<body class="dark">

<div id="root"></div>

<script>
"use strict";

/* ============================================================
   STORAGE UTILITIES (Autosave)
   ============================================================ */
function saveState(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}
function loadState(key, fallback) {
  const stored = localStorage.getItem(key);
  if (!stored) return fallback;
  try { return JSON.parse(stored); }
  catch { return fallback; }
}

/* ============================================================
   SCORING LOGIC
   ============================================================ */
function computeFlightScore(timers, twoBlade, logBonus) {
  if (timers.some(t => t === "" || t === null)) return null;

  const mean =
    timers.reduce((a, b) => a + parseFloat(b), 0) / timers.length;

  const rotor = twoBlade ? 1.1 : 1.0;
  const logFactor =
    logBonus === "full" ? 1.2 :
    logBonus === "partial" ? 1.1 : 1.0;

  return mean * rotor * logFactor;
}

function computeFinalScore(f1, f2, penalty) {
  if (f1 == null && f2 == null) return null;
  const best = Math.max(f1 || 0, f2 || 0);
  return best * (1 - penalty);
}
  <script>
/* ============================================================
   REACT COMPONENTS — SETUP SCREEN
   ============================================================ */

const e = React.createElement;

function SetupScreen({ onStart }) {
  const [division, setDivision] = React.useState("B");
  const [teamCount, setTeamCount] = React.useState(10);
  const [eventName, setEventName] = React.useState(
    "Berrien County Science Olympiad Helicopter"
  );

  return (
    React.createElement("div", { className: "p-6 max-w-3xl mx-auto" },
      React.createElement("h1", { className: "text-3xl font-bold mb-4" },
        "Event Setup"
      ),

      React.createElement("div", { className: "panel mb-4" },
        React.createElement("label", { className: "block mb-2 font-semibold" }, "Event Name"),
        React.createElement("input", {
          className: "input w-full",
          value: eventName,
          onChange: e => setEventName(e.target.value)
        })
      ),

      React.createElement("div", { className: "panel mb-4" },
        React.createElement("label", { className: "block mb-2 font-semibold" }, "Division"),
        React.createElement("select", {
          className: "input w-full",
          value: division,
          onChange: e => setDivision(e.target.value)
        },
          React.createElement("option", { value: "B" }, "Division B"),
          React.createElement("option", { value: "C" }, "Division C")
        )
      ),

      React.createElement("div", { className: "panel mb-4" },
        React.createElement("label", { className: "block mb-2 font-semibold" }, "Number of Teams"),
        React.createElement("input", {
          type: "number",
          min: 1,
          className: "input w-full",
          value: teamCount,
          onChange: e => setTeamCount(parseInt(e.target.value) || 1)
        })
      ),

      React.createElement("button", {
        className: "btn",
        onClick: () =>
          onStart({ eventName, division, teamCount })
      }, "Start Scoring")
    )
  );
}

/* ============================================================
   MAIN APP COMPONENT
   ============================================================ */
function App() {
  const [setup, setSetup] = React.useState(
    loadState("setup", null)
  );

  const [teams, setTeams] = React.useState(
    loadState("teams", [])
  );

  // Persist changes
  React.useEffect(() => saveState("setup", setup), [setup]);
  React.useEffect(() => saveState("teams", teams), [teams]);

  if (!setup) {
    return React.createElement(SetupScreen, {
      onStart: (info) => {
        const initialTeams = Array.from({ length: info.teamCount }).map((_, i) => ({
          id: i + 1,
          name: "",
          f1: ["", "", ""],
          f2: ["", "", ""],
          twoBlade1: false,
          twoBlade2: false,
          log1: "none",
          log2: "none",
          penalty: 0,
          f1Score: null,
          f2Score: null,
          finalScore: null,
          rank: null
        }));

        setTeams(initialTeams);
        setSetup(info);
      }
    });
  }

  /* After setup, the scoring UI will load (coming in Chunk 3) */
  return React.createElement("div", { id: "app-container" },
    React.createElement("h1", { className: "text-3xl font-bold p-4" },
      setup.eventName + " — Division " + setup.division
    ),
    React.createElement("div", { id: "scoring-root" },
      "Loading scoring interface..."
    )
  );
}
</script>

<!-- React Root Mount -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
});
</script>
<script>
/* ============================================================
   SCORING TABLE COMPONENTS
   ============================================================ */

function TeamRow({ team, index, updateTeam }) {
  const setField = (field, value) => {
    updateTeam(index, { ...team, [field]: value });
  };

  const updateTimer = (flight, timerIndex, value) => {
    const updated = [...team[flight]];
    updated[timerIndex] = value;
    updateTeam(index, { ...team, [flight]: updated });
  };

  const f1Score = computeFlightScore(team.f1.map(Number), team.twoBlade1, team.log1);
  const f2Score = computeFlightScore(team.f2.map(Number), team.twoBlade2, team.log2);
  const finalScore = computeFinalScore(f1Score, f2Score, Number(team.penalty));

  // Attach computed values
  updateTeam(index, {
    ...team,
    f1Score,
    f2Score,
    finalScore
  });

  const warningCell = (v) =>
    v === "" ? "input warning w-full" : "input w-full";

  return (
    React.createElement("div", {
      className: "grid grid-cols-13 gap-2 p-2 border-b border-gray-700 items-center"
    },

      /* Team ID */
      React.createElement("div", null, team.id),

      /* Team name input */
      React.createElement("input", {
        className: "input w-full",
        value: team.name,
        placeholder: "Team Name",
        onChange: e => setField("name", e.target.value)
      }),

      /* ---------------- Flight 1 Timers ---------------- */
      ...team.f1.map((t, i) =>
        React.createElement("input", {
          type: "number",
          step: "0.01",
          className: warningCell(t),
          value: t,
          onChange: e => updateTimer("f1", i, e.target.value)
        })
      ),

      /* Two-Blade F1 */
      React.createElement("select", {
        className: "input",
        value: team.twoBlade1 ? "Y" : "N",
        onChange: e => setField("twoBlade1", e.target.value === "Y")
      },
        React.createElement("option", { value: "N" }, "N"),
        React.createElement("option", { value: "Y" }, "Y")
      ),

      /* Log Bonus F1 */
      React.createElement("select", {
        className: "input",
        value: team.log1,
        onChange: e => setField("log1", e.target.value)
      },
        React.createElement("option", { value: "none" }, "None"),
        React.createElement("option", { value: "partial" }, "Partial"),
        React.createElement("option", { value: "full" }, "Full")
      ),

      /* ---------------- Flight 2 Timers ---------------- */
      ...team.f2.map((t, i) =>
        React.createElement("input", {
          type: "number",
          step: "0.01",
          className: warningCell(t),
          value: t,
          onChange: e => updateTimer("f2", i, e.target.value)
        })
      ),

      /* Two-Blade F2 */
      React.createElement("select", {
        className: "input",
        value: team.twoBlade2 ? "Y" : "N",
        onChange: e => setField("twoBlade2", e.target.value === "Y")
      },
        React.createElement("option", { value: "N" }, "N"),
        React.createElement("option", { value: "Y" }, "Y")
      ),

      /* Log Bonus F2 */
      React.createElement("select", {
        className: "input",
        value: team.log2,
        onChange: e => setField("log2", e.target.value)
      },
        React.createElement("option", { value: "none" }, "None"),
        React.createElement("option", { value: "partial" }, "Partial"),
        React.createElement("option", { value: "full" }, "Full")
      ),

      /* Penalty */
      React.createElement("input", {
        type: "number",
        step: "0.01",
        className: "input w-full",
        value: team.penalty,
        onChange: e => setField("penalty", e.target.value)
      }),

      /* Final Score (read-only) */
      React.createElement("div", { className: "text-primary font-bold text-center" },
        finalScore ? finalScore.toFixed(2) : "--"
      ),

      /* Rank (computed later) */
      React.createElement("div", { className: "text-primary font-bold text-center" },
        team.rank || "--"
      )
    )
  );
}

/* ============================================================
   SCORING PAGE
   ============================================================ */
function ScoringPage({ setup, teams, setTeams }) {

  // Re-rank whenever scores change
  React.useEffect(() => {
    const scores = teams.map(t => t.finalScore || 0);
    const sorted = [...scores].sort((a, b) => b - a);

    const rankedTeams = teams.map(t => ({
      ...t,
      rank: t.finalScore ? sorted.indexOf(t.finalScore) + 1 : null
    }));

    setTeams(rankedTeams);
  }, [teams]);

  const updateTeam = (index, newTeam) => {
    const updated = [...teams];
    updated[index] = newTeam;
    setTeams(updated);
  };

  return (
    React.createElement("div", { className: "p-4" },

      React.createElement("h2", { className: "text-2xl font-bold mb-4" },
        `Division ${setup.division} — Scoring`
      ),

      /* TABLE HEADER */
      React.createElement("div", {
        className: "grid grid-cols-13 gap-2 p-2 border-b border-gray-500 font-semibold"
      },
        "ID", "Team Name",
        "F1 T1","F1 T2","F1 T3","2B1","Log1",
        "F2 T1","F2 T2","F2 T3","2B2","Log2",
        "PEN","Score","Rank"
      ),

      /* TEAM ROWS */
      teams.map((team, i) =>
        React.createElement(TeamRow, {
          key: team.id,
          team,
          index: i,
          updateTeam
        })
      ),

      React.createElement("div", { className: "mt-6 flex gap-4" },
        React.createElement("button", {
          className: "btn",
          onClick: () => exportDivisionPDF(setup, teams)
        }, "Export Division PDF"),

        React.createElement("button", {
          className: "btn",
          onClick: () => exportSupervisorPacket(setup, teams)
        }, "Export Supervisor Packet PDF")
      )
    )
  );
}
</script>
<script>
/* ============================================================
   PDF EXPORT UTILITIES
   ============================================================ */

async function exportDivisionPDF(setup, teams) {
  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({
    unit: "pt",
    format: "letter"
  });

  const title = `${setup.eventName} — Division ${setup.division}`;
  pdf.setFontSize(18);
  pdf.text(title, 40, 40);

  pdf.setFontSize(12);
  pdf.text("Division Results", 40, 65);
  pdf.text(`Generated: ${new Date().toLocaleString()}`, 40, 82);

  let y = 110;

  pdf.setFontSize(10);
  pdf.text("Rank", 40, y);
  pdf.text("Team", 80, y);
  pdf.text("F1 Score", 200, y);
  pdf.text("F2 Score", 280, y);
  pdf.text("Final", 360, y);

  y += 15;

  teams
    .sort((a, b) => (b.finalScore || 0) - (a.finalScore || 0))
    .forEach((t) => {
      pdf.text(String(t.rank || "--"), 40, y);
      pdf.text(t.name || `Team ${t.id}`, 80, y);

      pdf.text(t.f1Score ? t.f1Score.toFixed(2) : "--", 200, y);
      pdf.text(t.f2Score ? t.f2Score.toFixed(2) : "--", 280, y);
      pdf.text(t.finalScore ? t.finalScore.toFixed(2) : "--", 360, y);

      y += 15;

      if (y > 720) {
        pdf.addPage();
        y = 40;
      }
    });

  pdf.save(`Division_${setup.division}_Results.pdf`);
}

/* ============================================================
   SUPERVISOR PACKET PDF
   ============================================================ */
async function exportSupervisorPacket(setup, teams) {
  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({
    unit: "pt",
    format: "letter"
  });

  /* -------- COVER PAGE -------- */
  pdf.setFontSize(20);
  pdf.text(setup.eventName, 40, 60);

  pdf.setFontSize(14);
  pdf.text(`Division ${setup.division} Supervisor Packet`, 40, 90);
  pdf.text(`Generated: ${new Date().toLocaleString()}`, 40, 118);
  pdf.text(`Number of Teams: ${teams.length}`, 40, 148);

  pdf.setFontSize(12);
  pdf.text("Scoring Rules:", 40, 190);
  pdf.text("- Flight Score = mean of 3 timers × rotor bonus × log bonus", 40, 210);
  pdf.text("- Rotor Bonus = 1.10 if two-blade", 40, 230);
  pdf.text("- Log Bonus = 1.20 (full), 1.10 (partial), 1.00 (none)", 40, 250);
  pdf.text("- Final Score = max(F1, F2) × (1 − penalty)", 40, 270);

  pdf.addPage();

  /* -------- PER TEAM PAGES -------- */
  teams
    .sort((a, b) => (a.rank || 999) - (b.rank || 999))
    .forEach((team, idx) => {
      pdf.setFontSize(16);
      pdf.text(`Team: ${team.name || ("Team " + team.id)}`, 40, 60);

      pdf.setFontSize(12);
      pdf.text(`Rank: ${team.rank || "--"}`, 40, 90);
      pdf.text(`Final Score: ${team.finalScore ? team.finalScore.toFixed(2) : "--"}`, 40, 110);

      pdf.text("Flight 1:", 40, 150);
      pdf.text(`Timers: ${team.f1.join(", ")}`, 60, 170);
      pdf.text(`Two-Blade: ${team.twoBlade1 ? "Yes" : "No"}`, 60, 190);
      pdf.text(`Log Bonus: ${team.log1}`, 60, 210);
      pdf.text(`Score: ${team.f1Score ? team.f1Score.toFixed(2) : "--"}`, 60, 230);

      pdf.text("Flight 2:", 40, 270);
      pdf.text(`Timers: ${team.f2.join(", ")}`, 60, 290);
      pdf.text(`Two-Blade: ${team.twoBlade2 ? "Yes" : "No"}`, 60, 310);
      pdf.text(`Log Bonus: ${team.log2}`, 60, 330);
      pdf.text(`Score: ${team.f2Score ? team.f2Score.toFixed(2) : "--"}`, 60, 350);

      pdf.text("Penalty:", 40, 390);
      pdf.text(`${team.penalty}`, 60, 410);

      pdf.text("Supervisor Notes:", 40, 450);
      pdf.line(40, 460, 550, 460);
      pdf.line(40, 480, 550, 480);
      pdf.line(40, 500, 550, 500);
      pdf.line(40, 520, 550, 520);

      pdf.text("Signatures:", 40, 560);
      pdf.line(40, 580, 250, 580);
      pdf.text("Event Supervisor", 40, 595);

      pdf.line(300, 580, 510, 580);
      pdf.text("Score Runner", 300, 595);

      if (idx < teams.length - 1) pdf.addPage();
    });

  pdf.save(`Supervisor_Packet_Div_${setup.division}.pdf`);
}
</script>
<script>
/* ============================================================
   MAIN APP – SCORING PAGE LOADING
   ============================================================ */

function App() {
  const [setup, setSetup] = React.useState(loadState("setup", null));
  const [teams, setTeams] = React.useState(loadState("teams", []));

  // Save state automatically
  React.useEffect(() => saveState("setup", setup), [setup]);
  React.useEffect(() => saveState("teams", teams), [teams]);

  // If no setup yet → show Setup Screen
  if (!setup) {
    return React.createElement(SetupScreen, {
      onStart: (info) => {
        const initialTeams = Array.from({ length: info.teamCount }).map((_, i) => ({
          id: i + 1,
          name: "",
          f1: ["", "", ""],
          f2: ["", "", ""],
          twoBlade1: false,
          twoBlade2: false,
          log1: "none",
          log2: "none",
          penalty: 0,
          f1Score: null,
          f2Score: null,
          finalScore: null,
          rank: null
        }));

        setTeams(initialTeams);
        setSetup(info);
      }
    });
  }

  // SCORING UI
  return React.createElement("div", { className: "p-4" },
    React.createElement("h1", { className: "text-3xl font-bold mb-4" },
      `${setup.eventName} — Division ${setup.division}`
    ),

    React.createElement("button", {
      className: "btn mb-4",
      onClick: () => {
        localStorage.removeItem("setup");
        localStorage.removeItem("teams");
        location.reload();
      }
    }, "Reset Event"),

    React.createElement(ScoringPage, {
      setup,
      teams,
      setTeams
    })
  );
}

/* ============================================================
   MOUNT REACT APP
   ============================================================ */
document.addEventListener("DOMContentLoaded", function () {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
});
</script>
