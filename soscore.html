<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Berrien County Science Olympiad Helicopter Scoring</title>

<!-- TailwindCSS (CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: { primary: '#38bdf8', bgdark: '#0f172a', panel: '#1e293b' }
      }
    }
  };
</script>

<!-- React 18 (UMD) -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- jsPDF for PDF Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; }
  .panel { background-color: #1e293b; border-radius: 0.5rem; padding: 1rem; }
  .btn { background-color: #38bdf8; padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: 700; color: black; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .input { background-color: #0f172a; border: 1px solid #334155; padding: 0.35rem 0.5rem; border-radius: 0.375rem; color: white; }
  .input:focus { outline: 2px solid #38bdf8; }
  .score-grid {
    display: grid;
    grid-template-columns:
      3rem      /* ID */
      1.3fr     /* Team Name */
      4.5rem 4.5rem 4.5rem /* F1 T1..T3 */
      4rem      /* 2B1 */
      6rem      /* Log1 */
      4.5rem 4.5rem 4.5rem /* F2 T1..T3 */
      4rem      /* 2B2 */
      6rem      /* Log2 */
      5rem      /* Penalty */
      6rem      /* Score */
      4rem;     /* Rank */
    gap: .5rem;
    align-items: center;
  }
  .score-grid.header { font-weight: 700; border-bottom: 1px solid #64748b; padding: .5rem 0; }
  .score-row { border-bottom: 1px solid #334155; padding: .4rem 0; }
  .subtle-warn { border-color: #a16207 !important; background-color: #78350f22 !important; }
  .group-label {
    text-transform: uppercase; font-size: .75rem; letter-spacing: .04em; color: #93c5fd;
  }
</style>
</head>

<body class="dark">
  <div id="root"></div>

<script>
"use strict";
const e = React.createElement;

/* =========================================================================
   Storage (per-division persistence)
   ========================================================================= */
const STORAGE_KEY = "scioly_helicopter_v1";

const loadAll = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {
      eventName: "Berrien County Science Olympiad Helicopter",
      activeDivision: "B",
      divisions: {
        B: { initialized: false, teamCount: 0, teams: [] },
        C: { initialized: false, teamCount: 0, teams: [] }
      }
    };
    return JSON.parse(raw);
  } catch {
    return {
      eventName: "Berrien County Science Olympiad Helicopter",
      activeDivision: "B",
      divisions: {
        B: { initialized: false, teamCount: 0, teams: [] },
        C: { initialized: false, teamCount: 0, teams: [] }
      }
    };
  }
};

const saveAll = (data) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
};

/* =========================================================================
   Scoring Logic
   ========================================================================= */
function computeFlightScore(timers, twoBlade, logBonus) {
  // Require all three timers present and valid numbers
  if (!Array.isArray(timers) || timers.length !== 3) return null;
  const vals = timers.map(v => (v === "" || v === null) ? NaN : Number(v));
  if (vals.some(Number.isNaN)) return null;

  const mean = (vals[0] + vals[1] + vals[2]) / 3;
  const rotor = twoBlade ? 1.10 : 1.00;
  const logFactor = logBonus === "full" ? 1.20
                  : logBonus === "partial" ? 1.10
                  : 1.00;
  return mean * rotor * logFactor;
}

function computeFinalScore(f1, f2, penalty) {
  const p = Number(penalty) || 0;
  const v1 = (typeof f1 === "number") ? f1 : 0;
  const v2 = (typeof f2 === "number") ? f2 : 0;
  const best = Math.max(v1, v2);
  if (best === 0) return null;
  return best * (1 - p);
}

/* =========================================================================
   Helpers for creating teams and updating state
   ========================================================================= */
function makeBlankTeam(id) {
  return {
    id, name: "",
    f1: ["", "", ""], twoBlade1: false, log1: "none",
    f2: ["", "", ""], twoBlade2: false, log2: "none",
    penalty: 0
  };
}

function initDivision(divisionData, teamCount) {
  const count = Math.max(1, parseInt(teamCount || "1", 10));
  return {
    initialized: true,
    teamCount: count,
    teams: Array.from({ length: count }, (_, i) => makeBlankTeam(i + 1))
  };
}

/* =========================================================================
   Row Component
   ========================================================================= */
function TeamRow({ team, onChange }) {
  const warning = (v) => (v === "" ? "input subtle-warn w-full" : "input w-full");

  const setField = (fld, val) => onChange({ ...team, [fld]: val });
  const updateTimer = (flight, i, val) => {
    const arr = [...team[flight]];
    arr[i] = val;
    onChange({ ...team, [flight]: arr });
  };

  const f1Score = computeFlightScore(team.f1, team.twoBlade1, team.log1);
  const f2Score = computeFlightScore(team.f2, team.twoBlade2, team.log2);
  const finalScore = computeFinalScore(f1Score, f2Score, team.penalty);

  return e("div", { className: "score-grid score-row" },
    // ID
    e("div", null, team.id),

    // Team name
    e("input", {
      className: "input w-full",
      value: team.name,
      placeholder: "Team Name",
      onChange: ev => setField("name", ev.target.value)
    }),

    // F1 timers
    ...team.f1.map((t, i) => e("input", {
      key: "f1" + i,
      type: "number", step: "0.01", min: "0",
      className: warning(t),
      value: t, placeholder: "0.00",
      onChange: ev => updateTimer("f1", i, ev.target.value)
    })),

    // 2B1
    e("select", {
      className: "input",
      value: team.twoBlade1 ? "Y" : "N",
      onChange: ev => setField("twoBlade1", ev.target.value === "Y")
    }, e("option", { value: "N" }, "N"), e("option", { value: "Y" }, "Y")),

    // Log1
    e("select", {
      className: "input",
      value: team.log1,
      onChange: ev => setField("log1", ev.target.value)
    },
      e("option", { value: "none" }, "None"),
      e("option", { value: "partial" }, "Partial"),
      e("option", { value: "full" }, "Full")
    ),

    // F2 timers
    ...team.f2.map((t, i) => e("input", {
      key: "f2" + i,
      type: "number", step: "0.01", min: "0",
      className: warning(t),
      value: t, placeholder: "0.00",
      onChange: ev => updateTimer("f2", i, ev.target.value)
    })),

    // 2B2
    e("select", {
      className: "input",
      value: team.twoBlade2 ? "Y" : "N",
      onChange: ev => setField("twoBlade2", ev.target.value === "Y")
    }, e("option", { value: "N" }, "N"), e("option", { value: "Y" }, "Y")),

    // Log2
    e("select", {
      className: "input",
      value: team.log2,
      onChange: ev => setField("log2", ev.target.value)
    },
      e("option", { value: "none" }, "None"),
      e("option", { value: "partial" }, "Partial"),
      e("option", { value: "full" }, "Full")
    ),

    // Penalty
    e("input", {
      type: "number", step: "0.01", min: "0", max: "1",
      className: "input w-full",
      value: team.penalty,
      onChange: ev => setField("penalty", ev.target.value)
    }),

    // Final score
    e("div", { className: "text-primary font-bold text-center" },
      typeof finalScore === "number" ? finalScore.toFixed(2) : "--"
    ),

    // Rank (filled by derived rendering)
    e("div", { className: "text-primary font-bold text-center" }, team.rank ?? "--")
  );
}

/* =========================================================================
   Division-scoped Scoring Page
   ========================================================================= */
function ScoringPage({ data, setData }) {
  const activeDivision = data.activeDivision;
  const divData = data.divisions[activeDivision];

  // If division not initialized, prompt for team count (your choice: B)
  React.useEffect(() => {
    if (!divData.initialized) {
      const count = window.prompt(`How many teams for Division ${activeDivision}?`, "10");
      const initialized = initDivision(divData, count);
      const next = {
        ...data,
        divisions: { ...data.divisions, [activeDivision]: initialized }
      };
      setData(next);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeDivision, divData.initialized]);

  if (!divData.initialized) {
    // Short-circuit while initializing (prompt just ran)
    return e("div", { className: "panel" }, `Initializing Division ${activeDivision}…`);
  }

  const teams = divData.teams;

  // Update helper (mutates only current division safely)
  const updateTeams = (newTeams) => {
    const next = {
      ...data,
      divisions: {
        ...data.divisions,
        [activeDivision]: { ...divData, teams: newTeams, teamCount: newTeams.length }
      }
    };
    setData(next);
  };

  const updateOne = (idx, newTeam) => {
    const arr = [...teams];
    arr[idx] = newTeam;
    updateTeams(arr);
  };

  // Derived scores & ranks (no state writes here)
  const derivedTeams = React.useMemo(() => {
    // First compute f1/f2/final for each
    const enriched = teams.map(t => {
      const f1 = computeFlightScore(t.f1, t.twoBlade1, t.log1);
      const f2 = computeFlightScore(t.f2, t.twoBlade2, t.log2);
      const final = computeFinalScore(f1, f2, t.penalty);
      return { ...t, f1Score: f1, f2Score: f2, finalScore: final };
    });

    // Rank using competition ranking (1, 2, 2, 4 …) with stable order for ties
    const order = enriched
      .map((t, i) => ({ i, s: (t.finalScore == null ? -Infinity : t.finalScore) }))
      .sort((a, b) => b.s - a.s);

    let rank = 0, seen = 0, last = null;
    const ranks = new Array(enriched.length).fill(null);
    for (const item of order) {
      seen++;
      if (item.s === -Infinity) { ranks[item.i] = null; continue; }
      if (last === null || item.s !== last) { rank = seen; last = item.s; }
      ranks[item.i] = rank;
    }

    return enriched.map((t, i) => ({ ...t, rank: ranks[i] }));
  }, [teams]);

  // Exports
  const exportDivisionPDF = () => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: "pt", format: "letter" });
    const title = `${data.eventName} — Division ${activeDivision}`;

    pdf.setFontSize(18); pdf.text(title, 40, 40);
    pdf.setFontSize(12);
    pdf.text("Division Results", 40, 65);
    pdf.text(`Generated: ${new Date().toLocaleString()}`, 40, 82);

    let y = 110;
    pdf.setFontSize(10);
    pdf.text("Rank", 40, y);
    pdf.text("Team", 80, y);
    pdf.text("F1", 240, y);
    pdf.text("F2", 320, y);
    pdf.text("Final", 400, y);
    y += 15;

    const sorted = [...derivedTeams].sort((a, b) => (b.finalScore ?? 0) - (a.finalScore ?? 0));
    for (const t of sorted) {
      pdf.text(String(t.rank ?? "--"), 40, y);
      pdf.text(String(t.name || `Team ${t.id}`), 80, y);
      pdf.text(t.f1Score != null ? t.f1Score.toFixed(2) : "--", 240, y);
      pdf.text(t.f2Score != null ? t.f2Score.toFixed(2) : "--", 320, y);
      pdf.text(t.finalScore != null ? t.finalScore.toFixed(2) : "--", 400, y);
      y += 15;
      if (y > 720) { pdf.addPage(); y = 40; }
    }
    pdf.save(`Division_${activeDivision}_Results.pdf`);
  };

  const exportSupervisorPacket = () => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: "pt", format: "letter" });

    pdf.setFontSize(20); pdf.text(data.eventName, 40, 60);
    pdf.setFontSize(14);
    pdf.text(`Division ${activeDivision} Supervisor Packet`, 40, 90);
    pdf.text(`Generated: ${new Date().toLocaleString()}`, 40, 118);
    pdf.text(`Number of Teams: ${derivedTeams.length}`, 40, 148);

    pdf.setFontSize(12);
    pdf.text("Scoring Rules:", 40, 190);
    pdf.text("- Flight Score = mean of 3 timers × rotor bonus × log bonus", 40, 210);
    pdf.text("- Rotor Bonus = 1.10 if two-blade", 40, 230);
    pdf.text("- Log Bonus = 1.20 (full), 1.10 (partial), 1.00 (none)", 40, 250);
    pdf.text("- Final Score = max(F1, F2) × (1 − penalty)", 40, 270);

    pdf.addPage();

    const sorted = [...derivedTeams].sort((a, b) => (a.rank ?? 999) - (b.rank ?? 999));
    sorted.forEach((team, idx) => {
      pdf.setFontSize(16);
      pdf.text(`Team: ${team.name || ("Team " + team.id)}`, 40, 60);
      pdf.setFontSize(12);
      pdf.text(`Rank: ${team.rank ?? "--"}`, 40, 90);
      pdf.text(`Final Score: ${team.finalScore != null ? team.finalScore.toFixed(2) : "--"}`, 40, 110);

      pdf.text("Flight 1:", 40, 150);
      pdf.text(`Timers: ${team.f1.join(", ")}`, 60, 170);
      pdf.text(`Two-Blade: ${team.twoBlade1 ? "Yes" : "No"}`, 60, 190);
      pdf.text(`Log Bonus: ${team.log1}`, 60, 210);
      pdf.text(`Score: ${team.f1Score != null ? team.f1Score.toFixed(2) : "--"}`, 60, 230);

      pdf.text("Flight 2:", 40, 270);
      pdf.text(`Timers: ${team.f2.join(", ")}`, 60, 290);
      pdf.text(`Two-Blade: ${team.twoBlade2 ? "Yes" : "No"}`, 60, 310);
      pdf.text(`Log Bonus: ${team.log2}`, 60, 330);
      pdf.text(`Score: ${team.f2Score != null ? team.f2Score.toFixed(2) : "--"}`, 60, 350);

      pdf.text("Penalty:", 40, 390);
      pdf.text(`${team.penalty}`, 60, 410);

      pdf.text("Supervisor Notes:", 40, 450);
      pdf.line(40, 460, 550, 460);
      pdf.line(40, 480, 550, 480);
      pdf.line(40, 500, 550, 500);
      pdf.line(40, 520, 550, 520);

      pdf.text("Signatures:", 40, 560);
      pdf.line(40, 580, 250, 580); pdf.text("Event Supervisor", 40, 595);
      pdf.line(300, 580, 510, 580); pdf.text("Score Runner", 300, 595);

      if (idx < sorted.length - 1) pdf.addPage();
    });

    pdf.save(`Supervisor_Packet_Div_${activeDivision}.pdf`);
  };

  // Controls visible INSIDE scoring section (your choice)
  const controlsBar = e("div", { className: "panel mb-4 flex flex-wrap items-center gap-3" },
    e("div", { className: "flex items-center gap-2" },
      e("label", { className: "font-semibold" }, "Division:"),
      e("select", {
        className: "input",
        value: activeDivision,
        onChange: (ev) => {
          const next = { ...data, activeDivision: ev.target.value };
          setData(next);
        }
      }, e("option", { value: "B" }, "B"), e("option", { value: "C" }, "C"))
    ),

    e("div", { className: "flex items-center gap-2 ml-2" },
      e("span", { className: "text-sm text-gray-300" }, `Teams: ${teams.length}`)
    ),

    e("div", { className: "flex items-center gap-2 ml-auto" },
      e("button", {
        className: "btn",
        onClick: () => {
          const name = window.prompt("Event name:", data.eventName || "");
          if (name !== null) setData({ ...data, eventName: name });
        }
      }, "Rename Event"),

      e("button", {
        className: "btn",
        onClick: () => {
          const n = window.prompt(`Set team count for Division ${activeDivision}:`, String(teams.length));
          if (n === null) return;
          const count = Math.max(1, parseInt(n || "1", 10));
          const newTeams = Array.from({ length: count }, (_, i) => teams[i] ? { ...teams[i], id: i + 1 } : makeBlankTeam(i + 1));
          updateTeams(newTeams);
        }
      }, "Set Team Count"),

      e("button", {
        className: "btn",
        onClick: () => updateTeams([...teams, makeBlankTeam(teams.length + 1)])
      }, "Add Team"),

      e("button", {
        className: "btn",
        onClick: () => {
          if (teams.length > 1) updateTeams(teams.slice(0, -1));
        }
      }, "Remove Last"),

      e("button", {
        className: "btn",
        onClick: () => {
          if (confirm(`Reset ONLY Division ${activeDivision}? This cannot be undone.`)) {
            const nextDiv = initDivision({ initialized: false, teamCount: 0, teams: [] }, 10);
            const next = {
              ...data,
              divisions: { ...data.divisions, [activeDivision]: nextDiv }
            };
            setData(next);
          }
        }
      }, `Reset Division ${activeDivision}`),

      e("button", { className: "btn", onClick: exportDivisionPDF }, "Export Division PDF"),
      e("button", { className: "btn", onClick: exportSupervisorPacket }, "Export Supervisor Packet")
    )
  );

  // Header rows
  const headerTop = e("div", { className: "score-grid header" },
    "", "", // (empty cells for ID, Name)
    e("div", { className: "group-label", style: { gridColumn: "3 / span 5" } }, "Flight 1"),
    e("div", { className: "group-label", style: { gridColumn: "8 / span 5" } }, "Flight 2"),
    "", "","" // Penalty, Score, Rank labels are on second row
  );

  const headerSecond = e("div", { className: "score-grid header", style: { fontWeight: 600 } },
    "ID", "Team",
    "T1", "T2", "T3", "2B", "Log",
    "T1", "T2", "T3", "2B", "Log",
    "PEN", "Score", "Rank"
  );

  return e("div", { className: "p-4" },
    controlsBar,
    headerTop,
    headerSecond,
    ...derivedTeams.map((t, i) =>
      e(TeamRow, {
        key: t.id,
        team: t,
        onChange: (newTeam) => updateOne(i, newTeam)
      })
    )
  );
}

/* =========================================================================
   App (top-level)
   ========================================================================= */
function App() {
  const [data, setData] = React.useState(loadAll());

  // Persist all changes
  React.useEffect(() => saveAll(data), [data]);

  return e("div", { className: "p-4 max-w-[1400px] mx-auto" },
    e("h1", { className: "text-3xl font-bold mb-2" },
      data.eventName || "Science Olympiad Helicopter"
    ),
    e("p", { className: "text-sm text-slate-300 mb-4" },
      "Switch divisions from inside the scoring section. Each division has its own teams and scores."
    ),
    e(ScoringPage, { data, setData })
  );
}

/* =========================================================================
   Mount
   ========================================================================= */
document.addEventListener("DOMContentLoaded", function () {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(e(App));
});

</script>
</body>
</html>
