<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Berrien County Science Olympiad Helicopter Scoring</title>

<!-- React 18 (production UMD) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- jsPDF for PDF Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root {
    --bg: #0f172a;       /* slate-900 */
    --panel: #1e293b;    /* slate-800 */
    --line: #334155;     /* slate-700 */
    --line2: #64748b;    /* slate-500 */
    --text: #e5e7eb;     /* gray-200 */
    --subtle: #cbd5e1;   /* slate-300 */
    --primary: #38bdf8;  /* sky-400 */
    --warn-border: #a16207; /* amber-700 */
    --warn-bg: #78350f22;   /* amber-900 @ ~13% alpha */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background-color: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 16px; }
  h1 { font-size: clamp(1.4rem, 2.5vw, 1.9rem); font-weight: 800; margin: 0 0 8px; }
  .subtext { color: var(--subtle); font-size: .95rem; margin-bottom: 16px; }

  .panel { background-color: var(--panel); border-radius: 8px; padding: 12px; }
  .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 12px; }
  .toolbar-left { display: flex; gap: 10px; align-items: center; }
  .toolbar-right { display: flex; gap: 10px; align-items: center; margin-left: auto; }

  .btn {
    background-color: var(--primary); color: #000; font-weight: 700;
    padding: 8px 12px; border-radius: 6px; border: 0; cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(1.05); }
  .input {
    background-color: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 6px 8px;
    border-radius: 6px;
  }
  .input:focus { outline: 2px solid var(--primary); }
  .label { font-weight: 700; margin-right: 6px; }

  /* --- Responsive scoring grid --- */

  /* Grid container wraps in a scroll shell so it always fits the screen */
  .grid-shell {
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;            /* clips sticky header bottom borders nicely */
  }
  .grid-scroll {
    overflow-x: auto;            /* horizontal scroll on narrow screens */
    overflow-y: auto;
    max-height: min(72vh, 1200px); /* keep room for toolbar on small screens */
  }

  /* 15-column grid with sensible min widths; shrinks but remains readable */
  .score-grid {
    display: grid;
    grid-template-columns:
      minmax(2.8rem, 3rem)           /* ID */
      minmax(12rem, 1.3fr)           /* Team Name */
      minmax(4.2rem, 5.2rem)         /* F1 T1 */
      minmax(4.2rem, 5.2rem)         /* F1 T2 */
      minmax(4.2rem, 5.2rem)         /* F1 T3 */
      minmax(3.6rem, 4.2rem)         /* 2B1 */
      minmax(5.2rem, 6.4rem)         /* Log1 */
      minmax(4.2rem, 5.2rem)         /* F2 T1 */
      minmax(4.2rem, 5.2rem)         /* F2 T2 */
      minmax(4.2rem, 5.2rem)         /* F2 T3 */
      minmax(3.6rem, 4.2rem)         /* 2B2 */
      minmax(5.2rem, 6.4rem)         /* Log2 */
      minmax(4.2rem, 5.2rem)         /* Penalty */
      minmax(5.0rem, 6.0rem)         /* Score */
      minmax(3.6rem, 4.2rem);        /* Rank */
    gap: .5rem;
    align-items: center;
    padding: 8px 12px;
  }

  .header {
    font-weight: 700;
    background: #0f172aee; /* sticky bg to cover rows when stuck */
    backdrop-filter: saturate(1.2);
    border-bottom: 1px solid var(--line2);
  }
  .row {
    border-bottom: 1px solid var(--line);
    padding-top: 6px; padding-bottom: 6px;
  }

  /* Two-row sticky header */
  .sticky {
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .sticky.second {
    top: 36px; /* sits just below the group header row */
    z-index: 6;
  }

  .group-label {
    text-transform: uppercase; font-size: .75rem; letter-spacing: .04em;
    color: #93c5fd; text-align: center;
    display: flex; align-items: center; justify-content: center;
  }

  /* simple column-span utilities used for group labels */
  .span-5 { grid-column: span 5; }

  .subtle-warn { border-color: var(--warn-border) !important; background-color: var(--warn-bg) !important; }
  .text-primary { color: var(--primary); font-weight: 800; text-align: center; }

  /* Keep buttons and inputs readable at small widths */
  @media (max-width: 640px) {
    .toolbar-right { width: 100%; justify-content: flex-start; }
    .btn { padding: 8px 10px; font-size: .92rem; }
    .input { font-size: .95rem; }
  }
</style>
</head>

<body>
  <div id="root"></div>

<script>
"use strict";

/* ---- Guard: if React failed to load, show a helpful message ---- */
(function ensureReactLoaded(){
  const ok = !!(window.React && window.ReactDOM);
  if (!ok) {
    document.getElementById('root').innerHTML =
      '<div style="padding:16px">Could not load React from CDN. Check internet and reload.</div>';
  }
})();

const e = React.createElement;

/* =========================================================================
   Storage (per-division persistence)
   ========================================================================= */
const STORAGE_KEY = "scioly_helicopter_v3";

const defaultState = () => ({
  eventName: "Berrien County Science Olympiad Helicopter",
  activeDivision: "B",
  divisions: {
    B: { initialized: false, teamCount: 0, teams: [] },
    C: { initialized: false, teamCount: 0, teams: [] }
  }
});

const loadAll = () => {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : defaultState(); }
  catch { return defaultState(); }
};
const saveAll = (data) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {} };

/* =========================================================================
   Scoring Logic
   ========================================================================= */
function computeFlightScore(timers, twoBlade, logBonus) {
  if (!Array.isArray(timers) || timers.length !== 3) return null;
  const vals = timers.map(v => (v === "" || v === null) ? NaN : Number(v));
  if (vals.some(Number.isNaN)) return null;
  const mean = (vals[0] + vals[1] + vals[2]) / 3;
  const rotor = twoBlade ? 1.10 : 1.00;
  const logFactor = logBonus === "full" ? 1.20 : logBonus === "partial" ? 1.10 : 1.00;
  return mean * rotor * logFactor;
}
function computeFinalScore(f1, f2, penalty) {
  const p = Number(penalty) || 0;
  const v1 = (typeof f1 === "number") ? f1 : 0;
  const v2 = (typeof f2 === "number") ? f2 : 0;
  const best = Math.max(v1, v2);
  if (best === 0) return null;
  return best * (1 - p);
}

/* =========================================================================
   Helpers
   ========================================================================= */
function makeBlankTeam(id) {
  return {
    id, name: "",
    f1: ["", "", ""], twoBlade1: false, log1: "none",
    f2: ["", "", ""], twoBlade2: false, log2: "none",
    penalty: 0
  };
}
function initDivisionFromPrompt(divisionKey) {
  const n = window.prompt(`How many teams for Division ${divisionKey}?`, "10");
  const count = Math.max(1, parseInt(n || "10", 10));
  return {
    initialized: true,
    teamCount: count,
    teams: Array.from({ length: count }, (_, i) => makeBlankTeam(i + 1))
  };
}

/* =========================================================================
   Row
   ========================================================================= */
function TeamRow({ team, onChange }) {
  const f1Score = computeFlightScore(team.f1, team.twoBlade1, team.log1);
  const f2Score = computeFlightScore(team.f2, team.twoBlade2, team.log2);
  const finalScore = computeFinalScore(f1Score, f2Score, team.penalty);

  const setField = (k, v) => onChange({ ...team, [k]: v });
  const setTimer = (flight, idx, v) => {
    const arr = [...team[flight]]; arr[idx] = v;
    onChange({ ...team, [flight]: arr });
  };
  const warn = (v) => (v === "" ? "input subtle-warn w-full" : "input w-full");

  return e("div", { className: "score-grid row" },
    e("div", null, team.id),

    e("input", { className: "input w-full", value: team.name, placeholder: "Team Name",
      onChange: ev => setField("name", ev.target.value) }),

    ...team.f1.map((t, i) => e("input", {
      key: "f1" + i, type: "number", step: "0.01", min: "0",
      className: warn(t), value: t, placeholder: "0.00",
      onChange: ev => setTimer("f1", i, ev.target.value)
    })),

    e("select", { className: "input", value: team.twoBlade1 ? "Y" : "N",
      onChange: ev => setField("twoBlade1", ev.target.value === "Y") },
      e("option", { value: "N" }, "N"), e("option", { value: "Y" }, "Y")),

    e("select", { className: "input", value: team.log1,
      onChange: ev => setField("log1", ev.target.value) },
      e("option", { value: "none" }, "None"),
      e("option", { value: "partial" }, "Partial"),
      e("option", { value: "full" }, "Full")),

    ...team.f2.map((t, i) => e("input", {
      key: "f2" + i, type: "number", step: "0.01", min: "0",
      className: warn(t), value: t, placeholder: "0.00",
      onChange: ev => setTimer("f2", i, ev.target.value)
    })),

    e("select", { className: "input", value: team.twoBlade2 ? "Y" : "N",
      onChange: ev => setField("twoBlade2", ev.target.value === "Y") },
      e("option", { value: "N" }, "N"), e("option", { value: "Y" }, "Y")),

    e("select", { className: "input", value: team.log2,
      onChange: ev => setField("log2", ev.target.value) },
      e("option", { value: "none" }, "None"),
      e("option", { value: "partial" }, "Partial"),
      e("option", { value: "full" }, "Full")),

    e("input", { className: "input w-full", type: "number", step: "0.01", min: "0", max: "1",
      value: team.penalty, onChange: ev => setField("penalty", ev.target.value) }),

    e("div", { className: "text-primary" },
      (typeof finalScore === "number") ? finalScore.toFixed(2) : "--"),

    e("div", { className: "text-primary" }, team.rank ?? "--")
  );
}

/* =========================================================================
   Scoring Page (division-scoped)
   ========================================================================= */
function ScoringPage({ data, setData }) {
  const activeDivision = data.activeDivision;
  const divData = data.divisions[activeDivision];

  /* HOOKS MUST REMAIN IN THE SAME ORDER EVERY RENDER */
  // 1) Initialize division first time we see it (async so we don't block paint)
  React.useEffect(() => {
    if (!divData.initialized) {
      setTimeout(() => {
        const initialized = initDivisionFromPrompt(activeDivision);
        const next = { ...data, divisions: { ...data.divisions, [activeDivision]: initialized } };
        setData(next);
      }, 0);
    }
  }, [activeDivision, divData.initialized, data, setData]);

  // 2) Safe teams array even if not initialized yet
  const teams = divData.initialized ? divData.teams : [];

  // 3) Derive scores/ranks (always run; OK on [])
  const derivedTeams = React.useMemo(() => {
    const enriched = teams.map(t => {
      const f1 = computeFlightScore(t.f1, t.twoBlade1, t.log1);
      const f2 = computeFlightScore(t.f2, t.twoBlade2, t.log2);
      const final = computeFinalScore(f1, f2, t.penalty);
      return { ...t, f1Score: f1, f2Score: f2, finalScore: final };
    });
    const order = enriched
      .map((t, i) => ({ i, s: (t.finalScore == null ? -Infinity : t.finalScore) }))
      .sort((a, b) => b.s - a.s);

    let rank = 0, seen = 0, last = null;
    const ranks = new Array(enriched.length).fill(null);
    for (const item of order) {
      seen++;
      if (item.s === -Infinity) { ranks[item.i] = null; continue; }
      if (last === null || item.s !== last) { rank = seen; last = item.s; }
      ranks[item.i] = rank;
    }
    return enriched.map((t, i) => ({ ...t, rank: ranks[i] }));
  }, [teams]);

  // Update helpers (only active division)
  const updateTeams = (newTeams) => {
    const next = {
      ...data,
      divisions: {
        ...data.divisions,
        [activeDivision]: { ...divData, initialized: true, teams: newTeams, teamCount: newTeams.length }
      }
    };
    setData(next);
  };

  // Exports
  const exportDivisionPDF = () => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: "pt", format: "letter" });
    const title = `${data.eventName} — Division ${activeDivision}`;

    pdf.setFontSize(18); pdf.text(title, 40, 40);
    pdf.setFontSize(12); pdf.text("Division Results", 40, 65);
    pdf.text(`Generated: ${new Date().toLocaleString()}`, 40, 82);

    let y = 110; pdf.setFontSize(10);
    pdf.text("Rank", 40, y); pdf.text("Team", 80, y);
    pdf.text("F1", 240, y); pdf.text("F2", 320, y); pdf.text("Final", 400, y);
    y += 15;

    const sorted = [...derivedTeams].sort((a, b) => (b.finalScore ?? 0) - (a.finalScore ?? 0));
    for (const t of sorted) {
      pdf.text(String(t.rank ?? "--"), 40, y);
      pdf.text(String(t.name || `Team ${t.id}`), 80, y);
      pdf.text(t.f1Score != null ? t.f1Score.toFixed(2) : "--", 240, y);
      pdf.text(t.f2Score != null ? t.f2Score.toFixed(2) : "--", 320, y);
      pdf.text(t.finalScore != null ? t.finalScore.toFixed(2) : "--", 400, y);
      y += 15; if (y > 720) { pdf.addPage(); y = 40; }
    }
    pdf.save(`Division_${activeDivision}_Results.pdf`);
  };
  const exportSupervisorPacket = () => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: "pt", format: "letter" });

    pdf.setFontSize(20); pdf.text(data.eventName, 40, 60);
    pdf.setFontSize(14);
    pdf.text(`Division ${activeDivision} Supervisor Packet`, 40, 90);
    pdf.text(`Generated: ${new Date().toLocaleString()}`, 40, 118);
    pdf.text(`Number of Teams: ${derivedTeams.length}`, 40, 148);

    pdf.setFontSize(12);
    pdf.text("Scoring Rules:", 40, 190);
    pdf.text("- Flight Score = mean of 3 timers × rotor bonus × log bonus", 40, 210);
    pdf.text("- Rotor Bonus = 1.10 if two-blade", 40, 230);
    pdf.text("- Log Bonus = 1.20 (full), 1.10 (partial), 1.00 (none)", 40, 250);
    pdf.text("- Final Score = max(F1, F2) × (1 − penalty)", 40, 270);

    pdf.addPage();
    const sorted = [...derivedTeams].sort((a, b) => (a.rank ?? 999) - (b.rank ?? 999));
    sorted.forEach((team, idx) => {
      pdf.setFontSize(16); pdf.text(`Team: ${team.name || ("Team " + team.id)}`, 40, 60);
      pdf.setFontSize(12);
      pdf.text(`Rank: ${team.rank ?? "--"}`, 40, 90);
      pdf.text(`Final Score: ${team.finalScore != null ? team.finalScore.toFixed(2) : "--"}`, 40, 110);
      pdf.text("Flight 1:", 40, 150);
      pdf.text(`Timers: ${team.f1.join(", ")}`, 60, 170);
      pdf.text(`Two-Blade: ${team.twoBlade1 ? "Yes" : "No"}`, 60, 190);
      pdf.text(`Log Bonus: ${team.log1}`, 60, 210);
      pdf.text(`Score: ${team.f1Score != null ? team.f1Score.toFixed(2) : "--"}`, 60, 230);
      pdf.text("Flight 2:", 40, 270);
      pdf.text(`Timers: ${team.f2.join(", ")}`, 60, 290);
      pdf.text(`Two-Blade: ${team.twoBlade2 ? "Yes" : "No"}`, 60, 310);
      pdf.text(`Log Bonus: ${team.log2}`, 60, 330);
      pdf.text(`Score: ${team.f2Score != null ? team.f2Score.toFixed(2) : "--"}`, 60, 350);
      pdf.text("Penalty:", 40, 390); pdf.text(`${team.penalty}`, 60, 410);
      pdf.text("Supervisor Notes:", 40, 450);
      pdf.line(40, 460, 550, 460); pdf.line(40, 480, 550, 480);
      pdf.line(40, 500, 550, 500); pdf.line(40, 520, 550, 520);
      pdf.text("Signatures:", 40, 560);
      pdf.line(40, 580, 250, 580); pdf.text("Event Supervisor", 40, 595);
      pdf.line(300, 580, 510, 580); pdf.text("Score Runner", 300, 595);
      if (idx < sorted.length - 1) pdf.addPage();
    });
    pdf.save(`Supervisor_Packet_Div_${activeDivision}.pdf`);
  };

  // Controls (inside scoring section)
  const controlsBar = e("div", { className: "panel toolbar" },
    e("div", { className: "toolbar-left" },
      e("span", { className: "label" }, "Division:"),
      e("select", {
        className: "input",
        value: activeDivision,
        onChange: (ev) => setData({ ...data, activeDivision: ev.target.value })
      }, e("option", { value: "B" }, "B"), e("option", { value: "C" }, "C")),
      e("span", null, `Teams: ${teams.length}`)
    ),
    e("div", { className: "toolbar-right" },
      e("button", {
        className: "btn",
        onClick: () => {
          const name = window.prompt("Event name:", data.eventName || "");
          if (name !== null) setData({ ...data, eventName: name });
        }
      }, "Rename Event"),
      e("button", {
        className: "btn",
        onClick: () => {
          const n = window.prompt(`Set team count for Division ${activeDivision}:`, String(teams.length || 10));
          if (n === null) return;
          const count = Math.max(1, parseInt(n || "1", 10));
          const newTeams = Array.from({ length: count }, (_, i) =>
            teams[i] ? { ...teams[i], id: i + 1 } : makeBlankTeam(i + 1)
          );
          updateTeams(newTeams);
        }
      }, "Set Team Count"),
      e("button", { className: "btn", onClick: () => updateTeams([...teams, makeBlankTeam(teams.length + 1)]) }, "Add Team"),
      e("button", { className: "btn", onClick: () => (teams.length > 1 ? updateTeams(teams.slice(0, -1)) : null) }, "Remove Last"),
      e("button", {
        className: "btn",
        onClick: () => {
          if (confirm(`Reset ONLY Division ${activeDivision}? This cannot be undone.`)) {
            const reset = initDivisionFromPrompt(activeDivision);
            const next = { ...data, divisions: { ...data.divisions, [activeDivision]: reset } };
            setData(next);
          }
        }
      }, `Reset Division ${activeDivision}`),
      e("button", { className: "btn", onClick: exportDivisionPDF }, "Export Division PDF"),
      e("button", { className: "btn", onClick: exportSupervisorPacket }, "Export Supervisor Packet")
    )
  );

  // ===== Two-row sticky headers (clean alignment) =====
  const headerTop = e(
    "div",
    { className: "score-grid header sticky" },
    // 15 total columns: 2 placeholders, 5 F1, 5 F2, 3 placeholders
    e("div", null),          // ID placeholder
    e("div", null),          // Team placeholder
    e("div", { className: "group-label span-5" }, "FLIGHT 1"),
    e("div", { className: "group-label span-5" }, "FLIGHT 2"),
    e("div", null),          // PEN placeholder
    e("div", null),          // Score placeholder
    e("div", null)           // Rank placeholder
  );

  const headerSecond = e(
    "div",
    { className: "score-grid header sticky second" },
    "ID", "Team",
    "F1 T1", "F1 T2", "F1 T3", "2B1", "Log1",
    "F2 T1", "F2 T2", "F2 T3", "2B2", "Log2",
    "PEN", "Score", "Rank"
  );

  // While division initializes (prompt fired), render placeholder with toolbar
  if (!divData.initialized) {
    return e("div", { className: "container" },
      e("h1", null, data.eventName),
      e("div", { className: "subtext" }, "Switch divisions inside the scoring section. Each division has its own teams and scores."),
      controlsBar,
      e("div", { className: "panel" }, `Initializing Division ${activeDivision}…`)
    );
  }

  return e("div", { className: "container" },
    e("h1", null, data.eventName),
    e("div", { className: "subtext" }, "Switch divisions inside the scoring section. Each division has its own teams and scores."),
    controlsBar,

    // Responsive shell: sticky headers + scrollable grid body
    e("div", { className: "grid-shell" },
      headerTop,
      headerSecond,
      e("div", { className: "grid-scroll" },
        // rows
        ...derivedTeams.map((t, i) =>
          e(TeamRow, {
            key: t.id,
            team: t,
            onChange: (newTeam) => {
              const arr = [...teams]; arr[i] = newTeam; updateTeams(arr);
            }
          })
        )
      )
    )
  );
}

/* =========================================================================
   App
   ========================================================================= */
function App() {
  const [data, setData] = React.useState(loadAll());
  React.useEffect(() => { saveAll(data); }, [data]);
  return e(ScoringPage, { data, setData });
}

/* =========================================================================
   Mount
   ========================================================================= */
document.addEventListener("DOMContentLoaded", function () {
  if (!(window.React && window.ReactDOM)) return; // guard
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(e(App));
});
</script>
</body>
</html>
