<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Berrien County Science Olympiad Helicopter Scoring</title>

<!-- TailwindCSS (CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: { primary: '#38bdf8', bgdark: '#0f172a', panel: '#1e293b' }
    } }
  };
</script>

<!-- React + ReactDOM (CDN) -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- html2canvas + jsPDF for PDF Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; }
  .panel { background-color: #1e293b; border-radius: 0.5rem; padding: 1rem; }
  .btn { background-color: #38bdf8; padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: bold; color: black; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.8; }
  .input { background-color: #0f172a; border: 1px solid #334155; padding: 0.35rem 0.5rem; border-radius: 0.375rem; color: white; }
  .input:focus { outline: 2px solid #38bdf8; }
  .warning { background-color: #7f1d1d !important; }
  /* Replace grid-cols-13 with explicit template for consistency without Tailwind plugin */
  .score-grid {
    display: grid;
    grid-template-columns:
      3rem          /* ID */
      1.2fr         /* Team Name */
      6rem 6rem 6rem /* F1 T1..T3 */
      4rem           /* 2B1 */
      6rem           /* Log1 */
      6rem 6rem 6rem /* F2 T1..T3 */
      4rem           /* 2B2 */
      6rem           /* Log2 */
      5rem           /* PEN */
      6rem           /* Score */
      4rem;          /* Rank */
    gap: 0.5rem;
    align-items: center;
  }
  .score-grid.header { font-weight: 600; border-bottom: 1px solid #6b7280; padding: 0.5rem; }
  .score-row { border-bottom: 1px solid #374151; padding: 0.5rem 0; }
</style>
</head>

<body class="dark">
<div id="root"></div>

<script>
"use strict";

/* ============================================================
   STORAGE UTILITIES (Autosave)
   ============================================================ */
function saveState(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
function loadState(key, fallback) {
  try {
    const stored = localStorage.getItem(key);
    return stored ? JSON.parse(stored) : fallback;
  } catch { return fallback; }
}

/* ============================================================
   SCORING LOGIC
   ============================================================ */
function computeFlightScore(timers, twoBlade, logBonus) {
  // timers: number[] (may include NaN for blanks)
  if (!Array.isArray(timers) || timers.length === 0) return null;
  // Require all three timers to be valid numbers
  if (timers.some(t => t === "" || t === null || Number.isNaN(Number(t)))) return null;

  const vals = timers.map(Number);
  const mean = vals.reduce((a, b) => a + b, 0) / vals.length;

  const rotor = twoBlade ? 1.10 : 1.00;
  const logFactor = logBonus === "full" ? 1.20
                  : logBonus === "partial" ? 1.10
                  : 1.00;

  return mean * rotor * logFactor;
}

function computeFinalScore(f1, f2, penalty) {
  const p = Number(penalty) || 0;
  const v1 = (typeof f1 === 'number') ? f1 : 0;
  const v2 = (typeof f2 === 'number') ? f2 : 0;
  const best = Math.max(v1, v2);
  if (best === 0) return null;
  return best * (1 - p);
}

/* ============================================================
   REACT COMPONENTS — SETUP SCREEN
   ============================================================ */
const e = React.createElement;

function SetupScreen({ onStart }) {
  const [division, setDivision] = React.useState("B");
  const [teamCount, setTeamCount] = React.useState(10);
  const [eventName, setEventName] = React.useState("Berrien County Science Olympiad Helicopter");

  return (
    e("div", { className: "p-6 max-w-3xl mx-auto" },
      e("h1", { className: "text-3xl font-bold mb-4" }, "Event Setup"),

      e("div", { className: "panel mb-4" },
        e("label", { className: "block mb-2 font-semibold" }, "Event Name"),
        e("input", {
          className: "input w-full",
          value: eventName,
          onChange: ev => setEventName(ev.target.value),
          placeholder: "Event name"
        })
      ),

      e("div", { className: "panel mb-4" },
        e("label", { className: "block mb-2 font-semibold" }, "Division"),
        e("select", {
          className: "input w-full",
          value: division,
          onChange: ev => setDivision(ev.target.value)
        },
          e("option", { value: "B" }, "Division B"),
          e("option", { value: "C" }, "Division C")
        )
      ),

      e("div", { className: "panel mb-4" },
        e("label", { className: "block mb-2 font-semibold" }, "Number of Teams"),
        e("input", {
          type: "number",
          min: 1,
          className: "input w-full",
          value: teamCount,
          onChange: ev => setTeamCount(Math.max(1, parseInt(ev.target.value || "1", 10)))
        })
      ),

      e("button", {
        className: "btn",
        onClick: () => onStart({ eventName, division, teamCount })
      }, "Start Scoring")
    )
  );
}

/* ============================================================
   TEAM ROW
   ============================================================ */
function TeamRow({ team, index, updateTeam }) {

  const setField = (field, value) => {
    updateTeam(index, { ...team, [field]: value });
  };

  const updateTimer = (flight, timerIndex, value) => {
    const updated = [...team[flight]];
    updated[timerIndex] = value;
    updateTeam(index, { ...team, [flight]: updated });
  };

  // Compute scores locally for display (do NOT write state from here to avoid loops)
  const f1Score = computeFlightScore(team.f1.map(Number), team.twoBlade1, team.log1);
  const f2Score = computeFlightScore(team.f2.map(Number), team.twoBlade2, team.log2);
  const finalScore = computeFinalScore(f1Score, f2Score, team.penalty);

  const warningCell = (v) => (v === "" ? "input warning w-full" : "input w-full");

  return (
    e("div", { className: "score-grid score-row" },

      // ID
      e("div", null, team.id),

      // Team name
      e("input", {
        className: "input w-full",
        value: team.name,
        placeholder: "Team Name",
        onChange: ev => setField("name", ev.target.value)
      }),

      // Flight 1 timers
      ...team.f1.map((t, i) =>
        e("input", {
          key: "f1" + i,
          type: "number",
          step: "0.01",
          min: "0",
          className: warningCell(t),
          value: t,
          placeholder: "0.00",
          onChange: ev => updateTimer("f1", i, ev.target.value)
        })
      ),

      // Two-Blade F1
      e("select", {
        className: "input",
        value: team.twoBlade1 ? "Y" : "N",
        onChange: ev => setField("twoBlade1", ev.target.value === "Y")
      },
        e("option", { value: "N" }, "N"),
        e("option", { value: "Y" }, "Y")
      ),

      // Log Bonus F1
      e("select", {
        className: "input",
        value: team.log1,
        onChange: ev => setField("log1", ev.target.value)
      },
        e("option", { value: "none" }, "None"),
        e("option", { value: "partial" }, "Partial"),
        e("option", { value: "full" }, "Full")
      ),

      // Flight 2 timers
      ...team.f2.map((t, i) =>
        e("input", {
          key: "f2" + i,
          type: "number",
          step: "0.01",
          min: "0",
          className: warningCell(t),
          value: t,
          placeholder: "0.00",
          onChange: ev => updateTimer("f2", i, ev.target.value)
        })
      ),

      // Two-Blade F2
      e("select", {
        className: "input",
        value: team.twoBlade2 ? "Y" : "N",
        onChange: ev => setField("twoBlade2", ev.target.value === "Y")
      },
        e("option", { value: "N" }, "N"),
        e("option", { value: "Y" }, "Y")
      ),

      // Log Bonus F2
      e("select", {
        className: "input",
        value: team.log2,
        onChange: ev => setField("log2", ev.target.value)
      },
        e("option", { value: "none" }, "None"),
        e("option", { value: "partial" }, "Partial"),
        e("option", { value: "full" }, "Full")
      ),

      // Penalty
      e("input", {
        type: "number",
        step: "0.01",
        min: "0",
        max: "1",
        className: "input w-full",
        value: team.penalty,
        onChange: ev => setField("penalty", ev.target.value)
      }),

      // Final Score (read-only)
      e("div", { className: "text-primary font-bold text-center" },
        typeof finalScore === "number" ? finalScore.toFixed(2) : "--"
      ),

      // Rank (computed later)
      e("div", { className: "text-primary font-bold text-center" },
        team.rank ?? "--"
      )
    )
  );
}

/* ============================================================
   SCORING PAGE
   ============================================================ */
function ScoringPage({ setup, teams, setTeams }) {

  // Recompute scores & ranks whenever teams change
  React.useEffect(() => {
    // Compute derived fields immutably at the page level
    const withScores = teams.map(t => {
      const f1 = computeFlightScore(t.f1.map(Number), t.twoBlade1, t.log1);
      const f2 = computeFlightScore(t.f2.map(Number), t.twoBlade2, t.log2);
      const final = computeFinalScore(f1, f2, t.penalty);
      return { ...t, f1Score: f1, f2Score: f2, finalScore: final };
    });

    // Rank: sort by finalScore desc; handle ties by same rank (competition ranking)
    const ordered = withScores
      .map((t, i) => ({ ...t, _idx: i }))
      .sort((a, b) => (b.finalScore ?? -Infinity) - (a.finalScore ?? -Infinity));

    let currentRank = 0;
    let lastScore = null;
    let seen = 0;

    for (const item of ordered) {
      seen += 1;
      if (item.finalScore == null) {
        item.rank = null;
        continue;
      }
      if (lastScore === null || item.finalScore !== lastScore) {
        currentRank = seen;
        lastScore = item.finalScore;
      }
      item.rank = currentRank;
    }

    // Restore original order
    const ranked = [...ordered].sort((a, b) => a._idx - b._idx).map(({_idx, ...rest}) => rest);

    setTeams(ranked);
  }, [teams, setTeams]);

  const updateTeam = (index, newTeam) => {
    const updated = [...teams];
    updated[index] = newTeam;
    setTeams(updated);
  };

  return (
    e("div", { className: "p-4" },
      e("h2", { className: "text-2xl font-bold mb-4" },
        `Division ${setup.division} — Scoring`
      ),

      // TABLE HEADER
      e("div", { className: "score-grid header" },
        "ID", "Team Name",
        "F1 T1","F1 T2","F1 T3","2B1","Log1",
        "F2 T1","F2 T2","F2 T3","2B2","Log2",
        "PEN","Score","Rank"
      ),

      // TEAM ROWS
      ...teams.map((team, i) =>
        e(TeamRow, { key: team.id, team, index: i, updateTeam })
      ),

      e("div", { className: "mt-6 flex gap-4 flex-wrap" },
        e("button", { className: "btn", onClick: () => exportDivisionPDF(setup, teams) }, "Export Division PDF"),
        e("button", { className: "btn", onClick: () => exportSupervisorPacket(setup, teams) }, "Export Supervisor Packet PDF")
      )
    )
  );
}

/* ============================================================
   PDF EXPORT UTILITIES
   ============================================================ */
async function exportDivisionPDF(setup, teams) {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "pt", format: "letter" });

  const title = `${setup.eventName} — Division ${setup.division}`;
  pdf.setFontSize(18);
  pdf.text(title, 40, 40);
  pdf.setFontSize(12);
  pdf.text("Division Results", 40, 65);
  pdf.text(`Generated: ${new Date().toLocaleString()}`, 40, 82);

  let y = 110;
  pdf.setFontSize(10);
  pdf.text("Rank", 40, y);
  pdf.text("Team", 80, y);
  pdf.text("F1 Score", 240, y);
  pdf.text("F2 Score", 320, y);
  pdf.text("Final", 400, y);
  y += 15;

  const sorted = [...teams].sort((a, b) => (b.finalScore ?? 0) - (a.finalScore ?? 0));
  sorted.forEach((t) => {
    pdf.text(String(t.rank ?? "--"), 40, y);
    pdf.text(String(t.name || `Team ${t.id}`), 80, y);
    pdf.text(t.f1Score != null ? t.f1Score.toFixed(2) : "--", 240, y);
    pdf.text(t.f2Score != null ? t.f2Score.toFixed(2) : "--", 320, y);
    pdf.text(t.finalScore != null ? t.finalScore.toFixed(2) : "--", 400, y);

    y += 15;
    if (y > 720) {
      pdf.addPage();
      y = 40;
    }
  });

  pdf.save(`Division_${setup.division}_Results.pdf`);
}

async function exportSupervisorPacket(setup, teams) {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "pt", format: "letter" });

  /* -------- COVER PAGE -------- */
  pdf.setFontSize(20);
  pdf.text(setup.eventName, 40, 60);
  pdf.setFontSize(14);
  pdf.text(`Division ${setup.division} Supervisor Packet`, 40, 90);
  pdf.text(`Generated: ${new Date().toLocaleString()}`, 40, 118);
  pdf.text(`Number of Teams: ${teams.length}`, 40, 148);

  pdf.setFontSize(12);
  pdf.text("Scoring Rules:", 40, 190);
  pdf.text("- Flight Score = mean of 3 timers × rotor bonus × log bonus", 40, 210);
  pdf.text("- Rotor Bonus = 1.10 if two-blade", 40, 230);
  pdf.text("- Log Bonus = 1.20 (full), 1.10 (partial), 1.00 (none)", 40, 250);
  pdf.text("- Final Score = max(F1, F2) × (1 − penalty)", 40, 270);

  pdf.addPage();

  /* -------- PER TEAM PAGES -------- */
  const sorted = [...teams].sort((a, b) => (a.rank ?? 999) - (b.rank ?? 999));

  sorted.forEach((team, idx) => {
    pdf.setFontSize(16);
    pdf.text(`Team: ${team.name || ("Team " + team.id)}`, 40, 60);
    pdf.setFontSize(12);
    pdf.text(`Rank: ${team.rank ?? "--"}`, 40, 90);
    pdf.text(`Final Score: ${team.finalScore != null ? team.finalScore.toFixed(2) : "--"}`, 40, 110);

    pdf.text("Flight 1:", 40, 150);
    pdf.text(`Timers: ${team.f1.join(", ")}`, 60, 170);
    pdf.text(`Two-Blade: ${team.twoBlade1 ? "Yes" : "No"}`, 60, 190);
    pdf.text(`Log Bonus: ${team.log1}`, 60, 210);
    pdf.text(`Score: ${team.f1Score != null ? team.f1Score.toFixed(2) : "--"}`, 60, 230);

    pdf.text("Flight 2:", 40, 270);
    pdf.text(`Timers: ${team.f2.join(", ")}`, 60, 290);
    pdf.text(`Two-Blade: ${team.twoBlade2 ? "Yes" : "No"}`, 60, 310);
    pdf.text(`Log Bonus: ${team.log2}`, 60, 330);
    pdf.text(`Score: ${team.f2Score != null ? team.f2Score.toFixed(2) : "--"}`, 60, 350);

    pdf.text("Penalty:", 40, 390);
    pdf.text(`${team.penalty}`, 60, 410);

    pdf.text("Supervisor Notes:", 40, 450);
    pdf.line(40, 460, 550, 460);
    pdf.line(40, 480, 550, 480);
    pdf.line(40, 500, 550, 500);
    pdf.line(40, 520, 550, 520);

    pdf.text("Signatures:", 40, 560);
    pdf.line(40, 580, 250, 580); pdf.text("Event Supervisor", 40, 595);
    pdf.line(300, 580, 510, 580); pdf.text("Score Runner", 300, 595);

    if (idx < sorted.length - 1) pdf.addPage();
  });

  pdf.save(`Supervisor_Packet_Div_${setup.division}.pdf`);
}

/* ============================================================
   MAIN APP
   ============================================================ */
function App() {
  const [setup, setSetup] = React.useState(loadState("setup", null));
  const [teams, setTeams] = React.useState(loadState("teams", []));

  React.useEffect(() => saveState("setup", setup), [setup]);
  React.useEffect(() => saveState("teams", teams), [teams]);

  if (!setup) {
    return e(SetupScreen, {
      onStart: (info) => {
        const initialTeams = Array.from({ length: info.teamCount }).map((_, i) => ({
          id: i + 1,
          name: "",
          f1: ["", "", ""],
          f2: ["", "", ""],
          twoBlade1: false,
          twoBlade2: false,
          log1: "none",
          log2: "none",
          penalty: 0,
          f1Score: null,
          f2Score: null,
          finalScore: null,
          rank: null
        }));
        setTeams(initialTeams);
        setSetup(info);
      }
    });
  }

  return e("div", { className: "p-4" },
    e("h1", { className: "text-3xl font-bold mb-4" },
      `${setup.eventName} — Division ${setup.division}`
    ),
    e("button", {
      className: "btn mb-4",
      onClick: () => {
        localStorage.removeItem("setup");
        localStorage.removeItem("teams");
        location.reload();
      }
    }, "Reset Event"),
    e(ScoringPage, { setup, teams, setTeams })
  );
}

/* ============================================================
   MOUNT REACT APP
   ============================================================ */
document.addEventListener("DOMContentLoaded", function () {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
});

/* ============================================================
   OFFLINE INIT LOG
   ============================================================ */
window.addEventListener("load", () => {
  console.log("Offline scoring app initialized.");
});
</script>
</body>
</html>
