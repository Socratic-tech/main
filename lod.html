  <section class="topbar"><div class="card brand"><div class="logo">⌁</div><div><h1>Vitals: The Teaching Hospital</h1><div class="subtitle">Life & Death Inspired · Working Build</div></div></div><div class="card monitor"><div class="ecgWrap"><canvas id="ecg" width="720" height="110"></canvas><div class="live">● LIVE</div></div><div class="vital hr"><div><small>HR</small><b id="vHR">--</b><span>bpm</span></div></div><div class="vital bp"><div><small>BP</small><b id="vBP">--</b><span>mmHg</span></div></div><div class="vital temp"><div><small>Temp</small><b id="vTemp">--</b><span>°C</span></div></div><div class="vital o2"><div><small>SpO₂</small><b id="vO2">--</b><span>%</span></div></div><div class="vital pain"><div><small>Pain</small><b id="vPain">--</b><span>/10</span></div></div><div class="stab"><div><div class="meter"></div><b id="vStability">--</b><span id="stabLabel">STABLE</span></div></div></div></section>

</div></div>

const patients=[
{id:'gas',name:'Avery N.',age:31,sex:'Female',room:'1A',diagnosis:'Benign gas pain',correctAction:'observe',complaint:'Crampy bloating. No fever. Pain does not localize.',chart:'No major medical history. Ate a heavy meal late last night.',vitals:{hr:82,bp:'118/76',temp:37.0,spo2:99,pain:3,stability:92},examPain:[],interview:[['location','Where is the pain?','It feels crampy and all over, not one spot.','key','↔️','Non-localized crampy pain','neutral'],['fever','Any fever?','No fever.','key','✅','No fever','neutral'],['nausea','Any nausea?','A little bloating, no vomiting.','support','💨','Bloating without vomiting','neutral'],['urinary','Any urinary symptoms?','No urinary symptoms.','support','✅','No urinary symptoms','neutral'],['diet','What did you eat?','Large meal late last night.','support','🍽️','Heavy meal before symptoms','supportive'],['sleep','How did you sleep?','Fine until bloating began.','low','','', 'neutral']],xrayType:'normal',usCm:null,requires:'none',surgery:null},
{id:'infection',name:'Mason R.',age:19,sex:'Male',room:'2C',diagnosis:'Diffuse intestinal infection',correctAction:'medicate',complaint:'Generalized abdominal soreness with fever and nausea.',chart:'Several classmates recently had stomach illness.',vitals:{hr:104,bp:'116/74',temp:38.5,spo2:98,pain:6,stability:78},examPain:['ruq','luq','rlq','llq'],interview:[['spread','Is the pain in one spot or all over?','It hurts all over.','key','↔️','Diffuse abdominal pain','critical'],['fever','Any fever?','Fever and chills began last night.','key','🌡️','Fever with chills','supportive'],['sick','Any sick contacts?','Several classmates have similar symptoms.','key','👥','Sick contacts','supportive'],['migration','Did pain move to the RLQ?','No. It stayed generalized.','support','✅','No pain migration','neutral'],['urinary','Any urinary symptoms?','No urinary symptoms.','support','✅','No urinary symptoms','neutral'],['family','Family history?','Not relevant here.','low','','','neutral']],xrayType:'diffuse',usCm:null,requires:'none',surgery:null},
{id:'stone',name:'Jordan S.',age:42,sex:'Male',room:'3B',diagnosis:'Kidney stone',correctAction:'refer',complaint:'Sharp side pain that comes in waves. Nausea. No fever.',chart:'History of dehydration during long work shifts.',vitals:{hr:96,bp:'126/80',temp:37.2,spo2:99,pain:7,stability:84},examPain:['rlq','llq'],interview:[['location','Where is the pain?','Pain starts near the flank and waves toward the groin.','key','📍','Flank-to-groin pain','critical'],['wave','Constant or wave-like?','It comes in intense waves.','key','🌊','Colicky wave-like pain','critical'],['urinary','Any urinary symptoms?','Some urgency and discomfort.','key','🚻','Urinary symptoms present','supportive'],['fever','Any fever?','No fever.','support','✅','No fever','neutral'],['nausea','Any nausea?','Nausea during pain waves.','support','🤢','Nausea with pain waves','supportive'],['diet','What did you eat?','No unusual food exposure.','low','','','neutral']],xrayType:'stones',usCm:null,requires:'xray',surgery:null},
{id:'appendix',name:'Emily Carter',age:24,sex:'Female',room:'4A',diagnosis:'Appendicitis',correctAction:'operate',complaint:'Pain started near the belly button and moved to the right lower abdomen.',chart:'No major medical history. Last meal: toast eight hours ago.',vitals:{hr:102,bp:'124/78',temp:38.2,spo2:97,pain:6,stability:72},examPain:['rlq','rebound'],interview:[['location','Where is the pain now?','Patient points to the right lower abdomen.','key','📍','Pain localized to RLQ','critical'],['migration','Did the pain move?','It started near the belly button and moved right lower.','key','🏃','Pain migrated to RLQ','critical'],['nausea','Any nausea or appetite change?','Nausea and decreased appetite.','key','🤢','Nausea and low appetite','supportive'],['fever','Any fever or chills?','Fever began earlier today.','key','🌡️','Fever present','supportive'],['urinary','Any urinary symptoms?','No urinary symptoms or flank pain.','support','✅','No urinary symptoms','neutral'],['sleep','How did you sleep?','Poorly because of pain. Low diagnostic value.','low','','','neutral']],xrayType:'appendix',usCm:null,requires:'xray',surgery:'appendectomy'},
{id:'aneurysmSmall',name:'Samir T.',age:67,sex:'Male',room:'5D',diagnosis:'Small abdominal aortic aneurysm',correctAction:'observe',complaint:'Deep central abdominal discomfort. Patient says, “That feels like a lump.”',chart:'Older patient with hypertension history. Stable vitals.',vitals:{hr:88,bp:'138/84',temp:37.1,spo2:97,pain:4,stability:80},examPain:['navel'],interview:[['lump','Do you feel a mass or pulse?','Patient describes a pulsing lump below the navel.','key','⭕','Pulsing central mass sensation','critical'],['pain','How severe is the pain?','Moderate discomfort, not tearing pain.','support','📉','Moderate central discomfort','supportive'],['fever','Any fever?','No fever.','support','✅','No fever','neutral'],['migration','Did pain move to the RLQ?','No migration.','support','✅','No RLQ migration','neutral'],['history','Blood pressure history?','Longstanding hypertension.','key','🫀','Hypertension history','supportive'],['diet','Recent diet changes?','Not relevant.','low','','','neutral']],xrayType:'normal',usCm:4.2,requires:'ultrasound',surgery:null},
{id:'aneurysmLarge',name:'Dana V.',age:71,sex:'Female',room:'6E',diagnosis:'Large abdominal aortic aneurysm',correctAction:'operate',complaint:'Severe central abdominal pain with a pulsating lump.',chart:'Older patient with vascular disease history. Watch stability closely.',vitals:{hr:118,bp:'102/66',temp:37.4,spo2:96,pain:8,stability:58},examPain:['navel'],interview:[['lump','Do you feel a mass or pulse?','Patient reports a strong pulsing lump.','key','⭕','Strong pulsing central mass','critical'],['pain','How severe is the pain?','Severe deep central pain.','key','🚨','Severe central pain','critical'],['fever','Any fever?','No fever.','support','✅','No fever','neutral'],['migration','Did pain move to the RLQ?','No migration.','support','✅','No RLQ migration','neutral'],['history','Vascular history?','Known vascular disease.','key','🫀','Vascular disease history','supportive'],['diet','Recent diet changes?','Not relevant.','low','','','neutral']],xrayType:'normal',usCm:6.1,requires:'ultrasound',surgery:'aneurysm repair'},
{id:'constipation',name:'Nora P.',age:36,sex:'Female',room:'7F',diagnosis:'Constipation / benign bowel gas',correctAction:'observe',complaint:'Lower abdominal fullness and cramping for two days. No fever.',chart:'Recently started iron supplement. Stable and comfortable at rest.',vitals:{hr:78,bp:'116/72',temp:36.9,spo2:99,pain:3,stability:94},examPain:['llq'],interview:[['bowel','When was your last bowel movement?','Three days ago, harder than usual.','key','🚽','Constipation history','critical'],['fever','Any fever?','No fever.','key','✅','No fever','neutral'],['vomit','Any vomiting?','No vomiting.','support','✅','No vomiting','neutral'],['migration','Did pain move to the RLQ?','No movement to the RLQ.','support','✅','No pain migration','neutral'],['meds','Any new medicines?','Started iron supplement recently.','key','💊','Iron supplement started','supportive'],['family','Family history?','Not relevant.','low','','','neutral']],xrayType:'normal',usCm:null,requires:'none',surgery:null},
{id:'foodPoisoning',name:'Luis G.',age:28,sex:'Male',room:'8G',diagnosis:'Acute gastroenteritis / foodborne illness',correctAction:'medicate',complaint:'Nausea, diarrhea, and crampy pain after a picnic.',chart:'Several family members became sick after the same meal.',vitals:{hr:108,bp:'112/70',temp:38.0,spo2:98,pain:5,stability:82},examPain:['ruq','luq','rlq','llq'],interview:[['meal','Any shared food exposure?','Family ate the same picnic food and several are sick.','key','🍗','Shared food exposure','critical'],['diarrhea','Any diarrhea?','Frequent watery diarrhea.','key','↔️','Watery diarrhea','supportive'],['fever','Any fever?','Low fever started this morning.','support','🌡️','Low fever','supportive'],['migration','Did pain move to the RLQ?','No, cramps are all over.','key','✅','No focal migration','neutral'],['urinary','Any urinary symptoms?','No urinary symptoms.','support','✅','No urinary symptoms','neutral'],['sleep','How did you sleep?','Poorly. Low diagnostic value.','low','','','neutral']],xrayType:'diffuse',usCm:null,requires:'none',surgery:null},
{id:'obstruction',name:'Grace M.',age:59,sex:'Female',room:'9H',diagnosis:'Possible bowel obstruction',correctAction:'refer',complaint:'Crampy abdominal pain with vomiting and a swollen belly.',chart:'Prior abdominal surgery. No bowel movement since yesterday.',vitals:{hr:112,bp:'118/76',temp:37.6,spo2:97,pain:7,stability:70},examPain:['ruq','luq','rlq','llq'],interview:[['surgery','Any previous abdominal surgery?','Yes, prior bowel surgery years ago.','key','🧵','Prior abdominal surgery','critical'],['vomit','Any vomiting?','Repeated vomiting overnight.','key','🤮','Repeated vomiting','critical'],['distension','Does the belly feel swollen?','Patient reports increasing distension.','key','🎈','Abdominal distension','supportive'],['bowel','Passing gas or stool?','No stool and minimal gas.','support','🚫','No stool or gas','supportive'],['fever','Any fever?','No clear fever.','support','✅','No clear fever','neutral'],['diet','What did you eat?','Not helpful here.','low','','','neutral']],xrayType:'diffuse',usCm:null,requires:'xray',surgery:null}
];
const baseVitals=patients.map(p=>({...p.vitals}));
const game={scene:'hub',patientIndex:0,completedPatients:{},score:0,time:0,budget:2500,evidence:[],log:[],asked:[],slots:5,palpated:[],selectedAction:null,outcome:null,mistakes:[],xray:{view:'abdomenAP',beamX:50,beamY:50,exposure:55,still:false,taken:false,quality:0,usable:false},ultra:{probeX:50,probeY:50,angle:50,frozen:false,quality:0,measured:false},orprep:{step:0,sterile:30,mistakes:0,completed:[]},surgery:{step:0,mistakes:0,bleeding:false,complication:null,completed:[]},office:{pending:[],resolved:[],nextAt:18,lastPenaltyAt:0},done:{hub:false,room:false,interview:false,exam:false,imaging:false,decision:false,orprep:false,surgery:false,debrief:false}};
const regions=[{id:'ruq',label:'RUQ'},{id:'luq',label:'LUQ'},{id:'navel',label:'Navel'},{id:'rlq',label:'RLQ'},{id:'llq',label:'LLQ'},{id:'rebound',label:'Rebound'}];
const prepSteps=[['wash','🧼','Scrub hands'],['gloves','🧤','Sterile gloves'],['antiseptic','🧴','Apply antiseptic'],['drape','🟦','Place sterile drape'],['anesthesia','😴','Confirm anesthesia'],['antibiotics','💉','Give antibiotics'],['iv','🩸','Confirm IV / blood']];
const surgerySteps=[['incision','🔪','Mark and make incision'],['retract','↔️','Retract tissue'],['identify','👁️','Identify target anatomy'],['clamp','🩺','Clamp / control blood supply'],['remove','✂️','Remove or repair target'],['irrigate','🧽','Irrigate and suction'],['close','🪡','Close layers']];
const officeTemplates=[
 {id:'busLate',icon:'🚌',title:'School transport delay',body:'Your office says a student patient is waiting because the bus is late and the parent is upset.',correct:'triage',choices:[['triage','Have front desk explain delay, keep appointment, and ask nurse to triage symptoms.'],['ignore','Tell them to wait without follow-up.'],['cancel','Cancel the appointment immediately.']]},
 {id:'rxRefill',icon:'💊',title:'Medication refill request',body:'A stable patient needs a routine refill, but the chart needs a quick safety check.',correct:'chart',choices:[['auto','Approve without checking the chart.'],['chart','Ask MA to check allergies/last visit, then queue refill for signature.'],['deny','Deny the refill without review.']]},
 {id:'feverCall',icon:'🌡️',title:'Parent reports worsening fever',body:'A parent calls the office: fever is higher and the student looks worse than this morning.',correct:'nurse',choices:[['nurse','Route to nurse triage immediately and give clear urgent-care red flags.'],['tomorrow','Offer the next available appointment tomorrow.'],['reassure','Say it is probably fine without triage.']]},
 {id:'forms',icon:'📄',title:'School form problem',body:'A school medication form was faxed but is missing a signature before dismissal.',correct:'delegate',choices:[['delegate','Have front desk resend it and flag the signature line for you.'],['ignore','Leave it until tomorrow.'],['verbal','Tell school to accept a verbal order only.']]},
 {id:'angryParent',icon:'📞',title:'Escalated parent call',body:'A parent is angry about lab results not being explained clearly.',correct:'callBack',choices:[['callBack','Have nurse summarize results and schedule your callback window.'],['deflect','Tell front desk to say you are too busy.'],['release','Send raw results with no explanation.']]}
];

function p(){return patients[game.patientIndex]}function v(){return p().vitals}function formatTime(){const m=12+game.time,h=9+Math.floor(m/60);return`${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`}function spend(min,pts=0){game.time+=min;game.score+=pts;advanceOffice(min);if(!game.outcome&&game.scene!=='hub'&&game.scene!=='office'){v().stability=Math.max(0,v().stability-Math.ceil(min/12));if(v().stability<35)addLog('⚠️','Patient stability is getting low.')}}function addLog(icon,text){game.log.unshift({icon,text,time:formatTime()});game.log=game.log.slice(0,14)}function clearLog(){game.log=[];render()}function addEvidence(ev){if(ev&&ev.title&&!game.evidence.some(e=>e.id===ev.id))game.evidence.push(ev)}function setScene(scene){game.scene=scene;render();window.scrollTo({top:0,behavior:'smooth'})}
function resetPatient(index=game.patientIndex){game.patientIndex=index;patients.forEach((pt,i)=>pt.vitals={...baseVitals[i]});Object.assign(game,{scene:'room',score:0,time:0,budget:2500,evidence:[],log:[],asked:[],slots:5,palpated:[],selectedAction:null,outcome:null,mistakes:[],xray:{view:'abdomenAP',beamX:50,beamY:50,exposure:55,still:false,taken:false,quality:0,usable:false},ultra:{probeX:50,probeY:50,angle:50,frozen:false,quality:0,measured:false},orprep:{step:0,sterile:30,mistakes:0,completed:[]},surgery:{step:0,mistakes:0,bleeding:false,complication:null,completed:[]},office:{pending:[],resolved:[],nextAt:18,lastPenaltyAt:0},done:{hub:false,room:false,interview:false,exam:false,imaging:false,decision:false,orprep:false,surgery:false,debrief:false}});addLog('🏥',`Admitted ${p().name} to Room ${p().room}.`);render()}function goHub(){game.scene='hub';render()}function sceneDone(id){return game.done[id]||false}
function render(){renderVitals();renderSteps();renderEvidence();renderLog();const stage=document.getElementById('stage');if(game.scene==='hub')stage.innerHTML=renderHub();if(game.scene==='room')stage.innerHTML=renderRoom();if(game.scene==='interview')stage.innerHTML=renderInterview();if(game.scene==='exam')stage.innerHTML=renderExam();if(game.scene==='imaging')stage.innerHTML=renderImaging();if(game.scene==='xray')stage.innerHTML=renderXray();if(game.scene==='ultrasound')stage.innerHTML=renderUltrasound();if(game.scene==='decision')stage.innerHTML=renderDecision();if(game.scene==='orprep')stage.innerHTML=renderORPrep();if(game.scene==='surgery')stage.innerHTML=renderSurgery();if(game.scene==='office')stage.innerHTML=renderOffice();if(game.scene==='debrief')stage.innerHTML=renderDebrief();if(game.scene==='xray')updateBeam();if(game.scene==='ultrasound')updateProbe()}
function renderVitals(){const vt=v();document.getElementById('vHR').textContent=Math.round(vt.hr);document.getElementById('vBP').textContent=vt.bp;document.getElementById('vTemp').textContent=vt.temp.toFixed(1);document.getElementById('vO2').textContent=Math.round(vt.spo2);document.getElementById('vPain').textContent=Math.round(vt.pain);document.getElementById('vStability').textContent=`${Math.round(vt.stability)}%`;document.getElementById('stabLabel').textContent=vt.stability<35?'CRITICAL':vt.stability<60?'WATCH':'STABLE'}function renderSteps(){document.getElementById('stepList').innerHTML=scenes.map(s=>`<div class="step ${game.scene===s.id?'active':''} ${sceneDone(s.id)?'done':''}"><div class="stepIcon">${sceneDone(s.id)?'✓':s.icon}</div><div><div class="stepTitle">${s.label}</div><div class="stepCopy">${s.copy}</div></div></div>`).join('')}function renderEvidence(){document.getElementById('evidenceCount').textContent=`${game.evidence.length} cards`;document.getElementById('evidenceStack').innerHTML=game.evidence.length?game.evidence.map(e=>`<div class="ev ${e.type||'neutral'}"><div class="evIcon">${e.icon||'•'}</div><div><strong>${e.title}</strong><span>${e.source}</span></div></div>`).join(''):`<div class="ev neutral"><div class="evIcon">🔎</div><div><strong>No evidence yet</strong><span>Findings appear here.</span></div></div>`}function renderLog(){document.getElementById('eventLog').innerHTML=game.log.length?game.log.map(l=>`<div class="logRow"><div>${l.icon}</div><div><time>${l.time}</time>${l.text}</div></div>`).join(''):`<div class="logRow"><div>•</div><div>No events yet.</div></div>`}
function header(badge,title,copy,right=''){return`<div class="stageHeader"><div><span class="badge">${badge}</span><h2>${title}</h2><p>${copy}</p></div><div class="actions">${right}</div></div>`}function footer(left='',right=''){const office=game.scene==='office'?'':officeButton();return`<div class="footer"><div class="group">${left}</div><div class="group">${office}${right}</div></div>`}
function renderHub(){const cards=patients.map((pt,i)=>`<button class="patientCard ${game.completedPatients[pt.id]?'done':''}" onclick="resetPatient(${i})"><h3>Room ${pt.room}: ${pt.name}</h3><p>${pt.complaint}</p><span class="tag">${game.completedPatients[pt.id]?'Completed':'Admit patient'}</span></button>`).join('');return`${header('Hospital Hub','Choose a Patient','Work through the original-style loop: room, exam, imaging, decision, medical school feedback, OR, and debrief.')}<div class="stageBody"><div class="hubGrid">${cards}</div><div class="callout" style="margin-top:14px"><b>Design goal:</b> The draw of the original was procedural reasoning. You do not just click a diagnosis. You examine, order the right imaging, make the clipboard decision, then survive strict prep and surgery if needed.</div><div class="callout" style="margin-top:14px"><b>Practice pressure:</b> Office calls can stack up while you work. Check the office line and resolve issues before they turn into score and budget penalties.</div></div>${footer(`<span class="statusText">Completed: ${Object.keys(game.completedPatients).length}/${patients.length}</span>`,'')}`}
function renderRoom(){const vt=v();return`${header('Patient Room',`Room ${p().room}: ${p().name}`,'Review the complaint and chart before interviewing.',`<button onclick="goHub()">Hospital Hub</button>`)}<div class="stageBody"><div class="roomLayout"><div class="portrait"><div class="person"><div class="painGlow ${vt.pain>4?'':'hidden'}"></div><div class="headShape"><span class="faceDot faceL"></span><span class="faceDot faceR"></span></div><div class="armShape armL"></div><div class="armShape armR"></div><div class="bodyShape"></div><div class="legShape legL"></div><div class="legShape legR"></div></div></div><div class="chart"><div class="infoGrid"><div class="info"><small>Name</small><b>${p().name}</b></div><div class="info"><small>Age / Sex</small><b>${p().age} / ${p().sex}</b></div><div class="info"><small>Room</small><b>${p().room}</b></div><div class="info"><small>Stability</small><b>${vt.stability}%</b></div></div><div class="callout"><b>Chief complaint:</b><br>${p().complaint}</div><div class="callout"><b>Chart:</b><br>${p().chart}</div><p class="teacherNote">Do not jump to the clipboard. The safest route starts with questions and abdominal mapping.</p></div></div></div>${footer(`<span class="statusText">Score: ${game.score} · Time: ${formatTime()} · Budget: $${game.budget}</span>`,`<button class="primary" onclick="startInterview()">Start Interview ▶</button>`)}`}
function startInterview(){game.done.room=true;spend(2,5);addLog('💬','Interview started.');setScene('interview')}
function renderInterview(){const used=game.asked.length,slots=Array.from({length:game.slots},(_,i)=>`<span class="slot ${i<used?'used':''}"></span>`).join(''),qs=p().interview.map(q=>`<button class="question ${game.asked.includes(q[0])?'asked':''} ${q[3]==='low'?'low':''}" onclick="ask('${q[0]}')" ${game.asked.includes(q[0])||used>=game.slots?'disabled':''}><b>${q[1]}</b><span>${game.asked.includes(q[0])?q[2]:(q[3]==='low'?'May waste time':'May reveal useful evidence')}</span></button>`).join(''),key=countUseful();return`${header('Interview','Ask Useful Questions','You get five question slots. Good questions reveal evidence; poor questions cost time.')}<div class="stageBody"><div class="slots"><span>Question slots:</span>${slots}<span>${used}/${game.slots}</span></div><div class="callout"><b>Goal:</b> uncover at least 2 useful clues. Current useful clues: <b>${key}</b></div><br><div class="questionGrid">${qs}</div></div>${footer(`<button onclick="setScene('room')">◀ Back to Room</button>`,`<button class="primary" onclick="finishInterview()" ${key<2?'disabled':''}>Continue to Palpation ▶</button>`)}`}
function ask(id){const q=p().interview.find(x=>x[0]===id);if(!q||game.asked.includes(id)||game.asked.length>=game.slots)return;game.asked.push(id);spend(q[3]==='low'?8:4,q[3]==='low'?-5:10);if(q[5])addEvidence({id:'int_'+id,icon:q[4],title:q[5],type:q[6],source:'Interview'});addLog(q[3]==='low'?'🟧':'💬',q[2]);render()}function countUseful(){return game.asked.map(id=>p().interview.find(q=>q[0]===id)).filter(q=>q&&(q[3]==='key'||q[3]==='support')).length}function finishInterview(){game.done.interview=true;addLog('🖐️','Moved to physical exam.');setScene('exam')}
function renderExam(){const required=['ruq','luq','rlq','llq'],checked=required.filter(id=>game.palpated.includes(id)).length,buttons=regions.map(r=>{const painful=p().examPain.includes(r.id),done=game.palpated.includes(r.id);return`<button class="abdomenButton ${r.id} ${painful?'pain':''} ${done?'checked':''}" onclick="palpate('${r.id}')">${done?'✓ ':''}${r.label}</button>`}).join(''),list=required.map(id=>`<div class="checkItem ${game.palpated.includes(id)?'done':''}">${game.palpated.includes(id)?'✓':'•'} ${id.toUpperCase()}</div>`).join(''),last=game.log[0]?.text||'Click an abdomen region button, or click directly on the abdomen graphic, to palpate.';return`${header('Abdominal Palpation','Map the Abdomen','This is the core diagnostic mechanic. The pain pattern drives the next step.')}<div class="stageBody"><div class="palpationScene"><div class="abdomenBoard" onclick="palpateFromBoard(event)"><div class="torsoGraphic"><div class="torsoHead"></div><div class="torsoBody"></div></div><div class="abdomenGrid">${buttons}</div></div><div class="feedback"><div class="box"><div class="reaction">${reaction()}</div><b>Latest response</b><p>${last}</p></div><div class="box"><b>Required quadrants</b><div class="checklist">${list}</div><p class="teacherNote">Required: RUQ, LUQ, RLQ, and LLQ. You can click the buttons or the abdomen graphic. Navel and rebound add diagnostic power.</p></div><div class="callout"><b>Progress:</b> ${checked}/4 required quadrants checked.</div></div></div></div>${footer(`<button onclick="setScene('interview')">◀ Back to Interview</button>`,`<button class="primary" onclick="finishExam()" ${checked<4?'disabled':''}>Continue to Imaging ▶</button>`)}`}
function reaction(){const last=game.palpated[game.palpated.length-1];if(!last)return'😐';if(p().examPain.includes(last))return last==='rebound'?'😫':'😣';return'😐'}
function palpateFromBoard(event){
  if(event.target.closest('button'))return;
  const board=event.currentTarget.getBoundingClientRect();
  const x=((event.clientX-board.left)/board.width)*100;
  const y=((event.clientY-board.top)/board.height)*100;
  let id='navel';
  if(y<43) id=x<50?'ruq':'luq';
  else if(y>58) id=x<50?'rlq':'llq';
  else id='navel';
  palpate(id);
}
function palpate(id){if(game.palpated.includes(id))return;const painful=p().examPain.includes(id);let finding='No strong pain at '+id.toUpperCase()+'.';if(id==='rebound')finding=painful?'Rebound tenderness: pain worsens after release.':'No rebound tenderness.';if(id==='navel')finding=painful?'Pulsing central tenderness / mass sensation.':'No central mass felt.';if(id==='rlq'&&painful)finding='Sharp right lower quadrant tenderness.';if(id==='llq'&&painful)finding='Left lower quadrant discomfort.';if(id==='ruq'&&painful)finding='Right upper quadrant tenderness.';if(id==='luq'&&painful)finding='Left upper quadrant tenderness.';game.palpated.push(id);spend(3,painful?12:6);if(painful){v().pain=Math.min(10,v().pain+1);v().hr+=2}addEvidence({id:'palp_'+id,icon:painful?'⚠️':'✅',title:finding,type:painful?'critical':'neutral',source:'Palpation'});addLog(painful?'⚠️':'✅',finding);const allQuadrants=['ruq','luq','rlq','llq'].every(q=>game.palpated.includes(q));if(allQuadrants&&!game.done.exam){game.done.exam=true;addLog('✅','Abdominal exam complete. Imaging/clipboard path available.')}render()}
function finishExam(){game.done.exam=true;addLog('🩻','Physical exam completed. Imaging/clipboard path available.');setScene('imaging')}
function renderImaging(){const need=p().requires;return`${header('Imaging Hub','Choose the Right Department','Imaging is not a generic button. X-ray separates stones from appendicitis; ultrasound measures aneurysm risk.')}<div class="stageBody"><div class="imagingChoice"><button class="imageOption" onclick="setScene('xray')"><div class="bigIcon">🩻</div><h3>X-Ray Room</h3><p>Use for partial/focal pain to look for stones or rule them out.</p></button><button class="imageOption" onclick="setScene('ultrasound')"><div class="bigIcon">🌀</div><h3>Ultrasound Room</h3><p>Use for a pulsating central mass or suspected aneurysm.</p></button></div><div class="callout" style="margin-top:14px"><b>Current pathway hint:</b> ${need==='xray'?'This case needs a usable X-ray.':need==='ultrasound'?'This case needs an ultrasound measurement.':'This case may be decided from interview and palpation.'}</div></div>${footer(`<button onclick="setScene('exam')">◀ Back to Exam</button>`,`<button class="primary" onclick="setScene('decision')">Go to Clipboard ▶</button>`)}`}
function renderXray(){if(game.xray.taken)return renderXrayResult();const q=xrayQuality();return`${header('X-Ray Mini-Game','Take a Usable Film','Choose the view, center the beam, set exposure, and keep the patient still.')}<div class="stageBody"><div class="xrayScene"><div class="xrayRoom"><div class="plate"></div><div class="xrayPatient"></div><div class="xrayTable"></div><div class="xrayBeam" id="xrayBeam"><div class="crosshair"></div></div></div><div class="controls"><div class="control"><h3>1. Choose View</h3><div class="viewGrid"><button class="viewBtn ${game.xray.view==='abdomenAP'?'selected':''}" onclick="setXrayView('abdomenAP')">Abdomen AP</button><button class="viewBtn ${game.xray.view==='chest'?'selected':''}" onclick="setXrayView('chest')">Chest</button><button class="viewBtn ${game.xray.view==='pelvis'?'selected':''}" onclick="setXrayView('pelvis')">Pelvis</button><button class="viewBtn ${game.xray.view==='lateral'?'selected':''}" onclick="setXrayView('lateral')">Lateral</button></div></div><div class="control"><h3>2. Align Beam</h3><div class="moveGrid"><span></span><button onclick="moveBeam(0,-5)">▲</button><span></span><button onclick="moveBeam(-5,0)">◀</button><button onclick="centerBeam()">◎</button><button onclick="moveBeam(5,0)">▶</button><span></span><button onclick="moveBeam(0,5)">▼</button><span></span></div></div><div class="control"><h3>3. Exposure: <span id="exposureLabel">${game.xray.exposure}</span> kVp</h3><input type="range" min="25" max="90" value="${game.xray.exposure}" oninput="setExposure(this.value)"></div><div class="control"><label class="toggleRow"><input type="checkbox" ${game.xray.still?'checked':''} onchange="toggleStill(this.checked)"> Patient is still / breath held</label></div><div class="control"><h3>Quality Estimate</h3><div class="qualityMeter"><div class="qualityFill" style="width:${q}%"></div></div></div><button class="primary bigBtn" onclick="takeXray()"><b>Take X-Ray</b><span>Costs $120 and 10 minutes.</span></button></div></div></div>${footer(`<button onclick="setScene('imaging')">◀ Imaging Hub</button>`,`<button onclick="xrayHelp()">Technique Help</button>`)}`}
function renderXrayResult(){const q=game.xray.quality,usable=game.xray.usable;return`${header('X-Ray Result',usable?'Usable film obtained.':'Limited film obtained.','Review the image and radiology report.')}<div class="stageBody"><div class="filmViewer"><div class="film">${xraySVG(p().xrayType,usable)}</div><div class="report"><div class="reportLine"><b>Image Quality</b><span>${q}/100 — ${usable?'diagnostic quality':'limited quality'}</span></div><div class="reportLine"><b>Radiology Read</b><span>${usable?xrayFindingText():'Limited film due to poor positioning/exposure. Repeat recommended.'}</span></div><div class="reportLine"><b>Clinical Use</b><span>${usable?'Add this to the clipboard reasoning.':'A required decision may be rejected if this film is limited.'}</span></div><div class="actions"><button class="warn" onclick="retakeXray()">Retake X-Ray</button><button class="primary" onclick="finishXray()">Accept Film ▶</button></div></div></div></div>${footer(`<button onclick="setScene('imaging')">◀ Imaging Hub</button>`,`<span class="statusText">Budget: $${game.budget}</span>`)}`}
function xrayFindingText(){if(p().xrayType==='stones')return 'Small radiopaque stones are visible above the pelvis.';if(p().xrayType==='appendix')return 'No radiopaque urinary stones. Mild nonspecific right-lower-quadrant gas pattern.';if(p().xrayType==='diffuse')return 'Diffuse nonspecific bowel gas pattern. No focal surgical finding.';return 'No acute radiographic finding.'}function setXrayView(val){game.xray.view=val;render()}function moveBeam(dx,dy){game.xray.beamX=Math.max(20,Math.min(80,game.xray.beamX+dx));game.xray.beamY=Math.max(20,Math.min(80,game.xray.beamY+dy));render()}function centerBeam(){game.xray.beamX=50;game.xray.beamY=50;render()}function setExposure(val){game.xray.exposure=Number(val);const e=document.getElementById('exposureLabel');if(e)e.textContent=val;const f=document.querySelector('.qualityFill');if(f)f.style.width=xrayQuality()+'%'}function toggleStill(val){game.xray.still=val;render()}function updateBeam(){const b=document.getElementById('xrayBeam');if(!b)return;b.style.left=`calc(${game.xray.beamX}% - 95px)`;b.style.top=`calc(${game.xray.beamY}% - 110px)`}function xrayQuality(){let q=0;if(game.xray.view==='abdomenAP')q+=35;else if(game.xray.view==='pelvis')q+=12;const dx=Math.abs(game.xray.beamX-50),dy=Math.abs(game.xray.beamY-50);q+=Math.max(0,35-(dx+dy)*1.4);const exp=game.xray.exposure;q+=exp>=45&&exp<=65?20:Math.max(0,20-Math.abs(exp-55));if(game.xray.still)q+=10;return Math.round(Math.max(0,Math.min(100,q)))}function takeXray(){game.xray.quality=xrayQuality();game.xray.usable=game.xray.quality>=75;game.xray.taken=true;game.budget-=120;spend(10,game.xray.usable?20:-8);if(game.xray.usable){addEvidence({id:'xray_'+p().id,icon:'🩻',title:xrayFindingText(),type:p().xrayType==='stones'?'critical':'neutral',source:'X-Ray'});addLog('🩻',`Usable X-ray: ${xrayFindingText()}`)}else addLog('🩻','X-ray taken, but image quality is limited.');render()}function retakeXray(){game.xray={view:'abdomenAP',beamX:50,beamY:50,exposure:55,still:false,taken:false,quality:0,usable:false};addLog('🩻','Preparing to retake X-ray.');render()}function finishXray(){game.done.imaging=true;game.done.xray=game.xray.usable;setScene('imaging')}function xrayHelp(){document.getElementById('stage').innerHTML=`${header('X-Ray Help','Technique Rules','Good images require correct view, centering, exposure, and stillness.')}<div class="stageBody"><div class="callout"><ol><li>Choose Abdomen AP.</li><li>Center the beam.</li><li>Set exposure between 45 and 65.</li><li>Check stillness before taking the image.</li></ol></div></div>${footer(`<button class="primary" onclick="setScene('xray')">Back to X-Ray</button>`,'')}`}
function renderUltrasound(){if(game.ultra.measured)return renderUltrasoundResult();const q=ultraQuality();return`${header('Ultrasound Mini-Game','Find and Measure the Aorta','Use this when palpation suggests a pulsating central mass.')}<div class="stageBody"><div class="ultraScene"><div class="ultraRoom"><div class="ultraScreen"></div><div class="ultraTarget"></div><div class="xrayPatient"></div><div class="xrayTable"></div><div class="ultraProbe" id="ultraProbe"></div></div><div class="controls"><div class="control"><h3>1. Move Probe</h3><div class="moveGrid"><span></span><button onclick="moveProbe(0,-5)">▲</button><span></span><button onclick="moveProbe(-5,0)">◀</button><button onclick="centerProbe()">◎</button><button onclick="moveProbe(5,0)">▶</button><span></span><button onclick="moveProbe(0,5)">▼</button><span></span></div></div><div class="control"><h3>2. Probe Angle: <span id="angleLabel">${game.ultra.angle}</span>°</h3><input type="range" min="0" max="100" value="${game.ultra.angle}" oninput="setAngle(this.value)"></div><div class="control"><h3>Clarity Estimate</h3><div class="qualityMeter"><div class="qualityFill" style="width:${q}%"></div></div></div><button class="primary bigBtn" onclick="freezeUltrasound()"><b>Freeze and Measure</b><span>Costs 8 minutes. Quality 70+ gives a measurement.</span></button></div></div></div>${footer(`<button onclick="setScene('imaging')">◀ Imaging Hub</button>`,'')}`}
function updateProbe(){const b=document.getElementById('ultraProbe');if(!b)return;b.style.left=`calc(${game.ultra.probeX}% - 35px)`;b.style.top=`calc(${game.ultra.probeY}% - 35px)`}function moveProbe(dx,dy){game.ultra.probeX=Math.max(15,Math.min(85,game.ultra.probeX+dx));game.ultra.probeY=Math.max(15,Math.min(85,game.ultra.probeY+dy));render()}function centerProbe(){game.ultra.probeX=50;game.ultra.probeY=54;render()}function setAngle(val){game.ultra.angle=Number(val);const e=document.getElementById('angleLabel');if(e)e.textContent=val;const f=document.querySelector('.qualityFill');if(f)f.style.width=ultraQuality()+'%'}function ultraQuality(){const dx=Math.abs(game.ultra.probeX-50),dy=Math.abs(game.ultra.probeY-54),ang=Math.abs(game.ultra.angle-50);let q=100-(dx+dy)*1.8-ang*.7;return Math.round(Math.max(0,Math.min(100,q)))}function freezeUltrasound(){game.ultra.quality=ultraQuality();game.ultra.measured=game.ultra.quality>=70;game.budget-=180;spend(8,game.ultra.measured?20:-8);if(game.ultra.measured&&p().usCm){addEvidence({id:'us_'+p().id,icon:'🌀',title:`Aortic diameter measured ${p().usCm.toFixed(1)} cm`,type:p().usCm>=5?'critical':'supportive',source:'Ultrasound'});addLog('🌀',`Ultrasound measurement: ${p().usCm.toFixed(1)} cm.`)}else if(game.ultra.measured){addEvidence({id:'us_clear_'+p().id,icon:'🌀',title:'No aneurysm measured on this scan',type:'neutral',source:'Ultrasound'});addLog('🌀','Ultrasound completed: no aneurysm measured.')}else addLog('🌀','Ultrasound image too noisy for measurement.');render()}function renderUltrasoundResult(){const good=game.ultra.measured;return`${header('Ultrasound Result',good?'Measurement captured.':'Limited ultrasound.','Review the measurement before deciding.')}<div class="stageBody"><div class="filmViewer"><div class="film">${ultraSVG(good)}</div><div class="report"><div class="reportLine"><b>Scan Quality</b><span>${game.ultra.quality}/100</span></div><div class="reportLine"><b>Measurement</b><span>${good?(p().usCm?`Aorta measures ${p().usCm.toFixed(1)} cm.`:'No aneurysm measured.'):'Image too noisy. Retake recommended.'}</span></div><div class="actions"><button class="warn" onclick="retakeUltrasound()">Retake Ultrasound</button><button class="primary" onclick="finishUltrasound()">Accept Scan ▶</button></div></div></div></div>${footer(`<button onclick="setScene('imaging')">◀ Imaging Hub</button>`,'')}`}function retakeUltrasound(){game.ultra={probeX:50,probeY:50,angle:50,frozen:false,quality:0,measured:false};render()}function finishUltrasound(){game.done.imaging=true;game.done.ultrasound=game.ultra.measured;setScene('imaging')}
function renderDecision(){const actions=[['observe','👀','Observe','Monitor without active procedure.'],['medicate','💊','Medicate','Treat/support non-surgical infection pattern.'],['refer','📨','Refer','Send to the right service.'],['operate','🔪','Operate','Move to OR prep and surgery.']].map(a=>`<button class="clipBtn" onclick="chooseAction('${a[0]}')"><div class="clipIcon">${a[1]}</div><div><h3>${a[2]}</h3><p>${a[3]}</p></div></button>`).join('');return`${header('Clipboard Decision','Choose the Action','The clipboard is strict. Missing exam or imaging sends you to medical school.')}<div class="stageBody"><div class="clipboardGrid">${actions}</div><div class="reqs">${requirements()}</div></div>${footer(`<button onclick="setScene('imaging')">◀ Back to Imaging</button>`,`<button onclick="medSchool('Review the diagnostic rules before acting.')">Medical School Notes</button>`)}`}
function requirements(){const key=countUseful(),allQ=['ruq','luq','rlq','llq'].every(id=>game.palpated.includes(id)),img=imagingSatisfied();return[['Interview clues',key>=2,`${key} useful clue(s) found`],['All quadrants',allQ,allQ?'Complete':'RUQ/LUQ/RLQ/LLQ required'],['Needed imaging',img,img?'Satisfied':p().requires==='xray'?'Usable X-ray required':p().requires==='ultrasound'?'Ultrasound measurement required':'Not required']].map(r=>`<div class="req ${r[1]?'done':''}"><b>${r[1]?'✓':'•'} ${r[0]}</b><span>${r[2]}</span></div>`).join('')}function imagingSatisfied(){if(p().requires==='xray')return game.done.xray;if(p().requires==='ultrasound')return game.done.ultrasound;return true}function chooseAction(action){game.selectedAction=action;const allQ=['ruq','luq','rlq','llq'].every(id=>game.palpated.includes(id)),key=countUseful();let lecture='';if(key<2)lecture='You did not gather enough interview evidence before acting.';else if(!allQ)lecture='You did not complete the abdominal exam. Check all four quadrants.';else if(!imagingSatisfied())lecture='You needed the required imaging before that clipboard decision.';else if(action!==p().correctAction)lecture=`Wrong clipboard action. Correct action was ${p().correctAction.toUpperCase()}.`;if(lecture){game.mistakes.push(lecture);spend(8,-30);v().stability=Math.max(0,v().stability-8);addLog('⚠️',lecture);medSchool(lecture);return}game.done.decision=true;spend(5,60);addLog('✅',`Correct action: ${action.toUpperCase()}.`);if(action==='operate')setScene('orprep');else{game.outcome='success';setScene('debrief')}}function medSchool(msg){document.getElementById('stage').innerHTML=`${header('Medical School Feedback','Decision Rejected','The point is not guessing; it is following the diagnostic pathway.')}<div class="stageBody"><div class="callout"><b>${msg}</b><br><br><ol><li>Map the abdomen first.</li><li>No pain supports observation.</li><li>Diffuse pain supports medication.</li><li>Partial focal pain needs X-ray.</li><li>Pulsating function renderORPrep(){const step=prepSteps[game.orprep.step];if(!step)return renderORPrepComplete();const buttons=prepSteps.map(s=>`<button class="toolBtn ${game.orprep.completed.includes(s[0])?'current':''}" onclick="usePrep('${s[0]}')">${s[1]}<br>${s[2]}</button>`).join(''),checks=prepSteps.map((s,i)=>`<div class="prepCheck ${game.orprep.completed.includes(s[0])?'done':''} ${i===game.orprep.step?'current':''}">${game.orprep.completed.includes(s[0])?'✓':i===game.orprep.step?'▶':'•'} ${s[2]}</div>`).join('');return`${header('OR Prep','Prepare the Sterile Field','Order matters. The sterile field must stay high enough for surgery.')}<div class="stageBody"><div class="orprepScene"><div class="orRoom"><div class="sterileGlow ${game.orprep.sterile<55?'bad':''}"></div><div class="orField"></div><div class="orPatient"></div><div class="orTable"></div></div><div class="controls"><div class="control"><h3>Current Step</h3><div class="callout"><b>${step[1]} ${step[2]}</b></div></div><div class="control"><h3>Sterile Field: ${game.orprep.sterile}%</h3><div class="qualityMeter"><div class="qualityFill" style="width:${game.orprep.sterile}%"></div></div></div><div class="control"><h3>Prep Tray</h3><div class="toolGrid">${buttons}</div></div><div class="control"><h3>Checklist</h3>${checks}</div></div></div></div>${footer(`<button onclick="setScene('decision')">◀ Back</button>`,`<button onclick="orPrepHelp()">Prep Help</button>`)}`}
function usePrep(id){const expected=prepSteps[game.orprep.step];if(id===expected[0]){game.orprep.completed.push(id);game.orprep.step++;game.orprep.sterile=Math.min(100,game.orprep.sterile+10);spend(3,12);addLog('🧼',`${expected[2]} complete.`);if(game.orprep.step>=prepSteps.length){game.done.orprep=game.orprep.sterile>=75;if(game.done.orprep){addEvidence({id:'orprep',icon:'🧼',title:'OR prep completed safely',type:'supportive',source:'OR Prep'});addLog('✅','OR prep complete.')}else{game.mistakes.push('Sterile field too low after OR prep.');addLog('⚠️','Sterile field compromised.')}}}else{game.orprep.mistakes++;game.orprep.sterile=Math.max(0,game.orprep.sterile-18);spend(4,-15);v().stability=Math.max(0,v().stability-3);const chosen=prepSteps.find(s=>s[0]===id);game.mistakes.push(`OR prep order error: used ${chosen?chosen[2]:id} before ${expected[2]}.`);addLog('⚠️',`Wrong prep order. Expected ${expected[2]}.`)}render()}function renderORPrepComplete(){return`${header('OR Prep Complete',game.done.orprep?'Sterile field ready.':'Sterile field compromised.','Continue to surgery or retry prep.')}<div class="stageBody"><div class="debrief"><div class="scoreCircle">${game.orprep.sterile}%</div><div class="debriefList"><div class="debriefItem"><strong>Sterile field</strong><span>${game.orprep.sterile}%</span></div><div class="debriefItem"><strong>Mistakes</strong><span>${game.orprep.mistakes}</span></div><div class="debriefItem"><strong>Sequence</strong><span>${game.orprep.completed.map(id=>prepSteps.find(s=>s[0]===id)[2]).join(' → ')}</span></div></div></div></div>${footer(`<button onclick="game.orprep={step:0,sterile:30,mistakes:0,completed:[]};game.done.orprep=false;setScene('orprep')">Retry Prep</button>`,`<button class="primary" onclick="setScene('surgery')" ${game.done.orprep?'':'disabled'}>Begin Surgery ▶</button>`)}`}
function orPrepHelp(){document.getElementById('stage').innerHTML=`${header('OR Prep Help','Safe Prep Sequence','Follow the steps in order.')}<div class="stageBody"><div class="callout"><ol><li>Scrub hands.</li><li>Sterile gloves.</li><li>Apply antiseptic.</li><li>Place sterile drape.</li><li>Confirm anesthesia.</li><li>Give antibiotics.</li><li>Confirm IV / blood.</li></ol></div></div>${footer(`<button class="primary" onclick="setScene('orprep')">Back to OR Prep</button>`,'')}`}
function renderSurgery(){const step=surgerySteps[game.surgery.step];if(!step)return renderSurgeryComplete();const buttons=surgerySteps.map(s=>`<button class="toolBtn ${game.surgery.completed.includes(s[0])?'current':''}" onclick="useSurgeryTool('${s[0]}')">${s[1]}<br>${s[2]}</button>`).join('');const alert=game.surgery.complication?`<div class="alertBox"><b>Monitor Alert:</b> ${game.surgery.complication.text}<br>Choose response before continuing.</div>`:'';return`${header('Surgery','Perform the Procedure',`Procedure: ${p().surgery}. Correct tool order matters.`)}<div class="stageBody"><div class="surgeryScene"><div class="surgeryRoom"><div class="orField"></div><div class="surgeryPatient"></div><div class="surgeryTarget"></div>${game.surgery.bleeding?'<div class="bleed one"></div><div class="bleed two"></div>':''}<div class="surgeryTable"></div></div><div class="controls"><div class="control"><h3>Current Step</h3><div class="callout"><b>${step[1]} ${step[2]}</b></div></div>${alert}<div class="control"><h3>Instrument Tray</h3><div class="toolGrid">${buttons}</div></div><div class="control"><h3>Emergency Response</h3><div class="toolGrid"><button onclick="treatComplication('atropine')">Atropine</button><button onclick="treatComplication('lidocaine')">Lidocaine</button><button onclick="treatComplication('blood')">Blood / Fluids</button><button onclick="treatComplication('cautery')">Cautery / Clamp</button></div></div></div></div></div>${footer(`<button onclick="setScene('orprep')">◀ OR Prep</button>`,`<span class="statusText">Mistakes: ${game.surgery.mistakes}</span>`)}`}
function useSurgeryTool(id){if(game.surgery.complication){addLog('⚠️','Treat the monitor alert before continuing.');v().stability=Math.max(0,v().stability-5);render();return}const expected=surgerySteps[game.surgery.step];if(id===expected[0]){game.surgery.completed.push(id);game.surgery.step++;spend(5,20);addLog('🔪',`${expected[2]} complete.`);if(id==='incision'){game.surgery.complication={kind:'cautery',text:'Bleeding in the field. Clamp/cautery now.'};game.surgery.bleeding=true}if(game.surgery.step>=surgerySteps.length){game.done.surgery=true;game.outcome='success';addEvidence({id:'surgery_done',icon:'🔪',title:'Procedure completed successfully',type:'supportive',source:'Surgery'});addLog('✅','Surgery completed.')}}else{game.surgery.mistakes++;game.mistakes.push(`Surgery error: used ${id} before ${expected[2]}.`);v().stability=Math.max(0,v().stability-10);spend(4,-20);addLog('⚠️',`Wrong surgical step. Expected ${expected[2]}.`)}render()}function treatComplication(kind){if(!game.surgery.complication){addLog('⚠️','No active complication to treat.');render();return}if(kind===game.surgery.complication.kind){addLog('✅','Complication treated correctly.');game.surgery.complication=null;game.surgery.bleeding=false;v().stability=Math.min(100,v().stability+5);game.score+=25}else{game.surgery.mistakes++;game.mistakes.push('Wrong emergency response during surgery.');v().stability=Math.max(0,v().stability-12);addLog('⚠️','Wrong emergency response. Patient stability dropped.')}render()}function renderSurgeryComplete(){return`${header('Surgery Complete','Patient Stabilized','The procedure is complete. Review the outcome.')}<div class="stageBody"><div class="debrief"><div class="scoreCircle">✓</div><div class="debriefList"><div class="debriefItem"><strong>Procedure</strong><span>${p().surgery}</span></div><div class="debriefItem"><strong>Surgery mistakes</strong><span>${game.surgery.mistakes}</span></div><div class="debriefItem"><strong>Patient stability</strong><span>${v().stability}%</span></div></div></div></div>${footer('',`<button class="primary" onclick="setScene('debrief')">Debrief ▶</button>`)}`}

function officeButton(){const n=game.office?.pending?.length||0;const cls=n>=2?'danger officePulse':n===1?'warn officePulse':'warn';return`<button class="${cls}" onclick="setScene('office')">☎ Office${n?` (${n})`:''}</button>`}
function advanceOffice(min){if(!game.office)return;while(game.time>=game.office.nextAt){createOfficeIssue();game.office.nextAt+=22+Math.floor(Math.random()*16)}if(game.office.pending.length>=3&&game.time-game.office.lastPenaltyAt>=18){game.office.lastPenaltyAt=game.time;game.score-=15;game.budget=Math.max(0,game.budget-50);addLog('☎️','Office issues are stacking up. Your practice is losing trust and time.')}}
function createOfficeIssue(){const used=new Set([...game.office.pending.map(i=>i.id),...game.office.resolved.map(i=>i.id)]);let pool=officeTemplates.filter(t=>!used.has(t.id));if(!pool.length){game.office.resolved=[];pool=officeTemplates.slice()}const template=pool[Math.floor(Math.random()*pool.length)];game.office.pending.push({...template,createdAt:game.time});addLog('☎️',`Office message waiting: ${template.title}.`)}
function renderOffice(){const pending=game.office.pending;const resolved=game.office.resolved.length;const cards=pending.length?pending.map(issue=>`<div class="officeCard urgent"><h3>${issue.icon} ${issue.title}</h3><p>${issue.body}</p><div class="officeChoices">${issue.choices.map(c=>`<button onclick="resolveOffice('${issue.id}','${c[0]}')">${c[1]}</button>`).join('')}</div></div>`).join(''):`<div class="officeCard"><h3>☎ No active office issues</h3><p>You called the office and everything is currently handled. This costs a little time, but protects the practice.</p><button class="primary" onclick="spend(3,3);addLog('☎️','Checked in with the office. No new problems.');setScene('room')">Return to patient</button></div>`;return`${header('Practice Office','Call and Triage Office Issues','The original game had pressure and interruption. This layer makes you manage the practice while diagnosing patients.')}<div class="stageBody"><div class="officeStatus"><div class="officeMetric"><small>Pending</small><b>${pending.length}</b></div><div class="officeMetric"><small>Resolved</small><b>${resolved}</b></div><div class="officeMetric"><small>Next check</small><b>${Math.max(0,game.office.nextAt-game.time)}m</b></div></div><div class="officeGrid">${cards}</div><div class="callout" style="margin-top:14px"><b>Rule:</b> Handle office issues with the safest delegation. Ignoring calls lets problems stack up, costing score and budget.</div></div>${footer(`<button onclick="setScene('room')">◀ Return to Patient</button>`,`<button onclick="goHub()">Hospital Hub</button>`)}`}
function resolveOffice(issueId,choiceId){const idx=game.office.pending.findIndex(i=>i.id===issueId);if(idx<0)return;const issue=game.office.pending[idx];game.office.pending.splice(idx,1);game.office.resolved.push(issue);if(choiceId===issue.correct){game.score+=18;spend(4,0);addLog('☎️',`Office resolved safely: ${issue.title}.`);addEvidence({id:'office_'+issue.id,icon:'☎️',title:`Handled office issue: ${issue.title}`,type:'supportive',source:'Practice Office'});}else{game.score-=22;game.budget=Math.max(0,game.budget-75);spend(6,0);game.mistakes.push(`Office issue mishandled: ${issue.title}.`);addLog('⚠️',`Office issue mishandled: ${issue.title}.`);}render()}
function renderDebrief(){game.done.debrief=true;game.completedPatients[p().id]=true;const score=Math.max(0,Math.min(100,70+Math.round(v().stability/5)+countUseful()*2+(game.done.xray||game.done.ultrasound?8:0)+(game.done.orprep?8:0)+(game.done.surgery?12:0)-game.mistakes.length*6));return`${header('Debrief','Case Review','Review the clinical reasoning and outcome.')}<div class="stageBody"><div class="debrief"><div class="scoreCircle">${score}</div><div class="debriefList"><div class="debriefItem"><strong>Final diagnosis</strong><span>${p().diagnosis}</span></div><div class="debriefItem"><strong>Correct action</strong><span>${p().correctAction.toUpperCase()}</span></div><div class="debriefItem"><strong>Your action</strong><span>${(game.selectedAction||'none').toUpperCase()}</span></div><div class="debriefItem"><strong>Imaging</strong><span>${p().requires==='xray'?(game.done.xray?'Usable X-ray completed.':'Required X-ray missing/limited.'):p().requires==='ultrasound'?(game.done.ultrasound?'Ultrasound measurement completed.':'Required ultrasound missing/limited.'):'Imaging not required.'}</span></div><div class="debriefItem"><strong>Procedure</strong><span>${p().surgery?(game.done.surgery?'Surgery completed.':'Surgery not completed.'):'No surgery required.'}</span></div><div class="debriefItem"><strong>Office management</strong><span>${game.office.resolved.length} resolved, ${game.office.pending.length} pending.</span></div><div class="debriefItem"><strong>Mistakes</strong><span>${game.mistakes.length?game.mistakes.join(' '):'No major reasoning errors.'}</span></div></div></div></div>${footer(`<button onclick="resetPatient(game.patientIndex)">Replay Patient</button>`,`<button class="primary" onclick="goHub()">Hospital Hub ▶</button>`)}`}
function xraySVG(type,usable){const stones=type==='stones'?'<circle cx="238" cy="250" r="5" fill="#fff"/><circle cx="250" cy="300" r="4" fill="#fff"/>':'';const diffuse=type==='diffuse'?'<ellipse cx="130" cy="150" rx="35" ry="18" fill="#05080d" opacity=".7"/><ellipse cx="280" cy="180" rx="38" ry="18" fill="#05080d" opacity=".7"/><ellipse cx="205" cy="260" rx="42" ry="20" fill="#05080d" opacity=".7"/>':'';const app=type==='appendix'?'<path d="M255 330c34 4 44 25 30 42" stroke="#cfd8dc" stroke-width="4" opacity=".55" fill="none"/>':'';return`<svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="g" cx="50%" cy="45%" r="65%"><stop offset="0" stop-color="#8d99a3"/><stop offset=".55" stop-color="#404a54"/><stop offset="1" stop-color="#080b10"/></radialGradient></defs><rect width="420" height="420" fill="#020407"/><g opacity="${usable?1:.5}"><rect x="42" y="28" width="336" height="364" rx="18" fill="url(#g)"/><g stroke="#e7edf2" stroke-width="10" stroke-linecap="round" opacity=".72" fill="none"><path d="M145 58c-34 54-39 118-28 180 7 39 15 83 4 128"/><path d="M275 58c34 54 39 118 28 180-7 39-15 83-4 128"/><path d="M132 338c55 27 103 27 156 0"/></g><g stroke="#f5f7fa" stroke-width="7" opacity=".78" fill="none"><path d="M210 60v290"/><path d="M188 84h44M185 122h50M183 160h54M181 198h58M183 236h54M187 274h46M192 312h36"/></g><g fill="#06080c" opacity=".55"><ellipse cx="130" cy="165" rx="32" ry="18"/><ellipse cx="284" cy="175" rx="34" ry="17"/><ellipse cx="152" cy="246" rx="31" ry="18"/><ellipse cx="268" cy="260" rx="30" ry="16"/></g>${diffuse}${app}${stones}<text x="58" y="374" fill="#d6e7ef" opacity=".55" font-family="monospace" font-size="12">AP ABDOMEN</text></g>${usable?'':`<g><rect x="58" y="52" width="304" height="318" rx="12" fill="rgba(0,0,0,.35)"/><text x="210" y="205" fill="#ffb15f" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="800">LIMITED FILM</text></g>`}</svg>`}function ultraSVG(good){return`<svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg"><rect width="420" height="420" fill="#02070a"/><path d="M70 350C120 90 300 90 350 350Z" fill="rgba(80,180,210,.16)" stroke="rgba(170,240,255,.4)"/><circle cx="210" cy="230" r="${p().usCm?45:20}" fill="rgba(255,255,255,.7)" opacity="${good?'.9':'.35'}"/><text x="210" y="330" fill="#c9f4ff" text-anchor="middle" font-family="monospace" font-size="16">${good?(p().usCm?`AORTA ${p().usCm.toFixed(1)} CM`:'NO AAA'):'NOISY SCAN'}</text></svg>`}
let tick=0;function drawECG(){const c=document.getElementById('ecg');if(!c){requestAnimationFrame(drawECG);return}const ctx=c.getContext('2d'),w=c.width,h=c.height,vt=v();ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(0,10,16,.58)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(82,242,122,.09)';ctx.lineWidth=1;for(let x=0;x<w;x+=34){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}for(let y=0;y<h;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}const speed=Math.max(.7,Math.min(1.8,vt.hr/100)),period=95/speed,base=h*.58;tick+=2.25*speed;function yAt(x){const t=(x+tick)%period;let y=base+Math.sin((x+tick)*.025)*2;if(t>8&&t<17)y-=6*Math.sin((t-8)/9*Math.PI);if(t>27&&t<31)y+=15*Math.sin((t-27)/4*Math.PI);if(t>31&&t<36)y-=38*Math.sin((t-31)/5*Math.PI);if(t>36&&t<43)y+=12*Math.sin((t-36)/7*Math.PI);if(t>58&&t<77)y-=9*Math.sin((t-58)/19*Math.PI);if(vt.stability<35)y+=(Math.random()-.5)*7;return y}ctx.strokeStyle=vt.stability<35?'#ff9b9b':'#52f27a';ctx.lineWidth=3;ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=10;ctx.beginPath();for(let x=0;x<w;x+=3){const y=yAt(x);x?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle='#52f27a';ctx.font='800 13px system-ui';ctx.fillText('II',15,22);ctx.fillText('25 mm/s',88,95);ctx.fillText('Filter: ON',176,95);requestAnimationFrame(drawECG)}
render();requestAnimationFrame(drawECG);
</script>
