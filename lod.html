<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VITALS — The Hospital Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07101a;--s1:#0d1e2e;--s2:#132537;--s3:#1a3045;
  --bdr:rgba(80,160,220,.18);--bdr2:rgba(80,160,220,.32);
  --tx:#dff0ff;--muted:#6a9ab8;--dim:#3a6278;
  --cyan:#2ed8fa;--green:#3ef892;--red:#f55;--amber:#f9c74f;--purple:#b18cff;
  --r:12px;--shadow:0 12px 48px rgba(0,0,0,.55);
  --ff:'Barlow',system-ui,sans-serif;--ffc:'Barlow Condensed',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:var(--ff);font-size:15px;line-height:1.5;overflow-x:hidden;min-height:100%}
button,input,select{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input[type=range]{accent-color:var(--cyan);width:100%}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* ─── NOISE OVERLAY ─── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* ─── LAYOUT ─── */
:root{--topbar-h:112px;--topbar-h-sm:52px}
.app{position:relative;z-index:1;padding:12px;padding-top:calc(var(--topbar-h) + 12px);min-height:100vh;
  background:radial-gradient(ellipse 70% 55% at 18% -5%,rgba(46,216,250,.08),transparent),
             radial-gradient(ellipse 50% 45% at 85% 105%,rgba(62,248,146,.05),transparent);
  transition:padding-top .25s ease;
}
.app.scrolled{padding-top:calc(var(--topbar-h-sm) + 12px)}
.shell{width:min(1480px,100%);margin:0 auto;display:grid;gap:12px}

/* ─── TOPBAR — fixed, collapses on scroll ─── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:grid;grid-template-columns:340px 1fr;gap:12px;
  padding:12px;
  background:linear-gradient(180deg,rgba(7,16,26,.98),rgba(7,16,26,.96));
  border-bottom:1px solid var(--bdr);
  box-shadow:0 4px 32px rgba(0,0,0,.6);
  backdrop-filter:blur(8px);
  transition:padding .25s ease,gap .25s ease;
}

/* ── expanded brand ── */
.brand{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 20px;display:flex;align-items:center;gap:16px;transition:padding .25s ease,border-radius .25s ease}
.brand-logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,#0b3050,#071824);border:1px solid rgba(46,216,250,.45);display:grid;place-items:center;font-size:30px;box-shadow:0 0 20px rgba(46,216,250,.18),inset 0 1px 0 rgba(255,255,255,.06);flex-shrink:0;transition:width .25s ease,height .25s ease,font-size .25s ease,border-radius .25s ease}
.brand-text{overflow:hidden;transition:opacity .2s ease}
.brand-text h1{font-family:var(--ffc);font-size:30px;font-weight:900;letter-spacing:.05em;line-height:1;color:var(--cyan);text-shadow:0 0 30px rgba(46,216,250,.35);white-space:nowrap;transition:font-size .25s ease}
.brand-text p{font-size:12px;color:var(--muted);margin-top:3px;letter-spacing:.03em;white-space:nowrap;transition:opacity .2s ease,max-height .25s ease;max-height:30px;overflow:hidden}

/* ── expanded monitor ── */
.monitor{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);display:grid;grid-template-columns:minmax(160px,1fr) repeat(5,88px) 140px;overflow:hidden;transition:border-radius .25s ease}
.ecg-cell{position:relative;padding:8px 10px;border-right:1px solid var(--bdr);overflow:hidden;transition:max-width .3s ease,padding .25s ease,opacity .25s ease}
#ecgCanvas{display:block;width:100%;height:82px;border-radius:6px;background:rgba(0,0,0,.3);transition:height .25s ease,opacity .25s ease}
.live-badge{position:absolute;top:11px;right:14px;font-size:10px;font-weight:700;color:var(--green);letter-spacing:.06em;display:flex;align-items:center;gap:4px;transition:opacity .2s ease}
.live-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.vital{display:grid;place-items:center;text-align:center;border-right:1px solid var(--bdr);padding:8px 4px;gap:1px;transition:padding .25s ease}
.vital small{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:opacity .2s ease,max-height .2s ease;max-height:20px;overflow:hidden}
.vital .vv{font-family:var(--ffc);font-size:26px;font-weight:700;line-height:1;transition:font-size .25s ease}
.vital .vu{font-size:9px;color:var(--dim);margin-top:1px;transition:opacity .2s ease,max-height .2s ease;max-height:16px;overflow:hidden}
.v-hr small,.v-hr .vv{color:var(--green)}
.v-bp small,.v-bp .vv{color:var(--red)}
.v-tmp small,.v-tmp .vv{color:var(--amber)}
.v-o2 small,.v-o2 .vv{color:#5de0ff}
.v-pain small,.v-pain .vv{color:var(--purple)}
.stab-cell{display:grid;place-items:center;padding:6px 10px;text-align:center;transition:padding .25s ease}
.stab-gauge{width:120px;height:62px;position:relative;transition:width .25s ease,height .25s ease,opacity .25s ease}
.stab-gauge svg{width:120px;height:62px;transition:width .25s ease,height .25s ease}
.stab-pct{font-family:var(--ffc);font-size:22px;font-weight:700;display:block;margin-top:-2px;transition:font-size .25s ease}
.stab-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;transition:opacity .2s ease,max-height .2s ease;max-height:20px;overflow:hidden}

/* ══════════════════════════════════════════
   SCROLLED STATE — compact topbar
══════════════════════════════════════════ */

.topbar.scrolled{
  padding:6px 12px;
  gap:10px;
  grid-template-columns:auto 1fr;
}

/* brand compact */
.topbar.scrolled .brand{
  padding:6px 12px;
  gap:10px;
  border-radius:8px;
  background:transparent;
  border-color:transparent;
}
.topbar.scrolled .brand-logo{
  width:32px;height:32px;font-size:16px;border-radius:6px;
}
.topbar.scrolled .brand-text h1{font-size:18px}
.topbar.scrolled .brand-text p{opacity:0;max-height:0;margin:0}

/* monitor compact — hide ECG, collapse vitals */
.topbar.scrolled .monitor{
  grid-template-columns:repeat(5,1fr) auto;
  border-radius:8px;
  background:transparent;
  border-color:transparent;
}
.topbar.scrolled .ecg-cell{
  display:none;
}
.topbar.scrolled .vital{
  padding:4px 8px;
  border-right-color:rgba(80,160,220,.1);
}
.topbar.scrolled .vital small{opacity:0;max-height:0}
.topbar.scrolled .vital .vv{font-size:17px}
.topbar.scrolled .vital .vu{opacity:0;max-height:0}
.topbar.scrolled .stab-cell{padding:4px 10px}
.topbar.scrolled .stab-gauge{width:70px;height:36px;opacity:.9}
.topbar.scrolled .stab-gauge svg{width:70px;height:36px}
.topbar.scrolled .stab-pct{font-size:14px}
.topbar.scrolled .stab-lbl{opacity:0;max-height:0}

/* ─── MAIN ─── */
.main{display:grid;grid-template-columns:260px 1fr 310px;gap:12px;align-items:start}
.main>aside:first-child{position:sticky;top:calc(var(--topbar-h) + 20px);max-height:calc(100vh - var(--topbar-h) - 32px);overflow-y:auto;display:grid;gap:12px;transition:top .25s ease,max-height .25s ease}
.app.scrolled .main>aside:first-child{top:calc(var(--topbar-h-sm) + 16px);max-height:calc(100vh - var(--topbar-h-sm) - 28px)}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}

/* ─── PANELS ─── */
.ph{padding:10px 14px;border-bottom:1px solid var(--bdr);background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.ph h3{font-family:var(--ffc);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.pb{padding:12px}
.steps{display:grid;gap:6px}
.stp{display:grid;grid-template-columns:34px 1fr;gap:8px;padding:8px;border-radius:8px;border:1px solid transparent;transition:.15s}
.stp.active{border-color:rgba(46,216,250,.55);background:rgba(46,216,250,.08)}
.stp.done{border-color:rgba(62,248,146,.4);background:rgba(62,248,146,.06)}
.stp-icon{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;font-size:17px;background:var(--s2);border:1px solid var(--bdr);transition:.15s}
.stp.active .stp-icon{background:rgba(46,216,250,.15);border-color:rgba(46,216,250,.5)}
.stp.done .stp-icon{background:rgba(62,248,146,.12);border-color:rgba(62,248,146,.45)}
.stp-title{font-size:12px;font-weight:700}
.stp-sub{font-size:10px;color:var(--muted);line-height:1.25}
.log-wrap{max-height:320px;overflow:auto;display:grid;gap:6px}
.logr{display:grid;grid-template-columns:20px 1fr;gap:7px;font-size:12px;line-height:1.35}
.logr time{font-size:10px;color:var(--dim);display:block;margin-top:1px}
.ev-wrap{max-height:470px;overflow:auto;display:grid;gap:7px}
.evc{display:grid;grid-template-columns:28px 1fr;gap:8px;padding:9px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);align-items:start}
.evc-icon{font-size:18px;text-align:center;margin-top:1px}
.evc-title{font-size:12px;font-weight:700;line-height:1.3}
.evc-src{font-size:10px;color:var(--muted)}
.evc.critical{background:rgba(245,85,85,.08);border-color:rgba(245,85,85,.24)}
.evc.supportive{background:rgba(249,199,79,.07);border-color:rgba(249,199,79,.2)}
.evc.neutral{background:rgba(46,216,250,.05);border-color:rgba(46,216,250,.15)}
.evc.lab{background:rgba(177,140,255,.07);border-color:rgba(177,140,255,.2)}

/* ─── STAGE ─── */
.stage{flex:1;display:flex;flex-direction:column;min-height:660px}
.sh{padding:16px 20px;border-bottom:1px solid var(--bdr);background:var(--s2)}
.sh .badge{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
.sh h2{font-family:var(--ffc);font-size:30px;font-weight:900;letter-spacing:.02em;margin-bottom:3px;line-height:1.1}
.sh p{font-size:13px;color:var(--muted);line-height:1.4}
.sb{padding:18px;flex:1}
.sf{padding:13px 18px;border-top:1px solid var(--bdr);background:var(--s2);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.sfg{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sfstat{font-size:11px;color:var(--muted)}

/* ─── BUTTONS ─── */
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2);font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
.btn:hover:not(:disabled){border-color:var(--cyan);background:rgba(46,216,250,.1);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.btn:disabled{opacity:.36;cursor:not-allowed;transform:none!important}
.btn.primary{border-color:rgba(46,216,250,.7);background:rgba(46,216,250,.12);color:var(--cyan);font-weight:700}
.btn.primary:hover:not(:disabled){background:rgba(46,216,250,.22);box-shadow:0 0 20px rgba(46,216,250,.18)}
.btn.danger{border-color:rgba(245,85,85,.6);background:rgba(245,85,85,.1);color:var(--red)}
.btn.warn{border-color:rgba(249,199,79,.5);background:rgba(249,199,79,.08);color:var(--amber)}
.btn.success{border-color:rgba(62,248,146,.55);background:rgba(62,248,146,.09);color:var(--green)}
.btn.lg{padding:14px 16px;min-height:60px;text-align:left}
.btn.lg b{display:block;font-size:14px}
.btn.lg small{display:block;color:var(--muted);font-size:11px;margin-top:2px;font-weight:400}

/* ─── CALLOUT ─── */
.callout{padding:12px 14px;border-radius:8px;background:rgba(46,216,250,.06);border:1px solid rgba(46,216,250,.16);font-size:13px;line-height:1.5}
.callout b{color:#b8eeff}
.callout.warn{background:rgba(249,199,79,.07);border-color:rgba(249,199,79,.2)}
.callout.warn b{color:#fde68a}
.callout.danger{background:rgba(245,85,85,.08);border-color:rgba(245,85,85,.22)}
.callout.danger b{color:#fecaca}
.callout.good{background:rgba(62,248,146,.06);border-color:rgba(62,248,146,.18)}
.callout.good b{color:#a7f3cf}
.infobox{padding:10px 13px;border-radius:8px;background:var(--s2);border:1px solid var(--bdr)}
.infobox small{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:3px}
.infobox b{font-size:14px;font-weight:700}

/* ─── HUB ─── */
.hub-top{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.diff-btn,.rot-btn{padding:10px 12px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2);text-align:left;cursor:pointer;transition:.15s}
.diff-btn:hover,.rot-btn:hover{border-color:rgba(46,216,250,.4)}
.diff-btn.on,.rot-btn.on{border-color:rgba(46,216,250,.7);background:rgba(46,216,250,.1)}
.diff-btn b,.rot-btn b{display:block;font-size:12px;font-weight:700;margin-bottom:2px}
.diff-btn small,.rot-btn small{display:block;font-size:10px;color:var(--muted);line-height:1.3}
.shift-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.case-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.cc{padding:14px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2);text-align:left;cursor:pointer;transition:.15s;min-height:130px}
.cc:hover{border-color:rgba(46,216,250,.4);transform:translateY(-1px)}
.cc.on{border-color:rgba(46,216,250,.7);background:rgba(46,216,250,.08)}
.cc.urgent{border-color:rgba(245,85,85,.4)}
.cc.dim{opacity:.58}
.cc h3{font-family:var(--ffc);font-size:16px;font-weight:700;margin-bottom:3px}
.cc .triage{font-size:12px;color:var(--muted);line-height:1.35;margin-bottom:8px}
.chip{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:10px;border:1px solid rgba(255,255,255,.1);color:#9ac;margin-right:4px;margin-bottom:2px;font-weight:600}
.chip.red{border-color:rgba(245,85,85,.35);color:#f9a8a8}
.chip.green{border-color:rgba(62,248,146,.35);color:#a7f3cf}
.vitchips{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px}
.vitchip{font-size:10px;padding:2px 7px;border:1px solid rgba(255,255,255,.07);border-radius:4px;background:rgba(255,255,255,.025);color:var(--muted);font-weight:600}

/* ─── ROOM ─── */
.room-grid{display:grid;grid-template-columns:190px 1fr;gap:18px}
.fig-wrap{min-height:340px;border:1px solid var(--bdr);border-radius:10px;background:radial-gradient(circle at 50% 40%,rgba(46,216,250,.1),transparent 65%),var(--s2);display:grid;place-items:center;position:relative}
.fig-person{position:relative;width:110px;height:280px}
.fh{position:absolute;left:50%;top:0;transform:translateX(-50%);width:52px;height:62px;background:linear-gradient(180deg,#c4936b,#a07050);border-radius:50%}
.fb{position:absolute;left:50%;top:64px;transform:translateX(-50%);width:88px;height:150px;border-radius:20px 20px 32px 32px;background:linear-gradient(180deg,#7aa0b2,#4d7a90);border:1px solid rgba(255,255,255,.14)}
.fa{position:absolute;top:72px;width:22px;height:115px;border-radius:16px;background:#c4936b}
.fa.l{left:8px;transform:rotate(5deg)}
.fa.r{right:8px;transform:rotate(-5deg)}
.fl{position:absolute;top:208px;width:26px;height:70px;border-radius:13px;background:#a07050}
.fl.l{left:20px}
.fl.r{right:20px}
.aura{position:absolute;border-radius:50%;animation:pulse 2s infinite ease-in-out;pointer-events:none}
.aura.abd{width:70px;height:70px;left:50%;top:54%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,255,255,.95) 0 4px,rgba(245,85,85,.72) 6px 20px,rgba(249,199,79,.3) 22px 35px,transparent)}
.aura.limb{width:54px;height:54px;left:76%;top:77%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,255,255,.9) 0 3px,rgba(245,85,85,.65) 5px 16px,transparent 20px)}
@keyframes pulse{0%{opacity:.9;transform:translate(-50%,-50%) scale(.9)}60%{opacity:.4;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:.9;transform:translate(-50%,-50%) scale(.9)}}
.chart-grid{display:grid;gap:10px}
.ig{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.plain-list{display:grid;gap:5px;margin-top:6px}
.plain-list li{font-size:13px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);line-height:1.35;list-style:none;color:var(--muted)}
.plain-list li b{color:var(--tx)}

/* ─── INTERVIEW ─── */
.slots-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:11px;color:var(--muted);font-weight:600}
.pip{width:26px;height:8px;border-radius:99px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.07)}
.pip.used{background:var(--cyan);box-shadow:0 0 8px rgba(46,216,250,.4)}
.qgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.qbtn{padding:12px 14px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2);text-align:left;cursor:pointer;transition:.15s;min-height:74px}
.qbtn:hover:not(:disabled){border-color:rgba(46,216,250,.45);background:rgba(46,216,250,.08)}
.qbtn:disabled{opacity:.38;cursor:not-allowed}
.qbtn.asked{border-color:rgba(62,248,146,.55);background:rgba(62,248,146,.07)}
.qbtn.low{border-color:rgba(249,199,79,.3)}
.qbtn b{display:block;font-size:12px;font-weight:700;margin-bottom:4px}
.qbtn span{display:block;font-size:11px;color:var(--muted);line-height:1.35}
.patient-says{padding:12px 14px;border-radius:8px;background:rgba(46,216,250,.06);border:1px solid rgba(46,216,250,.18);font-size:13px;font-style:italic;line-height:1.5;min-height:60px;color:#cce;margin-bottom:12px}
.patient-says .speaker{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:5px;font-style:normal;display:block}

/* ─── EXAM ─── */
.exam-layout{display:grid;grid-template-columns:minmax(300px,380px) 1fr;gap:18px;align-items:start}
.exam-board{position:relative;min-height:470px;border:1px solid var(--bdr);border-radius:10px;overflow:hidden;background:radial-gradient(circle at 50% 45%,rgba(46,216,250,.1),transparent 60%),var(--s2)}
.exam-board svg.body-map{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
.exam-btns-layer{position:absolute;inset:0}
.ebtn{position:absolute;padding:7px 10px;border-radius:7px;font-size:11px;font-weight:700;border:1px solid rgba(100,160,200,.5);background:rgba(7,16,26,.86);cursor:pointer;transition:.15s;white-space:nowrap;transform:translate(-50%,-50%)}
.ebtn:hover{border-color:var(--cyan);background:rgba(46,216,250,.16)}
.ebtn.tender{border-color:rgba(249,199,79,.75);background:rgba(249,199,79,.13);color:var(--amber)}
.ebtn.done{border-color:rgba(62,248,146,.7);background:rgba(62,248,146,.12);color:var(--green)}
.ebtn.done.tender{border-color:rgba(245,85,85,.8);background:rgba(245,85,85,.14);color:var(--red)}
.exam-feedback{display:grid;gap:10px}
.react-box{padding:14px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2);text-align:center}
.react-em{font-size:44px;display:block;margin-bottom:6px}
.react-txt{font-size:12px;color:var(--muted);line-height:1.35}
.chk-list{display:grid;gap:5px}
.ci{padding:7px 10px;border-radius:6px;border:1px solid var(--bdr);background:rgba(0,0,0,.15);font-size:12px;display:flex;align-items:center;gap:8px;color:var(--muted)}
.ci .ck{width:14px;height:14px;border-radius:3px;border:1px solid var(--dim);flex-shrink:0;display:grid;place-items:center;font-size:9px}
.ci.done{border-color:rgba(62,248,146,.45);color:var(--tx)}
.ci.done .ck{background:var(--green);border-color:var(--green);color:#07101a}
.ci.active{border-color:rgba(46,216,250,.5);color:var(--cyan)}

/* ─── IMAGING ─── */
.img-layout{display:grid;grid-template-columns:minmax(350px,1fr) 360px;gap:18px;align-items:start}
.img-viewer{position:relative;min-height:520px;border:1px solid var(--bdr);border-radius:10px;overflow:hidden;background:#030608;display:grid;place-items:center}
.real-img-wrap{width:100%;height:100%;min-height:520px;display:flex;flex-direction:column}
.real-img-wrap img{width:100%;flex:1;object-fit:contain;background:#030608;display:block}
.img-credit{font-size:10px;color:#3a6278;padding:5px 8px;border-top:1px solid rgba(255,255,255,.07);line-height:1.3;background:#040912}
.img-annotation{position:absolute;pointer-events:none}
.img-controls{display:grid;gap:10px}
.ctrl-card{padding:12px 14px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2)}
.ctrl-card h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.choice-btn{padding:8px 10px;border-radius:6px;border:1px solid var(--bdr);background:rgba(0,0,0,.2);font-size:12px;font-weight:600;text-align:center;cursor:pointer;transition:.14s}
.choice-btn:hover{border-color:rgba(46,216,250,.4);background:rgba(46,216,250,.08)}
.choice-btn.on{border-color:rgba(46,216,250,.75);background:rgba(46,216,250,.14);color:var(--cyan)}
.move-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:180px;margin:0 auto}
.move-btn{height:38px;border-radius:6px;border:1px solid var(--bdr);background:var(--s3);font-size:16px;cursor:pointer;transition:.14s}
.move-btn:hover{border-color:var(--cyan);background:rgba(46,216,250,.12)}
.beam{position:absolute;transition:all .1s ease;pointer-events:none}
.beam-box{width:100%;height:100%;border:2px solid rgba(46,216,250,.85);border-radius:12px;background:rgba(46,216,250,.06);box-shadow:0 0 25px rgba(46,216,250,.2),inset 0 0 20px rgba(46,216,250,.07)}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(62,248,146,.8)}
.crosshair{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;border:2px solid rgba(62,248,146,.7)}
.crosshair::before{left:50%;top:-10px;width:1px;height:50px;margin-left:-.5px}
.crosshair::after{top:50%;left:-10px;height:1px;width:50px;margin-top:-.5px}
.quality-bar{height:11px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:6px}
.quality-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),var(--amber) 40%,var(--green));transition:.2s}
.patient-bed{position:absolute;left:50%;bottom:42px;transform:translateX(-50%);width:78%;height:50px;border-radius:16px;background:linear-gradient(180deg,#3a5464,#1a2e3a);border:1px solid rgba(255,255,255,.15);box-shadow:0 16px 30px rgba(0,0,0,.4)}
.patient-lying{position:absolute;left:50%;top:50%;transform:translate(-50%,-65%);width:72px;height:205px;border-radius:38px;background:linear-gradient(180deg,#7aa0b2,#4d7a90);border:1px solid rgba(255,255,255,.15)}
.patient-lying::before{content:'';position:absolute;left:50%;top:-48px;transform:translateX(-50%);width:42px;height:50px;border-radius:50%;background:#c4936b}

/* ─── IMAGING: annotated SVG result ─── */
.img-result-svg{width:100%;height:100%;min-height:520px}
.img-result-svg svg{width:100%;height:100%;min-height:520px;display:block}
.annot{font-family:var(--ff);fill:#e0f8ff;font-size:13px;font-weight:700}
.annot-line{stroke:#2ed8fa;stroke-width:1.5;stroke-dasharray:4 3;fill:none;opacity:.8}
.annot-dot{fill:var(--cyan)}
.highlight-oval{fill:none;stroke:rgba(249,199,79,.8);stroke-width:2.5;animation:highlight-pulse 2s infinite}
@keyframes highlight-pulse{0%,100%{stroke-opacity:.7}50%{stroke-opacity:1}}
.limited-overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.6);border-radius:10px}
.limited-msg{text-align:center;padding:30px}
.limited-msg .em{font-size:48px;display:block;margin-bottom:8px}
.limited-msg h3{font-family:var(--ffc);font-size:22px;font-weight:900;color:var(--amber);margin-bottom:6px}
.limited-msg p{font-size:13px;color:var(--muted);line-height:1.4}

/* ─── DECISION ─── */
.dec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.dec-card{padding:16px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2);text-align:left;cursor:pointer;transition:.15s;min-height:100px;display:grid;grid-template-columns:44px 1fr;gap:12px;align-items:start}
.dec-card:hover{transform:translateY(-2px);border-color:rgba(46,216,250,.45);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.dec-icon{width:44px;height:44px;border-radius:10px;background:var(--s3);border:1px solid var(--bdr);display:grid;place-items:center;font-size:22px}
.dec-card h3{font-size:14px;font-weight:700;margin-bottom:4px}
.dec-card p{font-size:11px;color:var(--muted);line-height:1.35}
.consult-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.cons-btn{padding:12px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2);text-align:center;cursor:pointer;transition:.15s;font-weight:700;font-size:13px}
.cons-btn span{display:block;font-size:10px;color:var(--muted);margin-top:3px;font-weight:400}
.cons-btn:hover{border-color:rgba(46,216,250,.5);background:rgba(46,216,250,.08)}
.req-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.req{padding:10px 12px;border-radius:7px;border:1px solid var(--bdr);background:rgba(0,0,0,.15)}
.req.ok{border-color:rgba(62,248,146,.45);background:rgba(62,248,146,.06)}
.req b{font-size:12px;display:block;margin-bottom:2px}
.req small{font-size:10px;color:var(--muted);line-height:1.3}

/* ─── PROCEDURE ─── */
.proc-layout{display:grid;grid-template-columns:minmax(340px,1fr) 360px;gap:18px;align-items:start}
.proc-room{position:relative;min-height:530px;border:1px solid var(--bdr);border-radius:10px;background:radial-gradient(circle at 50% 44%,rgba(62,248,146,.09),transparent 60%),var(--s2);overflow:hidden}
.or-table{position:absolute;left:50%;bottom:46px;transform:translateX(-50%);width:76%;height:60px;border-radius:20px;background:linear-gradient(180deg,#3a5060,#1c3040);border:1px solid rgba(255,255,255,.18);box-shadow:0 18px 32px rgba(0,0,0,.4)}
.proc-patient{position:absolute;left:50%;top:272px;transform:translate(-50%,-50%);width:106px;height:255px;border-radius:50px;background:linear-gradient(180deg,#7aa0b2,#4d7a90);border:1px solid rgba(255,255,255,.18)}
.proc-patient::before{content:'';position:absolute;left:50%;top:-55px;transform:translateX(-50%);width:54px;height:60px;border-radius:50%;background:#c4936b}
.proc-target{position:absolute;border-radius:50%;border:2px solid rgba(249,199,79,.8);box-shadow:0 0 28px rgba(249,199,79,.2);animation:target-pulse 1.8s infinite}
@keyframes target-pulse{0%,100%{box-shadow:0 0 28px rgba(249,199,79,.2)}50%{box-shadow:0 0 42px rgba(249,199,79,.38)}}
.proc-target.abdomen{width:90px;height:90px;left:50%;top:310px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(249,199,79,.35),rgba(249,199,79,.1) 55%,transparent)}
.proc-target.hip{width:72px;height:72px;left:62%;top:360px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(249,199,79,.3),transparent 70%)}
.proc-target.chest{width:72px;height:72px;left:56%;top:228px;transform:translate(-50%,-50%)}
.proc-target.pelvis{width:80px;height:80px;left:50%;top:348px;transform:translate(-50%,-50%)}
.proc-overlay{position:absolute;inset:20px;border-radius:14px;border:2px solid rgba(62,248,146,.22);box-shadow:inset 0 0 40px rgba(62,248,146,.05)}
.proc-overlay.bad{border-color:rgba(245,85,85,.45);box-shadow:inset 0 0 40px rgba(245,85,85,.08)}
.proc-controls{display:grid;gap:10px}
.pc{padding:12px 14px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2)}
.pc h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.tool-btn{padding:10px 12px;border-radius:7px;border:1px solid var(--bdr);background:rgba(0,0,0,.18);text-align:left;cursor:pointer;transition:.14s;min-height:58px}
.tool-btn:hover{border-color:rgba(46,216,250,.4);background:rgba(46,216,250,.08)}
.tool-btn.done{border-color:rgba(62,248,146,.55);background:rgba(62,248,146,.08)}
.tool-btn b{display:block;font-size:12px;font-weight:700}
.tool-btn small{display:block;font-size:10px;color:var(--muted);margin-top:2px}
.safety-bar{height:12px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}
.safety-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),var(--amber) 40%,var(--green));transition:.3s}
.proc-steps{display:grid;gap:5px}
.ps{padding:7px 10px;border-radius:6px;border:1px solid var(--bdr);background:rgba(0,0,0,.15);font-size:12px;display:flex;align-items:center;gap:8px;color:var(--muted)}
.ps .psi{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.ps.done{border-color:rgba(62,248,146,.4);color:var(--tx)}
.ps.current{border-color:rgba(46,216,250,.55);background:rgba(46,216,250,.08);color:var(--cyan);font-weight:700}

/* ─── DEBRIEF ─── */
.debrief-layout{display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:start}
.score-ring{width:190px;height:190px;border-radius:50%;display:grid;place-items:center;font-family:var(--ffc);font-size:56px;font-weight:900;border:3px solid var(--green);box-shadow:0 0 36px rgba(62,248,146,.22),0 0 70px rgba(62,248,146,.08)}
.score-ring.mid{border-color:var(--amber);box-shadow:0 0 36px rgba(249,199,79,.22)}
.score-ring.low{border-color:var(--red);box-shadow:0 0 36px rgba(245,85,85,.22)}
.dlist{display:grid;gap:8px}
.di{padding:11px 13px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025)}
.di strong{display:block;font-size:12px;margin-bottom:3px}
.di p{font-size:12px;color:var(--muted);line-height:1.4}
.di.highlight{border-color:rgba(62,248,146,.25);background:rgba(62,248,146,.05)}
.di.mistake{border-color:rgba(245,85,85,.25);background:rgba(245,85,85,.05)}
.verdict-badge{display:inline-flex;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.verdict-badge.good{border:1px solid rgba(62,248,146,.4);background:rgba(62,248,146,.1);color:var(--green)}
.verdict-badge.ok{border:1px solid rgba(249,199,79,.4);background:rgba(249,199,79,.1);color:var(--amber)}
.verdict-badge.bad{border:1px solid rgba(245,85,85,.4);background:rgba(245,85,85,.1);color:var(--red)}

/* ─── MISC ─── */
.divider{height:1px;background:var(--bdr);margin:12px 0}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;border:1px solid rgba(255,255,255,.1);color:var(--muted)}
.tip{font-size:11px;color:var(--muted);font-style:italic;line-height:1.4;margin-top:6px}

/* future steps muted */
.stp.future{opacity:.35}
.stp.future .stp-icon{color:var(--dim)}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(110px);
  z-index:9999;
  display:flex;align-items:center;gap:10px;
  padding:11px 18px;
  border-radius:10px;
  border:1px solid var(--bdr);
  background:rgba(13,30,46,.97);
  backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,.55);
  font-size:13px;font-weight:600;
  color:var(--tx);
  max-width:min(460px,90vw);
  line-height:1.35;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1), opacity .28s ease;
  opacity:0;
  pointer-events:none;
}
.toast-in{transform:translateX(-50%) translateY(0);opacity:1}
.toast-out{transform:translateX(-50%) translateY(110px);opacity:0;transition:transform .3s ease,opacity .25s ease}
.toast-icon{font-size:20px;flex-shrink:0}
.toast-txt{flex:1}
.toast-neutral{border-color:rgba(46,216,250,.25);background:rgba(10,26,42,.97)}
.toast-good{border-color:rgba(62,248,146,.4);background:rgba(6,28,18,.97);color:#b6ffdb}
.toast-warn{border-color:rgba(249,199,79,.4);background:rgba(30,22,5,.97);color:#fde68a}
.toast-danger{border-color:rgba(245,85,85,.45);background:rgba(30,6,6,.97);color:#fecaca}

@media(max-width:1100px){
  :root{--topbar-h:auto;--topbar-h-sm:auto}
  .topbar{position:relative;grid-template-columns:1fr}
  .topbar.scrolled{grid-template-columns:1fr}
  .app{padding-top:12px}
  .app.scrolled{padding-top:12px}
  .main{grid-template-columns:1fr}
  .main>aside:first-child{position:relative;top:auto;max-height:none;overflow-y:visible}
  .app.scrolled .main>aside:first-child{top:auto;max-height:none}
  .exam-layout,.img-layout,.proc-layout,.room-grid,.debrief-layout{grid-template-columns:1fr}
  .monitor{grid-template-columns:repeat(3,auto);flex-wrap:wrap}
  .ecg-cell{grid-column:1/-1}
  .case-grid,.dec-grid,.diff-grid,.rot-grid{grid-template-columns:1fr}
  .stage{min-height:auto}
}
</style>
</head>
<body>
<div class="app"><div class="shell">

<!-- TOPBAR -->
<section class="topbar">
  <div class="card brand">
    <div class="brand-logo">🏥</div>
    <div class="brand-text">
      <h1>VITALS</h1>
      <p>The Hospital Shift Simulator</p>
    </div>
  </div>
  <div class="card monitor">
    <div class="ecg-cell">
      <canvas id="ecgCanvas" width="700" height="100"></canvas>
      <div class="live-badge">LIVE</div>
    </div>
    <div class="vital v-hr"><small>Heart Rate</small><div class="vv" id="vHR">--</div><div class="vu">bpm</div></div>
    <div class="vital v-bp"><small>Blood Press</small><div class="vv" id="vBP">--</div><div class="vu">mmHg</div></div>
    <div class="vital v-tmp"><small>Temp</small><div class="vv" id="vTMP">--</div><div class="vu">°C</div></div>
    <div class="vital v-o2"><small>Oxygen</small><div class="vv" id="vO2">--</div><div class="vu">% SpO₂</div></div>
    <div class="vital v-pain"><small>Pain</small><div class="vv" id="vPAIN">--</div><div class="vu">/10</div></div>
    <div class="stab-cell">
      <div class="stab-gauge" id="stabGauge">
        <svg viewBox="0 0 120 62" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="8" stroke-linecap="round"/>
          <path id="stabArc" d="M10 60 A50 50 0 0 1 110 60" fill="none" stroke="#3ef892" stroke-width="8" stroke-linecap="round" stroke-dasharray="157" stroke-dashoffset="40"/>
        </svg>
      </div>
      <span class="stab-pct" id="vSTAB">--</span>
      <span class="stab-lbl" id="vSTABL">Stable</span>
    </div>
  </div>
</section>

<!-- MAIN -->
<section class="main">
  <!-- LEFT — sticky sidebar -->
  <aside>
    <div class="card">
      <div class="ph">
        <h3>Your Progress</h3>
        <span class="prog-pct" style="font-family:var(--ffc);font-size:13px;font-weight:700;color:var(--muted)">0%</span>
      </div>
      <div style="height:3px;background:var(--s3);margin:0"><div id="progressBar" style="height:3px;width:0%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:0 2px 2px 0;transition:width .4s ease"></div></div>
      <div class="pb"><div class="steps" id="stepList"></div></div>
    </div>
    <div class="card">
      <div class="ph"><h3>Event Log</h3><button class="btn" style="padding:4px 10px;font-size:11px" onclick="clearLog()">Clear</button></div>
      <div class="pb"><div class="log-wrap" id="logWrap"></div></div>
    </div>
  </aside>

  <!-- CENTER -->
  <main class="card stage" id="stageCard">
    <div id="stage"></div>
  </main>

  <!-- RIGHT -->
  <aside>
    <div class="card">
      <div class="ph"><h3>Evidence Board</h3><span id="evCount" style="font-size:11px;color:var(--muted);font-weight:700">0 cards</span></div>
      <div class="pb"><div class="ev-wrap" id="evList"></div></div>
    </div>
  </aside>
</section>

</div></div>

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const SCENES=[
  {id:'hub',   label:'Hospital Hub',  icon:'🏥', sub:'Pick your shift'},
  {id:'room',  label:'Patient Room',  icon:'📋', sub:'Read the chart'},
  {id:'interview',label:'Interview',  icon:'💬', sub:'Ask questions'},
  {id:'exam',  label:'Exam',          icon:'🖐️', sub:'Map the pain'},
  {id:'imaging',label:'Imaging',      icon:'🩻', sub:'Run the study'},
  {id:'decision',label:'Decision',    icon:'⚖️', sub:'What do you do?'},
  {id:'procedure',label:'Procedure',  icon:'🛠️', sub:'Specialty steps'},
  {id:'debrief',label:'Debrief',      icon:'✅', sub:'See how you did'},
];

// Real CC0 Wikimedia images — direct file paths that reliably serve
const REAL_IMAGES = {
  pneumothorax:{
    url:'https://upload.wikimedia.org/wikipedia/commons/1/1d/Pneumothorax_on_chest_X-ray.jpg',
    credit:'Chest X-ray showing pneumothorax. Wikimedia Commons, CC0.',
    label:'Chest X-ray — Left Pneumothorax'
  },
  hip:{
    url:'https://upload.wikimedia.org/wikipedia/commons/5/5a/Hip_fracture_Garden_I.jpg',
    credit:'Hip X-ray showing femoral neck fracture. Wikimedia Commons, CC BY-SA.',
    label:'Pelvis X-ray — Hip Fracture'
  },
  obstruction:{
    url:'https://upload.wikimedia.org/wikipedia/commons/a/ae/Upright_abdominal_X-ray_demonstrating_small_bowel_obstruction_-_X-ray.jpg',
    credit:'Abdominal X-ray showing bowel obstruction. Wikimedia Commons, CC BY-SA.',
    label:'Abdominal X-ray — Bowel Obstruction'
  },
  stones:{
    url:'https://upload.wikimedia.org/wikipedia/commons/c/c2/Kidney_stone_%284%29.jpg',
    credit:'Kidney stone on X-ray. Wikimedia Commons, CC BY.',
    label:'Abdominal X-ray — Kidney Stone'
  }
};

function makeSVG(type, usable){
  const op = usable ? 1 : 0.45;
  const bg = `<rect width="420" height="470" fill="#020407"/>`;
  const bodyBase = `
    <defs>
      <radialGradient id="xg" cx="50%" cy="42%" r="60%">
        <stop offset="0" stop-color="#8da0aa"/>
        <stop offset=".55" stop-color="#3a4a55"/>
        <stop offset="1" stop-color="#070b10"/>
      </radialGradient>
    </defs>
    <rect x="40" y="22" width="340" height="426" rx="14" fill="url(#xg)" opacity="${op}"/>`;

  let accent = '';
  let labels = '';

  if(type==='appendicitis'){
    accent = `
      <g opacity="${op}">
        <ellipse cx="280" cy="348" rx="18" ry="28" fill="none" stroke="#f9c74f" stroke-width="2.5" class="highlight-oval"/>
        <circle cx="278" cy="354" r="6" fill="#f9c74f" opacity=".7"/>
        <line x1="278" y1="346" x2="220" y2="300" stroke="#2ed8fa" stroke-width="1.5" stroke-dasharray="4,3" opacity=".8"/>
        <text x="172" y="296" fill="#dff0ff" font-size="13" font-weight="700" font-family="Barlow, sans-serif">Inflamed</text>
        <text x="172" y="311" fill="#dff0ff" font-size="13" font-weight="700" font-family="Barlow, sans-serif">Appendix</text>
        <circle cx="278" cy="354" r="16" fill="none" stroke="#f55" stroke-width="1.5" opacity=".55"/>
        <!-- Spine -->
        <rect x="197" y="200" width="26" height="180" rx="5" fill="#c8d8e0" opacity=".55"/>
        <!-- Pelvis -->
        <ellipse cx="210" cy="385" rx="78" ry="38" fill="none" stroke="#c8d8e0" stroke-width="4" opacity=".4"/>
        <!-- Rib cage -->
        <g stroke="#c8d8e0" stroke-width="3" fill="none" opacity=".38">
          <path d="M155 175 Q130 205 138 240"/>
          <path d="M155 188 Q126 222 136 262"/>
          <path d="M265 175 Q290 205 282 240"/>
          <path d="M265 188 Q294 222 284 262"/>
        </g>
      </g>
    `;
    labels = `<text x="36" y="418" fill="#3a6278" font-size="11" font-family="Barlow, monospace">CT ABDOMEN · RLQ Pain</text>`;
  }

function procKey(p){
  const map={appendicitis:'appendectomy',gallbladder:'chole',obstruction:'obstruction',hernia:'hernia',aaa:'aaa',hip:'hip',ectopic:'ectopic',pneumothorax:'chesttube',stone:'stone'};
  return map[p.templateId||p.id]||null;
}
function ownerFor(p){
  if(p.correct.type==='consult')return p.correct.specialist;
  if(['operate','admit','medicate'].includes(p.correct.type))return 'General Surgery';
  if(p.templateId==='sprain'||p.id==='sprain')return 'Orthopedics';
  return 'Internal Medicine';
}
function effectiveCorrect(p){
  const owner=ownerFor(p);
  if(G.track==='General Surgery')return p.correct;
  if(owner===G.track){
    if(p.correct.type==='consult'){
      if(G.track==='Vascular'&&(p.templateId||p.id)==='aaa')return{type:'operate'};
      if(G.track==='OB/GYN'&&(p.templateId||p.id)==='ectopic')return{type:'operate'};
      if(G.track==='Emergency Medicine'&&(p.templateId||p.id)==='pneumothorax')return{type:'admit'};
      return{type:'admit'};
    }
    return p.correct;
  }
  if(owner==='General Surgery')return{type:'consult',specialist:'General Surgery'};
  return{type:'consult',specialist:owner};
}
function shouldDoProcedure(p){
  const key=procKey(p);
  if(!key)return false;
  const proc=PROCEDURES[key];
  return proc&&proc.owner===G.track;
}
function rotRelevant(p){return G.track==='General Surgery'||ownerFor(p)===G.track||p.service.includes(G.track)}
function correctLabel(p){const e=effectiveCorrect(p);return e.type==='consult'?`Consult ${e.specialist}`:e.type.charAt(0).toUpperCase()+e.type.slice(1)}

function generateShift(count=6){
  const pool=[...CASES_POOL];
  const selected=[];
  while(selected.length<count&&pool.length){
    const i=Math.floor(Math.random()*pool.length);
    selected.push(pool.splice(i,1)[0]);
  }
  currentCases=[];
  selected.forEach((t,i)=>{
    const p=clone(t);
    p.templateId=t.id;
    p._uid=`${t.id}_${Date.now()}_${i}`;
    p.id=p._uid;
    p.name=`${pick(firstNames)} ${pick(lastInits)}`;
    p.age=Math.max(14,Math.min(90,t.age+ri(-7,7)));
    p.room=`${ri(2,9)}${String.fromCharCode(65+i)}`;
    p.vitals=varyVitals(t.vitals,G.difficulty);
    p.complaint=triage(t,G.difficulty);
    p.seen=false;
    currentCases.push(p);

/* ── TOAST NOTIFICATION SYSTEM ── */
let _toastQueue=[];
let _toastBusy=false;
function toast(icon,text,type='neutral'){
  _toastQueue.push({icon,text,type});
  if(!_toastBusy)_nextToast();
}
function _nextToast(){
  if(!_toastQueue.length){_toastBusy=false;return}
  _toastBusy=true;
  const {icon,text,type}=_toastQueue.shift();
  let el=document.getElementById('toastEl');
  if(!el){
    el=document.createElement('div');
    el.id='toastEl';
    document.body.appendChild(el);
  }
  el.className=`toast toast-${type}`;
  el.innerHTML=`<span class="toast-icon">${icon}</span><span class="toast-txt">${text}</span>`;
  el.classList.add('toast-in');
  // hold 2.8s then slide out
  clearTimeout(el._tout);
  el._tout=setTimeout(()=>{
    el.classList.remove('toast-in');
    el.classList.add('toast-out');
    setTimeout(()=>{el.classList.remove('toast-out');_nextToast();},320);
  },2800);
}

function imgQuality(){
  let q=0;
  if(G.imaging.modality===C().imaging.modality)q+=30;
  if(G.imaging.target===C().imaging.target)q+=30;
  const dx=Math.abs(G.imaging.beamX-50),dy=Math.abs(G.imaging.beamY-50);
  q+=Math.max(0,22-(dx+dy)*.85);
  const exp=G.imaging.exposure;
  q+=exp>=44&&exp<=70?12:Math.max(0,12-Math.abs(exp-57)*.7);
  if(G.imaging.still)q+=6;
  return Math.round(Math.max(0,Math.min(100,q)));
}

function evaluateDecision(action,spec){
  const useful=usefulCount();
  const examOK=C().exam.required.every(id=>G.examined.includes(id));
  const imgOK=!C().imaging.required||G.done.imaging;
  const corr=effectiveCorrect(C());
  let lecture='';
  if(useful<2)lecture='Not enough clues from the interview. Go back and ask more.';
  else if(!examOK)lecture='You skipped required exam steps.';
  else if(!imgOK)lecture='You need a good imaging result before deciding.';
  else if(action!==corr.type)lecture=`That\'s not right for your ${G.track} role. The correct answer was: ${corr.type}${corr.specialist?' → '+corr.specialist:''}.`;
  else if(action==='consult'&&spec!==corr.specialist)lecture=`Wrong specialist. As ${G.track}, this patient needed ${corr.specialist}.`;
  if(lecture){
    G.mistakes.push(lecture);spend(8,-30);V().stability=Math.max(0,V().stability-7);log('⚠️',lecture);
    showLecture(lecture);return;
  }
  G.done.decision=true;G.outcome='success';spend(5,70);
  log('✅',`Good call: ${action}${spec?' → '+spec:''}`);
  if(shouldDoProcedure(C())){G.procedure={step:0,safety:60,mistakes:0,completed:[],name:null};setScene('procedure')}

}

/* ══════════════════════════════════════════
   ECG  —  accurate segment-based renderer
   Scrolling trace: new samples written at
   the right edge, old data shifted left.
   One beat = P → PR → QRS → ST → T → TP
   All timing derived from real HR.
══════════════════════════════════════════ */
const ECG_BUF_W = 700;          // matches canvas width attribute
const ecgBuf = new Float32Array(ECG_BUF_W).fill(0);
let ecgPhase  = 0;              // position within current RR cycle (seconds)
let ecgLast   = performance.now();

/*  Build one sample of a medically-accurate Lead-II waveform.
    phase  = time within RR interval [0 .. RR_sec)
    RR     = RR interval in seconds (= 60/HR)
    amp    = canvas half-amplitude in px
    Returns a signed deflection in px (positive = upward on canvas).  */
function ecgSample(phase, RR, amp, unstable) {
  // All durations scale loosely with RR (faster HR → shorter intervals)
  const PR  = Math.min(0.20, 0.12 + RR * 0.04);  // PR interval
  const QRS = 0.08 + (RR > 1.0 ? 0.01 : 0);      // QRS duration
  const ST  = Math.max(0.08, RR * 0.10);           // ST segment
  const QT  = PR + QRS + ST + RR * 0.20;           // approx QT end (T wave end)

  const t = phase;  // alias

  let v = 0;

  // ── P wave  (smooth hump before QRS) ──────────────────────────
  const P_start = 0.0;
  const P_dur   = PR - 0.02;
  if (t >= P_start && t < P_start + P_dur) {
    const tp = (t - P_start) / P_dur;
    v += amp * 0.15 * Math.sin(Math.PI * tp);
  }

  // ── PR segment (flat) already = 0 ─────────────────────────────

  // ── QRS complex ───────────────────────────────────────────────
  const Q_start = PR;
  const Q_dur   = QRS * 0.15;   // short Q dip
  const R_start = Q_start + Q_dur;
  const R_dur   = QRS * 0.35;   // sharp R spike up
  const S_start = R_start + R_dur;
  const S_dur   = QRS * 0.30;   // S dip below baseline
  const S_end   = S_start + S_dur;

  if (t >= Q_start && t < R_start) {
    const tq = (t - Q_start) / Q_dur;
    v -= amp * 0.10 * Math.sin(Math.PI * tq);          // Q: small dip
  } else if (t >= R_start && t < S_start) {
    const tr = (t - R_start) / R_dur;
    v += amp * 0.90 * Math.sin(Math.PI * tr);           // R: tall spike
  } else if (t >= S_start && t < S_end) {
    const ts = (t - S_start) / S_dur;
    v -= amp * 0.20 * Math.sin(Math.PI * ts);           // S: dip below
  }

  // ── ST segment (slightly elevated, flat) ──────────────────────
  if (t >= S_end && t < S_end + ST) {
    v += amp * 0.02;   // tiny normal ST elevation
  }

  // ── T wave (smooth, asymmetric hump) ──────────────────────────
  const T_start = S_end + ST;
  const T_dur   = RR * 0.22;
  if (t >= T_start && t < T_start + T_dur) {
    const tt = (t - T_start) / T_dur;
    // asymmetric: slower rise, faster fall
    const shape = tt < 0.45
      ? Math.sin(Math.PI * tt / 0.9)
      : Math.sin(Math.PI * (1 - (tt - 0.45) / 0.55 * 0.5 + 0.5));
    v += amp * 0.30 * Math.max(0, Math.sin(Math.PI * tt));
  }

  // ── TP segment (flat baseline until next beat) ─────────────────
  // v stays 0

  // Artifact on very low stability
  if (unstable) v += (Math.random() - 0.5) * amp * 0.18;

  return v;
}

function drawECG() {
  const canvas = document.getElementById('ecgCanvas');
  if (!canvas) { requestAnimationFrame(drawECG); return; }
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const vt = currentCases.length ? V() : { hr: 72, stability: 80 };
  const HR  = Math.max(30, Math.min(220, vt.hr));
  const RR  = 60 / HR;                         // seconds per beat
  const PX_PER_SEC = W / (RR * 3.5);           // show ~3.5 beats across width
  const amp = H * 0.36;                         // peak deflection in px
  const baseline = H * 0.55;
  const unstable = vt.stability < 35;

  // ── Advance phase by real elapsed time ────────────────────────
  const now = performance.now();
  const dt  = Math.min((now - ecgLast) / 1000, 0.05);   // seconds, capped
  ecgLast   = now;

  const samplesToAdd = Math.round(dt * PX_PER_SEC);

  for (let i = 0; i < samplesToAdd; i++) {
    ecgPhase += 1 / PX_PER_SEC;
    if (ecgPhase >= RR) ecgPhase -= RR;

    const deflection = ecgSample(ecgPhase, RR, amp, unstable);
    // Shift buffer left by 1, append new sample
    ecgBuf.copyWithin(0, 1);
    ecgBuf[ECG_BUF_W - 1] = baseline - deflection;   // invert: up = negative y
  }

  // ── Draw ──────────────────────────────────────────────────────
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(0,8,18,.72)';
  ctx.fillRect(0, 0, W, H);

  // Grid (1 large square = 0.2 s = 5 mm paper; 5 small = 1 large)
  const smallBox = PX_PER_SEC * 0.04;   // 0.04 s = 1 mm
  const largeBox = PX_PER_SEC * 0.20;   // 0.20 s = 5 mm
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += smallBox) {
    ctx.strokeStyle = (Math.round(x / largeBox) * largeBox - x < 0.5)
      ? 'rgba(46,216,250,.11)' : 'rgba(46,216,250,.045)';
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += smallBox) {
    ctx.strokeStyle = (Math.round(y / largeBox) * largeBox - y < 0.5)
      ? 'rgba(46,216,250,.11)' : 'rgba(46,216,250,.045)';
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Trace
  const color = unstable ? '#f55' : vt.stability < 60 ? '#f9c74f' : '#3ef892';
  ctx.strokeStyle = color;
  ctx.lineWidth   = 2.2;
  ctx.shadowColor = color;
  ctx.shadowBlur  = 9;
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  for (let x = 0; x < W; x++) {
    const y = ecgBuf[x];
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Labels
  ctx.fillStyle = 'rgba(62,248,146,.6)';
  ctx.font = '700 10px Barlow Condensed, sans-serif';
  ctx.fillText('Lead II', 10, 16);
  ctx.fillText('25 mm/s', 68, 16);
  ctx.fillText(`${HR} bpm`, W - 52, 16);

  requestAnimationFrame(drawECG);
}

/* ══════════════════════════════════════════
   SCROLL — compact topbar
══════════════════════════════════════════ */
(function(){
  const THRESHOLD = 40; // px scrolled before collapsing
  let ticking = false;
  function onScroll(){
    if(!ticking){
      requestAnimationFrame(()=>{
        const scrolled = window.scrollY > THRESHOLD;
        document.querySelector('.topbar').classList.toggle('scrolled', scrolled);
        document.querySelector('.app').classList.toggle('scrolled', scrolled);
        ticking = false;
      });
      ticking = true;
    }
  }
  window.addEventListener('scroll', onScroll, {passive:true});
})();

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
generateShift(6);
requestAnimationFrame(drawECG);
</script>
