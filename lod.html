function p(){return patients[game.caseIndex]}function v(){return p().vitals}function formatTime(){const m=12+game.time,h=9+Math.floor(m/60);return`${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`}function addLog(icon,text){game.log.unshift({icon,text,time:formatTime()});game.log=game.log.slice(0,14)}function clearLog(){game.log=[];render()}function spend(min,pts=0){game.time+=min;game.score+=pts;if(!game.outcome){v().stability=Math.max(0,v().stability-Math.ceil(min/12));if(v().stability<30)addLog('⚠️','Patient stability is getting low.')}}function addEvidence(ev){if(!ev)return;if(!game.evidence.some(e=>e.id===ev.id))game.evidence.push(ev)}function evFrom(q){if(!q.ev)return null;return{id:q.ev[0],icon:q.ev[1],title:q.ev[2],type:q.ev[3],source:'Interview'}}function hasEvidence(id){return game.evidence.some(e=>e.id===id)}function setScene(scene){game.scene=scene;render();window.scrollTo({top:0,behavior:'smooth'})}
function startCase(index){game.caseIndex=index;resetCaseState();setScene('room')}function resetCaseState(){patients.forEach(pt=>pt.vitals={...baseVitals[pt.id]});Object.assign(game,{scene:'room',score:0,time:0,budget:2500,evidence:[],log:[],asked:[],slots:5,palpated:[],selectedAction:null,outcome:null,mistakes:[],lecture:'',xray:{view:'abdomenAP',beamX:50,beamY:50,exposure:55,still:false,taken:false,quality:0,usable:false},ultra:{probeX:50,probeY:55,angle:50,gain:60,frozen:false,quality:0,measured:false},orprep:{step:0,sterile:30,mistakes:0,completed:[]},surgery:{step:0,mistakes:0,complication:null,completed:[]},done:{hub:false,room:false,interview:false,exam:false,diagnostics:false,decision:false,orprep:false,surgery:false,school:false,debrief:false}});addLog('🏥',`Admitted ${p().name} to Room ${p().room}.`)}function sceneDone(id){return game.done[id]||false}

function render(){renderVitals();renderSteps();renderEvidence();renderLog();const stage=document.getElementById('stage');if(game.scene==='hub')stage.innerHTML=renderHub();if(game.scene==='room')stage.innerHTML=renderRoom();if(game.scene==='interview')stage.innerHTML=renderInterview();if(game.scene==='exam')stage.innerHTML=renderExam();if(game.scene==='diagnostics')stage.innerHTML=renderDiagnostics();if(game.scene==='xray')stage.innerHTML=renderXray();if(game.scene==='ultrasound')stage.innerHTML=renderUltrasound();if(game.scene==='decision')stage.innerHTML=renderDecision();if(game.scene==='orprep')stage.innerHTML=renderORPrep();if(game.scene==='surgery')stage.innerHTML=renderSurgery();if(game.scene==='school')stage.innerHTML=renderSchool();if(game.scene==='debrief')stage.innerHTML=renderDebrief();if(game.scene==='xray')updateBeam();if(game.scene==='ultrasound')updateProbe()}
function renderVitals(){const ids=['vHR','vBP','vTemp','vO2','vPain','vStability'];if(!document.getElementById('vHR'))return;const vt=v();document.getElementById('vHR').textContent=Math.round(vt.hr);document.getElementById('vBP').textContent=vt.bp;document.getElementById('vTemp').textContent=vt.temp.toFixed(1);document.getElementById('vO2').textContent=Math.round(vt.spo2);document.getElementById('vPain').textContent=Math.round(vt.pain);document.getElementById('vStability').textContent=`${Math.round(vt.stability)}%`;document.getElementById('stabLabel').textContent=vt.stability<35?'CRITICAL':vt.stability<60?'WATCH':'STABLE'}
function renderSteps(){document.getElementById('stepList').innerHTML=scenes.map(s=>`<div class="step ${game.scene===s.id?'active':''} ${sceneDone(s.id)?'done':''}"><div class="stepIcon">${sceneDone(s.id)?'✓':s.icon}</div><div><div class="stepTitle">${s.label}</div><div class="stepCopy">${s.copy}</div></div></div>`).join('')}
function renderEvidence(){document.getElementById('evidenceCount').textContent=`${game.evidence.length} cards`;document.getElementById('evidenceStack').innerHTML=game.evidence.length?game.evidence.map(e=>`<div class="ev ${e.type||'neutral'}"><div class="evIcon">${e.icon||'•'}</div><div><strong>${e.title}</strong><span>${e.source}</span></div></div>`).join(''):`<div class="ev neutral"><div class="evIcon">🔎</div><div><strong>No evidence yet</strong><span>Findings appear here.</span></div></div>`}
function renderLog(){document.getElementById('eventLog').innerHTML=game.log.length?game.log.map(l=>`<div class="logRow"><div>${l.icon}</div><div><time>${l.time}</time>${l.text}</div></div>`).join(''):`<div class="logRow"><div>•</div><div>No events yet.</div></div>`}
function renderHub(){const cards=patients.map((pt,i)=>`<button class="caseCard" onclick="startCase(${i})"><span class="tag">Room ${pt.room}</span><h3>${pt.name}</h3><p>${pt.complaint}</p><p><b>Teaching path:</b> ${pt.needsUltrasound?'ultrasound / aneurysm':pt.needsXray?'x-ray / focal pain':'exam / clipboard'}</p></button>`).join('');return`${header('Hospital Hub','Choose a patient','The draw of the original was the hospital loop: examine, infer, test only when it matters, act, then get corrected hard if you skipped the procedure.')}<div class="stageBody"><div class="hubGrid">${cards}</div><div class="callout" style="margin-top:14px"><b>Classroom-safe original build:</b> no copied code, screens, text, or assets. This recreates the decision architecture: palpation patterns, X-ray stones pathway, ultrasound aneurysm pathway, strict OR prep, surgery sequence, and medical-school feedback.</div></div>${footer('',`<button class="primary" onclick="startCase(3)">Start Appendicitis Case ▶</button>`)}`}
function renderRoom(){return`${header('Patient Room',`${p().name} · Room ${p().room}`,'Read the complaint and chart before starting the interview.',`<button onclick="setScene('hub')">Hospital Hub</button>`)}<div class="stageBody"><div class="roomLayout"><div class="portrait"><div class="person"><div class="painGlow ${v().pain>4?'':'low'}"></div><div class="headShape"><span class="faceDot faceL"></span><span class="faceDot faceR"></span></div><div class="armShape armL"></div><div class="armShape armR"></div><div class="bodyShape"></div><div class="legShape legL"></div><div class="legShape legR"></div></div></div><div class="chart"><div class="infoGrid"><div class="info"><small>Name</small><b>${p().name}</b></div><div class="info"><small>Age / Sex</small><b>${p().age} / ${p().sex}</b></div><div class="info"><small>Stability</small><b>${v().stability}%</b></div><div class="info"><small>Budget</small><b>$${game.budget}</b></div></div><div class="callout"><b>Chief complaint:</b><br>${p().complaint}</div><div class="callout"><b>Chart:</b><br>${p().chart}</div><p class="teacherNote">This scene is intentionally simple: the player should want to move into exam and diagnostic reasoning.</p></div></div></div>${footer(`<span class="statusText">Score: ${game.score} · Time: ${formatTime()}</span>`,`<button class="primary" onclick="startInterview()">Start Interview ▶</button>`)}`}
function startInterview(){game.done.room=true;spend(2,5);addLog('💬','Interview started.');setScene('interview')}

function renderInterview(){const used=game.asked.length,slots=Array.from({length:game.slots},(_,i)=>`<span class="slot ${i<used?'used':''}"></span>`).join('');const qs=p().questions.map(id=>{const q=questionBank[id],a=answerFor(id);return`<button class="question ${game.asked.includes(id)?'asked':''} ${a.value==='low'?'low':''}" onclick="askQuestion('${id}')" ${game.asked.includes(id)||used>=game.slots?'disabled':''}><b>${q.q}</b><span>${game.asked.includes(id)?a.result:(a.value==='low'?'May waste time':'May reveal useful evidence')}</span></button>`}).join('');const key=countUseful();return`${header('Interview','Ask useful questions','You get five question slots. Low-value questions waste time and cost points.')}<div class="stageBody"><div class="slots"><span>Question slots:</span>${slots}<span>${used}/${game.slots}</span></div><div class="callout"><b>Goal:</b> find at least 2 useful clues before the physical exam. Current useful clues: <b>${key}</b></div><br><div class="questionGrid">${qs}</div></div>${footer(`<button onclick="setScene('room')">◀ Back</button>`,`<button class="primary" onclick="finishInterview()" ${key<2?'disabled':''}>Continue to Abdominal Exam ▶</button>`)}`}
function askQuestion(id){const a=answerFor(id);if(!a||game.asked.includes(id)||game.asked.length>=game.slots)return;game.asked.push(id);spend(a.value==='low'?8:4,a.value==='low'?-5:10);addEvidence(a.ev);addLog(a.value==='low'?'🟧':'💬',a.result);render()}
function countUseful(){return game.asked.map(id=>answerFor(id)).filter(a=>a&&(a.value==='key'||a.value==='support')).length}
function finishInterview(){game.done.interview=true;addLog('🖐️','Moved to abdominal exam.');setScene('exam')}
function renderExam(){const checked=p().palpation?.required?p().palpation.required.filter(id=>game.palpated.includes(id)).length:0;const buttons=regions.map(r=>{const painful=!!p().pain[r.id],done=game.palpated.includes(r.id);return`<button class="abdomenButton ${r.id} ${painful?'pain':''} ${done?'checked':''}" onclick="palpate('${r.id}')">${done?'✓ ':''}${r.label}</button>`}).join('');const list=['ruq','luq','rlq','llq'].map(id=>`<div class="checkItem ${game.palpated.includes(id)?'done':''}">${game.palpated.includes(id)?'✓':'•'} ${id.toUpperCase()}</div>`).join('');const last=game.log[0]?.text||'Click an abdomen region to start palpation.';return`${header('Abdominal Exam','Palpation Mini-Game','Press all four quadrants. The pain pattern determines the diagnostic branch.')}<div class="stageBody"><div class="examScene"><div class="abdomenBoard"><div class="torsoGraphic"><div class="torsoHead"></div><div class="torsoBody"></div></div><div class="abdomenGrid">${buttons}</div></div><div class="feedback"><div class="box"><div class="reaction">${reaction()}</div><b>Latest response</b><p>${last}</p></div><div class="box"><b>Required quadrants</b><div class="checklist">${list}</div><p class="teacherNote">Original-style logic: no pain → observe; diffuse pain → medicate; partial pain → X-ray; pulsating mass → ultrasound.</p></div><div class="callout"><b>Progress:</b> ${checked}/4 required quadrants checked.</div></div></div></div>${footer(`<button onclick="setScene('interview')">◀ Back</button>`,`<button class="primary" onclick="finishExam()" ${checked<4?'disabled':''}>Continue ▶</button>`)}`}
function reaction(){const last=game.palpated[game.palpated.length-1];if(!last)return'😐';if(p().pain[last])return last==='rebound'?'😫':'😣';return'😐'}function palpate(id){if(game.palpated.includes(id))return;const painful=!!p().pain[id];const finding=p().palpation?.findings?.[id]||`${regionFindings[id]} ${painful?'Pain response.':'No strong pain.'}`;game.palpated.push(id);spend(3,painful?12:6);if(painful){v().pain=Math.min(10,v().pain+1);v().hr+=2}addEvidence({id:'palp_'+id,icon:painful?'⚠️':'✅',title:finding,type:painful?'critical':'neutral',source:'Palpation'});addLog(painful?'⚠️':'✅',finding);render()}function finishExam(){game.done.exam=true;addLog('⚕️','Abdominal exam completed.');setScene('diagnostics')}
function renderDiagnostics(){const branch=diagnosticBranch();let cards='';cards+=`<button class="caseCard" onclick="setScene('xray')"><span class="tag">X-Ray Room</span><h3>Take abdominal film</h3><p>Needed for partial/focal pain to distinguish stone from appendicitis.</p></button>`;cards+=`<button class="caseCard" onclick="setScene('ultrasound')"><span class="tag">Ultrasound</span><h3>Scan for aneurysm</h3><p>Needed when a central pulsating mass is suspected.</p></button>`;cards+=`<button class="caseCard" onclick="setScene('decision')"><span class="tag">Clipboard</span><h3>Make decision</h3><p>Observe, medicate, refer, or operate. Premature choices trigger medical school.</p></button>`;return`${header('Diagnostics Hub','Choose the right department',`Exam pattern suggests: ${branch}. Tests are not generic; they matter only when the branch calls for them.`)}<div class="stageBody"><div class="hubGrid">${cards}</div><div class="callout" style="margin-top:14px"><b>Branch read:</b> ${branchAdvice()}</div></div>${footer(`<button onclick="setScene('exam')">◀ Back to Exam</button>`,`<button class="primary" onclick="setScene('decision')">Clipboard ▶</button>`)}`}
function diagnosticBranch(){const pains=game.palpated.filter(id=>p().pain[id]&&['ruq','luq','rlq','llq','navel','rebound'].includes(id));const quadPain=['ruq','luq','rlq','llq'].filter(id=>p().pain[id]);if(p().pain.navel)return'pulsating/central mass pathway';if(quadPain.length===0)return'no-pain observation pathway';if(quadPain.length>=4)return'diffuse pain medication pathway';return'partial/focal pain X-ray pathway'}function branchAdvice(){if(p().needsUltrasound)return'This patient needs ultrasound measurement before the clipboard action.';if(p().needsXray)return'This patient needs a usable X-ray before the clipboard action.';return'This patient may be handled from interview + palpation if the evidence is complete.'}
function renderXray(){if(game.xray.taken)return renderXrayResult();const q=xrayQuality();return`${header('X-Ray Room','X-Ray Mini-Game','Choose view, center beam, set exposure, hold still, then take the film.')}<div class="stageBody"><div class="xrayScene"><div class="xrayRoom"><div class="plate"></div><div class="xrayPatient"></div><div class="xrayTable"></div><div class="xrayBeam" id="xrayBeam"><div class="crosshair"></div></div></div><div class="controls"><div class="control"><h3>1. Choose View</h3><div class="viewGrid">${['abdomenAP','chest','pelvis','lateral'].map(vw=>`<button class="viewBtn ${game.xray.view===vw?'selected':''}" onclick="setXrayView('${vw}')">${vw==='abdomenAP'?'Abdomen AP':vw[0].toUpperCase()+vw.slice(1)}</button>`).join('')}</div></div><div class="control"><h3>2. Align Beam</h3><div class="moveGrid"><span></span><button onclick="moveBeam(0,-5)">▲</button><span></span><button onclick="moveBeam(-5,0)">◀</button><button onclick="centerBeam()">◎</button><button onclick="moveBeam(5,0)">▶</button><span></span><button onclick="moveBeam(0,5)">▼</button><span></span></div></div><div class="control"><h3>3. Exposure: <span id="exposureLabel">${game.xray.exposure}</span> kVp</h3><input type="range" min="25" max="90" value="${game.xray.exposure}" oninput="setExposure(this.value)"></div><div class="control"><label class="toggleRow"><input type="checkbox" ${game.xray.still?'checked':''} onchange="toggleStill(this.checked)"> Patient is still / breath held</label></div><div class="control"><h3>Quality Estimate</h3><div class="qualityMeter"><div class="qualityFill" style="width:${q}%"></div></div><p class="teacherNote">75+ is diagnostic.</p></div><button class="primary bigBtn" onclick="takeXray()"><b>Take X-Ray</b><span>Costs $120 and uses 10 minutes.</span></button></div></div></div>${footer(`<button onclick="setScene('diagnostics')">◀ Diagnostics</button>`,`<button onclick="xrayHelp()">Technique Help</button>`)}`}
function renderXrayResult(){const usable=game.xray.usable;return`${header('X-Ray Result',usable?'Usable film':'Limited film',usable?'Review the image and report.':'Retake it or proceed with weaker evidence.')}<div class="stageBody"><div class="filmViewer"><div class="film">${xraySVG(p().xrayType,usable)}</div><div class="report"><div class="reportLine"><b>Image Quality</b><span>${game.xray.quality}/100 — ${usable?'diagnostic quality':'limited'}</span></div><div class="reportLine"><b>Radiology Read</b><span>${usable?xrayFinding():'Limited film due to poor positioning/exposure. Repeat recommended.'}</span></div><div class="reportLine"><b>Clinical Use</b><span>${p().needsXray?'This pathway expects a usable X-ray before clipboard decision.':'X-ray is optional for this case.'}</span></div><div class="actions"><button class="warn" onclick="retakeXray()">Retake X-Ray</button><button class="primary" onclick="finishXray()">Return to Diagnostics ▶</button></div></div></div></div>${footer(`<button onclick="setScene('diagnostics')">◀ Diagnostics</button>`,`<span class="statusText">Budget: $${game.budget} · Time: ${formatTime()}</span>`)}`}
function xrayFinding(){if(p().xrayType==='stones')return'Radiopaque stone pattern visible above the pelvis.';if(p().xrayType==='appendix')return'No radiopaque urinary stones. Mild nonspecific right-lower-quadrant bowel gas pattern.';if(p().xrayType==='diffuse')return'Diffuse nonspecific bowel gas pattern. No focal surgical finding.';return'No acute finding on plain abdominal film.'}function setXrayView(val){game.xray.view=val;render()}function moveBeam(dx,dy){game.xray.beamX=Math.max(20,Math.min(80,game.xray.beamX+dx));game.xray.beamY=Math.max(20,Math.min(80,game.xray.beamY+dy));render()}function centerBeam(){game.xray.beamX=50;game.xray.beamY=50;render()}function setExposure(val){game.xray.exposure=Number(val);const e=document.getElementById('exposureLabel');if(e)e.textContent=val;const f=document.querySelector('.qualityFill');if(f)f.style.width=xrayQuality()+'%'}function toggleStill(val){game.xray.still=val;render()}function updateBeam(){const b=document.getElementById('xrayBeam');if(!b)return;b.style.left=`calc(${game.xray.beamX}% - 95px)`;b.style.top=`calc(${game.xray.beamY}% - 110px)`}function xrayQuality(){let q=0;if(game.xray.view==='abdomenAP')q+=35;else if(game.xray.view==='pelvis')q+=12;const dx=Math.abs(game.xray.beamX-50),dy=Math.abs(game.xray.beamY-50);q+=Math.max(0,35-(dx+dy)*1.4);const exp=game.xray.exposure;q+=exp>=45&&exp<=65?20:Math.max(0,20-Math.abs(exp-55));if(game.xray.still)q+=10;return Math.round(Math.max(0,Math.min(100,q)))}function takeXray(){game.xray.quality=xrayQuality();game.xray.usable=game.xray.quality>=75;game.xray.taken=true;game.budget-=120;spend(10,game.xray.usable?20:-8);if(game.xray.usable){addEvidence({id:'xray_'+p().id,icon:'🩻',title:xrayFinding(),type:p().xrayType==='stones'?'critical':'neutral',source:'X-Ray'});addLog('🩻',`Usable X-ray: ${xrayFinding()}`)}else addLog('🩻','X-ray taken, but image quality is limited.');render()}function retakeXray(){game.xray={view:'abdomenAP',beamX:50,beamY:50,exposure:55,still:false,taken:false,quality:0,usable:false};addLog('🩻','Preparing to retake X-ray.');render()}function finishXray(){game.done.diagnostics=true;game.done.xray=game.xray.usable;setScene('diagnostics')}function xrayHelp(){document.getElementById('stage').innerHTML=`${header('X-Ray Help','Technique','Choose Abdomen AP, center beam, use 45–65 kVp, and hold still.')}<div class="stageBody"><div class="callout">Quality 75+ produces a diagnostic film. The film result changes by case.</div></div>${footer(`<button class="primary" onclick="setScene('xray')">Back</button>`,'')}`}
function renderUltrasound(){if(game.ultra.measured)return renderUltrasoundResult();const q=ultraQuality();return`${header('Ultrasound Room','Ultrasound Mini-Game','Move the probe, adjust angle and gain, then freeze a measurable image.')}<div class="stageBody"><div class="ultraScene"><div class="ultraRoom"><div class="ultraScreen"><div class="scanLine"></div><div class="sonar"></div>${p().aorta?`<div class="aneurysm" style="width:${p().aorta*18}px;height:${p().aorta*13}px"></div>`:''}</div><div class="probe" id="probe"></div></div><div class="controls"><div class="control"><h3>Probe Position</h3><div class="moveGrid"><span></span><button onclick="moveProbe(0,-5)">▲</button><span></span><button onclick="moveProbe(-5,0)">◀</button><button onclick="centerProbe()">◎</button><button onclick="moveProbe(5,0)">▶</button><span></span><button onclick="moveProbe(0,5)">▼</button><span></span></div></div><div class="control"><h3>Angle: ${game.ultra.angle}</h3><input type="range" min="0" max="100" value="${game.ultra.angle}" oninput="setUltra('angle',this.value)"></div><div class="control"><h3>Gain: ${game.ultra.gain}</h3><input type="range" min="0" max="100" value="${game.ultra.gain}" oninput="setUltra('gain',this.value)"></div><div class="control"><h3>Clarity</h3><div class="qualityMeter"><div class="qualityFill" style="width:${q}%"></div></div><p class="teacherNote">75+ can be measured.</p></div><button class="primary bigBtn" onclick="freezeUltra()"><b>Freeze and Measure</b><span>Costs $220 and uses 12 minutes.</span></button></div></div></div>${footer(`<button onclick="setScene('diagnostics')">◀ Diagnostics</button>`,`<button onclick="ultraHelp()">Ultrasound Help</button>`)}`}
function renderUltrasoundResult(){const ok=game.ultra.quality>=75;const size=p().aorta||0;return`${header('Ultrasound Result',ok?'Measurement captured':'Image too noisy',ok?'Review measured aorta size.':'Retake the scan before relying on this.')}<div class="stageBody"><div class="filmViewer"><div class="film">${ultraSVG(ok,size)}</div><div class="report"><div class="reportLine"><b>Image Quality</b><span>${game.ultra.quality}/100</span></div><div class="reportLine"><b>Measurement</b><span>${ok&&size?`Aortic diameter measured at ${size.toFixed(1)} cm.`:'No reliable aneurysm measurement.'}</span></div><div class="reportLine"><b>Clinical Use</b><span>${size>=5?'At or above surgical threshold in this simplified model.':'Below surgical threshold in this simplified model.'}</span></div><div class="actions"><button class="warn" onclick="retakeUltra()">Retake Ultrasound</button><button class="primary" onclick="finishUltra()">Return to Diagnostics ▶</button></div></div></div></div>${footer(`<button onclick="setScene('diagnostics')">◀ Diagnostics</button>`,``)}`}
function ultraQuality(){let q=0;const dx=Math.abs(game.ultra.probeX-50),dy=Math.abs(game.ultra.probeY-55);q+=Math.max(0,45-(dx+dy)*1.4);q+=Math.max(0,25-Math.abs(game.ultra.angle-50));q+=Math.max(0,25-Math.abs(game.ultra.gain-60));return Math.round(Math.max(0,Math.min(100,q)))}function updateProbe(){const b=document.getElementById('probe');if(!b)return;b.style.left=`calc(${game.ultra.probeX}% - 29px)`;b.style.top=`calc(${game.ultra.probeY}% - 44px)`}function moveProbe(dx,dy){game.ultra.probeX=Math.max(20,Math.min(80,game.ultra.probeX+dx));game.ultra.probeY=Math.max(25,Math.min(80,game.ultra.probeY+dy));render()}function centerProbe(){game.ultra.probeX=50;game.ultra.probeY=55;render()}function setUltra(k,val){game.ultra[k]=Number(val);render()}function freezeUltra(){game.ultra.quality=ultraQuality();game.ultra.measured=true;game.budget-=220;spend(12,game.ultra.quality>=75?20:-8);if(game.ultra.quality>=75&&p().aorta){addEvidence({id:'ultra_'+p().id,icon:'🌀',title:`Aorta measured ${p().aorta.toFixed(1)} cm`,type:p().aorta>=5?'critical':'supportive',source:'Ultrasound'});addLog('🌀',`Ultrasound measured aorta at ${p().aorta.toFixed(1)} cm.`)}else addLog('🌀','Ultrasound image was too noisy to measure reliably.');render()}function retakeUltra(){game.ultra={probeX:50,probeY:55,angle:50,gain:60,frozen:false,quality:0,measured:false};render()}function finishUltra(){game.done.diagnostics=true;game.done.ultrasound=game.ultra.quality>=75;setScene('diagnostics')}function ultraHelp(){document.getElementById('stage').innerHTML=`${header('Ultrasound Help','Technique','Center the probe, keep angle near 50, gain near 60, then freeze.')}<div class="stageBody"><div class="callout">Aneurysm pathway needs ultrasound measurement. Under 5 cm observe; 5 cm or above operate.</div></div>${footer(`<button class="primary" onclick="setScene('ultrasound')">Back</button>`,'')}`}
function renderDecision(){const actions=[['observe','👀','Observe','Use for no-pain/benign cases or small aneurysm after ultrasound.'],['medicate','💊','Medicate','Use for diffuse infection pattern.'],['refer','📨','Refer','Use for kidney stone pathway.'],['operate','🔪','Operate','Use for appendicitis or large aneurysm.']].map(a=>`<button class="clipBtn" onclick="chooseAction('${a[0]}')"><div class="clipIcon">${a[1]}</div><div><h3>${a[2]}</h3><p>${a[3]}</p></div></button>`).join('');return`${header('Clipboard','Choose therapy','This is where the original was unforgiving: action must match evidence and required tests.')}<div class="stageBody"><div class="clipboardGrid">${actions}</div><div class="reqs">${requirements()}</div></div>${footer(`<button onclick="setScene('diagnostics')">◀ Diagnostics</button>`,`<button onclick="medicalNotes()">Medical School Notes</button>`)}`}
function requirements(){const key=countUseful(),allQ=['ruq','luq','rlq','llq'].every(id=>game.palpated.includes(id));const dxReq=!p().needsXray||game.done.xray;const usReq=!p().needsUltrasound||game.done.ultrasound;return[['Interview clues',key>=2,`${key} useful clue(s) found`],['All quadrants',allQ,allQ?'Complete':'RUQ/LUQ/RLQ/LLQ required'],['Required test',dxReq&&usReq,requiredTestText()]].map(r=>`<div class="req ${r[1]?'done':''}"><b>${r[1]?'✓':'•'} ${r[0]}</b><span>${r[2]}</span></div>`).join('')}function requiredTestText(){if(p().needsXray)return game.done.xray?'X-ray complete':'Usable X-ray required';if(p().needsUltrasound)return game.done.ultrasound?'Ultrasound complete':'Ultrasound measurement required';return'No diagnostic test required'}
function chooseAction(action){game.selectedAction=action;const key=countUseful(),allQ=['ruq','luq','rlq','llq'].every(id=>game.palpated.includes(id));let lecture='';if(key<2)lecture='You did not gather enough interview evidence before acting.';else if(!allQ)lecture='You did not complete the abdominal exam. Check all four quadrants.';else if(p().needsXray&&!game.done.xray)lecture='This partial/focal pain pathway required a usable abdominal X-ray.';else if(p().needsUltrasound&&!game.done.ultrasound)lecture='This central pulsating mass pathway required ultrasound measurement.';else if(action!==p().correctAction)lecture=`Wrong clipboard action. Correct action was ${p().correctAction.toUpperCase()}.`;if(lecture){sendToSchool(lecture);return}game.done.decision=true;spend(5,60);addLog('✅',`Correct action: ${action.toUpperCase()}.`);if(action==='operate'){setScene('orprep')}else{game.outcome='success';setScene('debrief')}}function sendToSchool(msg){game.lecture=msg;game.mistakes.push(msg);spend(8,-30);v().stability=Math.max(0,v().stability-8);addLog('🎓',`Medical school: ${msg}`);setScene('school')}function medicalNotes(){game.lecture=generalRule();setScene('school')}function generalRule(){return'Rule chain: complete interview, palpate all quadrants, use X-ray for partial/focal pain, use ultrasound for pulsating mass, then choose Observe / Medicate / Refer / Operate.'}
function renderSchool(){return`${header('Medical School','Corrective Feedback','This is where the game tells you exactly what you skipped or misunderstood.')}<div class="stageBody"><div class="callout"><b>${game.lecture||generalRule()}</b><br><br>${p().school}</div><div class="callout" style="margin-top:14px"><b>Pathway reminder:</b><ol><li>No pain → observe.</li><li>Diffuse pain → medicate.</li><li>Partial/focal pain → X-ray. Stones → refer. No stones with RLQ/rebound → operate.</li><li>Pulsing central mass → ultrasound. Under 5 cm → observe. 5 cm or above → operate.</li></ol></div></div>${footer(`<button onclick="setScene('decision')">◀ Back to Clipboard</button>`,`<button class="primary" onclick="setScene('diagnostics')">Return to Diagnostics</button>`)}`}
const prepSteps=[['wash','🧼','Scrub hands'],['gloves','🧤','Sterile gloves'],['antiseptic','🧴','Apply antiseptic'],['drape','🟦','Place sterile drape'],['anesthesia','😴','Confirm anesthesia'],['antibiotics','💉','Give antibiotics'],['iv','🩸','Confirm IV / blood']];
function renderORPrep(){const cur=prepSteps[game.orprep.step];if(!cur)return renderORPrepDone();const tools=prepSteps.map(s=>`<button class="toolBtn ${game.orprep.completed.includes(s[0])?'done':''}" onclick="prepTool('${s[0]}')">${s[1]}<br>${s[2]}</button>`).join('');const checks=prepSteps.map((s,i)=>`<div class="checkItem ${game.orprep.completed.includes(s[0])?'done':''}">${game.orprep.completed.includes(s[0])?'✓':i===game.orprep.step?'▶':'•'} ${s[2]}</div>`).join('');return`${header('OR Prep','Sterile Prep Mini-Game','Strict order matters. Wrong steps lower the sterile field.')}<div class="stageBody"><div class="orScene"><div class="orRoom"><div class="prepOverlay ${game.orprep.sterile<55?'bad':''}"></div><div class="orPatient"></div><div class="drape ${game.orprep.completed.includes('drape')?'on':''}"></div><div class="target"></div><div class="orTable"></div></div><div class="controls"><div class="control"><h3>Current Step</h3><div class="callout"><b>${cur[1]} ${cur[2]}</b></div></div><div class="control"><h3>Sterile Field: ${game.orprep.sterile}%</h3><div class="qualityMeter"><div class="qualityFill" style="width:${game.orprep.sterile}%"></div></div></div><div class="control"><h3>Prep Tray</h3><div class="toolGrid">${tools}</div></div><div class="control"><h3>Checklist</h3><div class="checklist">${checks}</div></div></div></div></div>${footer(`<button onclick="setScene('decision')">◀ Clipboard</button>`,`<button onclick="prepHelp()">Prep Help</button>`)}`}
function prepTool(id){const expected=prepSteps[game.orprep.step];if(!expected)return;if(id===expected[0]){game.orprep.completed.push(id);game.orprep.step++;game.orprep.sterile=Math.min(100,game.orprep.sterile+10);spend(3,12);addLog('🧼',`${expected[2]} complete.`)}else{const chosen=prepSteps.find(s=>s[0]===id);game.orprep.mistakes++;game.orprep.sterile=Math.max(0,game.orprep.sterile-18);game.mistakes.push(`OR prep order error: used ${chosen?.[2]||id} before ${expected[2]}.`);v().stability=Math.max(0,v().stability-3);spend(4,-15);addLog('⚠️',`Wrong prep order. Expected ${expected[2]}.`)}if(game.orprep.step>=prepSteps.length){game.done.orprep=game.orprep.sterile>=75;if(game.done.orprep){addEvidence({id:'orprep',icon:'🧼',title:'Sterile OR prep completed',type:'supportive',source:'OR Prep'});addLog('✅','OR prep complete. Ready for surgery.')}else sendToSchool('Sterile field was compromised during OR prep.')}render()}
function renderORPrepDone(){return`${header('OR Prep Complete','Sterile field ready','This unlocks the surgery scene.')}<div class="stageBody"><div class="debrief"><div class="scoreCircle">${game.orprep.sterile}%</div><div class="debriefList"><div class="debriefItem"><strong>Sterile field</strong><span>${game.orprep.sterile}%</span></div><div class="debriefItem"><strong>Mistakes</strong><span>${game.orprep.mistakes}</span></div><div class="debriefItem"><strong>Completed</strong><span>${game.orprep.completed.map(id=>prepSteps.find(s=>s[0]===id)[2]).join(' → ')}</span></div></div></div></div>${footer(`<button onclick="game.orprep={step:0,sterile:30,mistakes:0,completed:[]};game.done.orprep=false;setScene('orprep')">Retry Prep</button>`,`<button class="primary" onclick="setScene('surgery')">Begin Surgery ▶</button>`)}`}
function prepHelp(){game.lecture='Safe OR prep sequence: scrub hands, gloves, antiseptic, drape, anesthesia check, antibiotics, IV/blood readiness.';setScene('school')}
function surgerySteps(){return p().surgeryType==='aneurysm'?[['incision','🔪','Controlled incision'],['expose','🫀','Expose vessel'],['clamp','🗜️','Clamp above/below'],['graft','🧵','Place graft'],['check','🩺','Check flow'],['close','🪡','Close layers']]:[['incision','🔪','Controlled incision'],['retract','↔️','Retract tissue'],['identify','👁️','Identify appendix'],['clamp','🗜️','Clamp base'],['remove','✂️','Remove appendix'],['irrigate','💧','Irrigate field'],['close','🪡','Close layers']]}
function renderSurgery(){const steps=surgerySteps();const cur=steps[game.surgery.step];if(!cur)return surgeryDone();if(game.surgery.complication)return renderComplication();const tools=steps.map(s=>`<button class="toolBtn ${game.surgery.completed.includes(s[0])?'done':''}" onclick="surgeryTool('${s[0]}')">${s[1]}<br>${s[2]}</button>`).join('');return`${header('Surgery','Procedure Mini-Game','Choose the correct next surgical action. Complications can interrupt the flow.')}<div class="stageBody"><div class="surgeryScene"><div class="surgeryRoom"><div class="surgeryPatient"></div><div class="drape on"></div><div class="surgeryField"><div class="organ"></div>${p().surgeryType==='appendectomy'?'<div class="appendix"></div>':''}<div class="bleed b1"></div><div class="bleed b2"></div></div><div class="surgeryTable"></div></div><div class="controls"><div class="control"><h3>Current Step</h3><div class="callout"><b>${cur[1]} ${cur[2]}</b></div></div><div class="control"><h3>Instrument Tray</h3><div class="toolGrid">${tools}</div></div><div class="control"><h3>Status</h3><p>Stability: ${v().stability}%</p><p>Mistakes: ${game.surgery.mistakes}</p></div></div></div></div>${footer(`<button onclick="setScene('orprep')">◀ OR Prep</button>`,`<button onclick="surgeryHelp()">Surgery Help</button>`)}`}
function surgeryTool(id){const steps=surgerySteps(),expected=steps[game.surgery.step];if(id===expected[0]){game.surgery.completed.push(id);game.surgery.step++;spend(5,18);addLog('🔪',`${expected[2]} complete.`);if(game.surgery.step>=3&&!game.surgery.complication&&Math.random()<0.22){game.surgery.complication=randomComplication();addLog('⚠️',`Complication: ${game.surgery.complication.text}`)}}else{game.surgery.mistakes++;game.mistakes.push(`Surgery order error: used ${id} before ${expected[2]}.`);v().stability=Math.max(0,v().stability-8);spend(5,-25);addLog('⚠️',`Wrong surgical step. Expected ${expected[2]}.`);if(game.surgery.mistakes>=4)sendToSchool('Too many surgical errors. You lost the procedure.')}render()}function randomComplication(){const list=[{id:'bleeding',text:'Bleeding in field',fix:'clamp',label:'Clamp / cautery'}, {id:'brady',text:'Bradycardia on monitor',fix:'atropine',label:'Atropine'}, {id:'pvc',text:'PVCs on monitor',fix:'lidocaine',label:'Lidocaine'}, {id:'bpdrop',text:'Blood pressure crash',fix:'fluids',label:'Fluids / blood'}];return list[Math.floor(Math.random()*list.length)]}
function renderComplication(){const c=game.surgery.complication;const opts=[['clamp','🗜️','Clamp / cautery'],['atropine','💉','Atropine'],['lidocaine','💉','Lidocaine'],['fluids','🩸','Fluids / blood']].map(o=>`<button class="toolBtn" onclick="treatComplication('${o[0]}')">${o[1]}<br>${o[2]}</button>`).join('');return`${header('Complication','Respond immediately',c.text)}<div class="stageBody"><div class="surgeryScene"><div class="surgeryRoom"><div class="surgeryPatient"></div><div class="drape on"></div><div class="surgeryField"><div class="organ"></div><div class="appendix"></div><div class="bleed b1 on"></div><div class="bleed b2 ${c.id==='bleeding'?'on':''}"></div></div><div class="surgeryTable"></div></div><div class="controls"><div class="control"><h3>Monitor Alert</h3><div class="callout"><b>${c.text}</b><br>Choose the correct response before continuing.</div></div><div class="control"><h3>Emergency Tray</h3><div class="toolGrid">${opts}</div></div></div></div></div>${footer('',``)}`}
function treatComplication(id){const c=game.surgery.complication;if(!c)return;if(id===c.fix){game.surgery.complication=null;v().stability=Math.min(100,v().stability+6);spend(3,25);addLog('✅',`Complication treated: ${c.label}.`)}else{game.surgery.mistakes++;v().stability=Math.max(0,v().stability-14);game.mistakes.push(`Wrong complication response: used ${id} for ${c.text}.`);spend(4,-30);addLog('⚠️','Wrong emergency response.');if(v().stability<=0||game.surgery.mistakes>=4)sendToSchool('The patient deteriorated because the complication response was wrong.')}render()}
function surgeryDone(){game.done.surgery=true;game.outcome='success';addEvidence({id:'surgeryDone',icon:'✅',title:`${p().surgeryType} completed`,type:'supportive',source:'Surgery'});return`${header('Surgery Complete','Patient stabilized','The procedure sequence is complete.')}<div class="stageBody"><div class="debrief"><div class="scoreCircle">✓</div><div class="debriefList"><div class="debriefItem"><strong>Procedure</strong><span>${p().surgeryType}</span></div><div class="debriefItem"><strong>Mistakes</strong><span>${game.surgery.mistakes}</span></div><div class="debriefItem"><strong>Final stability</strong><span>${v().stability}%</span></div></div></div></div>${footer('',`<button class="primary" onclick="setScene('debrief')">Debrief ▶</button>`)}`}
function surgeryHelp(){game.lecture='Surgery is a strict procedure: incision, expose/retract, identify target, clamp before cutting/removing, irrigate/check, close layers. Treat monitor complications immediately.';setScene('school')}
function renderDebrief(){const correct=game.selectedAction===p().correctAction;const score=Math.max(0,Math.min(100,65+(correct?20:0)+(game.done.xray?5:0)+(game.done.ultrasound?5:0)+(game.done.orprep?8:0)+(game.done.surgery?10:0)+Math.round(v().stability/6)-game.mistakes.length*6));game.done.debrief=true;return`${header('Debrief','Case Review','Review clinical reasoning and procedural performance.')}<div class="stageBody"><div class="debrief"><div class="scoreCircle">${score}</div><div class="debriefList"><div class="debriefItem"><strong>Diagnosis</strong><span>${p().diagnosis}</span></div><div class="debriefItem"><strong>Correct action</strong><span>${p().correctAction.toUpperCase()}</span></div><div class="debriefItem"><strong>Your action</strong><span>${(game.selectedAction||'none').toUpperCase()}</span></div><div class="debriefItem"><strong>Outcome</strong><span>${game.outcome==='success'?'Patient survived the pathway.':'Case incomplete or redirected to medical school.'}</span></div><div class="debriefItem"><strong>Why it mattered</strong><span>${p().school}</span></div><div class="debriefItem"><strong>Mistakes</strong><span>${game.mistakes.length?game.mistakes.join(' '):'No major errors.'}</span></div></div></div></div>${footer(`<button onclick="resetCurrent()">Replay Case</button>`,`<button class="primary" onclick="setScene('hub')">Hospital Hub</button>`)}`}
function resetCurrent(){const idx=game.caseIndex;startCase(idx)}
function xraySVG(type,usable){const stones=type==='stones'?`<g fill="#fff" opacity=".95"><circle cx="235" cy="238" r="5"/><circle cx="248" cy="287" r="4"/><circle cx="226" cy="335" r="3.6"/></g>`:'';const appendix=type==='appendix'?`<g stroke="#cfd8dc" stroke-width="4" opacity=".55" fill="none"><path d="M255 330c34 4 44 25 30 42"/><path d="M262 348c20 5 29 17 22 31"/></g>`:'';const diffuse=type==='diffuse'?Array.from({length:15},(_,i)=>`<ellipse cx="${90+(i%5)*46}" cy="${160+Math.floor(i/5)*68}" rx="${18+(i%3)*4}" ry="${10+(i%2)*5}" fill="#05080d" opacity=".62"/>`).join(''):'';return`<svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="g" cx="50%" cy="45%" r="65%"><stop offset="0" stop-color="#8d99a3"/><stop offset=".55" stop-color="#404a54"/><stop offset="1" stop-color="#080b10"/></radialGradient></defs><rect width="420" height="420" fill="#020407"/><g opacity="${usable?1:.5}"><rect x="42" y="28" width="336" height="364" rx="18" fill="url(#g)"/><g stroke="#e7edf2" stroke-width="10" stroke-linecap="round" opacity=".72" fill="none"><path d="M145 58c-34 54-39 118-28 180 7 39 15 83 4 128"/><path d="M275 58c34 54 39 118 28 180-7 39-15 83-4 128"/><path d="M132 338c55 27 103 27 156 0"/><path d="M116 356c-22 6-44 16-61 32"/><path d="M304 356c22 6 44 16 61 32"/></g><g stroke="#f5f7fa" stroke-width="7" opacity=".78" fill="none"><path d="M210 60v290"/><path d="M188 84h44M185 122h50M183 160h54M181 198h58M183 236h54M187 274h46M192 312h36"/></g><g fill="#06080c" opacity=".55"><ellipse cx="130" cy="165" rx="32" ry="18"/><ellipse cx="284" cy="175" rx="34" ry="17"/><ellipse cx="152" cy="246" rx="31" ry="18"/><ellipse cx="268" cy="260" rx="30" ry="16"/><ellipse cx="205" cy="220" rx="25" ry="14"/></g>${diffuse}${appendix}${stones}<text x="58" y="374" fill="#d6e7ef" opacity=".55" font-family="monospace" font-size="12">AP ABDOMEN</text></g>${usable?'':`<g><rect x="58" y="52" width="304" height="318" rx="12" fill="rgba(0,0,0,.35)"/><text x="210" y="205" fill="#ffb15f" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="800">LIMITED FILM</text></g>`}</svg>`}
function ultraSVG(ok,size){return`<svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg"><rect width="420" height="420" fill="#020407"/><path d="M90 70 L330 70 L390 360 L30 360 Z" fill="#03111c" stroke="#456"/><g opacity="${ok?1:.45}"><ellipse cx="210" cy="230" rx="115" ry="75" fill="rgba(255,255,255,.10)" stroke="rgba(255,255,255,.35)"/><ellipse cx="210" cy="230" rx="${size?size*18:42}" ry="${size?size*13:30}" fill="rgba(255,255,255,.85)"/><line x1="${210-(size?size*18:42)}" y1="310" x2="${210+(size?size*18:42)}" y2="310" stroke="#fff" stroke-width="3"/><text x="210" y="335" fill="#fff" text-anchor="middle" font-family="monospace" font-size="16">${size?size.toFixed(1)+' cm':'no measure'}</text></g></svg>`}
let tick=0;function drawECG(){const c=document.getElementById('ecg');if(!c){requestAnimationFrame(drawECG);return}const ctx=c.getContext('2d'),w=c.width,h=c.height,vt=v();ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(0,10,16,.58)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(82,242,122,.09)';ctx.lineWidth=1;for(let x=0;x<w;x+=34){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}for(let y=0;y<h;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}const speed=Math.max(.7,Math.min(1.8,vt.hr/100)),period=95/speed,base=h*.58;tick+=2.25*speed;function yAt(x){const t=(x+tick)%period;let y=base+Math.sin((x+tick)*.025)*2;if(t>8&&t<17)y-=6*Math.sin((t-8)/9*Math.PI);if(t>27&&t<31)y+=15*Math.sin((t-27)/4*Math.PI);if(t>31&&t<36)y-=38*Math.sin((t-31)/5*Math.PI);if(t>36&&t<43)y+=12*Math.sin((t-36)/7*Math.PI);if(t>58&&t<77)y-=9*Math.sin((t-58)/19*Math.PI);if(vt.stability<35)y+=(Math.random()-.5)*7;return y}ctx.strokeStyle=vt.stability<35?'#ff9b9b':'#52f27a';ctx.lineWidth=3;ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=10;ctx.beginPath();for(let x=0;x<w;x+=3){const y=yAt(x);x?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle='#52f27a';ctx.font='800 13px system-ui';ctx.fillText('II',15,22);ctx.fillText('25 mm/s',88,95);ctx.fillText('Filter: ON',176,95);requestAnimationFrame(drawECG)}
render();requestAnimationFrame(drawECG);
</script>
