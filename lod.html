function ownerForCase(p){
  if(p.correct.type==='consult')return p.correct.specialist;
  if(['operate','admit'].includes(p.correct.type))return 'General Surgery';
  if(p.id==='sprain')return 'Orthopedics';
  return 'Internal Medicine';
}
function rotationRelevant(p){return game.track==='General Surgery'||ownerForCase(p)===game.track||p.service.includes(game.track)}
function setTrack(track){game.track=track;game.caseIndex=0;game.scene='hub';addLog('🧭',`Rotation changed to ${track}.`);render()}
function effectiveCorrect(p){
  const owner=ownerForCase(p);
  if(game.track==='General Surgery')return p.correct;
  if(owner===game.track){
    if(p.correct.type==='consult'){
      if(game.track==='Vascular'&&p.id==='aaa')return {type:'operate'};
      if(game.track==='OB/GYN'&&p.id==='ectopic')return {type:'operate'};
      if(game.track==='Emergency Medicine'&&p.id==='pneumothorax')return {type:'admit'};
      return {type:'admit'};
    }
    return p.correct;
  }
  if(owner==='General Surgery')return {type:'consult',specialist:'General Surgery'};
  if(owner==='Internal Medicine')return {type:'consult',specialist:'Internal Medicine'};
  return {type:'consult',specialist:owner};
}
function correctLabelFor(p){
  const eff=effectiveCorrect(p);
  return eff.type==='consult'?`Consult ${eff.specialist}`:eff.type;
}

function presentationCategory(t){
  if(['appendicitis','gallbladder','obstruction','diverticulitis','pancreatitis','hernia'].includes(t.id))return 'Abdominal Pain';
  if(t.id==='stone')return 'Flank Pain';
  if(t.id==='aaa')return 'Abdominal / Back Pain';
  if(t.id==='hip'||t.id==='sprain')return 'Injury / Fall';
  if(t.id==='ectopic')return 'Pelvic Pain';
  if(t.id==='pneumothorax')return 'Shortness of Breath';
  return 'General Complaint';
}

function generateShift(count=6){
  const diff=game.difficulty||'Resident';
  const pool=[...caseTemplates];
  const selected=[];
  while(selected.length<count&&pool.length){
    const idx=Math.floor(Math.random()*pool.length);
    selected.push(pool.splice(idx,1)[0]);
  }
  cases.splice(0,cases.length);
  selected.forEach((t,i)=>{
    const p=clone(t);
    p.templateId=t.id;
    p.id=`${t.id}_${Date.now()}_${i}_${randInt(100,999)}`;
    p.name=`${pick(firstNames)} ${pick(lastInitials)}`;
    p.age=Math.max(12,Math.min(92,t.age+randInt(-8,8)));
    p.room=`${randInt(2,9)}${String.fromCharCode(65+i)}`;
    p.category=presentationCategory(t);
    p.triage=vagueComplaint(t,diff);
    p.complaint=p.triage;
    p.vitals=varyVitals(t.vitals,diff);
    p.seen=false;
    cases.push(p);
    baseVitals[p.id]={...p.vitals};
  });
  game.caseIndex=0;
  game.scene='hub';
  game.done.hub=false;
  addLog('🎲',`Generated ${cases.length}-patient ${diff} shift.`);
  render();
}
function setDifficulty(mode){
  game.difficulty=mode;
  addLog('🎚️',`Difficulty set to ${mode}.`);
  render();
}

ction renderLog(){document.getElementById('eventLog').innerHTML=game.log.length?game.log.map(l=>`<div class="logRow"><div>${l.icon}</div><div><time>${l.time}</time>${l.text}</div></div>`).join(''):`<div class="logRow"><div>•</div><div>No events yet.</div></div>`}function header(badge,title,copy,right=''){return`<div class="stageHeader"><div><span class="badge">${badge}</span><h2>${title}</h2><p>${copy}</p></div><div class="actions">${right}</div></div>`}function footer(left='',right=''){return`<div class="footer"><div class="group">${left}</div><div class="group">${right}</div></div>`}

function procedureKeyFor(p){
  if(p.id==='appendicitis')return 'appendectomy';
  if(p.id==='gallbladder')return 'chole';
  if(p.id==='obstruction')return 'obstruction';
  if(p.id==='hernia')return 'hernia';
  if(p.id==='aaa')return 'aaa';
  if(p.id==='hip')return 'hip';
  if(p.id==='ectopic')return 'ectopic';
  if(p.id==='pneumothorax')return 'chesttube';
  if(p.id==='stone')return 'stone';
  return null;
}
function shouldDoProcedure(p){
  const key=procedureKeyFor(p);
  if(!key)return false;
  const proc=procedures[key];
  return proc&&proc.owner===game.track;
}
function resetProcedure(){
  const key=procedureKeyFor(c());
  const proc=key?procedures[key]:null;
  game.procedure={step:0,safety:55,mistakes:0,completed:[],name:proc?proc.title:null};
}
function renderProcedure(){
  const key=procedureKeyFor(c()),proc=key?procedures[key]:null;
  if(!proc)return renderDebrief();
  const current=proc.steps[game.procedure.step];
  if(!current)return renderProcedureComplete();
  const tools=proc.steps.map((s,i)=>`<button class="procTool ${game.procedure.completed.includes(s[0])?'done':''}" onclick="useProcedureTool('${s[0]}')"><b>${s[1]} ${s[2]}</b><span>${s[3]}</span></button>`).join('');
  const checks=proc.steps.map((s,i)=>`<div class="procCheck ${game.procedure.completed.includes(s[0])?'done':''} ${i===game.procedure.step?'current':''}">${game.procedure.completed.includes(s[0])?'✓':i===game.procedure.step?'▶':'•'} ${s[2]}</div>`).join('');
  const bad=game.procedure.safety<55?'bad':'';
  return `${header('Scene 6',`${proc.title} Mini-Game`,'Complete the specialty procedure in the correct order. Wrong steps reduce safety and stability.')}<div class="stageBody"><div class="procedureScene"><div class="procedureRoom"><div class="procOverlay ${bad}"></div><div class="procPatient"></div><div class="procTarget ${proc.target}"></div><div class="orTable"></div></div><div class="procControls"><div class="procCard"><h3>Current Step</h3><div class="callout"><b>${current[1]} ${current[2]}</b><br>${current[3]}</div></div><div class="procCard"><h3>Procedure Safety: ${game.procedure.safety}%</h3><div class="safetyMeter"><div class="safetyFill" style="width:${game.procedure.safety}%"></div></div><p class="teacherNote">Finish at 70%+ for a clean procedure.</p></div><div class="procCard"><h3>Tool / Action Tray</h3><div class="toolGrid">${tools}</div></div><div class="procCard"><h3>Checklist</h3><div class="procChecklist">${checks}</div></div></div></div></div>${footer(`<button onclick="setScene('decision')">◀ Back to Decision</button>`,`<button onclick="procedureHelp()">Procedure Help</button>`)}`;
}
function useProcedureTool(id){
  const key=procedureKeyFor(c()),proc=key?procedures[key]:null;
  if(!proc)return;
  const expected=proc.steps[game.procedure.step];
  if(!expected)return;
  if(id===expected[0]){
    game.procedure.completed.push(id);
    game.procedure.step++;
    game.procedure.safety=Math.min(100,game.procedure.safety+8);
    spend(4,14);
    addLog('🛠️',`${expected[2]} complete.`);
    if(game.procedure.step>=proc.steps.length){
      game.done.procedure=game.procedure.safety>=70;
      if(game.done.procedure){
        game.outcome='success';
        addEvidence({id:'proc_'+key,icon:'🛠️',title:`${proc.title} completed safely`,type:'supportive',source:'Procedure'});
        addLog('✅',`${proc.title} complete with safe procedure flow.`);
      }else{
        game.mistakes.push(`${proc.title} completed with compromised safety.`);
        addLog('⚠️',`${proc.title} completed, but safety was compromised.`);
      }
    }
  }else{
    game.procedure.mistakes++;
    game.procedure.safety=Math.max(0,game.procedure.safety-18);
    spend(5,-18);
    v().stability=Math.max(0,v().stability-4);
    const chosen=proc.steps.find(s=>s[0]===id);
    addLog('⚠️',`Wrong procedure order: ${chosen?chosen[2]:id}. Expected ${expected[2]}.`);
    game.mistakes.push(`Procedure order error: used ${chosen?chosen[2]:id} before ${expected[2]}.`);
  }
  render();
}

let tick=0;function drawECG(){const canvas=document.getElementById('ecg');if(!canvas){requestAnimationFrame(drawECG);return}const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height,vt=v();ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(0,10,16,.58)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(82,242,122,.09)';ctx.lineWidth=1;for(let x=0;x<w;x+=34){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}for(let y=0;y<h;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}const speed=Math.max(.7,Math.min(1.8,vt.hr/100)),period=95/speed,base=h*.58;tick+=2.25*speed;function yAt(x){const t=(x+tick)%period;let y=base+Math.sin((x+tick)*.025)*2;if(t>8&&t<17)y-=6*Math.sin((t-8)/9*Math.PI);if(t>27&&t<31)y+=15*Math.sin((t-27)/4*Math.PI);if(t>31&&t<36)y-=38*Math.sin((t-31)/5*Math.PI);if(t>36&&t<43)y+=12*Math.sin((t-36)/7*Math.PI);if(t>58&&t<77)y-=9*Math.sin((t-58)/19*Math.PI);if(vt.stability<35)y+=(Math.random()-.5)*7;return y}ctx.strokeStyle=vt.stability<35?'#ff9b9b':'#52f27a';ctx.lineWidth=3;ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=10;ctx.beginPath();for(let x=0;x<w;x+=3){const y=yAt(x);x?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle='#52f27a';ctx.font='800 13px system-ui';ctx.fillText('II',15,22);ctx.fillText('25 mm/s',88,95);ctx.fillText('Filter: ON',176,95);requestAnimationFrame(drawECG)}
