<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Ink Drawing → SVG</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">

<style>
/* ===========================
   ORIGINAL STYLES (RESTORED)
   =========================== */
:root {
    --primary:#2563eb;
    --primary-light:#eff6ff;
    --text-main:#334155;
    --text-sub:#64748b;
    --bg:#f1f5f9;
    --border:#e2e8f0;
    --green:#10b981;
    --green-dark:#059669;
    --orange:#f97316;
    --sidebar-w:320px;
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
    height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text-main);
    background:var(--bg);
    overflow:hidden;
}

body{display:flex;flex-direction:column;}

.app-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 20px;
    height:50px;
    background:white;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
}

.app-body{display:flex;flex:1;overflow:hidden;}

.sidebar{
    width:var(--sidebar-w);
    background:white;
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
}

.sidebar-scroll{
    flex:1;
    overflow-y:auto;
    padding:14px;
}

.preview-area{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:16px;
    overflow:hidden;
    gap:8px;
}

.canvas-frame{
    flex:1;
    background:#94a3b8;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

#canvas{
    max-width:100%;
    max-height:calc(100vh - 160px);
    background:white;
    box-shadow:0 2px 12px rgba(0,0,0,0.2);
}

.status-bar{
    font-size:0.78rem;
    color:var(--text-sub);
    text-align:center;
    height:18px;
}

.btn{
    padding:10px;
    border:none;
    border-radius:7px;
    font-weight:700;
    cursor:pointer;
    color:white;
    width: 100%;
}

.btn-svg{background:var(--green);}
.btn-png{background:#334155;}

.processing-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.7);
    align-items:center;
    justify-content:center;
    font-weight:600;
    z-index:100;
}
.processing-overlay.active{display:flex;}
</style>
</head>

<body>

<div class="processing-overlay" id="processingOverlay">Building Vector Path…</div>

<header class="app-header">
<h1>✏️ Student Ink Drawing → SVG</h1>
</header>

<div class="app-body">
    <aside class="sidebar">
        <div class="sidebar-scroll">
            <input type="file" id="fileInput" accept="image/*"><br><br>

            <label>Ink Sensitivity (Threshold)
                <input type="range" id="threshold" min="0" max="255" value="140" style="width:100%">
            </label><br><br>

            <button id="dlSvg" class="btn btn-svg" disabled>⬇ Download SVG</button>
            <br><br>
            <button id="dlPng" class="btn btn-png" disabled>⬇ Download PNG</button>
        </div>
    </aside>

    <main class="preview-area">
        <div class="canvas-frame">
            <canvas id="canvas"></canvas>
        </div>
        <div class="status-bar" id="statusBar"></div>
    </main>
</div>

<script>
// ==========================================
// STATE & DOM
// ==========================================
let currentImg = new Image();
let isLoaded = false;

const fileInput = document.getElementById('fileInput');
const thresholdSlider = document.getElementById('threshold');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', {willReadFrequently:true});
const statusBar = document.getElementById('statusBar');
const overlay = document.getElementById('processingOverlay');

// ==========================================
// IMAGE LOADING logic
// ==========================================
fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
        currentImg.onload = () => {
            isLoaded = true;
            document.getElementById('dlSvg').disabled = false;
            document.getElementById('dlPng').disabled = false;
            processImage();
        };
        currentImg.src = ev.target.result;
    };
    reader.readAsDataURL(file);
});

// ==========================================
// THRESHOLD PROCESSING (Same as original)
// ==========================================
function processImage() {
    if(!isLoaded) return;

    canvas.width = currentImg.width;
    canvas.height = currentImg.height;

    ctx.drawImage(currentImg, 0, 0);
    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = frame.data;
    const thresh = parseInt(thresholdSlider.value);

    for(let i=0; i<data.length; i+=4) {
        const lum = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
        const isInk = lum < thresh;
        // Make ink black, everything else transparent
        data[i] = data[i+1] = data[i+2] = 0;
        data[i+3] = isInk ? 255 : 0;
    }
    ctx.putImageData(frame, 0, 0);
    statusBar.innerText = `Image ready: ${canvas.width} x ${canvas.height}`;
}

thresholdSlider.addEventListener('input', processImage);

// ==========================================
// NATIVE VECTORIZER (The ImageTracer Alternative)
// ==========================================
function buildNativeSVG() {
    const w = canvas.width;
    const h = canvas.height;
    const imgData = ctx.getImageData(0, 0, w, h).data;
    
    let paths = "";
    
    // Scanline algorithm: Groups horizontal runs of black pixels into path segments
    for (let y = 0; y < h; y++) {
        let inRun = false;
        let startX = 0;
        
        for (let x = 0; x < w; x++) {
            const idx = (y * w + x) * 4;
            const isBlack = imgData[idx + 3] > 128; // Check Alpha channel
            
            if (isBlack && !inRun) {
                inRun = true;
                startX = x;
            } else if (!isBlack && inRun) {
                // End of a black segment found
                paths += `M${startX} ${y}h${x - startX}v1h-${x - startX}z `;
                inRun = false;
            }
        }
        // If the run goes to the very edge of the image
        if (inRun) {
            paths += `M${startX} ${y}h${w - startX}v1h-${w - startX}z `;
        }
    }

    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" shape-rendering="crispEdges">
        <path d="${paths}" fill="black" />
    </svg>`;
}

// ==========================================
// DOWNLOAD & UI
// ==========================================
function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

document.getElementById('dlSvg').addEventListener('click', () => {
    overlay.classList.add('active');
    
    // Small timeout to allow the spinner to show up
    setTimeout(() => {
        try {
            const svgContent = buildNativeSVG();
            const blob = new Blob([svgContent], {type: 'image/svg+xml;charset=utf-8'});
            downloadBlob(blob, 'student-drawing.svg');
            statusBar.innerText = "SVG Vector downloaded successfully!";
        } catch (e) {
            statusBar.innerText = "Error creating SVG.";
            console.error(e);
        } finally {
            overlay.classList.remove('active');
        }
    }, 50);
});

document.getElementById('dlPng').addEventListener('click', () => {
    canvas.toBlob(blob => {
        downloadBlob(blob, 'student-drawing.png');
        statusBar.innerText = "Transparent PNG downloaded!";
    }, 'image/png');
});
</script>

</body>
</html>
