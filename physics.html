// ---------- TRAIL PALETTE ----------
const TRAIL_PALETTE = [
  { r: 0,   g: 229, b: 255 },
  { r: 255, g: 107, b: 53  },
  { r: 167, g: 139, b: 250 },
  { r: 16,  g: 185, b: 129 },
  { r: 250, g: 204, b: 21  },
  { r: 244, g: 114, b: 182 },
];
const MAX_TRAILS = 6;

function runColor(index) { return TRAIL_PALETTE[index % TRAIL_PALETTE.length]; }
function colorHex(c) { const h=n=>n.toString(16).padStart(2,'0'); return '#'+h(c.r)+h(c.g)+h(c.b); }

let activeExperiment = 'projectile';

// ---------- CANVAS ----------
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const SCALE = 2.0;
const ORIGIN_X_FRAC = 0.08;
const ORIGIN_Y_FRAC = 0.82;
let W, H, originX, originY;

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  W = canvas.width;
  H = canvas.height;
  originX = W * ORIGIN_X_FRAC;
  originY = H * ORIGIN_Y_FRAC;
  drawScene([]);
}
window.addEventListener('resize', resizeCanvas);

function toScreen(mx, my) {
  return { x: originX + mx*SCALE*10, y: originY - my*SCALE*10 };
}

// ============================================================
//  ~~~~~ FIXED: REAL PROJECTILE RENDERER ~~~~~
//  Replaces the old "drawScene" which caused recursion
// ============================================================
function drawProjectileScene(simState) {
  if (!W) return;
  ctx.clearRect(0, 0, W, H);

  // axes
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(0,originY);
  ctx.lineTo(W,originY);
  ctx.stroke();

  ctx.fillStyle='#547080';
  ctx.font='9px JetBrains Mono';
  ctx.textAlign='center';

  for (let m=10; m<=500; m+=10) {
    const sx=toScreen(m,0).x;
    if (sx > W) break;
    ctx.strokeStyle='rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(sx,originY-5);
    ctx.lineTo(sx,originY+3);
    ctx.stroke();
    if (m % 20 === 0) ctx.fillText(m+'m', sx, originY+14);
  }

  ctx.textAlign='right';
  for (let m=10; m<=300; m+=10) {
    const sy=toScreen(0,m).y;
    if (sy < 0) break;
    ctx.strokeStyle='rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(originX-3, sy);
    ctx.lineTo(originX+5, sy);
    ctx.stroke();
    if (m % 20 === 0) ctx.fillText(m+'m', originX-8, sy+3);
  }

  // Completed trails
  for (let ri = 0; ri < state.completedRuns.length; ri++) {
    const run = state.completedRuns[ri];
    if (!run.visible) continue;
    const age = state.completedRuns.length - 1 - ri;
    const maxAge = Math.max(1, state.completedRuns.length - 1);
    const fade = 1 - (age/maxAge)*0.75;
    const c = run.color;
    drawProjectileTrail(run.data, c, fade*0.55, 1.5);

    if (run.range > 0) {
      const ip = toScreen(run.range,0);
      ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${fade*0.7})`;
      ctx.beginPath();
      ctx.arc(ip.x, originY, 3, 0, Math.PI*2);
      ctx.fill();
      if (age === 0) {
        ctx.font='9px JetBrains Mono';
        ctx.textAlign='center';
        ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},0.7)`;
        ctx.fillText(run.range.toFixed(1)+'m', ip.x, originY+20);
      }
    }
  }

  if (!simState || simState.length === 0) {
    drawPreviewTrajectory();
    return;
  }

  const currentColor = TRAIL_PALETTE[state.completedRuns.length % TRAIL_PALETTE.length];

  if (state.showTrail && simState.length > 1)
    drawProjectileTrail(simState, currentColor, 0.75, 2);

  const last = simState[simState.length-1];
  const pos = toScreen(last.x, last.y);

  ctx.strokeStyle = `rgba(${currentColor.r},${currentColor.g},${currentColor.b},0.6)`;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.moveTo(pos.x,pos.y);
  ctx.lineTo(pos.x + last.vx*0.3*SCALE, pos.y - last.vy*0.3*SCALE);
  ctx.stroke();
  ctx.setLineDash([]);

  const grad = ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,18);
  grad.addColorStop(0,`rgba(${currentColor.r},${currentColor.g},${currentColor.b},0.25)`);
  grad.addColorStop(1,`rgba(${currentColor.r},${currentColor.g},${currentColor.b},0)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(pos.x,pos.y,18,0,Math.PI*2);
  ctx.fill();

  const ballR = Math.max(4, Math.min(10, 3 + Math.cbrt(state.params.mass)*1.5));
  ctx.fillStyle = `rgb(${currentColor.r},${currentColor.g},${currentColor.b})`;
  ctx.shadowColor = `rgb(${currentColor.r},${currentColor.g},${currentColor.b})`;
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.arc(pos.x,pos.y,ballR,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  if (state.finished && state.range > 0) {
    const ip=toScreen(state.range,0);
    ctx.strokeStyle = `rgba(${currentColor.r},${currentColor.g},${currentColor.b},0.5)`;
    ctx.lineWidth=1;
    ctx.setLineDash([2,3]);
    ctx.beginPath();
    ctx.moveTo(ip.x,originY-10);
    ctx.lineTo(ip.x,originY+10);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=`rgba(${currentColor.r},${currentColor.g},${currentColor.b},0.9)`;
    ctx.font='10px JetBrains Mono';
    ctx.textAlign='center';
    ctx.fillText(state.range.toFixed(1)+'m', ip.x, originY+22);
  }
}

function drawProjectileTrail(data, color, alpha, width) {
  if (data.length < 2) return;
  ctx.lineWidth = width;
  ctx.setLineDash([]);
  const SEG = Math.max(1, Math.floor(data.length/60));
  for (let i = SEG; i < data.length; i += SEG) {
    const progress=i/data.length;
    ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${alpha*(0.15+progress*0.85)})`;
    const p0 = toScreen(data[i-SEG].x,data[i-SEG].y);
    const p1 = toScreen(data[i].x,data[i].y);
    ctx.beginPath();
    ctx.moveTo(p0.x,p0.y);
    ctx.lineTo(p1.x,p1.y);
    ctx.stroke();
  }
}

function drawPreviewTrajectory() {
  const pp = simulateRun(state.params, 2000);
  if (pp.length < 2) return;
  ctx.strokeStyle='rgba(255,255,255,0.09)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  let first=true;
  for (const pt of pp) {
    const p=toScreen(pt.x, pt.y);
    if (first) { ctx.moveTo(p.x,p.y); first=false; }
    else ctx.lineTo(p.x,p.y);
    if (p.x > W) break;
  }
  ctx.stroke();
  ctx.setLineDash([]);

  const theta = state.params.angle*Math.PI/180;
  ctx.strokeStyle='rgba(0,229,255,0.3)';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(originX,originY);
  ctx.lineTo(originX+35*Math.cos(theta),originY-35*Math.sin(theta));
  ctx.stroke();

  ctx.fillStyle='rgba(0,229,255,0.65)';
  ctx.font='10px JetBrains Mono';
  ctx.textAlign='left';
  ctx.fillText(state.params.angle+'°', originX+24, originY-6);
}

const pendulumState = {
  params:{ length:1.5, angle:30, gravity:9.81, damping:0.05, mass:1.0 },
  running:false, showTrail:true, currentTime:0,
  data:[], completedRuns:[], ps:null, animFrame:null

let pendLastTimestamp=null, pendDtAccum=0;
const PEND_DT = 1/480;

function rk4Pendulum(ps, params, dt) {
  const { gravity:g, length:L, damping:b } = params;
  const f = (th, om) => -(g/L)*Math.sin(th) - b*om;
  const k1t=ps.omega, k1o=f(ps.theta, ps.omega);
  const k2t=ps.omega+0.5*dt*k1o, k2o=f(ps.theta+0.5*dt*k1t, ps.omega+0.5*dt*k1o);
  const k3t=ps.omega+0.5*dt*k2o, k3o=f(ps.theta+0.5*dt*k2t, ps.omega+0.5*dt*k2o);
  const k4t=ps.omega+dt*k3o,     k4o=f(ps.theta+dt*k3t,  ps.omega+dt*k3o);
  return {
    theta: ps.theta + (dt/6)*(k1t+2*k2t+2*k3t+k4t),
    omega: ps.omega + (dt/6)*(k1o+2*k2o+2*k3o+k4o)
  };
}

function pendulumEnergy(ps, params) {
  const { gravity:g, length:L, mass:m } = params;
  const ke=0.5*m*L*L*ps.omega*ps.omega;
  const pe=m*g*L*(1 - Math.cos(ps.theta));
  return { ke, pe, energy: ke+pe };
}

function pendulumPeriod(params) {
  return 2*Math.PI*Math.sqrt(params.length/params.gravity);
}

function pendulumAnimLoop(timestamp) {
  if (!pendulumState.running) return;
  if (!pendLastTimestamp) pendLastTimestamp = timestamp;
  let wd=(timestamp-pendLastTimestamp)/1000;
  pendLastTimestamp = timestamp;
  if (document.getElementById('slowMo').checked) wd *= 0.15;
  pendDtAccum += wd;

  while (pendDtAccum >= PEND_DT && pendulumState.running) {
    pendDtAccum -= PEND_DT;
    pendulumState.ps = rk4Pendulum(pendulumState.ps, pendulumState.params, PEND_DT);
    pendulumState.currentTime += PEND_DT;

    const {theta, omega} = pendulumState.ps;
    const {ke, pe, energy} = pendulumEnergy(pendulumState.ps, pendulumState.params);
    const point = { t:pendulumState.currentTime, theta, omega, ke, pe, energy };
    pendulumState.data.push(point);

    if (pendulumState.data.length % 6 === 0) {
      const label = pendulumState.currentTime.toFixed(2);
      chartAngle.data.labels.push(label);
      chartAngle.data.datasets[0].data.push((theta*180/Math.PI).toFixed(3));

      chartPendEnergy.data.labels.push(label);
      chartPendEnergy.data.datasets[0].data.push(ke.toFixed(4));
      chartPendEnergy.data.datasets[1].data.push(pe.toFixed(4));
      chartPendEnergy.data.datasets[2].data.push(energy.toFixed(4));
    }
    if (pendulumState.data.length % 12 === 0) {
      chartAngle.update('none');
      chartPendEnergy.update('none');
    }
  }

  drawPendulumScene();
  pendulumState.animFrame = requestAnimationFrame(pendulumAnimLoop);
}

function runCompareLoop() {
  if (compareAnimFrame) cancelAnimationFrame(compareAnimFrame);

  function drawComparePane(ctx2d, expId) {
    const cw = ctx2d.canvas.width, ch = ctx2d.canvas.height;
    ctx2d.clearRect(0,0,cw,ch);

    const savedCtx = window.ctx, savedW=W, savedH=H;
    window.ctx = ctx2d; W=cw; H=ch;
    originX = cw*ORIGIN_X_FRAC; originY = ch*ORIGIN_Y_FRAC;

    try {
      if (expId === 'projectile') drawProjectileScene(state.data.length?state.data:[]);
      else if (expId === 'pendulum') drawPendulumScene();
      else if (expId === 'spring') drawSpringScene();
      else if (expId === 'incline') drawInclineScene();
      else if (expId === 'collision') drawCollisionScene();
    } catch(e){}

    window.ctx = savedCtx; W=savedW; H=savedH;
    originX = W*ORIGIN_X_FRAC; originY = H*ORIGIN_Y_FRAC;
  }

  function loop() {
    if (!compareActive) return;
    if (compareCtx0) drawComparePane(compareCtx0, compareExps[0]);
    if (compareCtx1) drawComparePane(compareCtx1, compareExps[1]);
    compareAnimFrame = requestAnimationFrame(loop);
  }
  loop();
}
