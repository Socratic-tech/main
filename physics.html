<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>OpenPhysics Lab — Version D (Projectile Experiment)</title>
<style>
  body {
    margin:0;
    overflow:hidden;
    background:#0a0c10;
    font-family:JetBrains Mono, monospace;
    color:#c8d8ea;
  }
  #toolbar {
    position:fixed; top:0; left:0; right:0;
    background:#12161f;
    height:48px;
    border-bottom:1px solid #252d3d;
    display:flex;
    align-items:center;
    padding:0 16px;
    gap:12px;
    z-index:10;
  }
  select {
    background:#1a1f2e;
    border:1px solid #2e3a50;
    color:#c8d8ea;
    padding:4px 8px;
    border-radius:4px;
  }
  canvas {
    position:absolute;
    top:48px; left:0;
  }
</style>
</head>

<body>

<!-- Toolbar UI -->
<div id="toolbar">
  <label>Experiment:</label>
  <select id="expSelector">
    <option value="empty">Empty Experiment</option>
    <option value="projectile">Projectile Motion</option>
  </select>
</div>

<!-- Main canvas -->
<canvas id="simCanvas"></canvas>

<script type="module">
/* ============================================================
   VERSION D — CAMERA SYSTEM
   ============================================================ */
export const camera = {
  x: 0,
  y: 0,
  scale: 20,
  min: 0.2,
  max: 5
};

export function worldToScreen(x, y, canvas) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: cx + (x - camera.x) * camera.scale,
    y: cy - (y - camera.y) * camera.scale
  };
}

export function screenToWorld(px, py, canvas) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: (px - cx) / camera.scale + camera.x,
    y: (cy - py) / camera.scale + camera.y
  };
}

/* ============================================================
   VERSION D — RENDERER
   ============================================================ */
export const renderer = {
  ctx:null,
  canvas:null,

  init(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
  },

  clear() {
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
  },

  ball(x,y,r,color) {
    const p = worldToScreen(x,y,this.canvas);
    this.ctx.fillStyle = color;
    this.ctx.beginPath();
    this.ctx.arc(p.x,p.y,r*camera.scale,0,Math.PI*2);
    this.ctx.fill();
  },

  line(x1,y1,x2,y2,color,w=1) {
    const p1=worldToScreen(x1,y1,this.canvas);
    const p2=worldToScreen(x2,y2,this.canvas);
    this.ctx.strokeStyle=color;
    this.ctx.lineWidth=w;
    this.ctx.beginPath();
    this.ctx.moveTo(p1.x,p1.y);
    this.ctx.lineTo(p2.x,p2.y);
    this.ctx.stroke();
  },

  trail(points,color) {
    if(points.length < 2) return;
    this.ctx.strokeStyle = color;
    this.ctx.lineWidth = 2;
    this.ctx.beginPath();
    for(let i=1; i<points.length; i++){
      const p1 = worldToScreen(points[i-1].x,points[i-1].y,this.canvas);
      const p2 = worldToScreen(points[i].x,points[i].y,this.canvas);
      this.ctx.moveTo(p1.x,p1.y);
      this.ctx.lineTo(p2.x,p2.y);
    }
    this.ctx.stroke();
  },

  text(str,x,y,color="#c8d8ea") {
    const p = worldToScreen(x,y,this.canvas);
    this.ctx.fillStyle = color;
    this.ctx.font="14px JetBrains Mono";
    this.ctx.fillText(str,p.x+4,p.y-4);
  }
};

/* ============================================================
   VERSION D — MASTER LOOP
   ============================================================ */
let lastT=0;
let activeExperiment=null;

function masterLoop(t) {
  if(!lastT) lastT=t;
  const dt = Math.min(0.05,(t-lastT)/1000);
  lastT = t;

  if(activeExperiment){
    activeExperiment.update(dt);
    activeExperiment.draw(renderer);
  }

  requestAnimationFrame(masterLoop);
}

/* ============================================================
   BASE EXPERIMENT CLASS
   ============================================================ */
class BaseExperiment {
  constructor(name){ this.name=name; }
  init(engine) {}
  reset() {}
  update(dt) {}
  draw(renderer) {}
}

/* ============================================================
   EMPTY EXPERIMENT (for testing camera)
   ============================================================ */
class EmptyExperiment extends BaseExperiment {
  constructor(){ super("empty"); }

  init(engine){ this.engine = engine; this.reset(); }
  reset(){ this.t=0; }
  update(dt){ this.t += dt; }

  draw(r){
    r.clear();
    r.line(-5,0,5,0,"#ff6b35",2);
    r.line(0,-5,0,5,"#00e5ff",2);
    r.text("Empty Experiment",0,0,"#a78bfa");
  }
}

/* ============================================================
   PROJECTILE EXPERIMENT (Version D)
   ============================================================ */
class ProjectileExperiment extends BaseExperiment {
  constructor(){ super("projectile"); }

  init(engine){
    this.engine = engine;
    this.params = {
      v0: 25,
      angle: 45*Math.PI/180,
      g: 9.81,
      drag: false,
      k: 0.15
    };
    this.reset();
  }

  reset(){
    this.t = 0;
    this.points = [];
    this.x = 0;
    this.y = 0;
    this.vx = this.params.v0 * Math.cos(this.params.angle);
    this.vy = this.params.v0 * Math.sin(this.params.angle);
  }

  update(dt){
    this.t += dt;

    if(this.params.drag){
      const v = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      const ax = -this.params.k * v * this.vx;
      const ay = -this.params.g - this.params.k * v * this.vy;
      this.vx += ax*dt;
      this.vy += ay*dt;
    }else{
      this.vy -= this.params.g * dt;
    }

    this.x += this.vx*dt;
    this.y += this.vy*dt;

    this.points.push({x:this.x,y:this.y});

    if(this.y < 0 && this.t > 0.2){
      this.vx = 0;
      this.vy = 0;
    }
  }

  draw(r){
    r.clear();
    r.line(-200,0,200,0,"#2e3a50",2);
    r.trail(this.points,"#00e5ff");
    r.ball(this.x,this.y,0.12,"#00e5ff");
    r.text(`t=${this.t.toFixed(2)}s`,this.x+1,this.y+1);
  }
}

/* ============================================================
   ENGINE BOOTSTRAP
   ============================================================ */
const canvas = document.getElementById("simCanvas");
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 48;
}
resize();
window.addEventListener("resize",resize);

renderer.init(canvas);

/* Register experiments */
const experiments = {
  empty: new EmptyExperiment(),
  projectile: new ProjectileExperiment()
};

/* UI selection */
const selector = document.getElementById("expSelector");
selector.addEventListener("change",()=>{
  activeExperiment = experiments[selector.value];
  activeExperiment.init({ renderer, canvas });
});

/* Camera control (pan + zoom) */
let dragging = false;
let lastMouse={x:0,y:0};

canvas.addEventListener("wheel", e=>{
  e.preventDefault();
  camera.scale *= e.deltaY < 0 ? 1.1 : 0.9;
  camera.scale = Math.max(camera.min, Math.min(camera.max, camera.scale));
});

canvas.addEventListener("mousedown", e=>{
  dragging = true;
  lastMouse = { x:e.clientX, y:e.clientY };
});

window.addEventListener("mouseup",()=> dragging=false);

canvas.addEventListener("mousemove", e=>{
  if(!dragging) return;
  const dx = (e.clientX - lastMouse.x) / camera.scale;
  const dy = (e.clientY - lastMouse.y) / camera.scale;
  camera.x -= dx;
  camera.y += dy;
  lastMouse = { x:e.clientX, y:e.clientY };
});

/* Start simulation */
activeExperiment = experiments.empty;
activeExperiment.init({ renderer, canvas });
activeExperiment.reset();

requestAnimationFrame(masterLoop);

</script>
</body>
</html>
