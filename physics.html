<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>OpenPhysics Lab — Version D Engine Core</title>
<style>
  body {
    margin:0;
    overflow:hidden;
    background:#0a0c10;
    font-family:JetBrains Mono, monospace;
    color:#c8d8ea;
  }
  #toolbar {
    position:fixed; top:0; left:0; right:0;
    background:#12161f;
    height:48px;
    border-bottom:1px solid #252d3d;
    display:flex;
    align-items:center;
    padding:0 16px;
    gap:12px;
  }
  select {
    background:#1a1f2e;
    border:1px solid #2e3a50;
    color:#c8d8ea;
    padding:4px 8px;
    border-radius:4px;
  }
  canvas {
    position:absolute;
    left:0; top:48px;
  }
</style>
</head>

<body>

<div id="toolbar">
  <label>Experiment:</label>
  <select id="expSelector">
    <option value="empty">Empty Experiment</option>
  </select>
</div>

<canvas id="simCanvas"></canvas>

<script type="module">
/* ============================================================
   VERSION D — CAMERA
   ============================================================ */
export const camera = {
  x: 0,
  y: 0,
  scale: 20,
  min: 0.2,
  max: 5
};

export function worldToScreen(x, y, canvas) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: cx + (x - camera.x) * camera.scale,
    y: cy - (y - camera.y) * camera.scale
  };
}

export function screenToWorld(px, py, canvas) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: (px - cx) / camera.scale + camera.x,
    y: (cy - py) / camera.scale + camera.y
  };
}


/* ============================================================
   VERSION D — RENDERER
   ============================================================ */
export const renderer = {
  ctx:null,
  canvas:null,

  init(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
  },

  clear() {
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
  },

  ball(x,y,r,color) {
    const p = worldToScreen(x,y,this.canvas);
    this.ctx.fillStyle = color;
    this.ctx.beginPath();
    this.ctx.arc(p.x,p.y,r*camera.scale,0,Math.PI*2);
    this.ctx.fill();
  },

  line(x1,y1,x2,y2,color,w=1) {
    const p1=worldToScreen(x1,y1,this.canvas);
    const p2=worldToScreen(x2,y2,this.canvas);
    this.ctx.strokeStyle=color;
    this.ctx.lineWidth=w;
    this.ctx.beginPath();
    this.ctx.moveTo(p1.x,p1.y);
    this.ctx.lineTo(p2.x,p2.y);
    this.ctx.stroke();
  },

  text(str,x,y,color="#c8d8ea") {
    const p = worldToScreen(x,y,this.canvas);
    this.ctx.fillStyle = color;
    this.ctx.font="16px JetBrains Mono";
    this.ctx.fillText(str,p.x+4,p.y-4);
  }
};


/* ============================================================
   VERSION D — MASTER LOOP
   ============================================================ */
let lastT=0;
let activeExperiment=null;

function masterLoop(t) {
  if(!lastT) lastT = t;
  const dt = Math.min(0.05, (t-lastT)/1000);
  lastT = t;

  if(activeExperiment) activeExperiment.update(dt);
  if(activeExperiment) activeExperiment.draw(renderer);

  requestAnimationFrame(masterLoop);
}


/* ============================================================
   VERSION D — BASE EXPERIMENT INTERFACE
   ============================================================ */
class BaseExperiment {
  constructor(name) {
    this.name=name;
  }
  init() {}
  reset() {}
  update(dt) {}
  draw(renderer) {}
}

/* ============================================================
   VERSION D — EMPTY EXPERIMENT (DEMO)
   ============================================================ */
class EmptyExperiment extends BaseExperiment {
  constructor() {
    super("empty");
    this.t = 0;
  }
  init() {}
  reset() { this.t = 0; }
  update(dt) { this.t += dt; }
  draw(r) {
    r.clear();
    r.line(0,-1,0,1,"#00e5ff",2); // y-axis
    r.line(-1,0,1,0,"#ff6b35",2); // x-axis
    r.text("Empty experiment (vD)",0,0,"#a78bfa");
    r.ball(Math.sin(this.t),Math.cos(this.t),0.1,"#00e5ff");
  }
}


/* ============================================================
   VERSION D — ENGINE BOOTSTRAP
   ============================================================ */
const canvas = document.getElementById("simCanvas");
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 48;
}
window.addEventListener("resize",resize);
resize();

renderer.init(canvas);

/* ------- Experiment registry ------- */
const experiments = {
  empty: new EmptyExperiment()
};

/* ------- Experiment switching ------- */
const selector = document.getElementById("expSelector");
selector.addEventListener("change", ()=>{
  const id = selector.value;
  activeExperiment = experiments[id];
  activeExperiment.init();
  activeExperiment.reset();
});


/* ============================================================
   VERSION D — CAMERA INPUT (Zoom + Pan)
   ============================================================ */
let dragging = false;
let lastMouse={x:0,y:0};

canvas.addEventListener("wheel", e=>{
  e.preventDefault();
  const zoom = e.deltaY < 0 ? 1.1 : 0.9;
  camera.scale = Math.min(camera.max, Math.max(camera.min, camera.scale * zoom));
});

canvas.addEventListener("mousedown", e=>{
  dragging = true;
  lastMouse.x = e.clientX;
  lastMouse.y = e.clientY;
});

window.addEventListener("mouseup", ()=> dragging=false);

canvas.addEventListener("mousemove", e=>{
  if(!dragging) return;
  const dx = (e.clientX - lastMouse.x) / camera.scale;
  const dy = (e.clientY - lastMouse.y) / camera.scale;
  camera.x -= dx;
  camera.y += dy;
  lastMouse.x = e.clientX;
  lastMouse.y = e.clientY;
});


/* ============================================================
   START ENGINE
   ============================================================ */
activeExperiment = experiments.empty;
activeExperiment.init();
activeExperiment.reset();

requestAnimationFrame(masterLoop);

</script>
</body>
</html>
