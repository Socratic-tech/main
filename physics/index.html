<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpenPhysics Lab — Version E+ (Plugin-Ready, Zoom Fixed)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #0E1117; --panel:#161B22; --border:#30363D; --text:#C9D1D9; --text-dim:#8B949E;
      --accent:#58A6FF; --accent-green:#3FB950; --accent-red:#FF6A6A; --accent-gold:#DAA520;
      --font-scale:1.0; --transition-speed:180ms;
    }
    @media (prefers-reduced-motion: reduce){ :root{ --transition-speed:0ms; } }
    body{ margin:0; background:var(--bg); color:var(--text); font-family: JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: calc(14px*var(--font-scale)); overflow:hidden; }
    #toolbar{ position:fixed; top:0; left:0; right:0; height:48px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; gap:10px; z-index:20; }
    #toolbar select, #toolbar button{ background:var(--panel); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:4px; cursor:pointer; font-size:calc(14px*var(--font-scale)); min-height:32px; }
    #toolbar button:hover, #toolbar select:focus{ outline:2px solid var(--accent); }
    #presetToast{ margin-left:auto; color:#9dd1ff; opacity:0; transition: opacity var(--transition-speed) ease; font-size:12px; }
    #presetToast.show{ opacity:1; }
    #sidePanel{ position:fixed; top:48px; bottom:0; right:0; width:300px; background:var(--panel); border-left:1px solid var(--border); padding:12px; overflow:auto; }
    .sectionTitle{ font-size: calc(15px*var(--font-scale)); color:var(--accent); text-transform:uppercase; margin:12px 0 6px; border-bottom:1px solid var(--border); padding-bottom:4px; letter-spacing:0.08em; font-weight:700; }
    .seg{ display:flex; gap:6px; }
    button.actionBtn{ width:100%; margin-top:8px; padding:10px; background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; font-size: calc(14px*var(--font-scale)); min-height:36px; }
    #simCanvas{ position:absolute; left:0; right:300px; top:48px; bottom:0; width:calc(100vw - 300px); height:calc(100vh - 48px); background:var(--bg); }
    #readoutGrid .row{ display:flex; justify-content:space-between; font-size: calc(14px*var(--font-scale)); margin:4px 0; }
    #readoutGrid .row span:last-child{ font-weight:700; color:var(--accent-green); }
  </style>
</head>
<body>
  <div id="toolbar">
    <label for="expSelector">Experiment:</label>
    <select id="expSelector" aria-label="Experiment Selector"></select>
    <select id="presetSelect" aria-label="Demo Presets"><option value="">Demo Presets…</option></select>
    <button id="btnStart" class="actionBtn">Start</button>
    <button id="btnPause" class="actionBtn">Pause</button>
    <button id="btnNewRun" class="actionBtn">Start New Run</button>
    <button id="btnResetRun" class="actionBtn">Reset Run</button>
    <button id="btnSaveRun" class="actionBtn">Save Run</button>
    <span id="presetToast" role="status" aria-live="polite"></span>
  </div>

  <div id="sidePanel">
    <div class="sectionTitle">Parameters</div>
    <label>Velocity: <span id="labelVel">25</span> m/s</label>
    <input type="range" id="sliderVel" min="0" max="80" value="25">
    <label>Angle: <span id="labelAng">45</span>°</label>
    <input type="range" id="sliderAng" min="1" max="89" value="45">
    <label>Gravity: <span id="labelGrav">9.81</span> m/s²</label>
    <input type="range" id="sliderGrav" min="0.5" max="20" step="0.01" value="9.81">
    <div id="inclineControls" style="display:none; margin-top:10px;">
      <div class="sectionTitle">Incline</div>
      <div class="seg">
        <button id="dirDown" class="actionBtn">⬇ Slide Down</button>
        <button id="dirUp" class="actionBtn">⬆ Push Up</button>
      </div>
    </div>
    <div class="sectionTitle">Readouts</div>
    <div id="readoutGrid"></div>
    <div class="sectionTitle">Run List</div>
    <div id="runList"></div>
  </div>

  <canvas id="simCanvas"></canvas>

  <!-- ===== ENGINE: CAMERA (zoom-to-cursor, normalized wheel) ===== -->
  <script type="text/x-module-source" id="engine-camera">
  export const camera = { x:0, y:0, scale:20, minScale:0.2, maxScale:5 };
  export function worldToScreen(x, y, canvas){ const cx=canvas.width/2, cy=canvas.height/2; return { x: cx+(x-camera.x)*camera.scale, y: cy-(y-camera.y)*camera.scale }; }
  export function screenToWorld(px, py, canvas){ const cx=canvas.width/2, cy=canvas.height/2; return { x: (px-cx)/camera.scale+camera.x, y: (cy-py)/camera.scale+camera.y }; }
  export function applyCameraInput(canvas){
    let dragging=false, last={x:0,y:0};
    const clamp=(v,lo,hi)=>Math.min(hi,Math.max(lo,v));
    function normalizedWheel(e){
      let dy=e.deltaY;
      if(e.deltaMode===1) dy*=16;       // lines -> px
      else if(e.deltaMode===2) dy*=120; // pages -> big
      dy=clamp(dy,-240,240);
      return -Math.sign(dy)*Math.log2(1+Math.abs(dy)/120);
    }
    canvas.addEventListener('wheel', (e)=>{
      e.preventDefault();
      const rect=canvas.getBoundingClientRect();
      const mx=e.clientX-rect.left, my=e.clientY-rect.top;
      const before=screenToWorld(mx,my,canvas);
      const ticks=normalizedWheel(e);
      const base=1.12;                 // ~12% per notch
      const zoomBase=e.ctrlKey?1.25:base; // pinch stronger
      const factor=Math.pow(zoomBase,ticks);
      const newScale=clamp(camera.scale*factor,camera.minScale,camera.maxScale);
      if(newScale===camera.scale) return;
      camera.scale=newScale;
      const after=screenToWorld(mx,my,canvas);
      camera.x += (before.x-after.x);
      camera.y += (before.y-after.y);
    },{passive:false});
    canvas.addEventListener('mousedown', e=>{ dragging=true; last={x:e.clientX,y:e.clientY}; });
    window.addEventListener('mouseup', ()=> dragging=false);
    canvas.addEventListener('mousemove', e=>{ if(!dragging) return; const dx=(e.clientX-last.x)/camera.scale; const dy=(e.clientY-last.y)/camera.scale; camera.x-=dx; camera.y+=dy; last={x:e.clientX,y:e.clientY}; });
  }
  </script>

  <!-- ===== ENGINE: RENDERER ===== -->
  <script type="text/x-module-source" id="engine-renderer">
  import { worldToScreen, camera } from '#engine-camera';
  export const renderer = {
    ctx:null, canvas:null,
    init(c){ this.canvas=c; this.ctx=c.getContext('2d', {alpha:false}); },
    clear(){ this.ctx.fillStyle='#0E1117'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height); },
    line(x1,y1,x2,y2,color='#C9D1D9',w=2){ const p1=worldToScreen(x1,y1,this.canvas), p2=worldToScreen(x2,y2,this.canvas); this.ctx.strokeStyle=color; this.ctx.lineWidth=w; this.ctx.beginPath(); this.ctx.moveTo(p1.x,p1.y); this.ctx.lineTo(p2.x,p2.y); this.ctx.stroke(); },
    ball(x,y,r,color){ const p=worldToScreen(x,y,this.canvas); this.ctx.fillStyle=color; this.ctx.beginPath(); this.ctx.arc(p.x,p.y, Math.max(1,r*camera.scale), 0, Math.PI*2); this.ctx.fill(); },
    trail(points, style){ if(points.length<2) return; const {color,width=2,dash=null}=style; this.ctx.strokeStyle=color; this.ctx.lineWidth=width; this.ctx.setLineDash(dash||[]); this.ctx.beginPath(); for(let i=1;i<points.length;i++){ const p1=worldToScreen(points[i-1].x, points[i-1].y, this.canvas), p2=worldToScreen(points[i].x, points[i].y, this.canvas); this.ctx.moveTo(p1.x,p1.y); this.ctx.lineTo(p2.x,p2.y);} this.ctx.stroke(); this.ctx.setLineDash([]); },
    text(str,x,y,color='#C9D1D9'){ const p=worldToScreen(x,y,this.canvas); this.ctx.fillStyle=color; this.ctx.font='14px JetBrains Mono, monospace'; this.ctx.fillText(str, p.x+6, p.y-6); }
  };
  </script>

  <!-- ===== ENGINE: LOOP ===== -->
  <script type="text/x-module-source" id="engine-loop">
  export let activeExperiment=null; let last=0;
  export function setActiveExperiment(exp){ activeExperiment=exp; }
  export function loop(t){ if(!last) last=t; const dt=Math.min(0.05,(t-last)/1000); last=t; if(activeExperiment){ activeExperiment.update?.(dt); activeExperiment.draw?.(); activeExperiment.updateUI?.(); } requestAnimationFrame(loop); }
  </script>

  <!-- ===== ENGINE: RUN MANAGER ===== -->
  <script type="text/x-module-source" id="engine-runmanager">
  export const runManager = {
    runs:[], nextId:1,
    saveRun(points, params, stats, style){ const run={ id:this.nextId++, points:structuredClone(points), params:structuredClone(params), stats:structuredClone(stats), visible:true, style: structuredClone(style)}; this.runs.push(run); return run; },
    undo(){ return this.runs.pop(); },
    toggleVisibility(id){ const r=this.runs.find(x=>x.id===id); if(r) r.visible=!r.visible; },
    deleteRun(id){ this.runs = this.runs.filter(r=>r.id!==id); },
    getStats(points){ if(!points.length) return {maxH:0, range:0, duration:0}; let maxH=-Infinity, minX=Infinity, maxX=-Infinity; for(const p of points){ if(p.y>maxH) maxH=p.y; if(p.x<minX) minX=p.x; if(p.x>maxX) maxX=p.x; } const last=points[points.length-1]; return { maxH, range:(maxX-minX), duration:last.t }; }
  };
  </script>

  <!-- ===== UI: WORKBENCH ===== -->
  <script type="text/x-module-source" id="ui-workbench">
  import { runManager } from '#engine-runmanager';
  const el = {
    labelVel: document.getElementById('labelVel'), labelAng: document.getElementById('labelAng'), labelGrav: document.getElementById('labelGrav'),
    sliderVel: document.getElementById('sliderVel'), sliderAng: document.getElementById('sliderAng'), sliderGrav: document.getElementById('sliderGrav'),
    btnStart: document.getElementById('btnStart'), btnPause: document.getElementById('btnPause'), btnNewRun: document.getElementById('btnNewRun'), btnResetRun: document.getElementById('btnResetRun'), btnSaveRun: document.getElementById('btnSaveRun'),
    expSelector: document.getElementById('expSelector'), presetSelect: document.getElementById('presetSelect'),
    inclineControls: document.getElementById('inclineControls'), dirDown: document.getElementById('dirDown'), dirUp: document.getElementById('dirUp'),
    readoutGrid: document.getElementById('readoutGrid'), runList: document.getElementById('runList'), presetToast: document.getElementById('presetToast')
  };
  export const paramsUI = { v0:25, angle:45*Math.PI/180, g:9.81 };
  el.sliderVel.oninput = ()=>{ paramsUI.v0=+el.sliderVel.value; el.labelVel.textContent=paramsUI.v0; };
  el.sliderAng.oninput = ()=>{ const d=+el.sliderAng.value; paramsUI.angle = d*Math.PI/180; el.labelAng.textContent=d; };
  el.sliderGrav.oninput = ()=>{ paramsUI.g=+el.sliderGrav.value; el.labelGrav.textContent=paramsUI.g.toFixed(2); };
  export function bindRunButtons(getActive){ el.btnStart.onclick=()=>getActive()?.startRun?.(paramsUI); el.btnPause.onclick=()=>getActive()?.pauseRun?.(); el.btnNewRun.onclick=()=>getActive()?.startNewRun?.(paramsUI); el.btnResetRun.onclick=()=>getActive()?.resetRun?.(paramsUI,{recenter:true}); el.btnSaveRun.onclick=()=>getActive()?.saveCurrentRun?.(); }
  export function showInclineControls(show){ el.inclineControls.style.display = show? '' : 'none'; }
  export function bindInclineDirectionHandlers(setDir){ el.dirDown.onclick=()=>setDir('down'); el.dirUp.onclick=()=>setDir('up'); }
  export function updateReadout(map){ el.readoutGrid.innerHTML = Object.entries(map).map(([k,v])=>`<div class="row"><span>${k}</span><span>${v}</span></div>`).join(''); }
  export function refreshRunList(){ el.runList.innerHTML=''; for(const run of runManager.runs){ const row=document.createElement('div'); row.style.display='flex'; row.style.justifyContent='space-between'; row.style.margin='4px 0'; row.innerHTML=`<span>Run ${run.id}</span><div><button class="visToggle" data-id="${run.id}">${run.visible?'👁':'🙈'}</button> <button class="delRun" data-id="${run.id}">✖</button></div>`; row.querySelector('.visToggle').onclick=()=>{ runManager.toggleVisibility(run.id); refreshRunList(); }; row.querySelector('.delRun').onclick=()=>{ runManager.deleteRun(run.id); refreshRunList(); }; el.runList.appendChild(row);} }
  export function setPresets(options){ el.presetSelect.innerHTML = '<option value="">Demo Presets…</option>'+ options.map((o,i)=>`<option value="${i}">${o.label}</option>`).join(''); }
  export function onPresetChange(handler){ el.presetSelect.onchange = ()=>{ const idx=el.presetSelect.value; if(idx!=='') handler(+idx); } }
  export function setSlidersFromParams(params){ const deg = Math.round((params.angle ?? paramsUI.angle)*180/Math.PI); el.sliderVel.value = params.v0 ?? paramsUI.v0; el.labelVel.textContent = el.sliderVel.value; el.sliderAng.value = deg; el.labelAng.textContent = deg; const g=params.g ?? paramsUI.g; el.sliderGrav.value = g; el.labelGrav.textContent = g.toFixed(2); }
  export function toast(msg){ el.presetToast.textContent = msg; el.presetToast.classList.add('show'); setTimeout(()=> el.presetToast.classList.remove('show'), 1200); }
  export { el };
  </script>

  <!-- ===== PLUGIN RUNTIME ===== -->
  <script type="text/x-module-source" id="plugin-runtime">
  import { renderer } from '#engine-renderer';
  import { camera, applyCameraInput } from '#engine-camera';
  import { runManager } from '#engine-runmanager';
  import { paramsUI, bindRunButtons, setPresets, onPresetChange, setSlidersFromParams, updateReadout, refreshRunList, showInclineControls, bindInclineDirectionHandlers, el, toast } from '#ui-workbench';
  import { setActiveExperiment } from '#engine-loop';
  const registry = new Map();
  function ensureOption(id,label){ const sel=el.expSelector; if(![...sel.options].some(o=>o.value===id)){ const opt=document.createElement('option'); opt.value=id; opt.textContent=label; sel.appendChild(opt);} }
  export const OPL = {
    registerExperiment(id,factory,meta){ registry.set(id,{id,factory,meta}); ensureOption(id, meta?.label||id); },
    deps(){ return { renderer, camera, runManager, ui:{ paramsUI, setPresets, onPresetChange, setSlidersFromParams, updateReadout, refreshRunList, showInclineControls, bindInclineDirectionHandlers, toast }, el } },
    _create(id){ const rec=registry.get(id); if(!rec) return null; return rec.factory(this.deps()); },
    _meta(id){ return registry.get(id)?.meta || {}; },
    _all(){ return [...registry.values()].map(r=>({id:r.id, meta:r.meta})); }
  };
  window.OPL = OPL;
  bindRunButtons(()=>window.__activeExperiment||null);
  export { applyCameraInput }; export { registry }; export { paramsUI }; export { setActiveExperiment };
  </script>

  <!-- ===== BUILT-IN EXPERIMENTS (Projectile, Pendulum) ===== -->
  <script type="text/x-module-source" id="exp-projectile">
  import { OPL } from '#plugin-runtime';
  import { runManager } from '#engine-runmanager';
  import { renderer } from '#engine-renderer';
  import { paramsUI, updateReadout } from '#ui-workbench';
  class ProjectileExperiment{
    constructor(){ this.running=false; this.paused=false; this.points=[]; this.params={...paramsUI}; this.t=0; this.x=0; this.y=0; this.vx=0; this.vy=0; }
    _style(){ return { color:'#58A6FF', width:2, dash:null }; }
    _stats(){ return runManager.getStats(this.points); }
    _seed(){ const p=this.params; this.x=0; this.y=0; this.vx=p.v0*Math.cos(p.angle); this.vy=p.v0*Math.sin(p.angle); }
    startRun(params){ if(this.running && !this.paused) return; this.params={...params}; if(this.paused){ this.paused=false; this.running=true; return;} this.running=true; this.paused=false; this.points=[]; this.t=0; this._seed(); }
    pauseRun(){ if(!this.running) return; this.paused=true; this.running=false; }
    startNewRun(p){ this.params={...p}; this.points=[]; this.t=0; this.running=true; this.paused=false; this._seed(); }
    resetRun(p,{recenter=false}={}){ this.params={...p}; this.points=[]; this.t=0; this.running=false; this.paused=false; this._seed(); }
    saveCurrentRun(){ if(this.points.length<2) return; const stats=this._stats(); runManager.saveRun(this.points,this.params,stats,this._style()); }
    update(dt){ if(!this.running || this.paused) return; const p=this.params; this.t+=dt; this.vy-=p.g*dt; this.x+=this.vx*dt; this.y+=this.vy*dt; this.points.push({t:this.t,x:this.x,y:this.y,vx:this.vx,vy:this.vy}); if(this.y<=0 && this.t>0.05){ this.running=false; this.paused=false; this.saveCurrentRun(); } }
    draw(){ renderer.clear(); renderer.line(-500,0,500,0,'#8B949E',2); renderer.trail(this.points,this._style()); renderer.ball(this.x,this.y,0.15,'#58A6FF'); }
    updateUI(){ const speed=Math.hypot(this.vx,this.vy); updateReadout({ Time:this.t.toFixed(2)+' s', X:this.x.toFixed(2)+' m', Y:this.y.toFixed(2)+' m', Vx:this.vx.toFixed(2)+' m/s', Vy:this.vy.toFixed(2)+' m/s', Speed:speed.toFixed(2)+' m/s' }); }
  }
  OPL.registerExperiment('projectile', ()=> new ProjectileExperiment(), { label:'Projectile', presets:[ {label:'Classic 45°', p:{ v0:40, angleDeg:45, g:9.81 }}, {label:'Moon Gravity', p:{ v0:25, angleDeg:45, g:1.62 }} ], camera:{x:0,y:0,scale:20}, autoStart:true, uses:{velocity:true,angle:true,gravity:true} });
  </script>

  <script type="text/x-module-source" id="exp-pendulum">
  import { OPL } from '#plugin-runtime';
  import { renderer } from '#engine-renderer';
  import { runManager } from '#engine-runmanager';
  import { updateReadout } from '#ui-workbench';
  class PendulumExperiment{
    constructor(){ this.running=false; this.paused=false; this.points=[]; this.params={ v0:0, angle:30*Math.PI/180, g:9.81 }; this.L=2.0; this.damping=0.04; this.pivot={x:0,y:1.5}; this.t=0; this.theta=this.params.angle; this.omega=0; }
    _style(){ return { color:'#DAA520', width:2, dash:null }; }
    _stats(){ if(!this.points.length) return {maxH:0,range:0,duration:0}; let minX=Infinity,maxX=-Infinity,maxY=-Infinity; for(const p of this.points){ if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.y>maxY)maxY=p.y; } const last=this.points[this.points.length-1]; return { maxH:maxY, range:(maxX-minX), duration:last.t }; }
    _bob(){ return { x:this.pivot.x + this.L*Math.sin(this.theta), y: this.pivot.y - this.L*Math.cos(this.theta) } }
    _rk4(dt){ const g=this.params.g, L=this.L, b=this.damping; const f=(th,om)=> (-(g/L)*Math.sin(th) - b*om); const k1t=this.omega, k1o=f(this.theta,this.omega); const k2t=this.omega+0.5*dt*k1o, k2o=f(this.theta+0.5*dt*k1t, this.omega+0.5*dt*k1o); const k3t=this.omega+0.5*dt*k2o, k3o=f(this.theta+0.5*dt*k2t, this.omega+0.5*dt*k2o); const k4t=this.omega+dt*k3o, k4o=f(this.theta+dt*k3t, this.omega+dt*k3o); this.theta+=(dt/6)*(k1t+2*k2t+2*k3t+k4t); this.omega+=(dt/6)*(k1o+2*k2o+2*k3o+k4o); }
    startRun(params){ if(this.running && !this.paused) return; this.params={...params}; if(this.paused){ this.paused=false; this.running=true; return;} this.running=true; this.paused=false; this.t=0; this.points=[]; this.theta=this.params.angle; this.omega=this.L>0?(this.params.v0/this.L):0; this.points.push({t:this.t, ...this._bob(), theta:this.theta, omega:this.omega}); }
    pauseRun(){ if(!this.running) return; this.paused=true; this.running=false; }
    startNewRun(p){ this.params={...p}; this.t=0; this.points=[]; this.running=true; this.paused=false; this.theta=this.params.angle; this.omega=this.L>0?(this.params.v0/this.L):0; this.points.push({t:this.t, ...this._bob(), theta:this.theta, omega:this.omega}); }
    resetRun(p,{recenter=false}={}){ this.params={...p}; this.t=0; this.points=[]; this.running=false; this.paused=false; this.theta=this.params.angle; this.omega=this.L>0?(this.params.v0/this.L):0; }
    saveCurrentRun(){ if(this.points.length<2) return; const stats=this._stats(); runManager.saveRun(this.points,this.params,stats,this._style()); }
    update(dt){ if(!this.running || this.paused) return; const step=Math.min(0.05,dt); this.t+=step; this._rk4(step); const pos=this._bob(); this.points.push({ t:this.t, x:pos.x, y:pos.y, theta:this.theta, omega:this.omega }); const settled=Math.abs(this.omega)<0.02 && Math.abs(this.theta)<0.02 && this.points.length>30; const timeUp=this.t>=12.0; if(settled || timeUp){ this.running=false; this.paused=false; this.saveCurrentRun(); } }
    draw(){ renderer.clear(); renderer.ball(this.pivot.x,this.pivot.y,0.06,'#C9D1D9'); if(this.points.length){ const last=this.points[this.points.length-1]; renderer.line(this.pivot.x,this.pivot.y,last.x,last.y,'#8B949E',2); } renderer.trail(this.points,this._style()); if(this.points.length){ const last=this.points[this.points.length-1]; renderer.ball(last.x,last.y,0.12,'#DAA520'); } }
    updateUI(){ const m=1.0, g=this.params.g, L=this.L; const yLowest=this.pivot.y-L; const bob=this._bob(); const h=(bob.y - yLowest); const v=Math.abs(this.omega)*L; const PE=m*g*h, KE=0.5*m*v*v, E=PE+KE; updateReadout({ Time:this.t.toFixed(2)+' s', 'θ':(this.theta*180/Math.PI).toFixed(1)+' °', 'ω':this.omega.toFixed(3)+' rad/s', Speed:v.toFixed(2)+' m/s', Energy:E.toFixed(2)+' J' }); }
  }
  OPL.registerExperiment('pendulum', ()=> new PendulumExperiment(), { label:'Pendulum', presets:[ {label:'Small Angle — Ideal', p:{ L:2.0, angleDeg:15, g:9.81, damping:0, v0:0 }}, {label:'Large Angle (90°)', p:{ L:1.5, angleDeg:90, g:9.81, damping:0, v0:0 }}, {label:'Overdamped', p:{ L:1.0, angleDeg:45, g:9.81, damping:1.8, v0:0 }} ], camera:{x:0,y:0,scale:20}, autoStart:true, uses:{velocity:true,angle:true,gravity:true} });
  </script>

  <!-- ===== PRESETS SYSTEM ===== -->
  <script type="text/x-module-source" id="exp-presets">
  export function buildPresetOptions(meta){ const presets = meta?.presets || []; return presets.map((p,i)=>({ label:p.label, index:i })); }
  export function applyPreset(meta, index, paramsUI){ const conf = (meta?.presets||[])[index]; if(!conf) return null; const p = conf.p||{}; if(p.v0!=null) paramsUI.v0 = Math.abs(p.v0); if(p.angleDeg!=null) paramsUI.angle = p.angleDeg*Math.PI/180; if(p.g!=null) paramsUI.g = p.g; const extras={}; if(p.L!=null) extras.L = p.L; if(p.damping!=null) extras.damping = p.damping; if(p.k!=null) extras.k=p.k; if(p.m!=null) extras.m=p.m; if(p.c!=null) extras.c=p.c; if(p.x0!=null) extras.x0=p.x0; if(p.muS!=null) extras.muS=p.muS; if(p.muK!=null) extras.muK=p.muK; if(p.mode) extras.mode=p.mode; return { paramsUI, extras, label:conf.label }; }
  </script>

  <!-- ===== MAIN (plugin-driven, DPR-aware canvas) ===== -->
  <script type="text/x-module-source" id="main">
  import { renderer } from '#engine-renderer';
  import { camera, applyCameraInput } from '#engine-camera';
  import { loop } from '#engine-loop';
  import { OPL, paramsUI, setActiveExperiment } from '#plugin-runtime';
  import { el, setPresets, onPresetChange, setSlidersFromParams, refreshRunList, toast } from '#ui-workbench';
  import { buildPresetOptions, applyPreset } from '#exp-presets';
  const canvas=document.getElementById('simCanvas');
  function resizeCanvasDPR(){
    const dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));
    const cssWidth  = window.innerWidth - 300;
    const cssHeight = window.innerHeight - 48;
    canvas.width  = Math.floor(cssWidth  * dpr);
    canvas.height = Math.floor(cssHeight * dpr);
    canvas.style.width  = cssWidth + 'px';
    canvas.style.height = cssHeight + 'px';
  }
  resizeCanvasDPR(); window.addEventListener('resize', resizeCanvasDPR);
  renderer.init(canvas); applyCameraInput(canvas);
  function rebuildExperimentSelector(){ const all=OPL._all(); el.expSelector.innerHTML=''; for(const {id,meta} of all){ const opt=document.createElement('option'); opt.value=id; opt.textContent=meta?.label||id; el.expSelector.appendChild(opt);} }
  function activate(id){ const exp=OPL._create(id); if(!exp) return; window.__activeExperiment=exp; setActiveExperiment(exp); const meta=OPL._meta(id); if(meta?.camera){ camera.x=meta.camera.x??0; camera.y=meta.camera.y??0; camera.scale=meta.camera.scale??20; } if(id==='pendulum'){ paramsUI.v0=0; } exp.resetRun?.(paramsUI,{recenter:true}); const opts=buildPresetOptions(meta); setPresets(opts); onPresetChange((index)=>{ const res=applyPreset(meta,index,paramsUI); if(!res) return; setSlidersFromParams(paramsUI); if(res.extras){ Object.assign(paramsUI,res.extras); } exp.resetRun?.(paramsUI,{recenter:true}); if(meta?.autoStart){ exp.startRun?.(paramsUI); } toast(`Loaded: ${res.label}`); }); if(meta?.autoStart){ exp.startRun?.(paramsUI); } refreshRunList(); }
  rebuildExperimentSelector();
  el.expSelector.onchange = ()=> activate(el.expSelector.value);
  const first = OPL._all()[0]?.id; if(first){ activate(first); }
  requestAnimationFrame(loop);
  </script>

  <!-- ===== BOOTSTRAP LOADER ===== -->
  <script type="module">
    (function bootstrap(){
      const sources=[...document.querySelectorAll('script[type="text/x-module-source"][id]')];
      const imports={};
      for(const s of sources){ const code=s.textContent; const url=URL.createObjectURL(new Blob([code],{type:'text/javascript'})); imports['#'+s.id]=url; }
      const im=document.createElement('script'); im.type='importmap'; im.textContent=JSON.stringify({imports},null,2); document.head.appendChild(im);
    })();
    import('#exp-projectile');
    import('#exp-pendulum');
    import('#main');
  </script>
</body>
