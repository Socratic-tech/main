<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>OpenPhysics Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
:root {
  --bg:#0E1117; --panel:#161B22; --border:#30363D; --text:#C9D1D9; --dim:#8B949E;
  --accent:#58A6FF; --green:#3FB950; --red:#FF6A6A; --gold:#DAA520; --orange:#F0883E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;overflow:hidden;}
#toolbar{position:fixed;top:0;left:0;right:0;height:50px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;z-index:20;}
#toolbar select,#toolbar button{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;}
#toolbar button:hover{border-color:var(--accent);color:var(--accent);}
#btnClearAll:hover{border-color:var(--red)!important;color:var(--red)!important;}
#btnClearAll.confirm{border-color:var(--red);color:var(--red);background:#2a1010;}
#toolbar select:focus{outline:2px solid var(--accent);}
#toast{margin-left:auto;color:#9dd1ff;opacity:0;transition:opacity .2s;font-size:11px;}
#toast.show{opacity:1;}
#simCanvas{position:fixed;left:0;right:320px;top:50px;bottom:0;}
#side{position:fixed;top:50px;right:0;bottom:0;width:320px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#side-scroll{flex:1;overflow-y:auto;padding:10px;}
#side-scroll::-webkit-scrollbar{width:4px;}
#side-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sec{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin:10px 0 5px;border-bottom:1px solid var(--border);padding-bottom:3px;}
label{display:block;margin:6px 0 2px;font-size:12px;color:var(--dim);}
input[type=range]{width:100%;accent-color:var(--accent);}
input[type=text], textarea, select.report-field{
  width:100%;background:#0f1520;border:1px solid var(--border);color:var(--text);
  padding:7px 8px;border-radius:4px;font-family:inherit;font-size:12px;
}
textarea{min-height:82px;resize:vertical;}
.val{color:var(--text);font-weight:600;}
.param-row{margin-bottom:4px;}
.param-row.hidden{display:none;}
.row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #1e242b;gap:8px;}
.row span:last-child{color:var(--green);font-weight:700;text-align:right;}
#graphWrap{display:none;margin-top:8px;}
#graphCanvas{width:100%;height:220px;display:block;background:#0a0f1a;border:1px solid var(--border);border-radius:4px;}
.graph-tools{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.graph-tools button,.graph-tools label{font-size:11px;}
.graph-tools button{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:4px;cursor:pointer;font-family:inherit;}
.graph-tools button:hover{border-color:var(--accent);color:var(--accent);}
.run-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #1e242b;}
.run-row button{background:none;border:none;color:var(--dim);cursor:pointer;padding:0 3px;font-size:13px;}
.run-row button:hover{color:var(--red);}
.run-table{width:100%;border-collapse:collapse;margin:4px 0 8px;font-size:11px;}
.run-table th{color:var(--dim);font-weight:600;text-align:left;padding:2px 4px;border-bottom:1px solid var(--border);}
.run-table td{padding:2px 4px;border-bottom:1px solid #1e242b;color:var(--text);}
.run-table td:last-child{color:var(--green);font-weight:600;text-align:right;}
.tabs{display:flex;gap:4px;margin-bottom:6px;}
.tab{flex:1;padding:5px;background:var(--panel);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:11px;text-align:center;color:var(--dim);}
.tab.active{border-color:var(--accent);color:var(--accent);}
.report-actions{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.report-actions button{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;}
.report-actions button:hover{border-color:var(--accent);color:var(--accent);}
.small-note{font-size:11px;color:var(--dim);line-height:1.5;}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.report-full{grid-column:1/-1;}
.report-block{margin-top:8px;}
.kv-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;}
.kv-table th,.kv-table td{border:1px solid #263040;padding:4px 6px;vertical-align:top;}
.kv-table th{color:var(--dim);font-weight:600;text-align:left;}
@media (max-width:900px){
  #simCanvas{right:0;bottom:50%;}
  #side{top:auto;left:0;right:0;bottom:0;width:auto;height:50%;border-left:none;border-top:1px solid var(--border);}
}
</style>
</head>
<body>
<div id="toolbar">
  <label for="expSel" style="white-space:nowrap;font-size:12px;">Experiment:</label>
  <select id="expSel"></select>
  <select id="presetSel"><option value="">Presets…</option></select>
  <button id="btnStart">▶ Start</button>
  <button id="btnPause">⏸ Pause</button>
  <button id="btnReset">↺ Reset</button>
  <button id="btnNew">+ New Run</button>
  <button id="btnSave">💾 Save Run</button>
  <button id="btnClearAll" title="Delete all saved runs and reset simulation">🗑 Clear All</button>
  <button id="btnReportFill" title="Refresh report with current data">📋 Fill Report</button>
  <span id="toast"></span>
</div>

<canvas id="simCanvas"></canvas>

<div id="side">
  <div id="side-scroll">
    <div class="sec">Parameters</div>

    <div class="param-row" id="row-vel">
      <label>Launch Velocity: <span class="val" id="lv">25</span> m/s</label>
      <input type="range" id="sVel" min="0" max="80" value="25">
    </div>
    <div class="param-row" id="row-ang">
      <label>Angle: <span class="val" id="la">45</span>°</label>
      <input type="range" id="sAng" min="1" max="89" value="45">
    </div>
    <div class="param-row" id="row-grav">
      <label>Gravity: <span class="val" id="lg">9.81</span> m/s²</label>
      <input type="range" id="sGrav" min="0.5" max="25" step="0.01" value="9.81">
    </div>
    <div class="param-row" id="row-mass">
      <label>Mass: <span class="val" id="lm">1.0</span> kg</label>
      <input type="range" id="sMass" min="0.1" max="20" step="0.1" value="1.0">
    </div>
    <div class="param-row hidden" id="row-length">
      <label>Length: <span class="val" id="ll">2.0</span> m</label>
      <input type="range" id="sLen" min="0.2" max="5" step="0.1" value="2.0">
    </div>
    <div class="param-row hidden" id="row-damp">
      <label>Damping: <span class="val" id="ld">0.04</span></label>
      <input type="range" id="sDamp" min="0" max="3" step="0.01" value="0.04">
    </div>
    <div class="param-row hidden" id="row-spring">
      <label>Spring k: <span class="val" id="lk">10</span> N/m</label>
      <input type="range" id="sSpring" min="1" max="100" step="1" value="10">
    </div>
    <div class="param-row hidden" id="row-x0">
      <label id="labelX0">Initial Displacement: <span class="val" id="lx0">1.0</span> m</label>
      <input type="range" id="sX0" min="0.1" max="100" step="0.5" value="20">
    </div>

    <div class="sec">Readouts <span style="font-size:10px;color:var(--dim);text-transform:none;font-weight:400;">(SI units)</span></div>
    <div class="tabs">
      <div class="tab active" id="tabTable">Table</div>
      <div class="tab" id="tabGraph">Graph</div>
    </div>
    <div id="readout"></div>

    <div id="graphWrap">
      <div class="graph-tools">
        <select id="seriesSel" style="flex:1;min-width:160px;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:4px;border-radius:4px;font-family:inherit;"></select>
        <label style="display:flex;align-items:center;gap:4px;color:var(--dim);margin:0;">
          <input type="checkbox" id="toggleSavedOverlay"> Saved runs
        </label>
        <button id="btnExportGraph">Export PNG</button>
      </div>
      <canvas id="graphCanvas"></canvas>
      <div class="small-note" style="margin-top:6px;">Graphs now overlay compatible saved runs when enabled.</div>
    </div>

    <div id="theoryView" style="display:none;margin-top:8px;"></div>

    <div id="reportView" style="display:none;margin-top:8px;"></div>

    <div class="sec">Saved Runs</div>
    <div id="runList"></div>
  </div>
</div>

<script>
const cam = {x:0, y:0, scale:20};
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d', {alpha:false});

function w2s(x, y) {
  return {x: canvas.width/2 + (x-cam.x)*cam.scale,
          y: canvas.height/2 - (y-cam.y)*cam.scale};
}
function s2w(px, py) {
  return {x: (px - canvas.width/2)/cam.scale + cam.x,
          y: (canvas.height/2 - py)/cam.scale + cam.y};
}
(function setupCamera(){
  let drag=false, lx=0, ly=0;
  canvas.addEventListener('wheel', e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    const bw=s2w(e.clientX-r.left, e.clientY-r.top);
    const f=e.deltaY>0?0.88:1.13;
    cam.scale=Math.max(0.2, Math.min(200, cam.scale*f));
    const aw=s2w(e.clientX-r.left, e.clientY-r.top);
    cam.x+=bw.x-aw.x; cam.y+=bw.y-aw.y;
  },{passive:false});
  canvas.addEventListener('mousedown', e=>{drag=true;lx=e.clientX;ly=e.clientY;});
  window.addEventListener('mouseup', ()=>drag=false);
  canvas.addEventListener('mousemove', e=>{
    if(!drag) return;
    cam.x-=(e.clientX-lx)/cam.scale; cam.y+=(e.clientY-ly)/cam.scale;
    lx=e.clientX; ly=e.clientY;
  });
})();

const R = {
  clear(){ ctx.fillStyle='#0E1117'; ctx.fillRect(0,0,canvas.width,canvas.height); },
  axisLabels(xUnit='m', yUnit='m'){
    const ox=w2s(0,0);
    ctx.fillStyle='#3a4a5a'; ctx.font='11px ui-monospace,monospace';
    ctx.fillText(`x (${xUnit}) →`, canvas.width - 90, ox.y - 6);
    ctx.save(); ctx.translate(ox.x+8, 60);
    ctx.fillText(`↑ y (${yUnit})`, 0, 0);
    ctx.restore();
  },
  grid(){
    ctx.strokeStyle='#1a2030'; ctx.lineWidth=1;
    const step=1;
    const tl=s2w(0,0), br=s2w(canvas.width,canvas.height);
    const x0=Math.floor(tl.x/step)*step, x1=Math.ceil(br.x/step)*step;
    const y0=Math.floor(br.y/step)*step, y1=Math.ceil(tl.y/step)*step;
    for(let x=x0;x<=x1;x+=step){const p=w2s(x,0);ctx.beginPath();ctx.moveTo(p.x,0);ctx.lineTo(p.x,canvas.height);ctx.stroke();}
    for(let y=y0;y<=y1;y+=step){const p=w2s(0,y);ctx.beginPath();ctx.moveTo(0,p.y);ctx.lineTo(canvas.width,p.y);ctx.stroke();}
    ctx.strokeStyle='#2b3a50'; ctx.lineWidth=1.5;
    const ox=w2s(0,0); ctx.beginPath();ctx.moveTo(0,ox.y);ctx.lineTo(canvas.width,ox.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ox.x,0);ctx.lineTo(ox.x,canvas.height);ctx.stroke();
  },
  line(x1,y1,x2,y2,color='#8B949E',w=1.5){
    const a=w2s(x1,y1),b=w2s(x2,y2);
    ctx.strokeStyle=color;ctx.lineWidth=w;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  },
  circle(x,y,r,fill,stroke){
    const p=w2s(x,y), pr=Math.max(2,r*cam.scale);
    ctx.beginPath();ctx.arc(p.x,p.y,pr,0,Math.PI*2);
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}
  },
  trail(pts,color,w=1.5,maxLen=800){
    if(pts.length<2) return;
    const start=Math.max(0,pts.length-maxLen);
    ctx.strokeStyle=color;ctx.lineWidth=w;ctx.setLineDash([]);
    ctx.beginPath();
    const p0=w2s(pts[start].x,pts[start].y);ctx.moveTo(p0.x,p0.y);
    for(let i=start+1;i<pts.length;i++){const p=w2s(pts[i].x,pts[i].y);ctx.lineTo(p.x,p.y);}    
    ctx.stroke();
  },
  savedTrail(pts,color){
    if(pts.length<2) return;
    ctx.strokeStyle=color;ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();const p0=w2s(pts[0].x,pts[0].y);ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<pts.length;i++){const p=w2s(pts[i].x,pts[i].y);ctx.lineTo(p.x,p.y);}    
    ctx.stroke();ctx.setLineDash([]);
  },
  label(text,x,y,color='#8B949E'){
    const p=w2s(x,y);
    ctx.fillStyle=color;ctx.font='12px ui-monospace,monospace';
    const lines=String(text).split('\n');
    lines.forEach((line,i)=>ctx.fillText(line,p.x+5,p.y-5+(i*13)));
  }
};

const GC = document.getElementById('graphCanvas');
const GX = GC.getContext('2d');
function resizeGC(){
  const dpr=Math.max(1,window.devicePixelRatio||1);
  GC.width=Math.floor(GC.clientWidth*dpr);
  GC.height=Math.floor(GC.clientHeight*dpr);
}
function cloneSeries(series){
  return (series||[]).map(s=>({
    label:s.label,
    xLabel:s.xLabel || 'Time (s)',
    values:(s.values||[]).map(p=>({t:p.t,v:p.v}))
  }));
}
function drawGraph(mainSeries, overlays=[]){
  resizeGC();
  const W=GC.width,H=GC.height,pad=34;
  GX.fillStyle='#0a0f1a';GX.fillRect(0,0,W,H);
  const all=[mainSeries,...overlays].filter(Boolean).filter(s=>s.values&&s.values.length>1);
  if(!all.length) return;
  const xs=all.flatMap(s=>s.values.map(p=>p.t));
  const ys=all.flatMap(s=>s.values.map(p=>p.v));
  let x0=Math.min(...xs), x1=Math.max(...xs);
  let y0=Math.min(...ys), y1=Math.max(...ys);
  if(x0===x1){x0-=1;x1+=1;}
  if(y0===y1){y0-=1;y1+=1;}
  const mx=t=>(pad+(t-x0)/((x1-x0)||1)*(W-2*pad));
  const my=v=>(H-pad-(v-y0)/((y1-y0)||1)*(H-2*pad));
  GX.strokeStyle='#1e2738';GX.lineWidth=1;
  [0,.25,.5,.75,1].forEach(f=>{
    const y=pad+f*(H-2*pad);
    GX.beginPath();GX.moveTo(pad,y);GX.lineTo(W-pad,y);GX.stroke();
    const val=(y1-(y1-y0)*f).toFixed(2);
    GX.fillStyle='#4a5568';GX.font='10px monospace';GX.fillText(val,3,y+3);
  });
  [0,.25,.5,.75,1].forEach(f=>{
    const x=pad+f*(W-2*pad);
    GX.beginPath();GX.moveTo(x,pad);GX.lineTo(x,H-pad);GX.stroke();
    const val=(x0+(x1-x0)*f).toFixed(2);
    GX.fillStyle='#4a5568';GX.font='10px monospace';GX.fillText(val,x-10,H-pad+14);
  });

  const drawSeries=(series, color, dashed=false)=>{
    GX.strokeStyle=color;GX.lineWidth=dashed?1.4:2.2;
    GX.setLineDash(dashed?[6,4]:[]);
    GX.beginPath();
    GX.moveTo(mx(series.values[0].t),my(series.values[0].v));
    for(let i=1;i<series.values.length;i++) GX.lineTo(mx(series.values[i].t),my(series.values[i].v));
    GX.stroke();
  };
  overlays.forEach((s,i)=>drawSeries(s, RUN_PALETTE[i % RUN_PALETTE.length], true));
  drawSeries(mainSeries, '#58A6FF', false);
  GX.setLineDash([]);

  GX.fillStyle='#9dd1ff';GX.font='11px monospace';
  GX.fillText(mainSeries.label||'',pad,pad-8);
  GX.fillStyle='#4a5568';GX.font='10px monospace';
  GX.fillText(mainSeries.xLabel || 'Time (s)', W/2-20, H-5);
  GX.save();
  GX.translate(10,H/2+20); GX.rotate(-Math.PI/2);
  GX.fillText(mainSeries.label||'Value',0,0);
  GX.restore();

  if(overlays.length){
    GX.fillStyle='#8B949E'; GX.font='10px monospace';
    GX.fillText('dashed = saved runs', W-pad-110, pad-8);
  }
}

const runs={list:[],next:1};
const RUN_PALETTE=['#58A6FF','#3FB950','#DAA520','#F0883E','#BC8CFF','#FF6A6A','#00CED1','#FF69B4','#ADFF2F','#FF8C00'];
function nextColor(){ return RUN_PALETTE[(runs.next-1) % RUN_PALETTE.length]; }

function saveRun(pts, summary, graphSeries){
  const color=RUN_PALETTE[(runs.next-1) % RUN_PALETTE.length];
  runs.list.push({
    id:runs.next++,
    pts:[...pts],
    color,
    vis:true,
    summary:summary||{},
    expanded:true,
    graphSeries:cloneSeries(graphSeries||[])
  });
  refreshRunList();
  fillReportFromCurrent();
}

function refreshRunList(){
  const el=document.getElementById('runList');
  el.innerHTML='';
  if(!runs.list.length){
    el.innerHTML='<div style="color:var(--dim);font-size:11px;padding:4px 0;">No saved runs yet. Click 💾 Save Run.</div>';
    return;
  }
  runs.list.forEach(r=>{
    const wrap=document.createElement('div');
    wrap.style.marginBottom='6px';
    const hdr=document.createElement('div');
    hdr.className='run-row';
    const colorDot=document.createElement('span');
    colorDot.style.cssText=`color:${r.color};font-weight:700;flex:1;cursor:pointer;`;
    colorDot.textContent=`■ Run ${r.id}`;
    colorDot.onclick=()=>{r.expanded=!r.expanded;refreshRunList();};

    const btnCollapse=document.createElement('button');
    btnCollapse.title='Expand/Collapse';
    btnCollapse.style.fontSize='11px';
    btnCollapse.textContent=r.expanded?'▾':'▸';
    btnCollapse.onclick=(e)=>{e.stopPropagation();r.expanded=!r.expanded;refreshRunList();};

    const btnVis=document.createElement('button');
    btnVis.title=r.vis?'Hide trail':'Show trail';
    btnVis.textContent=r.vis?'👁':'🙈';
    btnVis.style.opacity=r.vis?'1':'0.5';
    btnVis.onclick=(e)=>{e.stopPropagation();r.vis=!r.vis;refreshRunList();};

    const btnDel=document.createElement('button');
    btnDel.title='Delete run';
    btnDel.textContent='✖';
    btnDel.onclick=(e)=>{e.stopPropagation();runs.list=runs.list.filter(x=>x.id!==r.id);refreshRunList();fillReportFromCurrent();};

    const btnGroup=document.createElement('div');
    btnGroup.style.cssText='display:flex;gap:4px;align-items:center;';
    btnGroup.append(btnCollapse,btnVis,btnDel);

    hdr.append(colorDot, btnGroup);
    wrap.appendChild(hdr);

    if(r.expanded && r.summary && Object.keys(r.summary).length){
      const tbl=document.createElement('table');
      tbl.className='run-table';
      tbl.innerHTML='<thead><tr><th>Metric</th><th style="text-align:right;">Value</th></tr></thead>';
      const tbody=document.createElement('tbody');
      Object.entries(r.summary).forEach(([k,v])=>{
        const tr=document.createElement('tr');
        tr.innerHTML=`<td>${k}</td><td>${v}</td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      wrap.appendChild(tbl);
    }
    el.appendChild(wrap);
  });
}

const P={v0:25,angle:45*Math.PI/180,g:9.81,mass:1.0,length:2.0,damping:0.04,k:10,x0:1.0};
function bindSlider(id,labelId,key,scale,fmt){
  const sl=document.getElementById(id),lb=document.getElementById(labelId);
  if(!sl||!lb) return;
  sl.oninput=()=>{P[key]=parseFloat(sl.value)*(scale||1);lb.textContent=fmt?fmt(P[key]):parseFloat(sl.value);if(document.getElementById('tabTheory').classList.contains('active')) renderTheory();};
}
bindSlider('sVel','lv','v0'); bindSlider('sAng','la','angle',Math.PI/180,v=>(v*180/Math.PI).toFixed(0));
bindSlider('sGrav','lg','g'); bindSlider('sMass','lm','mass');
bindSlider('sLen','ll','length'); bindSlider('sDamp','ld','damping');
bindSlider('sSpring','lk','k'); bindSlider('sX0','lx0','x0');

function setSlidersFromP(p){
  if(p.v0!=null){document.getElementById('sVel').value=p.v0;document.getElementById('lv').textContent=p.v0;P.v0=p.v0;}
  if(p.angle!=null){const d=p.angle*180/Math.PI;document.getElementById('sAng').value=d;document.getElementById('la').textContent=d.toFixed(0);P.angle=p.angle;}
  if(p.angleDeg!=null){document.getElementById('sAng').value=p.angleDeg;document.getElementById('la').textContent=p.angleDeg;P.angle=p.angleDeg*Math.PI/180;}
  if(p.g!=null){document.getElementById('sGrav').value=p.g;document.getElementById('lg').textContent=p.g;P.g=p.g;}
  if(p.mass!=null){document.getElementById('sMass').value=p.mass;document.getElementById('lm').textContent=p.mass;P.mass=p.mass;}
  if(p.length!=null){document.getElementById('sLen').value=p.length;document.getElementById('ll').textContent=p.length;P.length=p.length;}
  if(p.damping!=null){document.getElementById('sDamp').value=p.damping;document.getElementById('ld').textContent=p.damping;P.damping=p.damping;}
  if(p.k!=null){document.getElementById('sSpring').value=p.k;document.getElementById('lk').textContent=p.k;P.k=p.k;}

  draw(){R.clear();R.grid();R.axisLabels('','m');runs.list.filter(r=>r.vis).forEach(r=>R.savedTrail(r.pts,r.color));ctx.fillStyle='#1e2d1e';const gl=w2s(-5,0),gr=w2s(5,-0.3);ctx.fillRect(gl.x,gl.y,gr.x-gl.x,gr.y-gl.y);R.line(-5,0,5,0,'#3FB950',2);const tickStep=P.x0<=20?2:P.x0<=50?5:P.x0<=100?10:P.x0<=200?20:50;for(let yy=0;yy<=P.x0;yy+=tickStep){R.line(-0.5,yy,0.5,yy,'#2b3a50',1);R.label(yy+' m', 0.6, yy,'#4a5568');}R.trail(this.pts,nextColor());R.circle(0,this.y,0.3,nextColor());if(this.vy!==0){const scale2=0.15,vy2=this.vy*scale2;R.line(0.4,this.y,0.4,this.y+vy2,'#FF6A6A',2);R.label(`v=${this.vy.toFixed(1)} m/s`, 0.5, this.y+vy2/2,'#FF6A6A');}},
  ui(){const theorY=P.x0-0.5*P.g*this.t*this.t;const k=this._k();const vt=Math.sqrt(P.g/k);const dragF=k*P.mass*this.vy*this.vy;updateReadout({'Time':this.t.toFixed(2)+' s','Height (y)':this.y.toFixed(2)+' m','Velocity (vy)':this.vy.toFixed(2)+' m/s','No-drag h (½gt²)':Math.max(0,theorY).toFixed(2)+' m','Terminal v':vt.toFixed(2)+' m/s','Drag force':dragF.toFixed(3)+' N','KE':(0.5*P.mass*this.vy*this.vy).toFixed(2)+' J','PE':(P.mass*P.g*Math.max(0,this.y)).toFixed(2)+' J'});},
  series(){return [{label:'Height (m)',values:this.pts.map(p=>({t:p.t,v:p.y}))},{label:'Velocity (m/s)',values:this.pts.map(p=>({t:p.t,v:p.vy}))},{label:'KE (J)',values:this.pts.map(p=>({t:p.t,v:0.5*P.mass*p.vy*p.vy}))},{label:'PE (J)',values:this.pts.map(p=>({t:p.t,v:P.mass*P.g*Math.max(0,p.y)}))}];}
}), {label:'Free Fall',rows:['row-grav','row-mass','row-x0'],cam:{x:0,y:10,scale:20},presets:[{label:'Earth — feather (20 m)',p:{g:9.81,mass:0.1,x0:20}},{label:'Earth — cannonball (20 m)',p:{g:9.81,mass:10,x0:20}},{label:'Moon (20 m)',p:{g:1.62,mass:1,x0:20}},{label:'Mars (20 m)',p:{g:3.72,mass:1,x0:20}},{label:'Jupiter (20 m)',p:{g:24.79,mass:1,x0:20}},{label:'Skyscraper — feather (300 m)',p:{g:9.81,mass:0.1,x0:300}},{label:'Skyscraper — cannonball (300 m)',p:{g:9.81,mass:10,x0:300}}]});
let active = null;
let activeExpId = null;
let graphMode = false;
let graphIdx = 0;

function hasUnsavedActiveData(){
  if(!active) return false;
  if(typeof active.pts !== 'undefined' && Array.isArray(active.pts) && active.pts.length > 1){
    return true;
  }
  return false;
}

function confirmExperimentSwitch(nextId){
  if(!active || !hasUnsavedActiveData()){
    activate(nextId);
    return;
  }

  const shouldSave = window.confirm(
    'You have unsaved experiment data. Click OK to save before switching. Click Cancel to switch without saving.'
  );

  if(shouldSave){
    active.save?.();
  }

  activate(nextId);
}

function activate(id){
  const rec = registry.get(id);
  if(!rec) return;

  activeExpId = id;
  const {factory,meta} = rec;
  active = factory();

  showRows(meta.rows || []);
  const lx0el = document.getElementById('labelX0');
  const sx0 = document.getElementById('sX0');

  if(id === 'freefall'){
    lx0el.innerHTML = 'Drop Height: <span class="val" id="lx0">' + P.x0.toFixed(0) + '</span> m';
    sx0.min = 1; sx0.max = 500; sx0.step = 1;
    if(parseFloat(sx0.value) < 1 || parseFloat(sx0.value) > 500) {
      sx0.value = 20;
      P.x0 = 20;
    }
  } else {
    lx0el.innerHTML = 'Initial Displacement: <span class="val" id="lx0">' + P.x0.toFixed(1) + '</span> m';
    sx0.min = 0.1; sx0.max = 4; sx0.step = 0.1;
  }

  if(meta.cam){
    cam.x = meta.cam.x;
    cam.y = meta.cam.y;
    cam.scale = meta.cam.scale;
  }

  const psel = document.getElementById('presetSel');
  psel.innerHTML = '<option value="">Presets…</option>';
  (meta.presets || []).forEach((p,i)=>{
    const o = document.createElement('option');
    o.value = i;
    o.textContent = p.label;
    psel.appendChild(o);
  });

  psel.onchange = (e)=>{
    if(e.target.value === '') return;
    const pr = (meta.presets || [])[+e.target.value];
    if(pr){
      setSlidersFromP(pr.p || {});
      active.reset();
      active.start();
      toast('Loaded: ' + pr.label);
      fillReportFromCurrent();
    }
    e.target.value = '';
  };

  active.reset();
  active.start();
  graphMode = false;
  switchToTable();
  fillReportFromCurrent();
}

document.getElementById('expSel').onchange = e => {
  const nextId = e.target.value;
  if(nextId === activeExpId) return;
  confirmExperimentSwitch(nextId);
};

function resize(){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const mobileLayout = window.innerWidth <= 900;

  const w = mobileLayout ? window.innerWidth : (window.innerWidth - 320);
  const h = mobileLayout ? Math.floor((window.innerHeight - 50) * 0.5) : (window.innerHeight - 50);

  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
}

registerExp('waves', ()=>({
  running:false, paused:false, pts:[], t:0,
  reset(){
    this.pts=[]; this.t=0; this.running=false; this.paused=false;
    cam.x=0; cam.y=0; cam.scale=30;
  },
  start(){if(this.paused){this.paused=false;this.running=true;return;}this.reset();this.running=true;},
  pause(){this.running=false;this.paused=true;},
  newRun(){this.reset();this.running=true;},
  save(){
    const lam=P.waveSpeed/P.freq;
    const T=1/P.freq;
    const summary={
      'Frequency (f)':P.freq.toFixed(2)+' Hz',
      'Amplitude (A)':P.amp.toFixed(2)+' m',
      'Wave speed (v)':P.waveSpeed.toFixed(1)+' m/s',
      'Wavelength (λ)':lam.toFixed(3)+' m',
      'Period (T)':T.toFixed(3)+' s',
      'Formula v=fλ':(P.freq*lam).toFixed(2)+' m/s ✓'
    };
    saveRun([{x:0,y:0},{x:1,y:0}], summary, this.series());
  },
  update(dt){if(!this.running||this.paused)return; this.t+=dt;},
  draw(){
    R.clear(); R.grid();
    const lam=P.waveSpeed/P.freq;
    const k=2*Math.PI/lam;
    const omega=2*Math.PI*P.freq;
    const color=nextColor();
    ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.setLineDash([]);
    ctx.beginPath();
    const xStart=-15, xEnd=15, step=0.05;
    let first=true;
    for(let wx=xStart;wx<=xEnd;wx+=step){
      const wy=P.amp*Math.sin(k*wx - omega*this.t);
      const sp=w2s(wx,wy);
      if(first){ctx.moveTo(sp.x,sp.y);first=false;}else ctx.lineTo(sp.x,sp.y);
    }
    ctx.stroke();
    R.line(-15,0,15,0,'#2b3a50',1);
    const wox=w2s(0,0).x, w1x=w2s(lam,0).x;
    ctx.strokeStyle='#4a5568'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(wox,w2s(0,-P.amp-0.4).y); ctx.lineTo(wox,w2s(0,P.amp+0.4).y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w1x,w2s(0,-P.amp-0.4).y); ctx.lineTo(w1x,w2s(0,P.amp+0.4).y); ctx.stroke();
    ctx.setLineDash([]);
    R.label('λ='+lam.toFixed(2)+'m', lam/2-0.3, P.amp+0.6,'#4a5568');
    R.line(-14.5, P.amp, -14, P.amp, '#8B949E', 1);
    R.line(-14.5,-P.amp, -14,-P.amp, '#8B949E', 1);
    R.line(-14.5,-P.amp,-14.5,P.amp,'#8B949E',1);
    R.label('A='+P.amp.toFixed(1)+'m',-14.3,P.amp/2,'#8B949E');
    R.axisLabels('m','m');
    const T=1/P.freq;
    R.label(`f=${P.freq.toFixed(2)}Hz  T=${T.toFixed(3)}s  v=${P.waveSpeed}m/s  λ=${lam.toFixed(2)}m`,
      -14, -P.amp-0.8, '#58A6FF');
  },
  ui(){
    const lam=P.waveSpeed/P.freq;
    const T=1/P.freq;
    const calcV=P.freq*lam;
    updateReadout({
      'Frequency (f)':P.freq.toFixed(2)+' Hz',
      'Period (T)':T.toFixed(3)+' s',
      'Amplitude (A)':P.amp.toFixed(2)+' m',
      'Wave speed (v)':P.waveSpeed.toFixed(1)+' m/s',
      'Wavelength (λ)':lam.toFixed(3)+' m',
      '— Theory —':'v = f × λ',
      'v = f·λ':calcV.toFixed(2)+' m/s',
      'Time elapsed':this.t.toFixed(2)+' s'
    });
  },
  series(){
    const lam=P.waveSpeed/P.freq;
    const k=2*Math.PI/lam;
    const omega=2*Math.PI*P.freq;
    const pts=[];
    for(let wx=-10;wx<=10;wx+=0.1)
      pts.push({t:wx, v:P.amp*Math.sin(k*wx - omega*this.t)});
    const tpts=[];
    for(let tt=0;tt<=2/P.freq;tt+=0.01)
      tpts.push({t:tt, v:P.amp*Math.sin(-omega*tt)});
    return [
      {label:'y(x) snapshot — displacement vs position (m)',values:pts,xLabel:'x (m)'},
      {label:'y(t) at x=0 — displacement vs time (m)',values:tpts}
    ];
  }
}),{
  label:'Waves & Sound',
  rows:['row-freq','row-amp','row-wavespeed'],
  cam:{x:0,y:0,scale:30},
  presets:[
    {label:'Slow wave',p:{freq:1,amp:1.5,waveSpeed:8}},
    {label:'High frequency',p:{freq:5,amp:0.5,waveSpeed:10}},
    {label:'Sound ~440 Hz (scaled)',p:{freq:4,amp:0.8,waveSpeed:12}},
    {label:'Long wavelength',p:{freq:0.5,amp:2,waveSpeed:10}},
    {label:'Standing wave feel',p:{freq:3,amp:1,waveSpeed:6}}

});

registerExp('collision', ()=>({
  running:false, paused:false, pts:[], t:0,
  x1:0, v1:0, x2:0, v2:0,
  phase:'before',
  collided:false,
  W:0.4,
  reset(){
    this.pts=[]; this.t=0; this.running=false; this.paused=false;
    this.phase='before'; this.collided=false;
    this.x1=-6; this.v1=P.vel1;
    this.x2=4;  this.v2=P.vel2;
    cam.x=0; cam.y=0; cam.scale=40;
  },
  start(){if(this.paused){this.paused=false;this.running=true;return;}this.reset();this.running=true;},
  pause(){this.running=false;this.paused=true;},
  newRun(){this.reset();this.running=true;},
  save(){
    if(this.phase!=='after') return;
    const summary={
      'Mass 1 (m₁)':P.mass.toFixed(2)+' kg',
      'Mass 2 (m₂)':P.mass2.toFixed(2)+' kg',
      'v₁ initial':P.vel1.toFixed(2)+' m/s',
      'v₂ initial':P.vel2.toFixed(2)+' m/s',
      'Restitution (e)':P.restitution.toFixed(2),
      'Type':P.restitution>=0.99?'Elastic':P.restitution<=0.01?'Perfectly Inelastic':'Partially Inelastic',
      'v₁ final':this.v1.toFixed(3)+' m/s',
      'v₂ final':this.v2.toFixed(3)+' m/s',
      'p before':(P.mass*P.vel1 + P.mass2*P.vel2).toFixed(3)+' kg·m/s',
      'p after':(P.mass*this.v1 + P.mass2*this.v2).toFixed(3)+' kg·m/s',
      'KE before':(0.5*P.mass*P.vel1*P.vel1 + 0.5*P.mass2*P.vel2*P.vel2).toFixed(3)+' J',
      'KE after':(0.5*P.mass*this.v1*this.v1 + 0.5*P.mass2*this.v2*this.v2).toFixed(3)+' J'
    };
    saveRun([{x:this.x1,y:0},{x:this.x2,y:0}], summary, this.series());
  },
  _postV(){
    const m1=P.mass, m2=P.mass2, u1=P.vel1, u2=P.vel2, e=P.restitution;
    const v1=(m1*u1 + m2*u2 - m2*e*(u1-u2))/(m1+m2);
    const v2=(m1*u1 + m2*u2 + m1*e*(u1-u2))/(m1+m2);
    return [v1,v2];
  },
  update(dt){
    if(!this.running||this.paused) return;
    this.t+=dt;
    this.x1+=this.v1*dt;
    this.x2+=this.v2*dt;
    this.pts.push({t:this.t,x1:this.x1,x2:this.x2,v1:this.v1,v2:this.v2});
    if(!this.collided){
      const touching = this.x1+this.W >= this.x2-this.W;
      const approaching = (this.v1 > this.v2 && this.x1 < this.x2) || (this.v2 > this.v1 && this.x2 < this.x1);
      if(touching && approaching){
        this.collided=true;
        this.phase='after';
        const [nv1,nv2]=this._postV();
        this.v1=nv1; this.v2=nv2;
      }
    }
    if(Math.abs(this.x1)>25||Math.abs(this.x2)>25) this.running=false;
  },
  draw(){
    R.clear(); R.grid();
    R.line(-20,0,20,0,'#8B949E',2);
    R.line(-20,-0.05,20,-0.05,'#2b3a50',8);
    const drawCart=(x,v,mass,clr,lbl)=>{
      const hw=this.W, hh=0.3;
      const tl=w2s(x-hw,hh), br=w2s(x+hw,-hh);
      ctx.fillStyle=clr; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(tl.x,tl.y,br.x-tl.x,br.y-tl.y,4); ctx.fill(); ctx.stroke();
      if(Math.abs(v)>0.05){
        const ex=x+(v>0?1:-1)*Math.min(Math.abs(v)*0.4,3);
        R.line(x,0.55,ex,0.55,clr,2);
        const arrowDir=v>0?1:-1;
        R.line(ex,0.55,ex-arrowDir*0.3,0.4,clr,2);
        R.line(ex,0.55,ex-arrowDir*0.3,0.7,clr,2);
      }
      R.label(lbl, x-0.15, hh+0.18, '#fff');
      R.label(`${mass.toFixed(1)} kg`, x-0.22, hh+0.02, '#fff');
      R.label(`v=${v.toFixed(2)} m/s`, x-0.35, hh+0.48, clr);
    };
    drawCart(this.x1,this.v1,P.mass,'#58A6FF','m₁');
    drawCart(this.x2,this.v2,P.mass2,'#F0883E','m₂');
    R.axisLabels('m','');
    const phaseColor=this.phase==='after'?'#3FB950':'#DAA520';
    R.label(this.phase==='after'?'After collision':'Before collision',-8,2,phaseColor);
  },
  ui(){
    const p1=P.mass*this.v1, p2=P.mass2*this.v2;
    const KE1=0.5*P.mass*this.v1*this.v1, KE2=0.5*P.mass2*this.v2*this.v2;
    const pInit=P.mass*P.vel1 + P.mass2*P.vel2;
    const type=P.restitution>=0.99?'Elastic':P.restitution<=0.01?'Perfectly Inelastic':'Partially Inelastic';
    updateReadout({
      'Type':type,
      'm₁':P.mass.toFixed(2)+' kg',
      'm₂':P.mass2.toFixed(2)+' kg',
      'u₁ initial':P.vel1.toFixed(3)+' m/s',
      'u₂ initial':P.vel2.toFixed(3)+' m/s',
      'v₁ current':this.v1.toFixed(3)+' m/s',
      'v₂ current':this.v2.toFixed(3)+' m/s',
      'p₁':p1.toFixed(3)+' kg·m/s',
      'p₂':p2.toFixed(3)+' kg·m/s',
      'p total':(p1+p2).toFixed(3)+' kg·m/s',
      '— Theory —':'p = mv',
      'p initial':pInit.toFixed(3)+' kg·m/s',
      'Δp (should=0)':(p1+p2-pInit).toFixed(4)+' kg·m/s',
      'KE total':(KE1+KE2).toFixed(3)+' J',
      'Phase':this.phase
    });
  },
  series(){
    return [

registerExp('incline', ()=>({
  running:false, paused:false, pts:[], t:0,
  x:0, v:0,
  L:8,
  sliding:false,
  reset(){
    this.pts=[]; this.t=0; this.running=false; this.paused=false;
    this.x=0; this.v=0; this.sliding=false;
    cam.x=0; cam.y=0; cam.scale=25;
  },
  start(){if(this.paused){this.paused=false;this.running=true;return;}this.reset();this.running=true;},
  pause(){this.running=false;this.paused=true;},
  newRun(){this.reset();this.running=true;},
  save(){
    if(this.pts.length<2) return;
    const th=P.angle, sinT=Math.sin(th), cosT=Math.cos(th);
    const FN=P.mass*P.g*cosT;
    const FgPar=P.mass*P.g*sinT;
    const Ffrk=P.muK*FN;
    const aNet=P.g*(sinT - P.muK*cosT);
    const last=this.pts[this.pts.length-1];
    const summary={
      'Angle (θ)':(th*180/Math.PI).toFixed(1)+'°',
      'Mass':P.mass.toFixed(2)+' kg',
      'μₛ':P.muS.toFixed(2),
      'μₖ':P.muK.toFixed(2),
      'Normal force (Fₙ)':FN.toFixed(2)+' N',
      'Gravity ∥ ramp':FgPar.toFixed(2)+' N',
      'Friction force':Ffrk.toFixed(2)+' N',
      'Net accel':aNet.toFixed(3)+' m/s²',
      'Did slide?':this.sliding?'Yes':'No (static friction held)',
      'Final speed':last.v.toFixed(3)+' m/s',
      'Distance':last.x.toFixed(3)+' m'
    };
    saveRun(this.pts.map(p=>({x:p.x,y:0})), summary, this.series());
  },
  _accel(){
    const th=P.angle, sinT=Math.sin(th), cosT=Math.cos(th);
    const FN=P.mass*P.g*cosT;
    const FgPar=P.mass*P.g*sinT;
    const Fs_max=P.muS*FN;
    if(!this.sliding){
      if(FgPar > Fs_max){ this.sliding=true; }
      else return 0;
    }
    return P.g*(sinT - P.muK*cosT);
  },
  update(dt){
    if(!this.running||this.paused) return;
    const steps=Math.max(1,Math.ceil(dt/0.005));
    const h=dt/steps;
    for(let s=0;s<steps;s++){
      const a=this._accel();
      this.v+=a*h; 
      this.x+=this.v*h;
      if(this.v<0){this.v=0; this.running=false; break;}
      if(this.x>=this.L){this.x=this.L; this.running=false; break;}
    }
    this.t+=dt;
    this.pts.push({t:this.t, x:this.x, v:this.v});
    if(!this.running) this.save();
  },
  _rampEnds(){
    const th=P.angle;
    const x0=-this.L*0.5, y0=this.L*0.5*Math.tan(th);
    const x1= this.L*0.5, y1=0;
    return {x0,y0,x1,y1};
  },
  draw(){
    R.clear(); R.grid();
    const th=P.angle, cosT=Math.cos(th), sinT=Math.sin(th);
    const {x0,y0,x1,y1}=this._rampEnds();
    R.line(x0,y0,x1,y1,'#8B949E',3);
    R.line(x0-1,0,x1+1,0,'#4a5568',2);
    ctx.save();
    ctx.fillStyle='#1e2530';
    const p0=w2s(x0,y0),p1=w2s(x1,y1),p2=w2s(x1,0),p3=w2s(x0,0);
    ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y);
    ctx.lineTo(p2.x,p2.y); ctx.lineTo(p3.x,p3.y); ctx.closePath(); ctx.fill();
    ctx.restore();

    ctx.save();
    const ap=w2s(x1,y1);
    ctx.strokeStyle='#DAA520'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(ap.x,ap.y,30,Math.PI,Math.PI+th); ctx.stroke();
    ctx.restore();
    R.label(`θ=${(th*180/Math.PI).toFixed(0)}°`, x1-0.9, 0.25,'#DAA520');

    const bx = x0 + (x1-x0)*(this.x/this.L) + cosT*0.3;
    const by = y0 + (y1-y0)*(this.x/this.L) + sinT*0.3;

    const FN=P.mass*P.g*cosT, FgPar=P.mass*P.g*sinT;
    const scale=0.04;
    const nx=-sinT, ny=cosT;
    R.line(bx,by, bx+nx*FN*scale, by+ny*FN*scale,'#3FB950',2);
    R.label('Fₙ', bx+nx*FN*scale, by+ny*FN*scale,'#3FB950');

    R.line(bx,by, bx, by-P.mass*P.g*scale,'#FF6A6A',2);
    R.label('Fg', bx+0.1, by-P.mass*P.g*scale,'#FF6A6A');

    if(this.sliding){
      const Ffk=P.muK*FN;
      R.line(bx,by, bx-cosT*Ffk*scale, by+sinT*Ffk*scale,'#DAA520',2);
      R.label('Ff', bx-cosT*Ffk*scale-0.2, by+sinT*Ffk*scale,'#DAA520');
    }

    ctx.save();
    const bp=w2s(bx,by);
    ctx.translate(bp.x,bp.y); ctx.rotate(-th);
    const bsz=cam.scale*0.35;
    ctx.fillStyle=nextColor(); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(-bsz,-bsz,bsz*2,bsz*2,3); ctx.fill(); ctx.stroke();
    ctx.restore();

    R.axisLabels('m','m');
    R.label(this.sliding?'Sliding':'Static — held by friction', x0, y0+0.5,
      this.sliding?'#FF6A6A':'#3FB950');
  },
  ui(){
    const th=P.angle, sinT=Math.sin(th), cosT=Math.cos(th);
    const FN=P.mass*P.g*cosT;
    const FgPar=P.mass*P.g*sinT;
    const Fs_max=P.muS*FN;
    const Ffk=P.muK*FN;
    const aTheory=P.g*(sinT-P.muK*cosT);
    const critAngle=Math.atan(P.muS)*180/Math.PI;
    updateReadout({
      'θ':(th*180/Math.PI).toFixed(1)+'°',
      'Status':this.sliding?'Sliding':'Static',
      'Normal Fₙ':FN.toFixed(2)+' N',
      'Fg ∥ ramp':FgPar.toFixed(2)+' N',
      'Max static Ff':Fs_max.toFixed(2)+' N',
      'Kinetic Ff':Ffk.toFixed(2)+' N',
      '— Theory —':'a = g(sinθ − μₖcosθ)',
      'Theory accel':aTheory.toFixed(3)+' m/s²',
      'Critical angle':critAngle.toFixed(1)+'°',
      'Current speed':this.v.toFixed(3)+' m/s',
      'Distance':this.x.toFixed(3)+' m'
    });
  },
  series(){
    return [
      {label:'Position along ramp (m)',values:this.pts.map(p=>({t:p.t,v:p.x}))},
      {label:'Speed (m/s)',values:this.pts.map(p=>({t:p.t,v:p.v}))},
      {label:'KE (J)',values:this.pts.map(p=>({t:p.t,v:0.5*P.mass*p.v*p.v}))}
    ];
  }
}),{
  label:'Inclined Plane & Friction',
  rows:['row-ang','row-grav','row-mass','row-muS','row-muK'],
  cam:{x:0,y:0,scale:25},
  presets:[
    {label:'Gentle slope, no slide',p:{angleDeg:20,g:9.81,mass:2,muS:0.5,muK:0.4}},
    {label:'Steep slope, sliding',p:{angleDeg:45,g:9.81,mass:2,muS:0.3,muK:0.2}},
    {label:'Just at critical angle',p:{angleDeg:27,g:9.81,mass:2,muS:0.51,muK:0.4}},
    {label:'Ice surface (low μ)',p:{angleDeg:15,g:9.81,mass:5,muS:0.1,muK:0.05}},
    {label:'Rubber on concrete',p:{angleDeg:35,g:9.81,mass:3,muS:0.8,muK:0.6}}
  ]
});

registerExp('orbital', ()=>({
  running:false, paused:false, pts:[], t:0,
  theta:0,
  GM_sun: 4*Math.PI*Math.PI,
  reset(){
    this.pts=[]; this.t=0; this.running=false; this.paused=false;
    this.theta=0;
    cam.x=0; cam.y=0; cam.scale=20;
  },
  start(){if(this.paused){this.paused=false;this.running=true;return;}this.reset();this.running=true;},
  pause(){this.running=false;this.paused=true;},
  newRun(){this.reset();this.running=true;},
  save(){
    const Rr=P.orbitR, GM=this.GM_sun*P.centralMass;
    const T=2*Math.PI*Math.sqrt(Rr*Rr*Rr/GM);
    const v=2*Math.PI*Rr/T;
    const Fc=P.mass*v*v/Rr;
    const summary={
      'Orbit radius':Rr.toFixed(2)+' AU',
      'Central mass':P.centralMass.toFixed(2)+'×M☉',
      'Orbital body mass':P.mass.toFixed(2)+' kg (relative)',
      'Period (T)':T.toFixed(3)+' yr',
      'Orbital speed (v)':v.toFixed(3)+' AU/yr',
      'Centripetal F':Fc.toFixed(3)+' (relative)',
      'Kepler 3rd': 'T²/R³ = '+(T*T/(Rr*Rr*Rr)).toFixed(4)
    };
    saveRun(this.pts.map(p=>({x:p.x,y:p.y})), summary, this.series());
  },
  update(dt){
    if(!this.running||this.paused) return;
    const Rr=P.orbitR, GM=this.GM_sun*P.centralMass;
    const omega=Math.sqrt(GM/(Rr*Rr*Rr));
    this.theta += omega*dt;
    if(this.theta > Math.PI*2) this.theta -= Math.PI*2;
    this.t += dt;
    const x=Rr*Math.cos(this.theta), y=Rr*Math.sin(this.theta);
    this.pts.push({t:this.t, x, y, theta:this.theta});
    const maxPts=Math.floor(2*Math.PI/omega * 60);
    if(this.pts.length>maxPts) this.pts.shift();
  },
  draw(){
    R.clear(); R.grid();
    const col=nextColor();
    ctx.save();
    const sc=w2s(0,0);
    const grd=ctx.createRadialGradient(sc.x,sc.y,0,sc.x,sc.y,cam.scale*0.8);
    grd.addColorStop(0,'rgba(255,220,80,0.5)');
    grd.addColorStop(1,'rgba(255,220,80,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(sc.x,sc.y,cam.scale*0.8,0,Math.PI*2); ctx.fill();
    ctx.restore();
    R.circle(0,0,0.25,'#FFD700','#FFA500');

    const orb=w2s(P.orbitR,0);
    ctx.strokeStyle='#2b3a50'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(sc.x,sc.y,(orb.x-sc.x),0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);

    R.trail(this.pts, col, 1.5, 300);

    if(this.pts.length){
      const last=this.pts[this.pts.length-1];
      R.circle(last.x,last.y,0.18,col,'#ffffff');

      const GM=this.GM_sun*P.centralMass;
      const orbitR=P.orbitR;
      const v=Math.sqrt(GM/orbitR);
      const Fc=P.mass*v*v/orbitR;
      const scale=0.15/Fc;
      const dx=-last.x/orbitR, dy=-last.y/orbitR;
      R.line(last.x,last.y, last.x+dx*Fc*scale, last.y+dy*Fc*scale,'#FF6A6A',2);
      R.label('Fc',last.x+dx*Fc*scale*1.2, last.y+dy*Fc*scale*1.2,'#FF6A6A');

      const vx=-Math.sin(this.theta)*0.8, vy=Math.cos(this.theta)*0.8;
      R.line(last.x,last.y,last.x+vx,last.y+vy,'#3FB950',2);
      R.label('v',last.x+vx*1.1,last.y+vy*1.1,'#3FB950');
    }

    if(this.pts.length){
      const last=this.pts[this.pts.length-1];
      ctx.strokeStyle='#2b3a50'; ctx.lineWidth=1; ctx.setLineDash([2,3]);
      const ps=w2s(0,0), pe=w2s(last.x,last.y);
      ctx.beginPath(); ctx.moveTo(ps.x,ps.y); ctx.lineTo(pe.x,pe.y); ctx.stroke();
      ctx.setLineDash([]);
    }

    const GM=this.GM_sun*P.centralMass;
    const T=2*Math.PI*Math.sqrt(P.orbitR*P.orbitR*P.orbitR/GM);
    R.label(`r=${P.orbitR}AU  T=${T.toFixed(2)}yr  T²/r³=${(T*T/(P.orbitR*P.orbitR*P.orbitR)).toFixed(3)}`,
      -9, -8,'#4a5568');
    R.axisLabels('AU','AU');
  },
  ui(){
    const orbitR=P.orbitR, GM=this.GM_sun*P.centralMass;
    const T=2*Math.PI*Math.sqrt(orbitR*orbitR*orbitR/GM);
    const omega=Math.sqrt(GM/(orbitR*orbitR*orbitR));
    const v=omega*orbitR;
    const Fc=P.mass*v*v/orbitR;
    updateReadout({
      'Orbital radius':orbitR.toFixed(2)+' AU',
      'Angle θ':(this.theta*180/Math.PI).toFixed(1)+'°',
      'Time elapsed':this.t.toFixed(3)+' yr',
      '— Circular Motion —':'',
      'Period (T)':T.toFixed(4)+' yr',
      'Orbital speed':v.toFixed(4)+' AU/yr',
      'Angular vel ω':omega.toFixed(4)+' rad/yr',
      'Centripetal F':Fc.toFixed(4),
      '— Kepler 3rd —':'T² = (4π²/GM)·R³',
      'T²/R³':(T*T/(orbitR*orbitR*orbitR)).toFixed(4)+' (const)'
    });
  },
  series(){
    return [
      {label:'x position (AU)',values:this.pts.map(p=>({t:p.t,v:p.x}))},
      {label:'y position (AU)',values:this.pts.map(p=>({t:p.t,v:p.y}))},
      {label:'Orbit: y vs x (AU)',values:this.pts.map(p=>({t:p.x,v:p.y})),xLabel:'x (AU)'}
    ];
  }
}),{
  label:'Orbital / Circular Motion',
  rows:['row-orbitR','row-centralMass','row-mass'],
  cam:{x:0,y:0,scale:20},
  presets:[
    {label:'Earth orbit',p:{orbitR:1,centralMass:1,mass:1}},
    {label:'Mars orbit',p:{orbitR:1.52,centralMass:1,mass:1}},
    {label:'Jupiter orbit',p:{orbitR:5.2,centralMass:1,mass:1}},
    {label:'Close-in planet',p:{orbitR:0.4,centralMass:1,mass:1}},
    {label:'Binary star system',p:{orbitR:3,centralMass:4,mass:1}},
    {label:'Distant orbit',p:{orbitR:12,centralMass:1,mass:1}}
  ]
});

      <b style="color:var(--accent)">Current values:</b><br>
      h = ${P.x0} m, m = ${P.mass} kg, g = ${P.g} m/s²<br>
      No-drag impact v = ${Math.sqrt(2*P.g*P.x0).toFixed(2)} m/s<br>
      No-drag time = ${Math.sqrt(2*P.x0/P.g).toFixed(2)} s
      </div>`,
    waves:`
      <div style="font-size:11px;color:var(--dim);line-height:1.7;font-family:ui-monospace,monospace;">
      <b style="color:var(--accent)">Waves & Sound</b><br>
      y(x,t) = A·sin(kx − ωt)<br><br>
      k = 2π/λ<br>
      ω = 2πf<br>
      v = fλ = ω/k<br>
      T = 1/f<br><br>
      <b style="color:var(--accent)">Current values:</b><br>
      f = ${P.freq} Hz, A = ${P.amp} m, v = ${P.waveSpeed} m/s<br>
      λ = ${(P.waveSpeed/P.freq).toFixed(3)} m<br>
      T = ${(1/P.freq).toFixed(3)} s
      </div>`,
    collision:`
      <div style="font-size:11px;color:var(--dim);line-height:1.7;font-family:ui-monospace,monospace;">
      <b style="color:var(--accent)">Momentum & Collisions</b><br>
      m₁u₁ + m₂u₂ = m₁v₁ + m₂v₂<br><br>
      e = (v₂−v₁)/(u₁−u₂)<br><br>
      v₁ = (m₁u₁+m₂u₂−m₂e(u₁−u₂))/(m₁+m₂)<br>
      v₂ = (m₁u₁+m₂u₂+m₁e(u₁−u₂))/(m₁+m₂)<br><br>
      <b style="color:var(--accent)">Current prediction:</b><br>
      m₁=${P.mass}kg, m₂=${P.mass2}kg, u₁=${P.vel1}m/s, u₂=${P.vel2}m/s<br>
      ${(()=>{
        const m1=P.mass,m2=P.mass2,u1=P.vel1,u2=P.vel2,e=P.restitution;
        const v1=(m1*u1 + m2*u2 - m2*e*(u1-u2))/(m1+m2);
        const v2=(m1*u1 + m2*u2 + m1*e*(u1-u2))/(m1+m2);
        return 'v₁_final = '+v1.toFixed(3)+' m/s<br>v₂_final = '+v2.toFixed(3)+' m/s';
      })()}
      </div>`,
    incline:`
      <div style="font-size:11px;color:var(--dim);line-height:1.7;font-family:ui-monospace,monospace;">
      <b style="color:var(--accent)">Inclined Plane & Friction</b><br>
      Fₙ = mg·cos(θ)<br>
      Fg∥ = mg·sin(θ)<br>
      Fs_max = μₛ·Fₙ<br>
      Ffk = μₖ·Fₙ<br><br>
      Slides when mg·sin(θ) > μₛmg·cos(θ)<br>
      Critical angle: θ_c = arctan(μₛ)<br><br>
      a = g·(sinθ − μₖcosθ)<br><br>
      <b style="color:var(--accent)">Current values:</b><br>
      θ=${(P.angle*180/Math.PI).toFixed(1)}°, m=${P.mass}kg, μₛ=${P.muS}, μₖ=${P.muK}
      </div>`,
    orbital:`
      <div style="font-size:11px;color:var(--dim);line-height:1.7;font-family:ui-monospace,monospace;">
      <b style="color:var(--accent)">Orbital / Circular Motion</b><br>
      Fg = GMm/r²<br>
      mv²/r = GMm/r² → v = √(GM/r)<br>
      T = 2π·√(r³/GM)<br>
      T²/r³ = constant<br><br>
      <b style="color:var(--accent)">Current values:</b><br>
      r = ${P.orbitR} AU, M = ${P.centralMass}×M☉
      </div>`
  };
  tv.innerHTML = theories[expId] || '<div class="small-note">Select an experiment.</div>';
};

function fillReportFromCurrent(){
  const expName=document.getElementById('expSel').selectedOptions[0]?.text || 'OpenPhysics Lab';
  const now=new Date();
  if(document.getElementById('rDate')) document.getElementById('rDate').value ||= now.toLocaleDateString();
  if(document.getElementById('rTitle')) document.getElementById('rTitle').value = expName;
  if(document.getElementById('rPurpose')) document.getElementById('rPurpose').value ||= `Investigate how changing variables affects ${expName.toLowerCase()}.`;
  if(document.getElementById('rProcedure')) document.getElementById('rProcedure').value ||= '1. Select a preset or adjust parameters.\n2. Run the simulation.\n3. Save runs.\n4. Compare readouts, graphs, and theory.\n5. Write analysis and conclusion.';
  if(document.getElementById('reportSummary')){
    document.getElementById('reportSummary').innerHTML = `
      <table class="kv-table">
        <tr><th>Experiment</th><td>${expName}</td></tr>
        <tr><th>Saved Runs</th><td>${runs.list.length}</td></tr>
        <tr><th>Gravity</th><td>${P.g.toFixed(2)} m/s²</td></tr>
        <tr><th>Mass</th><td>${P.mass.toFixed(2)} kg</td></tr>
      </table>
    `;
  }
  if(document.getElementById('reportRuns')){
    if(!runs.list.length){
      document.getElementById('reportRuns').innerHTML = '<div class="small-note">No saved runs yet.</div>';
    } else {
      document.getElementById('reportRuns').innerHTML = runs.list.map(r=>{
        const rows=Object.entries(r.summary||{}).map(([k,v])=>`<tr><th>${k}</th><td>${v}</td></tr>`).join('');
        return `<div style="margin-bottom:8px;border:1px solid #263040;border-radius:4px;padding:6px;">
          <div style="color:${r.color};font-weight:700;margin-bottom:4px;">■ Run ${r.id}</div>
          <table class="kv-table">${rows}</table>
        </div>`;
      }).join('');
    }
  }
  if(document.getElementById('reportTheory')){
    renderTheory();
    const raw=document.getElementById('theoryView').innerHTML || '';
    document.getElementById('reportTheory').innerHTML = raw;
  }
}

// ═══════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════
function switchToTable(){
  document.getElementById('tabTable').classList.add('active');
  document.getElementById('tabGraph').classList.remove('active');
  const theoryTab = document.getElementById('tabTheory');
  const reportTab = document.getElementById('tabReport');
  if(theoryTab) theoryTab.classList.remove('active');
  if(reportTab) reportTab.classList.remove('active');
  document.getElementById('readout').style.display = '';
  document.getElementById('graphWrap').style.display = 'none';
  document.getElementById('theoryView').style.display = 'none';
  document.getElementById('reportView').style.display = 'none';
  graphMode = false;
}

function switchToGraph(){
  document.getElementById('tabTable').classList.remove('active');
  document.getElementById('tabGraph').classList.add('active');
  const theoryTab = document.getElementById('tabTheory');
  const reportTab = document.getElementById('tabReport');
  if(theoryTab) theoryTab.classList.remove('active');
  if(reportTab) reportTab.classList.remove('active');
  document.getElementById('readout').style.display = 'none';
  document.getElementById('graphWrap').style.display = '';
  document.getElementById('theoryView').style.display = 'none';
  document.getElementById('reportView').style.display = 'none';
  graphMode = true;
  refreshSeriesSel();
}

function refreshSeriesSel(){
  if(!active || !active.series) return;
  const sel = document.getElementById('seriesSel');
  const prev = sel.value;
  sel.innerHTML = '';
  const series = active.series();
  series.forEach((s, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = s.label;
    sel.appendChild(o);
  });
  if(prev !== '' && series[+prev]) sel.value = prev;
  graphIdx = +sel.value || 0;
}

function getOverlaySeries(){
  if(!document.getElementById('toggleSavedOverlay').checked) return [];
  const mainLabel = active && active.series ? active.series()[graphIdx]?.label : null;
  return runs.list
    .filter(r => r.vis && r.graphSeries && r.graphSeries[graphIdx])
    .map(r => r.graphSeries[graphIdx]);
}

document.getElementById('tabTable').onclick = switchToTable;
document.getElementById('tabGraph').onclick = switchToGraph;

document.getElementById('seriesSel').onchange = e => {
  graphIdx = +e.target.value || 0;
};

document.getElementById('toggleSavedOverlay').onchange = () => {};

document.getElementById('btnExportGraph').onclick = () => {
  const link = document.createElement('a');
  link.download = 'graph.png';
  link.href = document.getElementById('graphCanvas').toDataURL();
  link.click();
};

document.getElementById('btnStart').onclick = () => {
  if(active) active.start();
};

document.getElementById('btnPause').onclick = () => {
  if(active) active.pause();
};

document.getElementById('btnReset').onclick = () => {
  if(active) active.reset();
};

document.getElementById('btnNew').onclick = () => {
  if(active) active.newRun();
};

document.getElementById('btnSave').onclick = () => {
  if(active) { active.save(); toast('Run saved!'); }
};

(function setupClearAll(){
  const btn = document.getElementById('btnClearAll');
  let confirmTimer = null;
  btn.onclick = () => {
    if(btn.classList.contains('confirm')){
      clearTimeout(confirmTimer);
      btn.classList.remove('confirm');
      runs.list = [];
      runs.next = 1;
      refreshRunList();
      if(active) active.reset();
      toast('All runs cleared');
    } else {
      btn.classList.add('confirm');
      btn.textContent = '🗑 Sure?';
      confirmTimer = setTimeout(() => {
        btn.classList.remove('confirm');
        btn.textContent = '🗑 Clear All';
      }, 2500);
    }
  };
})();

document.getElementById('btnReportFill').onclick = () => {
  fillReportFromCurrent();
  toast('Report filled');
};

window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════
let last=0;
function loop(ts){
  if(!last) last=ts;
  const dt=Math.min(0.05,(ts-last)/1000);
  last=ts;
  if(active){
    active.update(dt);
    active.draw();
    if(document.getElementById('tabTable').classList.contains('active')){
      active.ui();
    } else if(document.getElementById('tabGraph').classList.contains('active') && active.series){
      const s=active.series();
      if(s[graphIdx]) drawGraph(s[graphIdx], getOverlaySeries());
    }
  }
  requestAnimationFrame(loop);
}

activate('projectile');
requestAnimationFrame(loop);
</script>
