<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OpenPhysics Lab — Fixed (Projectile + Pendulum)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
:root {
  --bg:#0E1117; --panel:#161B22; --border:#30363D; --text:#C9D1D9; --text-dim:#8B949E;
  --accent:#58A6FF; --accent-green:#3FB950; --accent-red:#FF6A6A; --accent-gold:#DAA520;
  --font-scale:1.0; --transition-speed:180ms;
}
@media (prefers-reduced-motion: reduce){ :root{ --transition-speed:0ms; } }
body{ margin:0; background:var(--bg); color:var(--text); font-family: JetBrains Mono, ui-monospace, Menlo, Consolas, monospace; font-size: calc(14px*var(--font-scale)); overflow:hidden; }
#toolbar{ position:fixed; top:0; left:0; right:0; height:52px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; gap:10px; z-index:20; }
#toolbar select, #toolbar button{ background:var(--panel); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:4px; cursor:pointer; font-size:calc(14px*var(--font-scale)); min-height:32px; }
#toolbar button:hover, #toolbar select:focus{ outline:2px solid var(--accent); }
#presetToast{ margin-left:auto; color:#9dd1ff; opacity:0; transition: opacity var(--transition-speed) ease; font-size:12px; }
#presetToast.show{ opacity:1; }
#sidePanel{ position:fixed; top:52px; bottom:0; right:0; width:320px; background:var(--panel); border-left:1px solid var(--border); padding:12px; overflow:auto; }
.sectionTitle{ font-size: calc(15px*var(--font-scale)); color:var(--accent); text-transform:uppercase; margin:12px 0 6px; border-bottom:1px solid var(--border); padding-bottom:4px; letter-spacing:0.08em; font-weight:700; }
.seg{ display:flex; gap:6px; }
button.actionBtn{ width:100%; margin-top:8px; padding:10px; background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; font-size: calc(14px*var(--font-scale)); min-height:36px; }
#simCanvas{ position:absolute; left:0; right:320px; top:52px; bottom:0; width:calc(100vw - 320px); height:calc(100vh - 52px); background:var(--bg); }
#readoutGrid .row{ display:flex; justify-content:space-between; font-size: calc(14px*var(--font-scale)); margin:4px 0; }
#readoutGrid .row span:last-child{ font-weight:700; color:var(--accent-green); }
#graphPanel{ background:#0b1220; border:1px solid var(--border); padding:8px; border-radius:6px; }
#graphCanvas{ width:100%; height:240px; display:block; background:#0a0f1a; border:1px solid var(--border); border-radius:4px; }
.labelNote{ color:var(--text-dim); font-size:12px; }
</style>
</head>
<body>
  <div id="toolbar">
    <label for="expSelector">Experiment:</label>
    <select id="expSelector"></select>
    <select id="presetSelect"><option value="">Demo Presets…</option></select>
    <button id="btnStart" class="actionBtn">Start</button>
    <button id="btnPause" class="actionBtn">Pause</button>
    <button id="btnNewRun" class="actionBtn">Start New Run</button>
    <button id="btnResetRun" class="actionBtn">Reset Run</button>
    <button id="btnSaveRun" class="actionBtn">Save Run</button>
    <span id="presetToast" role="status" aria-live="polite"></span>
  </div>

  <div id="sidePanel">
    <div class="sectionTitle">Parameters</div>

    <label>Velocity: <span id="labelVel">25</span> m/s</label>
    <input type="range" id="sliderVel" min="0" max="80" value="25">

    <label>Angle: <span id="labelAng">45</span>°</label>
    <input type="range" id="sliderAng" min="1" max="89" value="45">

    <label>Gravity: <span id="labelGrav">9.81</span> m/s²</label>
    <input type="range" id="sliderGrav" min="0.5" max="20" step="0.01" value="9.81">

    <label>Mass: <span id="labelMass">1.00</span> kg <span class="labelNote">(projectile drag)</span></label>
    <input type="range" id="sliderMass" min="0.1" max="20" step="0.1" value="1.0">

    <div class="sectionTitle">Readouts</div>
    <div style="display:flex; gap:6px; margin-bottom:6px;">
      <button id="btnTableView" class="actionBtn" style="flex:1;">Table</button>
      <button id="btnGraphView" class="actionBtn" style="flex:1;">Graph</button>
    </div>
    <div id="readoutGrid"></div>

    <div id="graphPanel" style="display:none; margin-top:10px;">
      <select id="graphSeriesSelect" style="width:100%; margin-bottom:8px;"></select>
      <canvas id="graphCanvas"></canvas>
    </div>

    <div class="sectionTitle">Run List</div>
    <div id="runList"></div>
  </div>

  <canvas id="simCanvas"></canvas>

  <script type="module">
  // ======= CAMERA =======
  const camera = { x:0, y:0, scale:20, minScale:0.2, maxScale:5 };
  function worldToScreen(x,y,canvas){
    const cx=canvas.width/2, cy=canvas.height/2;
    return { x: cx+(x-camera.x)*camera.scale, y: cy-(y-camera.y)*camera.scale };
  }
  function screenToWorld(px,py,canvas){
    const cx=canvas.width/2, cy=canvas.height/2;
    return { x:(px-cx)/camera.scale + camera.x, y:(cy-py)/camera.scale + camera.y };
  }
  function applyCameraInput(canvas){
    let dragging=false, last={x:0,y:0};
    const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
    function normalizedWheel(e){
      let dy=e.deltaY;
      if(e.deltaMode===1) dy*=16; else if(e.deltaMode===2) dy*=120;
      dy=clamp(dy,-240,240);
      return -Math.sign(dy)*Math.log2(1+Math.abs(dy)/120);
    }
    canvas.addEventListener('wheel', (e)=>{
      e.preventDefault();
      const rect=canvas.getBoundingClientRect();
      const mx=e.clientX-rect.left, my=e.clientY-rect.top;
      const before=screenToWorld(mx,my,canvas);
      const ticks=normalizedWheel(e);
      const base=1.12;
      const zoomBase=e.ctrlKey?1.25:base;
      const factor=Math.pow(zoomBase,ticks);
      const newScale=clamp(camera.scale*factor,camera.minScale,camera.maxScale);
      if(newScale===camera.scale) return;
      camera.scale=newScale;
      const after=screenToWorld(mx,my,canvas);
      camera.x += (before.x - after.x);
      camera.y += (before.y - after.y);
    },{passive:false});
    canvas.addEventListener('mousedown', e=>{ dragging=true; last={x:e.clientX,y:e.clientY}; });
    window.addEventListener('mouseup', ()=> dragging=false);
    canvas.addEventListener('mousemove', e=>{
      if(!dragging) return;
      const dx=(e.clientX-last.x)/camera.scale;
      const dy=(e.clientY-last.y)/camera.scale;
      camera.x-=dx; camera.y+=dy;
      last={x:e.clientX,y:e.clientY};
    });
  }

  // ======= RENDERER =======
  const renderer={
    ctx:null, canvas:null,
    init(c){ this.canvas=c; this.ctx=c.getContext('2d',{alpha:false}); },
    clear(){ this.ctx.fillStyle='#0E1117'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height); },
    line(x1,y1,x2,y2,color='#C9D1D9',w=2){
      const p1=worldToScreen(x1,y1,this.canvas), p2=worldToScreen(x2,y2,this.canvas);
      this.ctx.strokeStyle=color; this.ctx.lineWidth=w;
      this.ctx.beginPath(); this.ctx.moveTo(p1.x,p1.y); this.ctx.lineTo(p2.x,p2.y); this.ctx.stroke();
    },
    ball(x,y,r,color){
      const p=worldToScreen(x,y,this.canvas);
      this.ctx.fillStyle=color; this.ctx.beginPath(); this.ctx.arc(p.x,p.y, Math.max(1,r*camera.scale), 0, Math.PI*2); this.ctx.fill();
    },
    trail(points, style){
      if(points.length<2) return;
      const {color,width=2,dash=null}=style;
      this.ctx.strokeStyle=color; this.ctx.lineWidth=width; this.ctx.setLineDash(dash||[]);
      this.ctx.beginPath();
      const p0=worldToScreen(points[0].x,points[0].y,this.canvas);
      this.ctx.moveTo(p0.x,p0.y);
      for(let i=1;i<points.length;i++){
        const p=worldToScreen(points[i].x,points[i].y,this.canvas);
        this.ctx.lineTo(p.x,p.y);
      }
      this.ctx.stroke(); this.ctx.setLineDash([]);
    },
    text(str,x,y,color='#C9D1D9'){
      const p=worldToScreen(x,y,this.canvas);
      this.ctx.fillStyle=color; this.ctx.font='14px JetBrains Mono, monospace';
      this.ctx.fillText(str, p.x+6, p.y-6);
    }
  };

  // ======= GRAPH (simple) =======
  const graphEngine={
    canvas:null, ctx:null,
    init(canvas){ this.canvas=canvas; this.ctx=canvas.getContext('2d'); this.resizeDPR(); },
    resizeDPR(){
      if(!this.canvas) return;
      const dpr=Math.max(1,Math.floor(window.devicePixelRatio || 1));
      const cssW=this.canvas.clientWidth; const cssH=this.canvas.clientHeight;
      this.canvas.width=Math.floor(cssW*dpr); this.canvas.height=Math.floor(cssH*dpr);
    },
    drawSeries(series){
      const ctx=this.ctx, c=this.canvas;
      ctx.clearRect(0,0,c.width,c.height);
      if(!series || !series.values || series.values.length<2) return;
      const vals=series.values;
      const minT=Math.min(...vals.map(p=>p.t)), maxT=Math.max(...vals.map(p=>p.t));
      let minV=Math.min(...vals.map(p=>p.v)), maxV=Math.max(...vals.map(p=>p.v));
      if(minV===maxV){ minV-=1; maxV+=1; }
      const pad=24, W=c.width, H=c.height;
      const mapT=t=> pad + (t-minT)/((maxT-minT)||1)*(W-2*pad);
      const mapV=v=> H-pad - (v-minV)/((maxV-minV)||1)*(H-2*pad);
      ctx.strokeStyle='#2b3342'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pad, pad); ctx.lineTo(pad, H-pad); ctx.lineTo(W-pad, H-pad); ctx.stroke();
      ctx.strokeStyle='#58A6FF'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(mapT(vals[0].t), mapV(vals[0].v));
      for(let i=1;i<vals.length;i++){ ctx.lineTo(mapT(vals[i].t), mapV(vals[i].v)); }
      ctx.stroke();
      ctx.fillStyle='#8B949E'; ctx.font='12px JetBrains Mono, monospace';
      ctx.fillText(series.label || 'Series', pad, pad-6);
    }
  };

  // ======= RUN MANAGER =======
  const runManager={
    runs:[], nextId:1,
    saveRun(points,params,stats,style){
      const run={ id:this.nextId++, points:structuredClone(points), params:structuredClone(params),
                  stats:structuredClone(stats), visible:true, style:structuredClone(style) };
      this.runs.push(run); return run;
    },
    toggleVisibility(id){ const r=this.runs.find(x=>x.id===id); if(r) r.visible=!r.visible; },
    deleteRun(id){ this.runs=this.runs.filter(r=>r.id!==id); },
    getStats(points){
      if(!points.length) return {maxH:0,range:0,duration:0};
      let minX=Infinity,maxX=-Infinity,maxY=-Infinity;
      for(const p of points){ if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.y>maxY)maxY=p.y; }
      const last=points[points.length-1];
      return { maxH:maxY, range:(maxX-minX), duration:last.t };
    }
  };

  // ======= UI WORKBENCH =======
  const el={
    labelVel:document.getElementById('labelVel'),
    labelAng:document.getElementById('labelAng'),
    labelGrav:document.getElementById('labelGrav'),
    labelMass:document.getElementById('labelMass'),
    sliderVel:document.getElementById('sliderVel'),
    sliderAng:document.getElementById('sliderAng'),
    sliderGrav:document.getElementById('sliderGrav'),
    sliderMass:document.getElementById('sliderMass'),
    btnStart:document.getElementById('btnStart'),
    btnPause:document.getElementById('btnPause'),
    btnNewRun:document.getElementById('btnNewRun'),
    btnResetRun:document.getElementById('btnResetRun'),
    btnSaveRun:document.getElementById('btnSaveRun'),
    expSelector:document.getElementById('expSelector'),
    presetSelect:document.getElementById('presetSelect'),
    readoutGrid:document.getElementById('readoutGrid'),
    runList:document.getElementById('runList'),
    btnTableView:document.getElementById('btnTableView'),
    btnGraphView:document.getElementById('btnGraphView'),
    graphPanel:document.getElementById('graphPanel'),
    graphSeriesSelect:document.getElementById('graphSeriesSelect'),
    presetToast:document.getElementById('presetToast')
  };
  const paramsUI={ v0:25, angle:45*Math.PI/180, g:9.81, mass:1.0 };
  el.sliderVel.oninput=()=>{ paramsUI.v0=+el.sliderVel.value; el.labelVel.textContent=paramsUI.v0; };
  el.sliderAng.oninput=()=>{ const d=+el.sliderAng.value; paramsUI.angle=d*Math.PI/180; el.labelAng.textContent=d; };
  el.sliderGrav.oninput=()=>{ paramsUI.g=+el.sliderGrav.value; el.labelGrav.textContent=paramsUI.g.toFixed(2); };
  el.sliderMass.oninput=()=>{ paramsUI.mass=+el.sliderMass.value; el.labelMass.textContent=paramsUI.mass.toFixed(2); };

  function bindRunButtons(getActive){
    el.btnStart.onclick = ()=> getActive()?.startRun?.(paramsUI);
    el.btnPause.onclick = ()=> getActive()?.pauseRun?.();
    el.btnNewRun.onclick = ()=> getActive()?.startNewRun?.(paramsUI);
    el.btnResetRun.onclick = ()=> getActive()?.resetRun?.(paramsUI,{recenter:true});
    el.btnSaveRun.onclick = ()=> getActive()?.saveCurrentRun?.();
  }
  function updateReadout(map){
    el.readoutGrid.innerHTML = Object.entries(map).map(([k,v]) =>
      `<div class="row"><span>${k}</span><span>${v}</span></div>`).join('');
  }
  function refreshRunList(){
    el.runList.innerHTML='';
    for(const run of runManager.runs){
      const row=document.createElement('div');
      row.style.display='flex'; row.style.justifyContent='space-between'; row.style.margin='4px 0';
      row.innerHTML=`<span>Run ${run.id}</span>
      <div>
        <button class="visToggle" data-id="${run.id}">${run.visible?'👁':'🙈'}</button>
        <button class="delRun" data-id="${run.id}">✖</button>
      </div>`;
      row.querySelector('.visToggle').onclick=()=>{ runManager.toggleVisibility(run.id); refreshRunList(); };
      row.querySelector('.delRun').onclick=()=>{ runManager.deleteRun(run.id); refreshRunList(); };
      el.runList.appendChild(row);
    }
  }
  function populateGraphSeries(seriesList){
    el.graphSeriesSelect.innerHTML = ((seriesList)||[]).map((s,i)=>`<option value="${i}">${s.label}</option>`).join('');
  }
  // Preset helpers
  let __presetHandler = null;
  function setPresets(options){
    const sel = el.presetSelect;
    sel.innerHTML = '<option value="">Demo Presets…</option>' +
      (options||[]).map(o=>`<option value="${o.index}">${o.label}</option>`).join('');
  }
  function onPresetChange(handler){
    __presetHandler = (idx)=> handler && handler(idx);
    el.presetSelect.onchange = (e)=>{
      const v = e.target.value;
      if (v === "") return;
      const i = parseInt(v,10);
      if (!Number.isNaN(i) && __presetHandler) __presetHandler(i);
      e.target.value = "";
    };
  }
  function setSlidersFromParams(p){
    if (typeof p.v0 === 'number'){ el.sliderVel.value=p.v0; el.labelVel.textContent=p.v0; }
    if (typeof p.angle === 'number'){ const deg=Math.round(p.angle*180/Math.PI); el.sliderAng.value=Math.max(1,Math.min(89,deg)); el.labelAng.textContent=deg; }
    if (typeof p.g === 'number'){ el.sliderGrav.value=p.g; el.labelGrav.textContent=p.g.toFixed(2); }
    if (typeof p.mass === 'number'){ el.sliderMass.value=p.mass; el.labelMass.textContent=p.mass.toFixed(2); }
  }

  // ======= PLUGIN RUNTIME (registry) =======
  const OPL=(function(){
    const registry=new Map();
    function registerExperiment(id,factory,meta){
      registry.set(id,{id,factory,meta});
      ensureOption(id, meta?.label||id);
      document.dispatchEvent(new CustomEvent('opl:registered', { detail:{ id, meta } }));
    }
    function ensureOption(id,label){
      const sel=el.expSelector;
      if(![...sel.options].some(o=>o.value===id)){
        const opt=document.createElement('option'); opt.value=id; opt.textContent=label; sel.appendChild(opt);
      }
    }
    function deps(){ return { renderer, camera, runManager, ui:{ paramsUI, setPresets, onPresetChange, setSlidersFromParams, updateReadout, refreshRunList, populateGraphSeries }, el }; }
    function _create(id){ const rec=registry.get(id); return rec ? rec.factory(deps()) : null; }
    function _meta(id){ return registry.get(id)?.meta || {}; }
    function _all(){ return [...registry.values()].map(r=>({id:r.id, meta:r.meta})); }
    return { registerExperiment, _create, _meta, _all };
  })();

  // ======= EXPERIMENT: PROJECTILE (with drag) =======
  const RHO_AIR=1.225, CD=0.47, RHO_OBJ=800;
  function dragK(mass){ const r=Math.pow((3*mass)/(4*Math.PI*RHO_OBJ),1/3); const A=Math.PI*r*r; return (0.5*RHO_AIR*CD*A)/mass; }
  function ProjectileExperiment(){
    this.running=false; this.paused=false; this.points=[]; this.params={...paramsUI};
    this.t=0; this.x=0; this.y=0; this.vx=0; this.vy=0;
  }
  ProjectileExperiment.prototype._style=function(){ return { color:'#58A6FF', width:2 }; };
  ProjectileExperiment.prototype._seed=function(){ const p=this.params; this.x=0; this.y=0; this.vx=p.v0*Math.cos(p.angle); this.vy=p.v0*Math.sin(p.angle); };
  ProjectileExperiment.prototype.startRun=function(p){ if(this.running && !this.paused) return; this.params={...p}; if(this.paused){ this.paused=false; this.running=true; return; } this.points=[]; this.t=0; this.running=true; this.paused=false; this._seed(); };
  ProjectileExperiment.prototype.pauseRun=function(){ this.paused=true; this.running=false; };
  ProjectileExperiment.prototype.startNewRun=function(p){ this.params={...p}; this.points=[]; this.t=0; this.running=true; this.paused=false; this._seed(); };
  ProjectileExperiment.prototype.resetRun=function(p){ this.params={...p}; this.points=[]; this.t=0; this.running=false; this.paused=false; this._seed(); };
  ProjectileExperiment.prototype.saveCurrentRun=function(){ if(this.points.length<2) return; const stats=runManager.getStats(this.points); runManager.saveRun(this.points,this.params,stats,this._style()); };
  ProjectileExperiment.prototype.update=function(dt){ if(!this.running || this.paused) return; const p=this.params; this.t+=dt; const k=dragK(p.mass); const v=Math.hypot(this.vx,this.vy); const ax=-k*v*this.vx; const ay=-p.g - k*v*this.vy; this.vx+=ax*dt; this.vy+=ay*dt; this.x+=this.vx*dt; this.y+=this.vy*dt; this.points.push({t:this.t,x:this.x,y:this.y,vx:this.vx,vy:this.vy}); if(this.y<=0 && this.t>0.05){ this.running=false; this.paused=false; this.saveCurrentRun(); } };
  ProjectileExperiment.prototype.draw=function(){ renderer.clear(); renderer.line(-500,0,500,0,'#8B949E',2); renderer.trail(this.points,this._style()); renderer.ball(this.x,this.y,0.15,'#58A6FF'); };
  ProjectileExperiment.prototype.updateUI=function(){ const speed=Math.hypot(this.vx,this.vy); updateReadout({ Time:this.t.toFixed(2)+' s', X:this.x.toFixed(2)+' m', Y:this.y.toFixed(2)+' m', Speed:speed.toFixed(2)+' m/s' }); };
  ProjectileExperiment.prototype.getReportSeries=function(){ return { table:{ Time:this.t.toFixed(2)+' s', X:this.x.toFixed(2)+' m', Y:this.y.toFixed(2)+' m' }, graph:[ {label:'X Position', values:this.points.map(p=>({t:p.t,v:p.x}))}, {label:'Y Position', values:this.points.map(p=>({t:p.t,v:p.y}))}, {label:'Speed', values:this.points.map(p=>({t:p.t,v:Math.hypot(p.vx,p.vy)}))} ] }; };

  OPL.registerExperiment('projectile', ()=> new ProjectileExperiment(), {
    label:'Projectile',
    presets:[
      {label:'Classic 45°', p:{ v0:40, angleDeg:45, g:9.81, mass:2.0 }},
      {label:'Moon Gravity', p:{ v0:25, angleDeg:45, g:1.62, mass:1.0 }}
    ],
    camera:{x:0,y:0,scale:20},
    autoStart:true
  });

  // ======= EXPERIMENT: PENDULUM =======
  function PendulumExperiment(){
    this.running=false; this.paused=false; this.points=[];
    this.params={ v0:0, angle:30*Math.PI/180, g:9.81 };
    this.L=2.0; this.damping=0.04;
    this.pivot={x:0,y:1.5};
    this.t=0; this.theta=this.params.angle; this.omega=0; this.settleTimer=0;
  }
  PendulumExperiment.prototype._style=function(){ return { color:'#DAA520', width:2 }; };
  PendulumExperiment.prototype._bob=function(){ return { x:this.pivot.x + this.L*Math.sin(this.theta), y:this.pivot.y - this.L*Math.cos(this.theta) }; };
  PendulumExperiment.prototype._rk4=function(dt){ const g=this.params.g, L=this.L, b=this.damping; const f=(th,om)=> (-(g/L)*Math.sin(th) - b*om); const th=this.theta, om=this.omega; const k1_th=om; const k1_om=f(th,om); const k2_th=om+0.5*dt*k1_om; const k2_om=f(th+0.5*dt*k1_th, om+0.5*dt*k1_om); const k3_th=om+0.5*dt*k2_om; const k3_om=f(th+0.5*dt*k2_th, om+0.5*dt*k2_om); const k4_th=om+dt*k3_om; const k4_om=f(th+dt*k3_th, om+dt*k3_om); this.theta+=(dt/6)*(k1_th+2*k2_th+2*k3_th+k4_th); this.omega+=(dt/6)*(k1_om+2*k2_om+2*k3_om+k4_om); };
  PendulumExperiment.prototype.startRun=function(params){ if(this.running && !this.paused) return; this.params={...params}; if(this.paused){ this.paused=false; this.running=true; return; } this.running=true; this.paused=false; this.t=0; this.points=[]; this.theta=this.params.angle; this.omega=(this.L>0? this.params.v0/this.L:0); this.settleTimer=0; };
  PendulumExperiment.prototype.pauseRun=function(){ this.running=false; this.paused=true; };
  PendulumExperiment.prototype.startNewRun=function(p){ this.params={...p}; this.running=true; this.paused=false; this.t=0; this.points=[]; this.theta=this.params.angle; this.omega=(this.L>0? this.params.v0/this.L:0); this.settleTimer=0; };
  PendulumExperiment.prototype.resetRun=function(p){ this.params={...p}; this.running=false; this.paused=false; this.t=0; this.points=[]; this.theta=this.params.angle; this.omega=(this.L>0? this.params.v0/this.L:0); this.settleTimer=0; };
  PendulumExperiment.prototype.saveCurrentRun=function(){ if(this.points.length<5) return; const stats=this._computeStats(); runManager.saveRun(this.points,this.params,stats,this._style()); };
  PendulumExperiment.prototype._computeStats=function(){ if(!this.points.length) return {maxH:0,range:0,duration:0}; let minX=Infinity,maxX=-Infinity,maxY=-Infinity; for(const p of this.points){ if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.y>maxY)maxY=p.y; } const last=this.points[this.points.length-1]; return { maxH:maxY, range:(maxX-minX), duration:last.t }; };
  PendulumExperiment.prototype.update=function(dt){ if(!this.running || this.paused) return; const step=Math.min(0.02,dt); this.t+=step; this._rk4(step); const pos=this._bob(); this.points.push({ t:this.t, x:pos.x, y:pos.y, theta:this.theta, omega:this.omega }); const lowEnergy=(Math.abs(this.omega)<0.01 && Math.abs(this.theta)<0.01); this.settleTimer = lowEnergy ? (this.settleTimer+step) : 0; if(this.settleTimer>3.0){ this.running=false; this.paused=false; this.saveCurrentRun(); } };
  PendulumExperiment.prototype.draw=function(){ renderer.clear(); renderer.ball(this.pivot.x,this.pivot.y,0.06,'#C9D1D9'); if(this.points.length){ const last=this.points[this.points.length-1]; renderer.line(this.pivot.x,this.pivot.y,last.x,last.y,'#8B949E',2); } renderer.trail(this.points,this._style()); if(this.points.length){ const last=this.points[this.points.length-1]; renderer.ball(last.x,last.y,0.12,'#DAA520'); } };
  PendulumExperiment.prototype.updateUI=function(){ const m=1, g=this.params.g, L=this.L; const yLowest=this.pivot.y-L; const bob=this._bob(); const h=bob.y-yLowest; const v=Math.abs(this.omega)*L; const PE=m*g*h, KE=0.5*m*v*v, E=PE+KE; updateReadout({ Time:this.t.toFixed(2)+' s', 'θ':(this.theta*180/Math.PI).toFixed(1)+' °', 'ω':this.omega.toFixed(3)+' rad/s', Speed:v.toFixed(2)+' m/s', Energy:E.toFixed(2)+' J' }); };
  PendulumExperiment.prototype.getReportSeries=function(){ return { table:{ Time:this.t.toFixed(2)+' s', Theta:(this.theta*180/Math.PI).toFixed(1)+' °', Omega:this.omega.toFixed(3)+' rad/s' }, graph:[ {label:'Angle (θ, rad)', values:this.points.map(p=>({t:p.t,v:p.theta}))}, {label:'Omega (ω, rad/s)', values:this.points.map(p=>({t:p.t,v:p.omega}))} ] }; };

  OPL.registerExperiment('pendulum', ()=> new PendulumExperiment(), {
    label:'Pendulum',
    presets:[
      {label:'Small Angle — Ideal', p:{ L:2.0, angleDeg:15, g:9.81, damping:0, v0:0 }},
      {label:'Large Angle (90°)', p:{ L:1.5, angleDeg:90, g:9.81, damping:0, v0:0 }},
      {label:'Overdamped', p:{ L:1.0, angleDeg:45, g:9.81, damping:1.8, v0:0 }}
    ],
    camera:{x:0,y:0,scale:20},
    autoStart:true
  });

  // ======= PRESETS HELPERS =======
  function buildPresetOptions(meta){ const presets=(meta?.presets)||[]; return presets.map((p,i)=>({label:p.label,index:i})); }
  function applyPreset(meta,index,paramsUI){ const conf=((meta?.presets)||[])[index]; if(!conf) return null; const p=conf.p||{}; if(p.v0!=null) paramsUI.v0=p.v0; if(p.angleDeg!=null) paramsUI.angle=p.angleDeg*Math.PI/180; if(p.g!=null) paramsUI.g=p.g; if(p.mass!=null) paramsUI.mass=p.mass; const extras={}; for(const k of ['L','damping','k','m','c','x0','muS','muK','mode']){ if(p[k]!=null) extras[k]=p[k]; } return { paramsUI, extras, label:conf.label }; }

  // ======= MAIN =======
  const canvas=document.getElementById('simCanvas');
  const graphCanvas=document.getElementById('graphCanvas');
  function resizeCanvasDPR(){ const dpr=Math.max(1,Math.floor(window.devicePixelRatio || 1)); const cssW=window.innerWidth-320, cssH=window.innerHeight-52; canvas.width=Math.floor(cssW*dpr); canvas.height=Math.floor(cssH*dpr); canvas.style.width=cssW+'px'; canvas.style.height=cssH+'px'; }
  function resizeGraphCanvasDPR(){ graphEngine.resizeDPR(); }
  resizeCanvasDPR(); window.addEventListener('resize', ()=>{ resizeCanvasDPR(); resizeGraphCanvasDPR(); });
  renderer.init(canvas); applyCameraInput(canvas); graphEngine.init(graphCanvas);
  window.__graphEngine = graphEngine; window.__graphActive=false; window.__graphSeriesIndex=0;

  let __activeExperiment = null;
  function rebuildExperimentSelector(){ const all=OPL._all(); el.expSelector.innerHTML=''; for(const {id,meta} of all){ const opt=document.createElement('option'); opt.value=id; opt.textContent=meta?.label||id; el.expSelector.appendChild(opt); } }
  function switchToTable(){ el.readoutGrid.style.display=''; el.graphPanel.style.display='none'; window.__graphActive=false; }
  function switchToGraph(){ const exp=__activeExperiment; if(!exp||!exp.getReportSeries) return; const series=(exp.getReportSeries().graph) || []; populateGraphSeries(series); el.readoutGrid.style.display='none'; el.graphPanel.style.display=''; window.__graphActive=true; window.__graphSeriesIndex=0; if(series[0]) graphEngine.drawSeries(series[0]); }
  el.btnTableView.onclick = switchToTable; el.btnGraphView.onclick = switchToGraph; el.graphSeriesSelect.onchange = (e)=>{ window.__graphSeriesIndex = +e.target.value; };

  document.addEventListener('opl:registered', ()=>{ rebuildExperimentSelector(); if(!__activeExperiment){ const first=OPL._all()[0]?.id; if(first) activate(first); } });

  function activate(id){ const exp=OPL._create(id); if(!exp) return; __activeExperiment=exp; const meta=OPL._meta(id); if(meta?.camera){ camera.x=meta.camera.x??0; camera.y=meta.camera.y??0; camera.scale=meta.camera.scale??20; } if(id==='pendulum'){ paramsUI.v0=0; } exp.resetRun?.(paramsUI,{recenter:true}); const opts=buildPresetOptions(meta); setPresets(opts); onPresetChange((index)=>{ const res=applyPreset(meta,index,paramsUI); if(!res) return; setSlidersFromParams(paramsUI); if(res.extras) Object.assign(paramsUI,res.extras); exp.resetRun?.(paramsUI,{recenter:true}); if(meta?.autoStart) exp.startRun?.(paramsUI); el.presetToast.textContent = `Loaded: ${res.label}`; el.presetToast.classList.add('show'); setTimeout(()=> el.presetToast.classList.remove('show'), 1200); if(window.__graphActive) switchToGraph(); }); if(meta?.autoStart) exp.startRun?.(paramsUI); refreshRunList(); switchToTable(); }

  rebuildExperimentSelector(); el.expSelector.onchange = ()=> activate(el.expSelector.value); const first=OPL._all()[0]?.id; if(first) activate(first);

  // animation loop
  let last=0; function loop(t){ if(!last) last=t; const dt=Math.min(0.05,(t-last)/1000); last=t; if(__activeExperiment){ __activeExperiment.update?.(dt); __activeExperiment.draw?.(); __activeExperiment.updateUI?.(); } if(window.__graphActive){ const exp=__activeExperiment; if(exp && exp.getReportSeries){ const list=(exp.getReportSeries().graph) || []; const idx=(window.__graphSeriesIndex || 0); const s=list[idx]; if(window.__graphEngine && s) window.__graphEngine.drawSeries(s); } } requestAnimationFrame(loop); }
  bindRunButtons(()=>__activeExperiment); requestAnimationFrame(loop);
  </script>
</body>
</html>
