<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hot Take Debate Generator</title>

<style>
    body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 30px;
        overflow-x: hidden;
    }

    h1 {
        color: #ffcc00;
        font-size: 3rem;
        margin-bottom: 25px;
    }

    /* TIMER BAR */
    #timerBarContainer {
        width: 90%;
        max-width: 1000px;
        height: 25px;
        background: #333;
        border-radius: 12px;
        margin: 0 auto 20px auto;
        overflow: hidden;
    }

    #timerBar {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #33ff66, #ffcc00, #ff3300);
        transition: width 0.1s linear;
    }

    /* BIG HOT TAKE BOX */
    #hotTakeBox {
        margin: 20px auto;
        padding: 60px;
        width: 90%;
        max-width: 1100px;
        min-height: 240px;
        background: #222;
        border-radius: 20px;
        font-size: 2.6rem;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1.3;
    }

    /* RANDOM END ANIMATIONS */
    .flashWhite { animation: flashWhite 0.5s ease; }
    @keyframes flashWhite {
        0% { background: white; color: black; }
        100% { background: #222; color: white; }
    }

    .flashRed { animation: flashRed 0.5s ease; }
    @keyframes flashRed {
        0% { background: #ff0000; }
        100% { background: #222; }
    }

    .pulse { animation: pulse 0.6s ease; }
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); }
        100% { transform: scale(1); }
    }

    .glowBurst { animation: glowBurst 1s ease; }
    @keyframes glowBurst {
        0% { box-shadow: 0 0 60px #ffcc00; }
        100% { box-shadow: none; }
    }

    .bounce { animation: bounce 0.6s ease; }
    @keyframes bounce {
        0% { transform: translateY(0); }
        40% { transform: translateY(-25px); }
        100% { transform: translateY(0); }
    }

    .category-btn {
        padding: 12px 25px;
        margin: 8px;
        font-size: 1.2rem;
        font-weight: bold;
        border: none;
        border-radius: 10px;
        background: #ffcc00;
        cursor: pointer;
    }

    #moveCue {
        margin-top: 15px;
        font-size: 2rem;
        font-weight: bold;
        display: none;
        animation: flashText 1s infinite;
    }

    @keyframes flashText {
        0% { color: #ff5555; }
        50% { color: #55ff55; }
        100% { color: #ff5555; }
    }

    #timer {
        font-size: 3rem;
        margin-top: 10px;
        display: none;
        font-weight: bold;
    }

    #modeIndicator {
        margin-top: 10px;
        font-size: 1.3rem;
        color: #00eaff;
    }

    #historyBox {
        margin-top: 30px;
        padding: 20px;
        width: 80%;
        max-width: 700px;
        background: #1a1a1a;
        border-radius: 10px;
        text-align: left;
    }

    #historyBox h2 { color: #ffcc00; text-align: center; }

    ul { list-style: none; padding: 0; }
    li {
        margin: 5px 0;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
    }
</style>
</head>
<body>

<h1>🔥 Hot Take Debate Generator 🔥</h1>

<!-- TIMER BAR ABOVE HOT TAKE -->
<div id="timerBarContainer"><div id="timerBar"></div></div>

<!-- HOT TAKE BOX -->
<div id="hotTakeBox">Select a category to begin!</div>

<!-- TIMER BELOW -->
<div id="timer"></div>

<!-- Movement Cue -->
<div id="moveCue">➡️ MOVE: AGREE or DISAGREE! ⬅️</div>

<!-- Category Buttons -->
<div>
    <button class="category-btn" onclick="newHotTake('gameplay')">Gameplay</button>
    <button class="category-btn" onclick="newHotTake('graphics')">Graphics & Art</button>
    <button class="category-btn" onclick="newHotTake('sound')">Sound & Audio</button>
    <button class="category-btn" onclick="newHotTake('narrative')">Narrative</button>
    <button class="category-btn" onclick="newHotTake('experience')">Player Experience</button>
    <button class="category-btn" onclick="newHotTake('culture')">Culture</button>
    <button class="category-btn" onclick="newHotTake('all')">Random</button>
</div>

<!-- Modes -->
<div style="margin-top:20px;">
    <button class="category-btn" onclick="setMode('content')">Content Mode</button>
    <button class="category-btn" onclick="setMode('games')">Game Mode</button>
    <button class="category-btn" onclick="endTimer()">⏹ End Timer</button>
</div>

<div id="modeIndicator">Content Mode ACTIVE</div>

<div id="historyBox">
    <h2>🕒 Recent Hot Takes</h2>
    <ul id="historyList"></ul>
</div>

<script>
// ===============================
// SOUND EFFECTS
// ===============================
function playSound(name) {
    const sounds = {
        reveal: "timer.mp3",
        ding: "ding.mp3",
        ping: "ping.mp3",
        airhorn: "horn.mp3"
    };

    const file = sounds[name];
    if (!file) return;

    const audio = new Audio(file);
    audio.volume = 0.9;
    audio.play();
}

// ===============================
// HOT TAKE DATABASES
// ===============================
const contentTakes = {
    gameplay: [
        "A game must teach its mechanics without words.",
        "Bad controls are unforgivable.",
        "Open-world games are too big and too empty.",
        "Repetitive gameplay is a design failure.",
        "If the core loop isn’t fun, nothing else matters."
    ],
    graphics: [
        "Art style matters more than realism.",
        "If players can’t read the screen, the art direction failed.",
        "Visual clutter ruins games.",
        "Animation quality beats texture quality.",
        "A memorable silhouette is more important than detail."
    ],
    sound: [
        "Sound creates immersion more than visuals.",
        "Silence is an underrated design tool.",
        "Bad mixing destroys emotional moments.",
        "Sound effects teach players faster than tutorials.",
        "Music should adapt to gameplay."
    ],
    narrative: [
        "Environmental storytelling beats cutscenes.",
        "Ambiguity makes stories stronger.",
        "Player choice in games is often an illusion.",
        "Theme matters more than plot.",
        "Too much story can ruin pacing."
    ],
    experience: [
        "Frustration is part of good design.",
        "Discovery matters more than rewards.",
        "Failure is the best teacher.",
        "Players want freedom but also structure.",
        "Reward systems manipulate players."
    ],
    culture: [
        "Games are the most important art form of this century.",
        "Remakes replace original ideas.",
        "Accessibility should be required.",
        "Microtransactions are a design problem.",
        "Indie games push creativity more than AAA games."
    ]
};

const gameTakes = {
    gameplay: [
        "Mario platforming still beats most modern games.",
        "Skyrim relies on mods more than gameplay.",
        "Call of Duty repeats the same formula every year.",
        "Minecraft is the best sandbox ever.",
        "Portal proves shorter games can be better."
    ],
    graphics: [
        "Wind Waker aged better than realism-heavy games.",
        "Pixel art aged better than early 3D.",
        "Overwatch has iconic character designs.",
        "Realistic graphics age poorly.",
        "Some beloved games launched looking outdated."
    ],
    sound: [
        "Halo has one of the greatest soundtracks ever.",
        "Horror relies more on sound than visuals.",
        "Iconic game SFX are more memorable than music.",
        "Sound can make exploration emotional.",
        "Games depend heavily on directional sound cues."
    ],
    narrative: [
        "Classic RPG stories beat many modern ones.",
        "Some games tell deeper stories than big-budget titles.",
        "The best horror games rely on psychology, not plot.",
        "Some simple games have powerful narratives.",
        "Certain RPGs changed storytelling forever."
    ],
    experience: [
        "Challenge makes victory meaningful.",
        "Some games perfect flow state.",
        "Simple games remain satisfying.",
        "Freedom often undermines meaning.",
        "Some games are more fun to watch than play."
    ],
    culture: [
        "One sandbox game shaped an entire generation.",
        "One battle royale defined the 2010s.",
        "MMOs peaked early.",
        "Nostalgia drives gaming culture.",
        "Cartoon-style games age better than realistic ones."
    ]
};

contentTakes.all = Object.values(contentTakes).flat();
gameTakes.all = Object.values(gameTakes).flat();

// MODE
let MODE = "content";
let history = [];

// TIMER
let timerInterval = null;
let timerAudio = null;

// ===============================
// MODE SWITCHER
// ===============================
function setMode(mode) {
    MODE = mode;
    playSound("ping");
    document.getElementById("modeIndicator").innerText =
        mode === "content" ? "Content Mode ACTIVE" : "Game Mode ACTIVE";
}

// ===============================
// RANDOM END ANIMATION
// ===============================
function triggerRandomEndAnimation() {
    const animations = ["flashWhite", "flashRed", "pulse", "glowBurst", "bounce"];
    const chosen = animations[Math.floor(Math.random() * animations.length)];

    const box = document.getElementById("hotTakeBox");
    box.classList.add(chosen);

    setTimeout(() => {
        box.classList.remove(chosen);
    }, 900);
}

// ===============================
// HOT TAKE GENERATOR
// ===============================
function newHotTake(category) {
    playSound("reveal");

    const set = MODE === "content" ? contentTakes : gameTakes;
    const list = category === "all" ? set.all : set[category];

    const chosen = list[Math.floor(Math.random() * list.length)];

    document.getElementById("hotTakeBox").innerText = chosen;

    document.getElementById("moveCue").style.display = "block";

    startTimer(30);

    history.unshift(chosen);
    if (history.length > 5) history.pop();
    updateHistory();
}

// ===============================
// TIMER (BAR + NUMBER)
// ===============================
function startTimer(seconds) {
    const timerText = document.getElementById("timer");
    const bar = document.getElementById("timerBar");

    timerText.style.display = "block";
    timerText.innerText = seconds;

    // Stop old audio
    if (timerAudio) {
        timerAudio.pause();
        timerAudio.currentTime = 0;
    }

    // Start long timer sound
    timerAudio = new Audio("timer.mp3");
    timerAudio.volume = 0.8;
    timerAudio.play();

    setTimeout(() => {
        if (timerAudio) timerAudio.pause();
    }, 28000);

    let time = seconds;

    clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        time--;
        timerText.innerText = time;

        // Update bar width
        const percent = (time / seconds) * 100;
        bar.style.width = percent + "%";

        if (time <= 0) {
            clearInterval(timerInterval);

            timerText.innerText = "GO!";
            playSound("ding");
            triggerRandomEndAnimation();

            bar.style.width = "0%";
        }
    }, 1000);
}

// ===============================
// END TIMER MANUALLY
// ===============================
function endTimer() {
    if (timerInterval) clearInterval(timerInterval);
    if (timerAudio) timerAudio.pause();

    playSound("ding");
    triggerRandomEndAnimation();

    document.getElementById("timerBar").style.width = "0%";
    document.getElementById("timer").innerText = "GO!";
}

// ===============================
// HISTORY DISPLAY
// ===============================
function updateHistory() {
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    history.forEach(item => {
        const li = document.createElement("li");
        li.innerText = item;
        list.appendChild(li);
    });
}
</script>
</body>
</html>
