<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hot Take Debate Generator</title>

<style>
    body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
    }

    h1 {
        color: #ffcc00;
        font-size: 2.5rem;
        margin-bottom: 25px;
    }

    #hotTakeBox {
        margin: 20px auto;
        padding: 40px;
        width: 80%;
        max-width: 900px;
        min-height: 180px;
        background: #222;
        border-radius: 12px;
        font-size: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.4s ease;
    }

    /* 🔥 Shake + Glow animation */
    .reveal-animation {
        animation: shake 0.5s ease, glow 1s ease;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-12px); }
        40% { transform: translateX(12px); }
        60% { transform: translateX(-8px); }
        80% { transform: translateX(8px); }
    }

    @keyframes glow {
        0% { box-shadow: 0 0 0px #ffcc00; }
        100% { box-shadow: 0 0 40px #ffcc00; }
    }

    .category-btn {
        padding: 12px 25px;
        margin: 10px;
        font-size: 1.2rem;
        font-weight: bold;
        border: none;
        border-radius: 10px;
        background: #ffcc00;
        cursor: pointer;
        transition: 0.2s;
    }

    .category-btn:hover {
        background: #e6b800;
    }

    /* 🚨 AGREE / DISAGREE Movement Cue */
    #moveCue {
        margin-top: 20px;
        font-size: 2rem;
        font-weight: bold;
        display: none;
        animation: flash 1s infinite;
    }

    @keyframes flash {
        0% { color: #ff5555; }
        50% { color: #55ff55; }
        100% { color: #ff5555; }
    }

    /* Countdown Timer */
    #timer {
        font-size: 2.5rem;
        margin-top: 20px;
        display: none;
        color: #00eaff;
    }

    #modeIndicator {
        margin-top: 10px;
        font-size: 1.3rem;
        color: #00eaff;
    }

    #historyBox {
        margin-top: 30px;
        padding: 20px;
        width: 70%;
        max-width: 700px;
        background: #1a1a1a;
        border-radius: 10px;
        font-size: 1.2rem;
        text-align: left;
        margin-left: auto;
        margin-right: auto;
    }

    #historyBox h2 {
        color: #ffcc00;
    }

    ul {
        list-style: none;
        padding: 0;
    }
    li {
        margin: 5px 0;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
    }
</style>
</head>
<body>

<h1>🔥 Hot Take Debate Generator 🔥</h1>

<div id="hotTakeBox">Select a category to begin!</div>

<!-- Category Buttons -->
<div>
    <button class="category-btn" onclick="newHotTake('gameplay')">Gameplay</button>
    <button class="category-btn" onclick="newHotTake('graphics')">Graphics & Art</button>
    <button class="category-btn" onclick="newHotTake('sound')">Sound & Audio</button>
    <button class="category-btn" onclick="newHotTake('narrative')">Narrative & Lore</button>
    <button class="category-btn" onclick="newHotTake('experience')">Player Experience</button>
    <button class="category-btn" onclick="newHotTake('culture')">Culture & Industry</button>
    <button class="category-btn" onclick="newHotTake('all')">Random From All</button>
</div>

<!-- Mode Toggle -->
<div style="margin-top:20px;">
    <button class="category-btn" onclick="setMode('content')">Content Mode</button>
    <button class="category-btn" onclick="setMode('games')">Game Mode</button>
</div>

<div id="modeIndicator">Content Mode ACTIVE</div>

<div id="moveCue">➡️ MOVE: AGREE or DISAGREE! ⬅️</div>
<div id="timer"></div>

<div id="historyBox">
    <h2>🕒 Recent Hot Takes</h2>
    <ul id="historyList"></ul>
</div>

<script>
// ===============================
// 🔊 SOUND EFFECTS (using your exact filenames)
// ===============================
function playSound(name) {
    let file = "";

    switch (name) {
        case "reveal":
            file = "timer.mp3";   // dramatic reveal
            break;

        case "ding":
            file = "ding.mp3";    // countdown finish
            break;

        case "ping":
            file = "ping.mp3";    // UI ping
            break;

        case "airhorn":
            file = "horn.mp3";    // chaos mode
            break;

        default:
            return;
    }

    const audio = new Audio(file);
    audio.volume = 0.9;
    audio.play();
}

// ===============================
// 🔥 CONTENT HOT TAKES
// ===============================
const contentTakes = {
    gameplay: [
        "A game must teach its mechanics without words.",
        "Bad controls are unforgivable, no matter what.",
        "Open-world games are too big and too empty.",
        "Repetitive gameplay is a design failure.",
        "If the core loop isn’t fun, the game cannot be saved."
    ],
    graphics: [
        "Art style matters more than graphic fidelity.",
        "If you can’t read the screen, the art direction has failed.",
        "Visual clutter is the worst kind of bad design.",
        "Animation quality matters more than texture quality.",
        "A memorable silhouette is more important than detail."
    ],
    sound: [
        "Sound design is more important than visuals for immersion.",
        "Music should adapt to what the player is doing.",
        "Silence is an underrated design tool.",
        "Bad audio mixing destroys emotional impact.",
        "Sound effects teach players faster than tutorials."
    ],
    narrative: [
        "Environmental storytelling is better than cutscenes.",
        "Ambiguity makes stories better.",
        "Player choice in story games is often an illusion.",
        "A game’s theme matters more than its plot.",
        "Too much story can ruin pacing."
    ],
    experience: [
        "Frustration is part of good game design.",
        "A sense of discovery matters more than rewards.",
        "Failure teaches better than tutorials.",
        "Players want freedom but need structure.",
        "Reward systems manipulate players more than they entertain."
    ],
    culture: [
        "Games are the most important art form of the 21st century.",
        "Remakes are replacing original ideas.",
        "Accessibility should always be required.",
        "Microtransactions are a design problem.",
        "Indie games push creativity more than AAA games."
    ]
};

// ===============================
// 🎮 GAME HOT TAKES
// ===============================
const gameTakes = {
    gameplay: [
        "Super Mario 64 has better platforming than most modern games.",
        "Skyrim is only fun because of mods.",
        "Call of Duty reuses the same gameplay loop every year.",
        "Minecraft is the best sandbox game ever made.",
        "Portal proves short games are better than long ones."
    ],
    graphics: [
        "Wind Waker aged better than most realistic games.",
        "Pixel art aged better than early 3D graphics.",
        "Overwatch has some of the most iconic character designs ever.",
        "Realistic graphics age faster than stylized ones.",
        "Skyrim’s visuals were outdated at launch."
    ],
    sound: [
        "Halo has one of the greatest soundtracks in gaming.",
        "Silent Hill uses sound better than most horror games.",
        "Mario sound effects are more iconic than most game music.",
        "Skyrim’s soundtrack is half the experience.",
        "Fortnite relies heavily on sound cues for survival."
    ],
    narrative: [
        "Ocarina of Time tells a better story than most RPGs today.",
        "GTA IV has a better story than GTA V.",
        "Silent Hill 2 is the best-written horror game ever.",
        "Undertale tells a deeper story than most AAA titles.",
        "Final Fantasy VII remains the most influential RPG story."
    ],
    experience: [
        "Frustration is what makes Souls-like games satisfying.",
        "Mario games create the best sense of flow.",
        "Pokémon is too easy but still satisfying.",
        "Open-world freedom often reduces meaning.",
        "Battle royale games are more fun to watch than play."
    ],
    culture: [
        "Minecraft is the most influential game ever.",
        "Fortnite shaped an entire generation of players.",
        "MMOs peaked with the early 2000s.",
        "Nostalgia drives most of gaming culture.",
        "Nintendo games age better than realistic games."
    ]
};

contentTakes.all = Object.values(contentTakes).flat();
gameTakes.all = Object.values(gameTakes).flat();

let MODE = "content";
let history = [];
let timerInterval;

// ===============================
// 🎛 MODE SWITCHER
// ===============================
function setMode(mode) {
    MODE = mode;
    playSound("ping");
    document.getElementById("modeIndicator").innerText =
        mode === "content" ? "Content Mode ACTIVE" : "Game Mode ACTIVE";
}

// ===============================
// 🎲 HOT TAKE GENERATOR
// ===============================
function newHotTake(category) {
    playSound("reveal");

    const set = MODE === "content" ? contentTakes : gameTakes;
    const list = category === "all" ? set.all : set[category];

    const chosen = list[Math.floor(Math.random() * list.length)];

    const box = document.getElementById("hotTakeBox");
    box.classList.remove("reveal-animation");
    void box.offsetWidth;
    box.classList.add("reveal-animation");

    box.innerText = chosen;

    document.getElementById("moveCue").style.display = "block";
    playSound("ping");

    startTimer(30);

    history.unshift(chosen);
    if (history.length > 5) history.pop();
    updateHistory();
}

// ===============================
// ⏳ TIMER
// ===============================
function startTimer(seconds) {
    const timer = document.getElementById("timer");
    timer.style.display = "block";

    let time = seconds;
    timer.innerText = time;

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        time--;
        timer.innerText = time;
        if (time <= 0) {
            clearInterval(timerInterval);
            timer.innerText = "GO!";
            playSound("ding");
        }
    }, 1000);
}

// ===============================
// 🕒 HISTORY DISPLAY
// ===============================
function updateHistory() {
    const list = document.getElementById("historyList");
    list.innerHTML = "";
    history.forEach(item => {
        const li = document.createElement("li");
        li.innerText = item;
        list.appendChild(li);
    });
}

</script>
</body>
</html>
